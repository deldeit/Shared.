<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Shared.</title>
<meta name="theme-color" content="#000000">

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

<style>
  :root{
    --bg:#000;
    --text:#fff;
    --muted:rgba(255,255,255,.68);
    --muted-2:rgba(255,255,255,.48);
    --border:rgba(255,255,255,.14);
    --panel:rgba(255,255,255,.05);
    --panel-2:rgba(255,255,255,.08);
    --panel-3:rgba(255,255,255,.12);
    --danger:#ff3b30;
    --like:#ff2d55;
    --sidebar-w:330px;
    --feed-width:420px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:#000;
    color:#fff;
    font-family:'Archivo Black', sans-serif;
    overflow:hidden;
  }

  button, input, a{font-family:'Archivo Black', sans-serif;}

  .app{
    width:100%;
    height:100vh;
    display:flex;
    background:#000;
  }

  .sidebar{
    position:fixed;
    left:0;
    top:0;
    bottom:0;
    width:var(--sidebar-w);
    padding:18px 16px;
    display:flex;
    flex-direction:column;
    gap:14px;
    border-right:1px solid rgba(255,255,255,.1);
    background:#000;
    z-index:20;
    overflow:hidden;
  }

  .sidebar-top{
    display:flex;
    flex-direction:column;
    gap:14px;
    min-height:0;
    flex:1;
  }

  .sidebar-bottom{
    margin-top:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .search-wrap{position:relative}

  .search{
    width:100%;
    display:block;
    padding:14px 16px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.18);
    background:#111;
    color:#fff;
    outline:none;
    font-size:15px;
  }

  .search::placeholder{color:rgba(255,255,255,.4)}

  .suggestions{
    position:absolute;
    left:0;
    right:0;
    top:calc(100% + 8px);
    display:none;
    background:#0b0b0b;
    border:1px solid rgba(255,255,255,.14);
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.55);
    max-height:320px;
    overflow-y:auto;
    z-index:30;
  }

  .suggestion{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 14px;
    cursor:pointer;
    border-bottom:1px solid rgba(255,255,255,.06);
  }

  .suggestion:last-child{border-bottom:0}
  .suggestion:hover{background:rgba(255,255,255,.06)}

  .suggestion-avatar,
  .avatar,
  .story img,
  .album-cover{
    object-fit:cover;
    background:#111;
  }

  .suggestion-avatar{
    width:34px;
    height:34px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,.1);
    flex:0 0 auto;
  }

  .suggestion-meta{min-width:0;flex:1}
  .suggestion-title{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:14px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .suggestion-subtitle{
    margin-top:3px;
    font-size:11px;
    color:var(--muted-2);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .nav-btn{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 15px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.15);
    background:rgba(255,255,255,.05);
    color:#fff;
    cursor:pointer;
    transition:.2s;
    text-decoration:none;
    user-select:none;
    line-height:1;
    font-size:15px;
  }

  .nav-btn:hover{background:rgba(255,255,255,.1)}
  .nav-btn.logout{
    background:rgba(255,59,48,.14);
    color:#ff7a73;
    border-color:rgba(255,59,48,.3);
  }

  .nav-btn .material-symbols-rounded{
    font-size:22px;
    line-height:1;
  }

  .main{
    margin-left:var(--sidebar-w);
    width:calc(100% - var(--sidebar-w));
    height:100vh;
    overflow-y:auto;
    overflow-x:hidden;
    scroll-snap-type:y mandatory;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;
  }

  .header{
    text-align:center;
    padding:18px 12px 14px;
    font-size:30px;
    letter-spacing:-.05em;
    border-bottom:1px solid rgba(255,255,255,.08);
    position:sticky;
    top:0;
    background:#000;
    z-index:5;
  }

  .stories-section{padding-top:8px;}

  .section-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 12px 10px;
  }

  .section-title{
    font-size:12px;
    color:var(--muted-2);
    letter-spacing:.14em;
    text-transform:uppercase;
  }

  .stories{
    display:flex;
    gap:14px;
    overflow-x:auto;
    padding:8px 12px 6px;
    scrollbar-width:none;
  }

  .stories::-webkit-scrollbar{display:none}

  .story{
    min-width:70px;
    text-align:center;
    cursor:pointer;
    flex:0 0 auto;
  }

  .story img{
    width:60px;
    height:60px;
    border-radius:50%;
    border:2px solid #fff;
    display:block;
    margin:0 auto 8px;
  }

  .story div{
    font-size:11px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .feed{
    display:flex;
    flex-direction:column;
    gap:12px;
    padding:34px 0 22px;
  }

  .post{
    scroll-snap-align:start;
    width:min(var(--feed-width), calc(100vw - var(--sidebar-w) - 24px));
    margin:0 auto;
    border:1px solid rgba(255,255,255,.15);
    border-radius:18px;
    overflow:hidden;
    background:#000;
  }

  .post-header{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 11px;
  }

  .avatar{
    width:42px;
    height:42px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,.12);
    flex:0 0 auto;
  }

  .username{
    display:flex;
    align-items:center;
    gap:6px;
    cursor:pointer;
    font-size:15px;
    line-height:1.1;
  }

  .verified{
    font-size:16px;
    color:#fff;
    flex:0 0 auto;
  }

  .post-time{
    margin-top:4px;
    font-size:10px;
    color:var(--muted-2);
  }

  .media{
    position:relative;
    width:100%;
    aspect-ratio:4/3;
    background:#111;
    overflow:hidden;
  }

  .media img{
    width:100%;
    height:100%;
    display:block;
    object-fit:cover;
  }

  .like-pop{
    position:absolute;
    inset:auto auto 50% 50%;
    transform:translate(-50%, 50%) scale(.8);
    pointer-events:none;
    opacity:0;
    z-index:3;
    color:var(--like);
    filter:drop-shadow(0 6px 20px rgba(0,0,0,.6));
    transition:opacity .15s ease, transform .15s ease;
  }

  .like-pop.show{
    opacity:1;
    transform:translate(-50%, 50%) scale(1);
  }

  .like-pop .material-symbols-rounded{
    font-size:72px;
    font-variation-settings:'FILL' 1,'wght' 700,'GRAD' 0,'opsz' 48;
  }

  .actions{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:10px 11px 0;
  }

  .like-row{
    display:flex;
    align-items:center;
    gap:10px;
  }

  .like-btn{
    width:40px;
    height:40px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.05);
    color:#fff;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:.18s;
    flex:0 0 auto;
  }

  .like-btn:hover{background:rgba(255,255,255,.1)}
  .like-btn:active{transform:scale(.96)}
  .like-btn.liked{color:var(--like);background:rgba(255,45,85,.08);border-color:rgba(255,45,85,.28)}

  .like-btn .material-symbols-rounded{
    font-size:20px;
    font-variation-settings:'FILL' 1,'wght' 700,'GRAD' 0,'opsz' 24;
  }

  .count{
    font-size:12px;
    color:var(--muted);
    cursor:pointer;
    user-select:none;
  }

  .tag-row{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    padding:10px 11px 0;
  }

  .tag-pill{
    padding:6px 10px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.05);
    color:#fff;
    font-size:11px;
    letter-spacing:.02em;
  }

  .caption{
    padding:10px 11px 0;
    font-size:14px;
    line-height:1.42;
  }

  .song-card{
    display:flex;
    align-items:center;
    gap:12px;
    padding:11px;
    margin:11px;
    border-radius:16px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
  }

  .album-cover{
    width:46px;
    height:46px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,.12);
    flex:0 0 auto;
  }

  .note-cover{
    width:46px;
    height:46px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,.12);
    display:flex;
    align-items:center;
    justify-content:center;
    background:#111;
    flex:0 0 auto;
  }

  .note-cover .material-symbols-rounded{
    font-size:24px;
  }

  .song-info{
    min-width:0;
    flex:1;
  }

  .song-title{
    font-size:14px;
    line-height:1.2;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .song-author{
    margin-top:4px;
    font-size:11px;
    color:var(--muted-2);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  audio.bg-audio{display:none}

  .loading{
    position:fixed;
    inset:0;
    z-index:100;
    display:grid;
    place-items:center;
    background:#000;
    transition:opacity .2s ease, visibility .2s ease;
  }

  .loading.hidden{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
  }

  .loading-card{
    display:grid;
    gap:14px;
    justify-items:center;
    padding:26px 22px;
    border-radius:24px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.12);
    min-width:220px;
  }

  .spinner{
    width:42px;
    height:42px;
    border-radius:50%;
    border:3px solid rgba(255,255,255,.14);
    border-top-color:#fff;
    animation:spin .85s linear infinite;
  }

  .loading-text{font-size:18px}

  @keyframes spin{to{transform:rotate(360deg)}}

  .story-viewer{
    position:fixed;
    inset:0;
    z-index:110;
    display:grid;
    place-items:center;
    background:#000;
    opacity:0;
    visibility:hidden;
    pointer-events:none;
    transition:opacity .2s ease, visibility .2s ease;
  }

  .story-viewer.open{
    opacity:1;
    visibility:visible;
    pointer-events:auto;
  }

  .story-viewer-shell,
  .story-stage{width:100%;height:100%;max-width:100vw;position:relative}

  .story-stage{background:#000}

  .story-stage img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .story-gradient{
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,.62), transparent 18%, transparent 78%, rgba(0,0,0,.72));
    pointer-events:none;
  }

  .story-top{
    position:absolute;
    top:0;
    left:0;
    right:0;
    z-index:2;
    padding:calc(14px + var(--safe-top)) 12px 12px;
    display:grid;
    gap:10px;
    background:linear-gradient(180deg, rgba(0,0,0,.56), transparent);
  }

  .progress-row{
    display:grid;
    grid-template-columns:repeat(12, 1fr);
    gap:4px;
  }

  .progress{
    height:3px;
    background:rgba(255,255,255,.18);
    border-radius:999px;
    overflow:hidden;
  }

  .progress > span{
    display:block;
    width:0%;
    height:100%;
    background:#fff;
    border-radius:inherit;
  }

  .story-meta{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    color:#fff;
  }

  .story-meta-left{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:0;
  }

  .story-meta-avatar{
    width:36px;
    height:36px;
    border-radius:50%;
    object-fit:cover;
    border:1px solid rgba(255,255,255,.16);
    background:#111;
  }

  .story-meta-name{
    font-size:16px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .close-btn{
    width:42px;
    height:42px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.16);
    background:rgba(255,255,255,.06);
    color:#fff;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }

  .story-tap-zone{
    position:absolute;
    inset:0;
    z-index:1;
    display:grid;
    grid-template-columns:1fr 1fr;
  }

  .story-hint{
    position:absolute;
    left:50%;
    bottom:calc(18px + var(--safe-bottom));
    transform:translateX(-50%);
    z-index:2;
    padding:10px 14px;
    border-radius:999px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.14);
    font-size:12px;
    backdrop-filter:blur(14px);
  }

  .modal{
    position:fixed;
    inset:0;
    z-index:120;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.88);
    padding:16px;
  }

  .modal.open{display:flex}

  .modal-box{
    width:min(92vw, 520px);
    max-height:min(80vh, 760px);
    overflow:auto;
    background:#0b0b0b;
    border:1px solid rgba(255,255,255,.14);
    border-radius:22px;
    box-shadow:0 22px 70px rgba(0,0,0,.55);
    padding:14px;
  }

  .modal-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:12px;
  }

  .modal-title{font-size:18px}

  .modal-close{
    width:38px;
    height:38px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.05);
    color:#fff;
    cursor:pointer;
    font-family:'Archivo Black', sans-serif;
  }

  .list-item{
    display:flex;
    align-items:center;
    gap:10px;
    width:100%;
    padding:10px 8px;
    border-radius:14px;
    cursor:pointer;
    transition:background .14s ease;
  }

  .list-item:hover{background:rgba(255,255,255,.05)}

  .list-avatar{
    width:34px;
    height:34px;
    border-radius:50%;
    object-fit:cover;
    background:#111;
    border:1px solid rgba(255,255,255,.10);
    flex:0 0 auto;
  }

  .list-main{min-width:0;flex:1}

  .list-name{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:15px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .list-sub{
    margin-top:2px;
    color:var(--muted-2);
    font-size:12px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .empty{
    margin:16px 14px 0;
    padding:22px;
    border-radius:22px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    color:var(--muted);
    text-align:center;
    font-size:15px;
  }

  @media (max-width: 860px){
    .app{display:block}
    .sidebar{
      position:sticky;
      top:0;
      width:100%;
      height:auto;
      bottom:auto;
      border-right:0;
      border-bottom:1px solid rgba(255,255,255,.1);
      padding:10px;
      gap:10px;
    }
    .sidebar-top{gap:10px}
    .sidebar-bottom{
      flex-direction:row;
      gap:8px;
      overflow-x:auto;
    }
    .nav-btn{
      padding:12px 14px;
      font-size:13px;
      border-radius:12px;
      white-space:nowrap;
      min-width:0;
    }
    .main{
      margin-left:0;
      width:100%;
      height:calc(100vh - 160px);
    }
    .header{font-size:28px}
    .post{width:calc(100vw - 18px)}
  }
</style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="search-wrap">
          <input id="search" class="search" placeholder="Search" autocomplete="off">
          <div id="suggestions" class="suggestions"></div>
        </div>
      </div>

      <div class="sidebar-bottom">
        <button class="nav-btn" type="button" onclick="goUpload('post')">
          <span class="material-symbols-rounded">upload</span>
          <span>Upload post</span>
        </button>

        <button class="nav-btn" type="button" onclick="goUpload('story')">
          <span class="material-symbols-rounded">add_circle</span>
          <span>Upload story</span>
        </button>

        <a class="nav-btn" href="settings.html">
          <span class="material-symbols-rounded">settings</span>
          <span>Settings</span>
        </a>

        <a class="nav-btn" href="about.html">
          <span class="material-symbols-rounded">info</span>
          <span>About</span>
        </a>

        <button class="nav-btn logout" type="button" onclick="logout()">
          <span class="material-symbols-rounded">logout</span>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <main class="main" id="mainScroll">
      <div class="header">Shared.</div>

      <section id="storiesSection" class="stories-section">
        <div class="section-head">
          <div class="section-title">Stories</div>
        </div>
        <div id="stories" class="stories"></div>
      </section>

      <div id="feed" class="feed"></div>
    </main>
  </div>

  <div id="loading" class="loading" role="status" aria-live="assertive">
    <div class="loading-card">
      <div class="spinner"></div>
      <div class="loading-text">Loading Shared...</div>
    </div>
  </div>

  <div id="storyViewer" class="story-viewer" aria-hidden="true">
    <div class="story-viewer-shell">
      <div class="story-stage">
        <img id="storyImage" alt="Story">
        <div class="story-gradient"></div>

        <div class="story-top">
          <div class="progress-row" id="progressRow"></div>
          <div class="story-meta">
            <div class="story-meta-left">
              <img id="storyAvatar" class="story-meta-avatar" alt="Profile avatar">
              <div id="storyName" class="story-meta-name"></div>
            </div>
            <button id="closeStory" class="close-btn" aria-label="Close story" type="button">
              <span class="material-symbols-rounded">close</span>
            </button>
          </div>
        </div>

        <div class="story-tap-zone" aria-hidden="true">
          <div id="prevStory"></div>
          <div id="nextStory"></div>
        </div>

        <div class="story-hint">Tap to navigate</div>
      </div>
    </div>
  </div>

  <div id="likesModal" class="modal" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="likesTitle">
      <div class="modal-head">
        <div id="likesTitle" class="modal-title">Likes</div>
        <button class="modal-close" type="button" id="closeLikesBtn">✕</button>
      </div>
      <div id="likesList"></div>
    </div>
  </div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = "https://cnhaonawapuahzoctqav.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes";
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const BUCKET_AVATARS = "avatars";
const BUCKET_SHARED = "shared";
const BUCKET_STORIES = "stories";

const state = {
  profiles: [],
  posts: [],
  likes: [],
  currentUserId: null,
  storyQueue: [],
  storyIndex: 0,
  storyTimer: null,
  storyRaf: null,
  storyStartTs: 0,
  storyDurationMs: 30000,
  searchQuery: "",
  coverCache: new Map()
};

const els = {
  loading: document.getElementById("loading"),
  mainScroll: document.getElementById("mainScroll"),
  storiesSection: document.getElementById("storiesSection"),
  stories: document.getElementById("stories"),
  feed: document.getElementById("feed"),
  storyViewer: document.getElementById("storyViewer"),
  storyImage: document.getElementById("storyImage"),
  storyAvatar: document.getElementById("storyAvatar"),
  storyName: document.getElementById("storyName"),
  progressRow: document.getElementById("progressRow"),
  closeStory: document.getElementById("closeStory"),
  prevStory: document.getElementById("prevStory"),
  nextStory: document.getElementById("nextStory"),
  search: document.getElementById("search"),
  suggestions: document.getElementById("suggestions"),
  likesModal: document.getElementById("likesModal"),
  likesList: document.getElementById("likesList"),
  closeLikesBtn: document.getElementById("closeLikesBtn")
};

function safeArray(v) { return Array.isArray(v) ? v : []; }

function escapeHtml(str) {
  return String(str ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatCount(n) {
  const num = Number(n || 0);
  if (num >= 1000000) return `${(num / 1000000).toFixed(num % 1000000 ? 1 : 0)}M`;
  if (num >= 1000) return `${(num / 1000).toFixed(num % 1000 ? 1 : 0)}K`;
  return String(num);
}

function timeAgo(value) {
  const date = value ? new Date(value) : null;
  if (!date || Number.isNaN(date.getTime())) return "";
  const diff = Math.max(0, Date.now() - date.getTime());
  const minutes = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);
  if (minutes < 1) return "just now";
  if (minutes < 60) return `${minutes}m ago`;
  if (hours < 24) return `${hours}h ago`;
  if (days < 7) return `${days}d ago`;
  return date.toLocaleDateString([], { month: "short", day: "numeric" });
}

function defaultProfileIcon() {
  return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
      <rect width="120" height="120" rx="60" fill="#111"/>
      <circle cx="60" cy="48" r="18" fill="#fff"/>
      <path d="M24 102c7-20 24-30 36-30s29 10 36 30" fill="#fff"/>
    </svg>
  `)}`;
}

function placeholderImage() {
  return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
      <rect width="800" height="600" fill="#111"/>
      <rect x="120" y="80" width="560" height="440" rx="42" fill="#1b1b1b"/>
      <path d="M220 390l110-120 80 78 70-86 100 128" stroke="#fff" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="320" cy="220" r="44" fill="#fff"/>
    </svg>
  `)}`;
}

function notePlaceholder() {
  return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
      <rect width="120" height="120" rx="18" fill="#111"/>
      <path d="M74 22v44.4a18 18 0 1 0 8 15V42h20V22H74Z" fill="#fff"/>
    </svg>
  `)}`;
}

function normalizeAvatar(path) {
  if (!path) return "";
  if (/^https?:\/\//i.test(path)) return path;
  const { data } = supabase.storage.from(BUCKET_AVATARS).getPublicUrl(path);
  return data?.publicUrl || "";
}

function normalizeShared(path) {
  if (!path) return "";
  if (/^https?:\/\//i.test(path)) return path;
  const { data } = supabase.storage.from(BUCKET_SHARED).getPublicUrl(path);
  return data?.publicUrl || "";
}

function normalizeStory(path) {
  if (!path) return "";
  if (/^https?:\/\//i.test(path)) return path;
  const { data } = supabase.storage.from(BUCKET_STORIES).getPublicUrl(path);
  return data?.publicUrl || "";
}

function getProfileById(id) {
  return state.profiles.find((p) => String(p.id) === String(id)) || null;
}

function getUsernameForPost(post) {
  const profile = getProfileById(post.user_id) || getProfileById(post.profile_id);
  return post.username || profile?.username || profile?.full_name || "user";
}

function getAvatarForProfile(profile) {
  return normalizeAvatar(profile?.avatar_url || profile?.avatar || profile?.profile_image || "") || defaultProfileIcon();
}

function getAvatarForPost(post) {
  const profile = getProfileById(post.user_id) || getProfileById(post.profile_id);
  return normalizeAvatar(post.avatar_url || profile?.avatar_url || profile?.avatar || profile?.profile_image || "") || defaultProfileIcon();
}

function isVerified(profile) {
  return profile?.verified === true || profile?.verified === 'true' || profile?.verified === 1;
}

function tagsForPost(post) {
  const raw = post.tags;
  if (!raw) return [];
  if (Array.isArray(raw)) return raw.map((t) => String(t).trim()).filter(Boolean).slice(0, 8);
  return String(raw).split(',').map((t) => t.trim()).filter(Boolean).slice(0, 8);
}

function songKey(post) {
  return [post.song_title || post.song || "", post.song_author || post.song_artist || post.song_by || ""].join("|").trim().toLowerCase();
}

function getStoryQueue() {
  return state.profiles
    .map((profile) => {
      const avatarPath = profile.avatar_url || profile.avatar || profile.profile_image || "";
      const storyPath = profile.story_url || profile.story_image || profile.story || profile.latest_story || "";
      return {
        id: profile.id,
        username: profile.username || profile.full_name || "user",
        avatar: normalizeAvatar(avatarPath) || defaultProfileIcon(),
        story: normalizeStory(storyPath),
        profile
      };
    })
    .filter((item) => item.story || item.avatar || item.username);
}

function postLikeCount(postId) {
  return state.likes.filter((like) => String(like.post_id ?? like.postId ?? like.postid) === String(postId)).length;
}

function postLikedByMe(postId) {
  return state.currentUserId
    ? state.likes.some((like) => String(like.post_id ?? like.postId ?? like.postid) === String(postId) && String(like.user_id) === String(state.currentUserId))
    : false;
}

async function getCurrentUserId() {
  const { data, error } = await supabase.auth.getUser();
  if (error) return null;
  return data?.user?.id || null;
}

async function loadData() {
  try {
    const [{ data: profilesData }, { data: postsData }, { data: likesData }, currentUserId] = await Promise.all([
      supabase.from("profiles").select("*").order("username", { ascending: true }),
      supabase.from("posts").select("*").order("created_at", { ascending: false }),
      supabase.from("likes").select("*"),
      getCurrentUserId()
    ]);

    state.profiles = safeArray(profilesData);
    state.posts = safeArray(postsData);
    state.likes = safeArray(likesData);
    state.currentUserId = currentUserId;
    state.storyQueue = getStoryQueue();

    renderStories();
    await renderFeed(resolveCurrentFeed());
    updateSuggestions();
  } catch (err) {
    console.error(err);
    els.feed.innerHTML = `<div class="empty">Impossibile caricare i contenuti.</div>`;
  } finally {
    els.loading.classList.add("hidden");
  }
}

function renderStories() {
  if (!state.storyQueue.length) {
    els.storiesSection.style.display = "none";
    return;
  }

  els.storiesSection.style.display = "block";
  els.stories.innerHTML = state.storyQueue.map((story, index) => `
    <button class="story" data-story-index="${index}" type="button" aria-label="Open story from ${escapeHtml(story.username)}">
      <img loading="lazy" src="${story.avatar || defaultProfileIcon()}" alt="${escapeHtml(story.username)} avatar">
      <div>${escapeHtml(story.username)}</div>
    </button>
  `).join("");

  els.stories.querySelectorAll("[data-story-index]").forEach((btn) => {
    btn.addEventListener("click", () => openStory(Number(btn.dataset.storyIndex)));
  });
}

async function resolveAlbumCover(post) {
  const key = songKey(post);
  if (!key) return "";
  if (state.coverCache.has(key)) return state.coverCache.get(key);

  const title = String(post.song_title || post.song || "").trim();
  const artist = String(post.song_author || post.song_artist || post.song_by || "").trim();
  const term = [title, artist].filter(Boolean).join(" ");
  if (!term) {
    state.coverCache.set(key, "");
    return "";
  }

  try {
    const url = `https://itunes.apple.com/search?term=${encodeURIComponent(term)}&media=music&entity=song&limit=1`;
    const res = await fetch(url);
    const data = await res.json();
    const artwork = data?.results?.[0]?.artworkUrl100 || "";
    const cover = artwork ? artwork.replace(/100x100bb\.(jpg|png|jpeg)$/i, "600x600bb.$1") : "";
    state.coverCache.set(key, cover);
    return cover;
  } catch {
    state.coverCache.set(key, "");
    return "";
  }
}

async function renderFeed(filteredPosts = state.posts) {
  if (!filteredPosts.length) {
    els.feed.innerHTML = `<div class="empty">Nessun post trovato.</div>`;
    return;
  }

  els.feed.innerHTML = filteredPosts.map((post) => {
    const username = getUsernameForPost(post);
    const profile = getProfileById(post.user_id) || getProfileById(post.profile_id);
    const avatar = getAvatarForPost(post);
    const image = normalizeShared(post.image_url || post.media_url || post.image || "");
    const caption = post.caption || post.text || "";
    const songTitle = post.song_title || post.song || "";
    const songAuthor = post.song_author || post.song_artist || post.song_by || "";
    const songPreview = post.song_preview || post.audio_url || "";
    const songCover = normalizeShared(post.song_cover || post.album_cover || post.album_image || post.cover_url || post.artwork_url || post.album_art || "");
    const createdAt = post.created_at || post.inserted_at || post.updated_at || "";
    const likesCount = postLikeCount(post.id);
    const liked = postLikedByMe(post.id) || !!post.liked;
    const tags = tagsForPost(post);

    return `
      <article class="post" data-post-id="${escapeHtml(post.id)}">
        <div class="post-header">
          <img class="avatar" loading="lazy" src="${avatar}" alt="${escapeHtml(username)} avatar">
          <div class="user-meta">
            <div class="username" data-profile-id="${escapeHtml(post.user_id || post.profile_id || post.id)}">
              <span>${escapeHtml(username)}</span>
              ${profile && isVerified(profile) ? `<span class="verified">✓</span>` : ""}
            </div>
            <div class="post-time">${escapeHtml(timeAgo(createdAt))}</div>
          </div>
        </div>

        <div class="media" data-like-zone="${escapeHtml(post.id)}">
          <img class="lazy-media" loading="lazy" data-src="${escapeHtml(image)}" alt="Post by ${escapeHtml(username)}" src="${placeholderImage()}">
          <div class="like-pop" aria-hidden="true">
            <span class="material-symbols-rounded">favorite</span>
          </div>
        </div>

        <div class="actions">
          <div class="like-row">
            <button class="like-btn ${liked ? "liked" : ""}" data-like-btn="${escapeHtml(post.id)}" type="button" aria-label="Like post">
              <span class="material-symbols-rounded">favorite</span>
            </button>
            <div class="count" data-like-count="${escapeHtml(post.id)}">${formatCount(likesCount)} likes</div>
          </div>
        </div>

        ${tags.length ? `<div class="tag-row">${tags.map((tag) => `<span class="tag-pill">${escapeHtml(tag)}</span>`).join("")}</div>` : ""}

        ${caption ? `<div class="caption">${escapeHtml(caption)}</div>` : ""}

        ${(songTitle || songPreview) ? `
          <div class="song-card" data-song-key="${escapeHtml(songKey(post))}">
            ${songCover ? `<img class="album-cover" src="${songCover}" alt="Album cover">` : `<div class="note-cover" aria-label="No cover"><span class="material-symbols-rounded">music_note</span></div>`}
            <div class="song-info">
              ${songTitle ? `<div class="song-title">${escapeHtml(songTitle)}</div>` : ""}
              ${songAuthor ? `<div class="song-author">${escapeHtml(songAuthor)}</div>` : ""}
            </div>
            ${songPreview ? `<audio class="bg-audio" autoplay loop preload="auto" playsinline src="${escapeHtml(songPreview)}"></audio>` : ""}
          </div>
        ` : ""}
      </article>
    `;
  }).join("");

  wireLazyImages();
  wirePostInteractions();
  wireBackgroundAudio();
  wireDoubleTapLike();
  await resolveMissingCovers();
}

async function resolveMissingCovers() {
  const cards = [...document.querySelectorAll(".song-card[data-song-key]")];
  const targets = cards.filter((card) => card.querySelector(".note-cover"));

  await Promise.all(targets.map(async (card) => {
    const postEl = card.closest("[data-post-id]");
    if (!postEl) return;
    const postId = postEl.dataset.postId;
    const post = state.posts.find((p) => String(p.id) === String(postId));
    if (!post) return;

    const cover = await resolveAlbumCover(post);
    if (!cover) return;

    const note = card.querySelector(".note-cover");
    if (!note) return;
    const img = document.createElement("img");
    img.className = "album-cover";
    img.alt = "Album cover";
    img.src = cover;
    note.replaceWith(img);
  }));
}

function wireLazyImages() {
  const images = [...document.querySelectorAll("img.lazy-media")];
  const io = new IntersectionObserver((entries, observer) => {
    entries.forEach((entry) => {
      if (!entry.isIntersecting) return;
      const img = entry.target;
      const src = img.dataset.src;
      if (src) img.src = src;
      img.removeAttribute("data-src");
      observer.unobserve(img);
    });
  }, { root: els.mainScroll, threshold: 0.15, rootMargin: "160px 0px" });

  images.forEach((img) => io.observe(img));
}

function wireBackgroundAudio() {
  document.querySelectorAll("audio.bg-audio").forEach((audio) => {
    audio.volume = 0.22;
    const attemptPlay = async () => {
      try {
        await audio.play();
      } catch {
        // autoplay may be blocked until user interaction
      }
    };
    attemptPlay();
    audio.addEventListener("loadedmetadata", attemptPlay, { once: true });
  });
}

function toggleLike(postId) {
  const btn = document.querySelector(`[data-like-btn="${CSS.escape(postId)}"]`);
  const countEl = document.querySelector(`[data-like-count="${CSS.escape(postId)}"]`);
  if (!btn || !countEl) return;

  const liked = btn.classList.contains("liked");
  const currentCount = postLikeCount(postId);
  const nextCount = liked ? Math.max(0, currentCount - 1) : currentCount + 1;

  btn.classList.toggle("liked", !liked);
  countEl.textContent = `${formatCount(nextCount)} likes`;

  showLikePulse(postId);
  persistLike(postId, liked).catch((error) => {
    console.error(error);
    btn.classList.toggle("liked", liked);
    countEl.textContent = `${formatCount(currentCount)} likes`;
  });
}

function showLikePulse(postId) {
  const media = document.querySelector(`[data-like-zone="${CSS.escape(postId)}"]`);
  const pulse = media?.querySelector(".like-pop");
  if (!pulse) return;
  pulse.classList.add("show");
  setTimeout(() => pulse.classList.remove("show"), 220);
}

async function persistLike(postId, wasLiked) {
  if (!state.currentUserId) return;

  if (wasLiked) {
    const existing = state.likes.find((like) => String(like.post_id ?? like.postId ?? like.postid) === String(postId) && String(like.user_id) === String(state.currentUserId));
    if (existing?.id) {
      await supabase.from("likes").delete().eq("id", existing.id);
    } else {
      await supabase.from("likes").delete().eq("post_id", postId).eq("user_id", state.currentUserId);
    }
  } else {
    await supabase.from("likes").insert({ post_id: postId, user_id: state.currentUserId });
  }

  const { data } = await supabase.from("likes").select("*");
  state.likes = safeArray(data);
}

function wirePostInteractions() {
  document.querySelectorAll("[data-profile-id]").forEach((nameEl) => {
    nameEl.addEventListener("click", () => {
      const profileId = nameEl.dataset.profileId;
      goToProfile(profileId);
    });
  });

  document.querySelectorAll("[data-like-btn]").forEach((btn) => {
    btn.addEventListener("click", () => toggleLike(btn.dataset.likeBtn));
  });

  document.querySelectorAll("[data-like-count]").forEach((countEl) => {
    countEl.addEventListener("click", () => openLikesModal(countEl.dataset.likeCount));
  });
}

function wireDoubleTapLike() {
  const lastTap = new Map();

  document.querySelectorAll("[data-like-zone]").forEach((zone) => {
    zone.addEventListener("click", () => {
      const id = zone.dataset.likeZone;
      const now = Date.now();
      const prev = lastTap.get(id) || 0;
      if (now - prev < 300) {
        toggleLike(id);
        lastTap.delete(id);
        return;
      }
      lastTap.set(id, now);
      setTimeout(() => {
        if (lastTap.get(id) === now) lastTap.delete(id);
      }, 320);
    });

    zone.addEventListener("dblclick", () => {
      toggleLike(zone.dataset.likeZone);
    });
  });

  let touchStartTs = 0;
  let lastTouchPost = null;
  document.querySelectorAll("[data-like-zone]").forEach((zone) => {
    zone.addEventListener("touchend", () => {
      const id = zone.dataset.likeZone;
      const now = Date.now();
      if (lastTouchPost === id && now - touchStartTs < 320) {
        toggleLike(id);
        lastTouchPost = null;
        return;
      }
      touchStartTs = now;
      lastTouchPost = id;
    }, { passive: true });
  });
}

function resolveCurrentFeed() {
  return state.posts;
}

function updateSuggestions() {
  const q = state.searchQuery.trim().toLowerCase();
  if (!q) {
    els.suggestions.style.display = "none";
    els.suggestions.innerHTML = "";
    return;
  }

  const userMatches = state.profiles
    .filter((profile) => {
      const username = String(profile.username || profile.full_name || "").toLowerCase();
      const bio = String(profile.bio || "").toLowerCase();
      return username.includes(q) || bio.includes(q);
    })
    .slice(0, 8)
    .map((profile) => ({
      id: profile.id,
      title: profile.username || profile.full_name || "user",
      subtitle: profile.bio || "Open profile",
      avatar: getAvatarForProfile(profile),
      verified: isVerified(profile)
    }));

  if (!userMatches.length) {
    els.suggestions.style.display = "none";
    els.suggestions.innerHTML = "";
    return;
  }

  els.suggestions.innerHTML = userMatches.map((item) => `
    <div class="suggestion" data-suggestion-id="${escapeHtml(item.id)}">
      <img class="suggestion-avatar" src="${item.avatar}" alt="">
      <div class="suggestion-meta">
        <div class="suggestion-title">
          <span>${escapeHtml(item.title)}</span>
          ${item.verified ? `<span class="verified">✓</span>` : ""}
        </div>
        <div class="suggestion-subtitle">${escapeHtml(item.subtitle)}</div>
      </div>
    </div>
  `).join("");

  els.suggestions.style.display = "block";

  els.suggestions.querySelectorAll("[data-suggestion-id]").forEach((node) => {
    node.addEventListener("click", () => {
      goToProfile(node.dataset.suggestionId);
    });
  });
}

function goToProfile(profileId) {
  if (!profileId) return;
  window.location.href = `profile.html?id=${encodeURIComponent(profileId)}`;
}

function openStory(index) {
  if (!state.storyQueue.length) return;
  state.storyIndex = ((index % state.storyQueue.length) + state.storyQueue.length) % state.storyQueue.length;
  els.storyViewer.classList.add("open");
  els.storyViewer.setAttribute("aria-hidden", "false");
  document.body.style.overflow = "hidden";
  renderStory();
  startStoryTimer();
}

function closeStory() {
  stopStoryTimer();
  els.storyViewer.classList.remove("open");
  els.storyViewer.setAttribute("aria-hidden", "true");
  document.body.style.overflow = "hidden";
}

function renderStory() {
  const story = state.storyQueue[state.storyIndex];
  if (!story) return;
  els.storyImage.src = story.story || story.avatar || defaultProfileIcon();
  els.storyAvatar.src = story.avatar || defaultProfileIcon();
  els.storyName.textContent = story.username;
  renderProgressBars();
}

function renderProgressBars() {
  const total = Math.max(1, state.storyQueue.length);
  els.progressRow.innerHTML = Array.from({ length: total }, (_, i) => `
    <div class="progress"><span style="width:${i < state.storyIndex ? 100 : 0}%"></span></div>
  `).join("");
}

function updateProgress() {
  const bars = [...els.progressRow.querySelectorAll(".progress > span")];
  bars.forEach((bar, i) => {
    if (i < state.storyIndex) {
      bar.style.width = "100%";
    } else if (i > state.storyIndex) {
      bar.style.width = "0%";
    } else {
      const elapsed = performance.now() - state.storyStartTs;
      const pct = Math.min(100, (elapsed / state.storyDurationMs) * 100);
      bar.style.width = `${pct}%`;
    }
  });
  state.storyRaf = requestAnimationFrame(updateProgress);
}

function startStoryTimer() {
  stopStoryTimer();
  state.storyStartTs = performance.now();
  state.storyTimer = setTimeout(() => nextStory(), state.storyDurationMs);
  state.storyRaf = requestAnimationFrame(updateProgress);
}

function stopStoryTimer() {
  if (state.storyTimer) clearTimeout(state.storyTimer);
  if (state.storyRaf) cancelAnimationFrame(state.storyRaf);
  state.storyTimer = null;
  state.storyRaf = null;
}

function nextStory() {
  if (!state.storyQueue.length) return;
  state.storyIndex = (state.storyIndex + 1) % state.storyQueue.length;
  renderStory();
  startStoryTimer();
}

function prevStory() {
  if (!state.storyQueue.length) return;
  state.storyIndex = (state.storyIndex - 1 + state.storyQueue.length) % state.storyQueue.length;
  renderStory();
  startStoryTimer();
}

async function openLikesModal(postId) {
  const likesForPost = state.likes.filter((like) => String(like.post_id ?? like.postId ?? like.postid) === String(postId));
  const items = likesForPost.map((like) => {
    const profile = getProfileById(like.user_id);
    return {
      id: profile?.id || like.user_id,
      name: profile?.username || profile?.full_name || "user",
      avatar: getAvatarForProfile(profile),
      subtitle: profile?.bio || "Open profile",
      verified: isVerified(profile)
    };
  });

  els.likesList.innerHTML = items.length
    ? items.map((item) => `
        <div class="list-item" data-open-profile="${escapeHtml(item.id)}">
          <img class="list-avatar" src="${item.avatar}" alt="">
          <div class="list-main">
            <div class="list-name">
              <span>${escapeHtml(item.name)}</span>
              ${item.verified ? `<span class="verified">✓</span>` : ""}
            </div>
            <div class="list-sub">${escapeHtml(item.subtitle)}</div>
          </div>
        </div>
      `).join("")
    : `<div class="empty" style="margin:0;">No likes yet.</div>`;

  els.likesModal.classList.add("open");
  els.likesModal.setAttribute("aria-hidden", "false");

  els.likesList.querySelectorAll("[data-open-profile]").forEach((item) => {
    item.addEventListener("click", () => goToProfile(item.dataset.openProfile));
  });
}

function closeLikesModal() {
  els.likesModal.classList.remove("open");
  els.likesModal.setAttribute("aria-hidden", "true");
}

els.closeLikesBtn.addEventListener("click", closeLikesModal);
els.likesModal.addEventListener("click", (e) => {
  if (e.target === els.likesModal) closeLikesModal();
});

els.closeStory.addEventListener("click", closeStory);
els.storyViewer.addEventListener("click", (event) => {
  if (event.target === els.storyViewer) closeStory();
});
els.prevStory.addEventListener("click", (event) => { event.stopPropagation(); prevStory(); });
els.nextStory.addEventListener("click", (event) => { event.stopPropagation(); nextStory(); });

els.search.addEventListener("input", () => {
  state.searchQuery = els.search.value;
  updateSuggestions();
});

els.search.addEventListener("focus", updateSuggestions);
document.addEventListener("click", (e) => {
  if (!e.target.closest(".search-wrap")) {
    els.suggestions.style.display = "none";
  }
});

window.addEventListener("keydown", (event) => {
  if (els.storyViewer.classList.contains("open")) {
    if (event.key === "Escape") closeStory();
    if (event.key === "ArrowLeft") prevStory();
    if (event.key === "ArrowRight") nextStory();
  }
  if (els.likesModal.classList.contains("open") && event.key === "Escape") {
    closeLikesModal();
  }
});

document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    stopStoryTimer();
  } else if (els.storyViewer.classList.contains("open")) {
    startStoryTimer();
  }
});

window.goUpload = (type) => {
  window.location.href = `upload.html?type=${encodeURIComponent(type)}`;
};

window.logout = async () => {
  try {
    await supabase.auth.signOut();
  } finally {
    window.location.href = "index.html";
  }
};

window.goProfile = (id) => {
  if (!id) return;
  window.location.href = `profile.html?id=${encodeURIComponent(id)}`;
};

window.like = async (id) => {
  if (!id || !state.currentUserId) return;
  await supabase.from("likes").insert({ post_id: id, user_id: state.currentUserId });
  const { data } = await supabase.from("likes").select("*");
  state.likes = safeArray(data);
  renderFeed(resolveCurrentFeed());
};

window.showLikes = async (id) => {
  await openLikesModal(id);
};

loadData();
</script>
</body>
</html>
