<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Shared.</title>
  <meta name="theme-color" content="#000000" />
  <style>
    :root {
      --bg: #000000;
      --panel: rgba(255, 255, 255, 0.06);
      --panel-strong: rgba(255, 255, 255, 0.10);
      --border: rgba(255, 255, 255, 0.14);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.72);
      --muted-2: rgba(255, 255, 255, 0.50);
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.55);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --max-width: 740px;
      --header-h: 72px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      color: var(--text);
      overflow: hidden;
    }

    .app {
      width: 100%;
      height: 100dvh;
      display: flex;
      justify-content: center;
      background: #000;
    }

    .shell {
      width: 100%;
      max-width: var(--max-width);
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #000;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      padding-top: calc(var(--safe-top) + 10px);
      padding-inline: 14px;
      height: calc(var(--header-h) + var(--safe-top));
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
      background: rgba(0, 0, 0, 0.98);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .topbar-spacer { width: 1px; height: 1px; }

    .brand {
      justify-self: center;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
      font-weight: 900;
      letter-spacing: -0.05em;
      font-size: 1.45rem;
      line-height: 1;
    }

    .brand-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.10);
    }

    .actions-top {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chip-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.06);
      color: #fff;
      border-radius: 999px;
      padding: 10px 12px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
      text-decoration: none;
      white-space: nowrap;
    }

    .chip-btn:hover { transform: translateY(-1px); background: rgba(255,255,255,0.10); }
    .chip-btn:active { transform: scale(0.97); }

    .content {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      padding-bottom: calc(12px + var(--safe-bottom));
    }

    .content.snap-posts {
      scroll-snap-type: y proximity;
    }

    .section {
      padding: 12px 0 0;
    }

    .section-head {
      padding: 0 14px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .section-title {
      color: var(--muted);
      font-size: 0.74rem;
      letter-spacing: 0.20em;
      text-transform: uppercase;
    }

    .stories-wrap {
      position: relative;
    }

    .stories {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 74px;
      gap: 14px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 2px 14px 10px;
      scrollbar-width: none;
    }
    .stories::-webkit-scrollbar { display: none; }

    .story {
      appearance: none;
      border: 0;
      background: transparent;
      color: inherit;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      min-width: 74px;
    }

    .story-ring {
      width: 68px;
      height: 68px;
      border-radius: 999px;
      padding: 2px;
      background: #fff;
      transition: transform 180ms ease, opacity 180ms ease;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.12);
    }

    .story:active .story-ring,
    .story:hover .story-ring {
      transform: scale(0.98);
      opacity: 0.92;
    }

    .story-avatar {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      object-fit: cover;
      display: block;
      border: 2px solid #000;
      background: #111;
    }

    .story-name {
      max-width: 74px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .feed {
      display: grid;
      gap: 12px;
      padding: 2px 0 0;
    }

    .post {
      scroll-snap-align: start;
      border-top: 1px solid rgba(255,255,255,0.08);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: #000;
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      object-fit: cover;
      flex: 0 0 auto;
      border: 1px solid rgba(255,255,255,0.12);
      background: #111;
    }

    .user-meta { min-width: 0; flex: 1; }

    .username {
      margin: 0;
      font-weight: 800;
      font-size: 0.96rem;
      line-height: 1.2;
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .post-time {
      margin-top: 3px;
      color: var(--muted-2);
      font-size: 0.76rem;
    }

    .post-media {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #0b0b0b;
      overflow: hidden;
    }

    .post-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .post-body {
      padding: 12px 14px 16px;
      display: grid;
      gap: 12px;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .action-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.04);
      color: #fff;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .icon-btn:active { transform: scale(0.96); }
    .icon-btn.liked {
      background: rgba(255,255,255,0.16);
      border-color: rgba(255,255,255,0.34);
    }

    .icon {
      width: 20px;
      height: 20px;
      fill: currentColor;
      flex: 0 0 auto;
    }

    .count,
    .song-title,
    .caption {
      color: rgba(255,255,255,0.92);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .count { color: var(--muted); font-size: 0.84rem; }

    .caption strong { color: var(--text); }

    .song-card {
      display: grid;
      gap: 8px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .song-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted-2);
    }

    .audio-wrap {
      width: 100%;
      overflow: hidden;
      border-radius: 12px;
    }

    audio {
      width: 100%;
      display: block;
      filter: grayscale(1) contrast(1.15);
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: grid;
      place-items: center;
      background: #000;
      transition: opacity 240ms ease, visibility 240ms ease;
    }

    .loading.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loading-card {
      display: grid;
      gap: 14px;
      justify-items: center;
      padding: 26px 22px;
      border-radius: 24px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: var(--shadow);
      min-width: 220px;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 3px solid rgba(255,255,255,0.14);
      border-top-color: #fff;
      animation: spin 0.85s linear infinite;
    }

    .loading-text {
      color: var(--text);
      font-size: 0.98rem;
      letter-spacing: -0.01em;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .story-viewer {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      background: #000;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 220ms ease, visibility 220ms ease;
    }

    .story-viewer.open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .story-viewer-shell {
      position: relative;
      width: 100%;
      max-width: var(--max-width);
      height: 100%;
      overflow: hidden;
      display: flex;
      align-items: stretch;
      justify-content: center;
      background: #000;
    }

    .story-stage {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
    }

    .story-stage img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .story-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.62), transparent 20%, transparent 78%, rgba(0,0,0,0.72));
      pointer-events: none;
    }

    .story-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 2;
      padding: calc(14px + var(--safe-top)) 12px 12px;
      display: grid;
      gap: 10px;
      background: linear-gradient(180deg, rgba(0,0,0,0.56), transparent);
    }

    .progress-row {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 4px;
    }

    .progress {
      height: 3px;
      background: rgba(255,255,255,0.18);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress > span {
      display: block;
      width: 0%;
      height: 100%;
      background: #fff;
      border-radius: inherit;
    }

    .story-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--text);
    }

    .story-meta-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .story-meta-avatar {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.16);
    }

    .story-meta-name {
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .close-btn {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.06);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .story-tap-zone {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .story-hint {
      position: absolute;
      left: 50%;
      bottom: calc(18px + var(--safe-bottom));
      transform: translateX(-50%);
      z-index: 2;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.88);
      font-size: 0.8rem;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .empty {
      margin: 18px 14px 0;
      padding: 22px;
      border-radius: 22px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 420px) {
      .topbar {
        grid-template-columns: auto 1fr auto;
      }
      .brand { font-size: 1.25rem; }
      .chip-btn { padding: 9px 10px; font-size: 0.78rem; }
      .stories { grid-auto-columns: 70px; gap: 12px; }
      .story-ring { width: 64px; height: 64px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <header class="topbar">
        <div class="topbar-spacer"></div>
        <a class="brand" href="#" aria-label="Shared home">
          <span class="brand-dot"></span>
          <span>Shared.</span>
        </a>
        <div class="actions-top">
          <button id="uploadStoryBtn" class="chip-btn" type="button">Upload story</button>
          <button id="uploadPostBtn" class="chip-btn" type="button">Upload post</button>
        </div>
      </header>

      <main id="content" class="content snap-posts" aria-live="polite">
        <section class="section stories-wrap">
          <div class="section-head">
            <div class="section-title">Stories</div>
            <div id="storiesCount" class="section-title">0</div>
          </div>
          <div id="stories" class="stories" aria-label="Stories horizontal list"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <div class="section-title">Feed</div>
            <div id="postsCount" class="section-title">0</div>
          </div>
          <div id="feed" class="feed"></div>
        </section>
      </main>
    </div>
  </div>

  <div id="loading" class="loading" role="status" aria-live="assertive">
    <div class="loading-card">
      <div class="spinner"></div>
      <div class="loading-text">Loading Shared...</div>
    </div>
  </div>

  <div id="storyViewer" class="story-viewer" aria-hidden="true">
    <div class="story-viewer-shell">
      <div class="story-stage">
        <img id="storyImage" alt="Story" />
        <div class="story-gradient"></div>
        <div class="story-top">
          <div class="progress-row" id="progressRow"></div>
          <div class="story-meta">
            <div class="story-meta-left">
              <img id="storyAvatar" class="story-meta-avatar" alt="Profile avatar" />
              <div id="storyName" class="story-meta-name"></div>
            </div>
            <button id="closeStory" class="close-btn" aria-label="Close story">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18.3 5.71a1 1 0 0 0-1.42 0L12 10.59 7.12 5.71A1 1 0 0 0 5.7 7.12L10.59 12l-4.88 4.88a1 1 0 1 0 1.41 1.41L12 13.41l4.88 4.88a1 1 0 0 0 1.41-1.41L13.41 12l4.88-4.88a1 1 0 0 0 0-1.41Z"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="story-tap-zone" aria-hidden="true">
          <div id="prevStory"></div>
          <div id="nextStory"></div>
        </div>
        <div class="story-hint">Tap to navigate</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://cnhaonawapuahzoctqav.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const avatarBucket = "avatars";
    const sharedBucket = "shared";
    const storiesBucket = "stories";

    const state = {
      profiles: [],
      posts: [],
      likesByPost: new Map(),
      likedByMe: new Set(),
      currentUserId: null,
      storyQueue: [],
      storyIndex: 0,
      storyTimer: null,
      storyStartTs: 0,
      storyRaf: null,
      storyDurationMs: 30000
    };

    const els = {
      loading: document.getElementById("loading"),
      stories: document.getElementById("stories"),
      feed: document.getElementById("feed"),
      storiesCount: document.getElementById("storiesCount"),
      postsCount: document.getElementById("postsCount"),
      storyViewer: document.getElementById("storyViewer"),
      storyImage: document.getElementById("storyImage"),
      storyAvatar: document.getElementById("storyAvatar"),
      storyName: document.getElementById("storyName"),
      progressRow: document.getElementById("progressRow"),
      closeStory: document.getElementById("closeStory"),
      prevStory: document.getElementById("prevStory"),
      nextStory: document.getElementById("nextStory"),
      content: document.getElementById("content"),
      uploadStoryBtn: document.getElementById("uploadStoryBtn"),
      uploadPostBtn: document.getElementById("uploadPostBtn")
    };

    els.uploadStoryBtn.addEventListener("click", () => {
      window.location.href = "upload.html?type=story";
    });

    els.uploadPostBtn.addEventListener("click", () => {
      window.location.href = "upload.html";
    });

    function safeArray(value) {
      return Array.isArray(value) ? value : [];
    }

    function getProfileById(id) {
      return state.profiles.find((p) => p.id === id) || null;
    }

    function resolveAvatar(path) {
      if (!path) return "";
      if (path.startsWith("http://") || path.startsWith("https://")) return path;
      const { data } = supabase.storage.from(avatarBucket).getPublicUrl(path);
      return data?.publicUrl || "";
    }

    function resolveShared(path) {
      if (!path) return "";
      if (path.startsWith("http://") || path.startsWith("https://")) return path;
      const { data } = supabase.storage.from(sharedBucket).getPublicUrl(path);
      return data?.publicUrl || "";
    }

    function resolveStory(path) {
      if (!path) return "";
      if (path.startsWith("http://") || path.startsWith("https://")) return path;
      const { data } = supabase.storage.from(storiesBucket).getPublicUrl(path);
      return data?.publicUrl || "";
    }

    function formatCount(n) {
      const num = Number(n || 0);
      if (num >= 1000000) return `${(num / 1000000).toFixed(num % 1000000 ? 1 : 0)}M`;
      if (num >= 1000) return `${(num / 1000).toFixed(num % 1000 ? 1 : 0)}K`;
      return String(num);
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function timeAgo(value) {
      const date = value ? new Date(value) : null;
      if (!date || Number.isNaN(date.getTime())) return "";
      const diff = Math.max(0, Date.now() - date.getTime());
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);
      if (minutes < 1) return "just now";
      if (minutes < 60) return `${minutes}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7) return `${days}d ago`;
      return date.toLocaleDateString([], { month: "short", day: "numeric" });
    }

    async function getCurrentUserId() {
      const { data, error } = await supabase.auth.getUser();
      if (error) return null;
      return data?.user?.id || null;
    }

    async function loadData() {
      try {
        const [profilesRes, postsRes, likesRes, userId] = await Promise.all([
          supabase.from("profiles").select("*").order("username", { ascending: true }),
          supabase.from("posts").select("*").order("created_at", { ascending: false }),
          supabase.from("likes").select("*"),
          getCurrentUserId()
        ]);

        state.currentUserId = userId;
        state.profiles = safeArray(profilesRes.data);
        state.posts = safeArray(postsRes.data);

        const likes = safeArray(likesRes.data);
        state.likesByPost = new Map();
        state.likedByMe = new Set();

        for (const like of likes) {
          const postId = like.post_id ?? like.postId ?? like.postid;
          if (!postId) continue;
          state.likesByPost.set(postId, (state.likesByPost.get(postId) || 0) + 1);
          if (state.currentUserId && like.user_id === state.currentUserId) {
            state.likedByMe.add(postId);
          }
        }

        renderStories();
        renderFeed();
      } catch (err) {
        console.error(err);
        els.feed.innerHTML = `<div class="empty">Impossibile caricare i contenuti.</div>`;
      } finally {
        els.loading.classList.add("hidden");
      }
    }

    function buildStoriesFromProfiles() {
      return state.profiles
        .map((profile) => {
          const storyPath = profile.story_url || profile.story_image || profile.story || profile.latest_story || "";
          const avatarPath = profile.avatar_url || profile.avatar || profile.profile_image || "";
          return {
            id: profile.id,
            username: profile.username || profile.full_name || "user",
            avatar: resolveAvatar(avatarPath),
            story: resolveStory(storyPath),
            profile
          };
        })
        .filter((item) => item.story || item.avatar || item.username);
    }

    function placeholderAvatar(seed) {
      const label = encodeURIComponent(String(seed || "Shared"));
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
          <rect width="120" height="120" rx="60" fill="#111"/>
          <circle cx="60" cy="48" r="18" fill="#fff"/>
          <path d="M24 100c7-20 24-30 36-30s29 10 36 30" fill="#fff"/>
          <text x="60" y="114" font-family="Arial" font-size="0" fill="#fff">${label}</text>
        </svg>
      `)}`;
    }

    function renderStories() {
      state.storyQueue = buildStoriesFromProfiles();
      els.storiesCount.textContent = formatCount(state.storyQueue.length);

      if (!state.storyQueue.length) {
        els.stories.innerHTML = `<div class="empty" style="margin:0 14px; min-width: calc(100% - 28px);">Nessuna storia disponibile.</div>`;
        return;
      }

      els.stories.innerHTML = state.storyQueue.map((story, index) => `
        <button class="story" data-story-index="${index}" aria-label="Open story from ${escapeHtml(story.username)}">
          <span class="story-ring">
            <img class="story-avatar" loading="lazy" src="${story.avatar || placeholderAvatar(story.username)}" alt="${escapeHtml(story.username)} avatar" />
          </span>
          <span class="story-name">${escapeHtml(story.username)}</span>
        </button>
      `).join("");

      els.stories.querySelectorAll("[data-story-index]").forEach((btn) => {
        btn.addEventListener("click", () => openStory(Number(btn.dataset.storyIndex)));
      });
    }

    function renderFeed() {
      els.postsCount.textContent = formatCount(state.posts.length);

      if (!state.posts.length) {
        els.feed.innerHTML = `<div class="empty">Nessun post disponibile.</div>`;
        return;
      }

      els.feed.innerHTML = state.posts.map((post) => {
        const profile = getProfileById(post.user_id) || getProfileById(post.profile_id) || null;
        const username = post.username || profile?.username || profile?.full_name || "user";
        const avatarPath = post.avatar_url || profile?.avatar_url || profile?.avatar || "";
        const imagePath = resolveShared(post.image_url || post.media_url || post.image || "");
        const likes = Number(post.likes_count ?? state.likesByPost.get(post.id) ?? 0);
        const isLiked = state.likedByMe.has(post.id) || !!post.liked;
        const songTitle = post.song_title || post.song || "";
        const songPreview = post.song_preview || post.audio_url || "";
        const caption = post.caption || post.text || "";
        const createdAt = post.created_at || post.inserted_at || post.updated_at || "";

        return `
          <article class="post" data-post-id="${escapeHtml(post.id)}">
            <div class="post-header">
              <img class="avatar" loading="lazy" src="${resolveAvatar(avatarPath) || placeholderAvatar(username)}" alt="${escapeHtml(username)} avatar" />
              <div class="user-meta">
                <p class="username">${escapeHtml(username)}</p>
                <div class="post-time">${escapeHtml(timeAgo(createdAt))}</div>
              </div>
            </div>

            <div class="post-media">
              <img class="lazy-media" loading="lazy" data-src="${escapeHtml(imagePath)}" alt="Post by ${escapeHtml(username)}" src="${tinyBlurDataUri()}" />
            </div>

            <div class="post-body">
              <div class="actions">
                <div class="action-left">
                  <button class="icon-btn like-btn ${isLiked ? "liked" : ""}" data-like-btn="${escapeHtml(post.id)}" aria-label="Like post">
                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M12.1 21.35l-1.1-1.02C5.14 15.24 2 12.39 2 8.88 2 6.04 4.24 3.8 7.08 3.8c1.6 0 3.16.74 4.12 1.92.96-1.18 2.52-1.92 4.12-1.92C18.16 3.8 20.4 6.04 20.4 8.88c0 3.51-3.14 6.36-9 11.45l-1.3 1.02Z"/>
                    </svg>
                  </button>
                  <div class="count" data-like-count="${escapeHtml(post.id)}">${formatCount(likes)} likes</div>
                </div>
              </div>

              ${caption ? `<div class="caption"><strong>${escapeHtml(username)}</strong> ${escapeHtml(caption)}</div>` : ""}

              ${songTitle || songPreview ? `
                <div class="song-card">
                  <div class="song-label">Music</div>
                  ${songTitle ? `<div class="song-title">${escapeHtml(songTitle)}</div>` : ""}
                  ${songPreview ? `<div class="audio-wrap"><audio controls preload="none" src="${escapeHtml(songPreview)}"></audio></div>` : ""}
                </div>
              ` : ""}
            </div>
          </article>
        `;
      }).join("");

      wireLazyImages();
      wireLikeButtons();
    }

    function tinyBlurDataUri() {
      return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 10">
          <rect width="8" height="10" fill="#111"/>
        </svg>
      `);
    }

    function wireLazyImages() {
      const images = [...document.querySelectorAll("img.lazy-media")];
      const io = new IntersectionObserver((entries, observer) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) return;
          const img = entry.target;
          const src = img.dataset.src;
          if (src) img.src = src;
          img.removeAttribute("data-src");
          observer.unobserve(img);
        });
      }, { root: els.content, threshold: 0.15, rootMargin: "160px 0px" });

      images.forEach((img) => io.observe(img));
    }

    function wireLikeButtons() {
      document.querySelectorAll("[data-like-btn]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const postId = btn.dataset.likeBtn;
          if (!postId) return;

          const countEl = document.querySelector(`[data-like-count="${CSS.escape(postId)}"]`);
          const currentlyLiked = btn.classList.contains("liked");

          btn.classList.toggle("liked");
          let currentCount = Number((countEl?.textContent || "0").replace(/[^0-9]/g, "")) || 0;
          currentCount += currentlyLiked ? -1 : 1;
          if (countEl) countEl.textContent = `${formatCount(Math.max(0, currentCount))} likes`;

          if (!state.currentUserId) return;

          try {
            if (currentlyLiked) {
              await supabase.from("likes").delete().eq("post_id", postId).eq("user_id", state.currentUserId);
              state.likedByMe.delete(postId);
            } else {
              await supabase.from("likes").insert({ post_id: postId, user_id: state.currentUserId });
              state.likedByMe.add(postId);
            }
          } catch (error) {
            console.error(error);
            btn.classList.toggle("liked");
            if (countEl) countEl.textContent = `${formatCount(Math.max(0, currentlyLiked ? currentCount + 1 : currentCount - 1))} likes`;
          }
        });
      });
    }

    function openStory(index) {
      if (!state.storyQueue.length) return;
      state.storyIndex = ((index % state.storyQueue.length) + state.storyQueue.length) % state.storyQueue.length;
      els.storyViewer.classList.add("open");
      els.storyViewer.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
      renderStory();
      startStoryTimer();
    }

    function closeStory() {
      stopStoryTimer();
      els.storyViewer.classList.remove("open");
      els.storyViewer.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "hidden";
    }

    function renderStory() {
      const story = state.storyQueue[state.storyIndex];
      if (!story) return;
      els.storyImage.src = story.story || story.avatar || placeholderAvatar(story.username);
      els.storyAvatar.src = story.avatar || placeholderAvatar(story.username);
      els.storyName.textContent = story.username;
      renderProgressBars();
    }

    function renderProgressBars() {
      const total = Math.max(1, state.storyQueue.length);
      els.progressRow.innerHTML = Array.from({ length: total }, (_, i) => `
        <div class="progress"><span style="width:${i < state.storyIndex ? 100 : 0}%"></span></div>
      `).join("");
    }

    function updateProgress() {
      const bars = [...els.progressRow.querySelectorAll(".progress > span")];
      bars.forEach((bar, i) => {
        if (i < state.storyIndex) {
          bar.style.width = "100%";
        } else if (i > state.storyIndex) {
          bar.style.width = "0%";
        } else {
          const elapsed = performance.now() - state.storyStartTs;
          const pct = Math.min(100, (elapsed / state.storyDurationMs) * 100);
          bar.style.width = `${pct}%`;
        }
      });
      state.storyRaf = requestAnimationFrame(updateProgress);
    }

    function startStoryTimer() {
      stopStoryTimer();
      state.storyStartTs = performance.now();
      state.storyTimer = setTimeout(() => nextStory(), state.storyDurationMs);
      state.storyRaf = requestAnimationFrame(updateProgress);
    }

    function stopStoryTimer() {
      if (state.storyTimer) clearTimeout(state.storyTimer);
      if (state.storyRaf) cancelAnimationFrame(state.storyRaf);
      state.storyTimer = null;
      state.storyRaf = null;
    }

    function nextStory() {
      if (!state.storyQueue.length) return;
      state.storyIndex = (state.storyIndex + 1) % state.storyQueue.length;
      renderStory();
      startStoryTimer();
    }

    function prevStory() {
      if (!state.storyQueue.length) return;
      state.storyIndex = (state.storyIndex - 1 + state.storyQueue.length) % state.storyQueue.length;
      renderStory();
      startStoryTimer();
    }

    els.closeStory.addEventListener("click", closeStory);
    els.storyViewer.addEventListener("click", (event) => {
      if (event.target === els.storyViewer) closeStory();
    });
    els.prevStory.addEventListener("click", (event) => { event.stopPropagation(); prevStory(); });
    els.nextStory.addEventListener("click", (event) => { event.stopPropagation(); nextStory(); });
    window.addEventListener("keydown", (event) => {
      if (!els.storyViewer.classList.contains("open")) return;
      if (event.key === "Escape") closeStory();
      if (event.key === "ArrowLeft") prevStory();
      if (event.key === "ArrowRight") nextStory();
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        stopStoryTimer();
      } else if (els.storyViewer.classList.contains("open")) {
        startStoryTimer();
      }
    });

    loadData();
  </script>
</body>
</html>
