<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

<style>
body{
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:'Inter',sans-serif;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1a1a1a;
  padding:16px;
  border-radius:16px;
  margin-bottom:20px;
}

input, textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  background:#2a2a2a;
  color:white;
}

button{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:10px;
  border:none;
  border-radius:12px;
  background:white;
  color:black;
  cursor:pointer;
}

.post{
  margin-top:20px;
  background:#1a1a1a;
  padding:12px;
  border-radius:14px;
}

img{
  width:100%;
  border-radius:12px;
  margin-bottom:8px;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <input type="file" id="file">
    <textarea id="caption" placeholder="Write a caption..."></textarea>

    <button id="uploadBtn">
      <span class="material-symbols-outlined">send</span>
      Upload
    </button>

    <div id="status"></div>
  </div>

  <div id="feed"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://cnhaonawapuahzoctqav.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes"
);

const BUCKET = "shared";

// 🔴 METTI IL TUO DOMINIO TWICPICS
const TWIC_DOMAIN = "https://shared.twic.pics";

let user = null;
let file = null;

const status = document.getElementById("status");

// INIT
async function init(){
  const { data: { session } } = await supabase.auth.getSession();

  if(!session){
    window.location.href = "index.html";
    return;
  }

  user = session.user;
  loadFeed();
}
init();

// FILE
document.getElementById("file").onchange = e => {
  file = e.target.files[0];
};

// UPLOAD
document.getElementById("uploadBtn").onclick = async () => {

  if(!user) return setStatus("Not logged in");
  if(!file) return setStatus("Select a file");

  setStatus("Uploading...");

  try {
    const ext = file.name.split(".").pop();
    const fileName = `${user.id}/${Date.now()}.${ext}`;

    // Upload su Supabase
    const { error: uploadError } = await supabase.storage
      .from(BUCKET)
      .upload(fileName, file);

    if(uploadError) throw uploadError;

    // URL pubblico Supabase
    const { data } = supabase.storage
      .from(BUCKET)
      .getPublicUrl(fileName);

    const originalUrl = data.publicUrl;

    // 🔴 URL TWICPICS CORRETTO
    const twicUrl = `${TWIC_DOMAIN}/image?src=${encodeURIComponent(originalUrl)}&twic=v1/cover=800x600`;

    // Salva nel DB
    const { error: dbError } = await supabase
      .from("posts")
      .insert([{
        user_id: user.id,
        image_url: twicUrl,
        caption: document.getElementById("caption").value
      }]);

    if(dbError) throw dbError;

    setStatus("Upload OK ✅");
    loadFeed();

  } catch(err){
    setStatus("Error: " + (err.message || err));
  }
};

// FEED
async function loadFeed(){
  const { data, error } = await supabase
    .from("posts")
    .select("*")
    .order("created_at",{ascending:false});

  if(error){
    setStatus("Errore feed");
    return;
  }

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  data.forEach(p => {
    const div = document.createElement("div");
    div.className = "post";
    div.innerHTML = `
      <img src="${p.image_url}">
      <div>${p.caption || ""}</div>
    `;
    feed.appendChild(div);
  });
}

// STATUS
function setStatus(msg){
  status.innerText = msg;
}
</script>

</body>
</html>
