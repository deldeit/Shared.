<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shared</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  font-family:'Archivo Black', sans-serif;
}

body{
  margin:0;
  background:#000;
  color:#fff;
}

.container{
  max-width:720px;
  margin:auto;
  padding:20px;
}

.header{
  text-align:center;
  font-size:30px;
  margin-bottom:24px;
}

/* UPLOAD */
.upload-box{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:24px;
  padding:16px;
  margin-bottom:18px;
}

/* DROPZONE */
.dropzone{
  width:100%;
  height:160px;
  border-radius:18px;
  border:2px dashed #333;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  color:#777;
  cursor:pointer;
  transition:0.2s;
}

.dropzone.dragover{
  border-color:#fff;
  color:#fff;
}

/* PREVIEW */
.preview{
  width:100%;
  height:160px;
  border-radius:18px;
  overflow:hidden;
  display:none;
  margin-bottom:10px;
  border:1px solid #222;
}

.preview img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* INPUT */
input,textarea{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:14px;
  border:1px solid #222;
  background:#000;
  color:#fff;
}

/* SONG */
.song-wrapper{
  position:relative;
}

.song-item{
  padding:10px;
  border:1px solid #222;
  border-radius:12px;
  margin-top:6px;
  cursor:pointer;
  font-size:12px;
  background:#0f0f0f;
}

.song-item:hover{
  background:#111;
}

/* dropdown */
#suggestions{
  position:absolute;
  top:100%;
  left:0;
  right:0;
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:12px;
  margin-top:6px;
  max-height:220px;
  overflow:auto;
  z-index:10;
}

/* BUTTON */
button{
  width:100%;
  margin-top:12px;
  padding:14px;
  border-radius:16px;
  border:none;
  background:linear-gradient(135deg,#fff,#cfcfcf);
  color:#000;
  cursor:pointer;
}

/* POST */
.post{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:20px;
  padding:14px;
  margin-bottom:16px;
}

.post img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:16px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">Shared.</div>

<div class="upload-box">

  <div class="dropzone" id="dropzone">Drag & drop or click</div>

  <div class="preview" id="previewBox"></div>

  <input type="file" id="file" hidden accept="image/png,image/jpeg,image/jpg,image/gif">

  <textarea id="caption" placeholder="Write a caption..."></textarea>

  <!-- SONG -->
  <div class="song-wrapper">
    <input id="songInput" placeholder="Search song...">
    <div id="suggestions"></div>
  </div>

  <div id="songList"></div>

  <button id="uploadBtn">UPLOAD</button>

</div>

<div id="feed"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
"https://cnhaonawapuahzoctqav.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes"
);

let user;
let croppedBlob = null;
let selectedSong = null;
let audio = new Audio();

/* INIT */
(async()=>{
  const {data:{session}} = await supabase.auth.getSession();
  if(!session) location.href="index.html";
  user = session.user;
})();

const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("file");
const previewBox = document.getElementById("previewBox");
const caption = document.getElementById("caption");
const songInput = document.getElementById("songInput");
const suggestions = document.getElementById("suggestions");
const songList = document.getElementById("songList");

/* IMAGE HANDLING */
dropzone.onclick = ()=>fileInput.click();

fileInput.onchange = e=>{
  const f = e.target.files[0];
  if(!f) return;

  const reader = new FileReader();
  const img = new Image();

  reader.onload = e=>img.src=e.target.result;

  img.onload = ()=>{
    const canvas=document.createElement("canvas");
    canvas.width=800;
    canvas.height=800;

    const size=Math.min(img.width,img.height);
    const ctx=canvas.getContext("2d");

    ctx.drawImage(img,(img.width-size)/2,(img.height-size)/2,size,size,0,0,800,800);

    canvas.toBlob(b=>{
      croppedBlob=b;
      previewBox.style.display="block";
      dropzone.style.display="none";
      previewBox.innerHTML=`<img src="${URL.createObjectURL(b)}">`;
    },"image/jpeg",0.7);
  };

  reader.readAsDataURL(f);
};

/* =========================
   MUSIC SEARCH FIXED
========================= */

let debounce;

songInput.addEventListener("input", async e=>{
  clearTimeout(debounce);

  const q = e.target.value.trim();
  if(q.length < 2){
    suggestions.innerHTML="";
    return;
  }

  debounce = setTimeout(async ()=>{

    try{
      const res = await fetch(
        `https://corsproxy.io/?https://api.deezer.com/search?q=${encodeURIComponent(q)}`
      );

      const data = await res.json();

      suggestions.innerHTML="";

      (data.data || []).slice(0,6).forEach(track=>{

        if(!track.preview) return;

        const div = document.createElement("div");
        div.className="song-item";
        div.textContent=`${track.title} - ${track.artist.name}`;

        div.onclick=()=>{
          selectedSong={
            title:`${track.title} - ${track.artist.name}`,
            preview:track.preview
          };

          songList.innerHTML=`<div class="song-item">✓ ${selectedSong.title}</div>`;
          suggestions.innerHTML="";
          songInput.value="";

          audio.src = selectedSong.preview;
          audio.play().catch(()=>{});
        };

        suggestions.appendChild(div);
      });

    }catch(err){
      console.error("music error", err);
    }

  },250);
});

/* close dropdown */
document.addEventListener("click",(e)=>{
  if(!e.target.closest(".song-wrapper")){
    suggestions.innerHTML="";
  }
});

/* UPLOAD */
document.getElementById("uploadBtn").onclick = async ()=>{

  if(!croppedBlob) return alert("Image required");
  if(!caption.value.trim()) return alert("Caption required");
  if(!selectedSong) return alert("Select a song");

  const path = `${user.id}/${Date.now()}.jpg`;

  await supabase.storage.from("shared").upload(path,croppedBlob);

  const {data}=supabase.storage.from("shared").getPublicUrl(path);

  await supabase.from("posts").insert([{
    user_id:user.id,
    image_url:data.publicUrl,
    caption:caption.value,
    song_preview:selectedSong.preview,
    song_title:selectedSong.title
  }]);

  croppedBlob=null;
  selectedSong=null;

  previewBox.innerHTML="";
  previewBox.style.display="none";
  dropzone.style.display="flex";

  caption.value="";
  songInput.value="";
  songList.innerHTML="";
  suggestions.innerHTML="";
};

</script>

</body>
</html>
