<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Homepage</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Archivo Black', sans-serif;
}

body {
  background:#000;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
}

header {
  width:100%;
  max-width:900px;
  padding:20px;
  opacity:0.8;
}

.container {
  width:100%;
  max-width:900px;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

.card {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.dropzone {
  border:1px dashed rgba(255,255,255,0.25);
  border-radius:14px;
  padding:16px;
  text-align:center;
  font-size:13px;
  cursor:pointer;
}

.dropzone.dragover {
  background:rgba(255,255,255,0.05);
}

.preview {
  width:100%;
  max-height:320px;
  object-fit:cover;
  border-radius:14px;
  display:none;
}

textarea, input {
  background:rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.08);
  color:white;
  padding:10px;
  border-radius:12px;
  outline:none;
  font-size:13px;
}

.upload-btn {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:10px;
  border-radius:14px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  cursor:pointer;
}

.upload-btn input {
  display:none;
}

.songs {
  background:rgba(0,0,0,0.6);
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  max-height:160px;
  overflow:auto;
}

.song {
  padding:10px;
  display:flex;
  justify-content:space-between;
  font-size:12px;
  cursor:pointer;
}

.song:hover {
  background:rgba(255,255,255,0.05);
}

.material-icons {
  cursor:pointer;
  font-size:20px;
}

button {
  padding:10px;
  border:none;
  border-radius:12px;
  background:#fff;
  color:#000;
  font-weight:600;
  cursor:pointer;
}

button:disabled {
  opacity:0.5;
  cursor:not-allowed;
}

.post {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  overflow:hidden;
}

.post img {
  width:100%;
  display:block;
}

.post-body {
  padding:12px;
  font-size:13px;
}
</style>
</head>

<body>

<header>Homepage</header>

<div class="container">

  <div class="card">

    <div id="dropzone" class="dropzone">
      Drag & drop one image here
    </div>

    <label class="upload-btn">
      <span class="material-icons">upload</span>
      <span>Upload image</span>
      <input type="file" id="file" accept=".jpg,.jpeg,.png,.gif">
    </label>

    <img id="preview" class="preview">

    <textarea id="caption" placeholder="Write a caption"></textarea>

    <input id="songInput" placeholder="Search music...">

    <div id="suggestions" class="songs"></div>

    <button id="publishBtn" onclick="publishPost()">Publish</button>

  </div>

  <div id="feed"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://YOUR_PROJECT.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes"
);

/* AUTH */
const { data: sessionData } = await supabase.auth.getSession();
if (!sessionData.session) {
  window.location.href = "index.html";
}

const user = sessionData.session.user;

/* STATE */
let imageData = null;
let selectedMusic = null;
let currentAudio = null;

/* IMAGE HANDLER */
function handleFile(file) {
  if (!file) return;

  const allowed = ["image/jpeg","image/png","image/jpg","image/gif"];
  if (!allowed.includes(file.type)) return alert("Invalid file type");

  const reader = new FileReader();

  reader.onload = e => {
    imageData = e.target.result;

    const img = document.getElementById("preview");
    img.src = imageData;
    img.style.display = "block";

    document.getElementById("file").value = "";
  };

  reader.readAsDataURL(file);
}

document.getElementById("file").onchange = e => {
  handleFile(e.target.files[0]);
};

/* DRAG & DROP */
const dropzone = document.getElementById("dropzone");

dropzone.addEventListener("dragover", e => {
  e.preventDefault();
  dropzone.classList.add("dragover");
});

dropzone.addEventListener("dragleave", () => {
  dropzone.classList.remove("dragover");
});

dropzone.addEventListener("drop", e => {
  e.preventDefault();
  dropzone.classList.remove("dragover");
  handleFile(e.dataTransfer.files[0]);
});

/* MUSIC (DEEZER JSONP) */
window.handleDeezer = function(data){
  const box = document.getElementById("suggestions");
  box.innerHTML = "";

  data.data?.slice(0,5).forEach(t => {

    const div = document.createElement("div");
    div.className = "song";

    div.innerHTML = `
      <span>${t.title} - ${t.artist.name}</span>
      <span class="material-icons">play_arrow</span>
    `;

    const icon = div.querySelector(".material-icons");

    icon.onclick = (e) => {
      e.stopPropagation();

      if(currentAudio) currentAudio.pause();

      currentAudio = new Audio(t.preview);
      currentAudio.play();

      selectedMusic = t;
    };

    div.onclick = () => {
      selectedMusic = t;
      document.getElementById("songInput").value = t.title;
      box.innerHTML = "";
    };

    box.appendChild(div);
  });
};

let debounce;

document.getElementById("songInput").addEventListener("input", e => {
  clearTimeout(debounce);

  if(e.target.value.length < 2) return;

  debounce = setTimeout(() => {
    const s = document.createElement("script");
    s.src = `https://api.deezer.com/search?q=${encodeURIComponent(e.target.value)}&output=jsonp&callback=handleDeezer`;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 2000);
  }, 250);
});

/* RESET */
function resetComposer(){
  imageData = null;
  selectedMusic = null;

  document.getElementById("caption").value = "";
  document.getElementById("file").value = "";
  document.getElementById("songInput").value = "";
  document.getElementById("suggestions").innerHTML = "";

  const img = document.getElementById("preview");
  img.src = "";
  img.style.display = "none";
}

/* PUBLISH (BUCKET = shared) */
window.publishPost = async () => {
  const btn = document.getElementById("publishBtn");

  try {
    if (!imageData) return alert("Select an image");

    btn.disabled = true;
    btn.textContent = "Uploading...";

    const file = document.getElementById("file").files[0];
    const fileName = `${user.id}-${Date.now()}`;

    /* 🔥 BUCKET = shared */
    const { error: uploadError } = await supabase
      .storage
      .from("shared")
      .upload(fileName, file);

    if (uploadError) throw uploadError;

    const { data } = supabase
      .storage
      .from("shared")
      .getPublicUrl(fileName);

    const publicUrl = data.publicUrl;

    await supabase.from("posts").insert([{
      user_id: user.id,
      image_url: publicUrl,
      caption: document.getElementById("caption").value.trim(),
      music_title: selectedMusic?.title || null,
      music_preview: selectedMusic?.preview || null
    }]);

    resetComposer();
    loadFeed();

  } catch (err) {
    console.error(err);
    alert("Upload failed");
  } finally {
    btn.disabled = false;
    btn.textContent = "Publish";
  }
};

/* FEED */
async function loadFeed(){
  const { data } = await supabase
    .from("posts")
    .select("*")
    .order("created_at",{ascending:false});

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  data.forEach(p => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <img src="${p.image_url}">
      <div class="post-body">
        <div>${p.caption || ""}</div>
        <div>${p.music_title || ""}</div>
      </div>
    `;

    feed.appendChild(div);
  });
}

loadFeed();
</script>

</body>
</html>
