<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:'Archivo Black', sans-serif;
}

.container{
  max-width:720px;
  margin:auto;
  padding:20px;
}

.header{
  text-align:center;
  font-size:28px;
  margin-bottom:20px;
}

/* CARD */
.card{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:20px;
  padding:16px;
  margin-bottom:18px;
}

/* IMAGE PREVIEW SQUIRCLE */
.preview{
  width:100px;
  height:100px;
  border-radius:28px;
  background:#111;
  margin-bottom:10px;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid #222;
}

.preview img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* HIDDEN FILE INPUT */
input[type="file"]{
  display:none;
}

/* CUSTOM BUTTON */
.file-btn{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid #222;
  background:#000;
  color:#fff;
  cursor:pointer;
}

/* TEXT INPUTS */
input, textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:14px;
  border:1px solid #222;
  background:#000;
  color:#fff;
  font-family:'Archivo Black';
}

/* SONG */
.song-item{
  padding:10px;
  border:1px solid #222;
  border-radius:12px;
  margin-top:6px;
  cursor:pointer;
  font-size:12px;
}

.song-item:hover{
  background:#111;
}

/* POSTS */
.post{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:20px;
  padding:12px;
  margin-top:16px;
  cursor:pointer;
}

img{
  width:100%;
  border-radius:16px;
  margin-bottom:10px;
}

.song-title{
  font-size:18px;
  margin-top:10px;
}

.song-sub{
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">Shared.</div>

  <!-- UPLOAD -->
  <div class="card">

    <!-- IMAGE PREVIEW -->
    <div class="preview" id="previewBox">+</div>

    <label class="file-btn">
      Choose Image
      <input type="file" id="file">
    </label>

    <textarea id="caption" placeholder="Write caption..."></textarea>

    <!-- SONG -->
    <input id="songInput" placeholder="Search song...">
    <div id="suggestions"></div>
    <div id="songList"></div>

    <button id="uploadBtn">UPLOAD</button>
  </div>

  <!-- FEED -->
  <div id="feed"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://cnhaonawapuahzoctqav.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes"
);

const BUCKET = "shared";

let user = null;
let file = null;
let songs = [];
let croppedBlob = null;
let globalAudio = new Audio();

/* INIT */
async function init(){
  const { data:{session} } = await supabase.auth.getSession();
  if(!session) location.href="index.html";
  user = session.user;
  loadFeed();
}
init();

/* IMAGE PICK + CROPPING PREVIEW */
document.getElementById("file").onchange = async e => {
  file = e.target.files[0];
  if(!file) return;

  const img = new Image();
  const reader = new FileReader();

  reader.onload = ev => img.src = ev.target.result;

  img.onload = () => {
    const size = Math.min(img.width, img.height);

    const canvas = document.createElement("canvas");
    canvas.width = 800;
    canvas.height = 800;

    const ctx = canvas.getContext("2d");

    ctx.drawImage(img,
      (img.width-size)/2,
      (img.height-size)/2,
      size,size,
      0,0,800,800
    );

    canvas.toBlob(blob => croppedBlob = blob, "image/jpeg", 0.7);

    const url = URL.createObjectURL(croppedBlob);

    document.getElementById("previewBox").innerHTML =
      `<img src="${url}">`;
  };

  reader.readAsDataURL(file);
};

/* =========================
   DEEZER (YOUR FUNCTION)
========================= */

window.handleDeezer = function(data){
  const box = document.getElementById('suggestions');
  box.innerHTML = '';

  data.data?.slice(0,5).forEach(t => {
    const div = document.createElement('div');
    div.className = 'song-item';
    div.textContent = `${t.title} - ${t.artist.name}`;

    div.onclick = () => {
      songs.push({ title: div.textContent, preview: t.preview });

      document.getElementById('songList')
        .insertAdjacentHTML('beforeend',
          `<div class="song-item">${div.textContent}</div>`
        );

      box.innerHTML = '';
      document.getElementById('songInput').value = '';
    };

    box.appendChild(div);
  });
};

let debounce;
document.getElementById('songInput').addEventListener('input', e => {
  clearTimeout(debounce);
  if(e.target.value.length < 2) return;

  debounce = setTimeout(() => {
    const s = document.createElement('script');
    s.src = `https://api.deezer.com/search?q=${encodeURIComponent(e.target.value)}&output=jsonp&callback=handleDeezer`;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 2000);
  }, 250);
});

/* UPLOAD */
document.getElementById("uploadBtn").onclick = async () => {

  if(!user || !croppedBlob) return;

  const fileName = `${user.id}/${Date.now()}.jpg`;

  await supabase.storage
    .from(BUCKET)
    .upload(fileName, croppedBlob, {
      contentType:"image/jpeg"
    });

  const { data } = supabase.storage
    .from(BUCKET)
    .getPublicUrl(fileName);

  await supabase.from("posts").insert([{
    user_id: user.id,
    image_url: data.publicUrl,
    caption: document.getElementById("caption").value,
    song_title: songs[0]?.title || null,
    song_preview: songs[0]?.preview || null
  }]);

  loadFeed();
};

/* FEED (tap to play) */
async function loadFeed(){
  const { data } = await supabase
    .from("posts")
    .select("*")
    .order("created_at",{ascending:false});

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  data.forEach(p => {

    const div = document.createElement("div");
    div.className = "post";

    div.onclick = () => {
      if(p.song_preview){
        globalAudio.src = p.song_preview;
        globalAudio.play();
      }
    };

    div.innerHTML = `
      <img src="${p.image_url}">
      <div>${p.caption || ""}</div>

      ${p.song_title ? `
        <div class="song-title">${p.song_title}</div>
        <div class="song-sub">tap to play</div>
      ` : ""}
    `;

    feed.appendChild(div);
  });
}
</script>

</body>
</html>
