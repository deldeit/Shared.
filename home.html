<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Archivo Black',sans-serif;
}

body{
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
}

header{
  width:100%;
  max-width:900px;
  padding:20px;
  font-size:22px;
}

.container{
  width:100%;
  max-width:900px;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  padding:16px;
  border-radius:16px;
}

.dropzone{
  border:1px dashed rgba(255,255,255,0.3);
  padding:16px;
  text-align:center;
  border-radius:12px;
}

.preview{
  width:100%;
  max-height:300px;
  object-fit:cover;
  display:none;
  border-radius:12px;
  margin-top:10px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}

button{
  margin-top:10px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:white;
  color:black;
  font-weight:bold;
}

.post img{
  width:100%;
  border-radius:12px;
}

.post{
  margin-top:10px;
}

.post-body{
  padding:10px;
  font-size:13px;
}
</style>
</head>

<body>

<header>Shared</header>

<div class="container">

  <div class="card">
    <div class="dropzone" id="dropzone">Drop image here</div>

    <input type="file" id="file" accept="image/*">
    <img id="preview" class="preview">

    <textarea id="caption" placeholder="Write caption..."></textarea>

    <button id="publishBtn">Publish</button>
  </div>

  <div id="feed"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://cnhaonawapuahzoctqav.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes";
const BUCKET = "shared"; // 🔴 cambia se il tuo bucket è "images"

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let imageFile = null;

// 🔴 SESSION FIX
async function init(){
  const { data: { session } } = await supabase.auth.getSession();

  if(!session){
    window.location.href = "index.html";
    return;
  }

  currentUser = session.user;
  loadFeed();
}

// 🔴 AUTH SAFE
supabase.auth.onAuthStateChange((_event, session) => {
  currentUser = session?.user || null;
});

// 🔴 FILE HANDLING
document.getElementById("file").onchange = e => {
  handleFile(e.target.files[0]);
};

document.getElementById("dropzone").ondragover = e => e.preventDefault();

document.getElementById("dropzone").ondrop = e => {
  e.preventDefault();
  handleFile(e.dataTransfer.files[0]);
};

function handleFile(file){
  if(!file) return;

  imageFile = file;

  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById("preview");
    img.src = e.target.result;
    img.style.display = "block";
  };
  reader.readAsDataURL(file);
}

// 🔴 UPLOAD FIXATO (NO URL MANUALI)
document.getElementById("publishBtn").onclick = async () => {

  if(!currentUser){
    alert("Not logged in");
    return;
  }

  if(!imageFile){
    alert("No image selected");
    return;
  }

  const btn = document.getElementById("publishBtn");
  btn.disabled = true;
  btn.textContent = "Uploading...";

  try {

    const ext = imageFile.name.split(".").pop();
    const fileName = `${currentUser.id}/${Date.now()}.${ext}`;

    // ✔ UPLOAD CORRETTO
    const { error: uploadError } = await supabase.storage
      .from(BUCKET)
      .upload(fileName, imageFile, {
        contentType: imageFile.type,
        upsert: false
      });

    if(uploadError) throw uploadError;

    // ✔ URL PUBBLICO
    const { data } = supabase.storage
      .from(BUCKET)
      .getPublicUrl(fileName);

    if(!data?.publicUrl) throw new Error("URL non generato");

    // ✔ DB INSERT
    const { error: dbError } = await supabase
      .from("posts")
      .insert([{
        user_id: currentUser.id,
        image_url: data.publicUrl,
        caption: document.getElementById("caption").value
      }]);

    if(dbError) throw dbError;

    reset();
    loadFeed();

  } catch (err) {
    console.error(err);
    alert(err.message);
  }

  btn.disabled = false;
  btn.textContent = "Publish";
};

function reset(){
  imageFile = null;
  document.getElementById("caption").value = "";
  document.getElementById("file").value = "";
  document.getElementById("preview").style.display = "none";
}

// 🔴 FEED
async function loadFeed(){

  const { data, error } = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  if(error){
    console.error(error);
    return;
  }

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  data.forEach(post => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <img src="${post.image_url}">
      <div class="post-body">${post.caption || ""}</div>
    `;

    feed.appendChild(div);
  });
}

init();
</script>

</body>
</html>
