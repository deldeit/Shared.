<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Composer</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  font-family:Arial;
  color:white;
}

.composer {
  width:420px;
  background:#111;
  border-radius:30px;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

textarea {
  background:transparent;
  border:none;
  color:white;
  resize:none;
  height:60px;
  outline:none;
  font-size:14px;
}

.row {
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.icon {
  cursor:pointer;
  font-size:20px;
  opacity:0.8;
}

.preview {
  width:70px;
  height:70px;
  border-radius:20px;
  object-fit:cover;
  display:none;
}

.songs {
  background:#000;
  border-radius:15px;
  max-height:120px;
  overflow:auto;
}

.song {
  padding:8px;
  cursor:pointer;
  font-size:12px;
}

.song:hover {
  background:#222;
}

input[type="file"] {
  display:none;
}
</style>
</head>

<body>

<div class="composer">

  <!-- TEXT -->
  <textarea id="text" placeholder="Write something..."></textarea>

  <!-- IMAGE PREVIEW -->
  <img id="preview" class="preview">

  <!-- CONTROLS -->
  <div class="row">

    <label class="icon">
      📎
      <input type="file" id="file" onchange="loadImage(event)">
    </label>

    <div class="icon">🎵</div>

  </div>

  <!-- MUSIC SEARCH -->
  <input id="musicSearch" placeholder="Search music..." oninput="searchMusic()">

  <div class="songs" id="songs"></div>

</div>

<script>
let selectedSong = null;

/* IMAGE PREVIEW (SQUIRCLE STYLE) */
function loadImage(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(evt) {
    const img = document.getElementById("preview");
    img.src = evt.target.result;
    img.style.display = "block";
  };

  reader.readAsDataURL(file);
}

/* DEEZER SEARCH */
async function searchMusic() {
  const q = document.getElementById("musicSearch").value;
  const box = document.getElementById("songs");

  if (q.length < 2) {
    box.innerHTML = "";
    return;
  }

  const res = await fetch(`https://api.deezer.com/search?q=${q}`);
  const data = await res.json();

  box.innerHTML = "";

  data.data.slice(0, 5).forEach(song => {
    const div = document.createElement("div");
    div.className = "song";

    div.innerHTML = `
      ${song.title} - ${song.artist.name}
    `;

    div.onclick = () => {
      selectedSong = song.preview;
      alert("Selected: " + song.title);
      box.innerHTML = "";
    };

    box.appendChild(div);
  });
}
</script>

</body>
</html>
