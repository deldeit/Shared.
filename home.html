<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared - feed</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

<style>
*{box-sizing:border-box;}
body{margin:0;background:#000;color:#fff;font-family:'Archivo Black', sans-serif;}

.container{max-width:720px;margin:auto;padding:20px;}

.header{text-align:center;font-size:28px;margin-bottom:20px;}

.card{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:20px;
  padding:16px;
  margin-bottom:18px;
}

.preview{
  width:110px;height:110px;border-radius:28px;
  background:#111;margin-bottom:10px;
  display:flex;align-items:center;justify-content:center;
  border:1px solid #222;
}
.preview img{width:100%;height:100%;object-fit:cover;}

input[type="file"]{display:none;}

.file-btn{
  width:100%;padding:12px;border-radius:14px;
  border:1px solid #222;background:#000;color:#fff;
  cursor:pointer;text-align:center;
}

input, textarea{
  width:100%;padding:10px;margin-top:10px;
  border-radius:14px;border:1px solid #222;
  background:#000;color:#fff;
  font-family:'Archivo Black';
}

.song-item{
  padding:10px;border:1px solid #222;
  border-radius:12px;margin-top:6px;
  cursor:pointer;font-size:12px;
}
.song-item:hover{background:#111;}

button{
  width:100%;margin-top:12px;padding:14px;
  border-radius:16px;border:none;
  background:linear-gradient(135deg,#fff,#cfcfcf);
  color:#000;cursor:pointer;
}

.post{
  background:#0f0f0f;border:1px solid #222;
  border-radius:20px;padding:12px;margin-top:16px;
}

.post-header{
  display:flex;justify-content:space-between;
  align-items:center;
  font-size:12px;opacity:0.7;margin-bottom:6px;
}

.icon{
  font-family:'Material Symbols Outlined';
  font-size:22px;
  cursor:pointer;
}

.delete-btn{
  background:#ff3b3b;
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}

.like-row{
  display:flex;align-items:center;
  gap:6px;margin-top:8px;
}

.liked{color:#ff3b3b;}

.song-title{font-size:18px;margin-top:10px;}
</style>
</head>

<body>
<div class="container">

<div class="header">Shared.</div>

<div class="card">
  <div class="preview" id="previewBox">+</div>

  <label class="file-btn">
    Choose Image
    <input type="file" id="file">
  </label>

  <textarea id="caption" placeholder="Write caption..."></textarea>

  <input id="songInput" placeholder="Search song...">
  <div id="suggestions"></div>
  <div id="songList"></div>

  <button id="uploadBtn">UPLOAD</button>
</div>

<div id="feed"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient("https://cnhaonawapuahzoctqav.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes");

const BUCKET = "shared";

let user=null;
let croppedBlob=null;
let selectedSong=null;

/* AUDIO PERSISTENTE */
let globalAudio = new Audio();
let savedPreview = localStorage.getItem("playingPreview");

if(savedPreview){
  globalAudio.src = savedPreview;
  globalAudio.play().catch(()=>{});
}

/* INIT */
async function init(){
  const { data:{session} } = await supabase.auth.getSession();
  if(!session) location.href="index.html";
  user = session.user;
  loadFeed();
  realtime();
}
init();

/* IMAGE */
file.onchange = e=>{
  const f = e.target.files[0];
  if(!f) return;

  const reader = new FileReader();
  const img = new Image();

  reader.onload = ev=>img.src = ev.target.result;

  img.onload = ()=>{
    const canvas = document.createElement("canvas");
    canvas.width=800; canvas.height=800;

    const size=Math.min(img.width,img.height);
    const ctx=canvas.getContext("2d");

    ctx.drawImage(img,(img.width-size)/2,(img.height-size)/2,size,size,0,0,800,800);

    canvas.toBlob(b=>{
      croppedBlob=b;
      previewBox.innerHTML=`<img src="${URL.createObjectURL(b)}">`;
    },"image/jpeg",0.7);
  };

  reader.readAsDataURL(f);
};

/* DEEZER */
window.handleDeezer = d=>{
  suggestions.innerHTML="";
  d.data?.slice(0,5).forEach(t=>{
    const div=document.createElement("div");
    div.className="song-item";
    div.textContent=`${t.title} - ${t.artist.name}`;

    div.onclick=()=>{
      selectedSong={title:div.textContent,preview:t.preview};
      songList.innerHTML=`<div class="song-item">${selectedSong.title}</div>`;
      globalAudio.src=t.preview;
      globalAudio.play();
      suggestions.innerHTML="";
      songInput.value="";
    };

    suggestions.appendChild(div);
  });
};

let debounce;
songInput.oninput=e=>{
  clearTimeout(debounce);
  if(e.target.value.length<2) return;

  debounce=setTimeout(()=>{
    const s=document.createElement("script");
    s.src=`https://api.deezer.com/search?q=${encodeURIComponent(e.target.value)}&output=jsonp&callback=handleDeezer`;
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),2000);
  },250);
};

/* UPLOAD */
uploadBtn.onclick=async()=>{
  if(!croppedBlob) return;

  const fileName=`${user.id}/${Date.now()}.jpg`;

  await supabase.storage.from(BUCKET).upload(fileName,croppedBlob);

  const { data } = supabase.storage.from(BUCKET).getPublicUrl(fileName);

  await supabase.from("posts").insert([{
    user_id:user.id,
    image_url:data.publicUrl,
    caption:caption.value,
    song_title:selectedSong?.title,
    song_preview:selectedSong?.preview
  }]);

  /* RESET */
  croppedBlob=null;
  selectedSong=null;
  previewBox.innerHTML="+";
  caption.value="";
  songList.innerHTML="";
};

/* DELETE */
async function deletePost(id){
  await supabase.from("posts").delete().eq("id",id);
}

/* LIKE TOGGLE */
async function toggleLike(post,liked){
  if(liked){
    await supabase.from("likes")
      .delete()
      .eq("post_id",post.id)
      .eq("user_id",user.id);
  }else{
    await supabase.from("likes")
      .insert([{post_id:post.id,user_id:user.id}]);
  }
}

/* FEED */
async function loadFeed(){

  const { data: posts } = await supabase
    .from("posts")
    .select("*")
    .order("created_at",{ascending:false});

  const { data: likes } = await supabase
    .from("likes")
    .select("*");

  feed.innerHTML="";

  posts.forEach(p=>{

    const userLikes = likes.filter(l=>l.post_id===p.id);
    const likedByMe = userLikes.some(l=>l.user_id===user.id);

    const div=document.createElement("div");
    div.className="post";

    const date=new Date(p.created_at).toLocaleString();
    const isOwner=p.user_id===user.id;

    div.innerHTML=`
      <div class="post-header">
        <div>${isOwner?"You":p.user_id.slice(0,6)} • ${date}</div>

        ${isOwner?`
          <div class="delete-btn">
            <span class="icon">delete</span>
          </div>
        `:""}
      </div>

      <img src="${p.image_url}">
      <div>${p.caption||""}</div>

      ${p.song_title?`<div class="song-title">${p.song_title}</div>`:""}

      <div class="like-row">
        <span class="icon ${likedByMe?'liked':''}">favorite</span>
        <span>${userLikes.length}</span>
      </div>
    `;

    /* AUDIO */
    div.onclick=()=>{
      if(!p.song_preview) return;
      globalAudio.src=p.song_preview;
      globalAudio.play();
      localStorage.setItem("playingPreview",p.song_preview);
    };

    /* DELETE */
    if(isOwner){
      div.querySelector(".delete-btn").onclick=e=>{
        e.stopPropagation();
        deletePost(p.id);
      };
    }

    /* LIKE */
    div.querySelector(".like-row").onclick=e=>{
      e.stopPropagation();
      toggleLike(p,likedByMe);
    };

    feed.appendChild(div);
  });
}

/* REALTIME */
function realtime(){
  supabase.channel("realtime")
    .on("postgres_changes",{event:"*",schema:"public",table:"posts"},loadFeed)
    .on("postgres_changes",{event:"*",schema:"public",table:"likes"},loadFeed)
    .subscribe();
}
</script>

</body>
</html>
