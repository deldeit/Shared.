<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shared</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:'Archivo Black';
}

.container{
  max-width:720px;
  margin:auto;
  padding:20px;
}

.header{
  text-align:center;
  font-size:30px;
  margin-bottom:20px;
}

/* CARD */
.card{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:20px;
  padding:16px;
  margin-bottom:16px;
}

/* DROPZONE */
.dropzone{
  width:100%;
  height:140px;
  border:2px dashed #333;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#777;
  margin-bottom:12px;
  cursor:pointer;
}

/* PREVIEW */
.preview{
  width:110px;
  height:110px;
  border-radius:24px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:10px;
  overflow:hidden;
}

.preview img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* INPUT */
input,textarea{
  width:100%;
  margin-top:10px;
  padding:11px;
  border-radius:14px;
  border:1px solid #222;
  background:#000;
  color:#fff;
}

/* BUTTON */
.btn{
  width:100%;
  margin-top:12px;
  padding:14px;
  border-radius:16px;
  border:none;
  background:linear-gradient(135deg,#fff,#cfcfcf);
  color:#000;
  cursor:pointer;
  font-family:'Archivo Black';
}

/* SONG */
.song-item{
  padding:10px;
  border:1px solid #222;
  border-radius:12px;
  margin-top:6px;
  cursor:pointer;
  font-size:12px;
}

.song-item:hover{
  background:#111;
}

/* POST */
.post{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:20px;
  padding:14px;
  margin-bottom:16px;
}

.post img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:16px;
  margin-bottom:10px;
}

.post-header{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  opacity:0.7;
  margin-bottom:8px;
}

/* ICONS */
.icon{
  font-family:'Material Symbols Outlined';
  font-size:22px;
  cursor:pointer;
}

.delete-btn{
  background:#ff3b3b;
  width:32px;
  height:32px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* LIKE */
.like-row{
  display:flex;
  gap:8px;
  align-items:center;
  margin-top:10px;
}

.liked{
  color:#ff3b3b;
}
</style>
</head>

<body>

<div class="container">

<div class="header">Shared.</div>

<div class="card">

<!-- DROPZONE -->
<div class="dropzone" id="dropzone">
  Drag & drop image here<br>or click to upload
</div>

<input type="file" id="file" accept="image/png,image/jpeg,image/jpg,image/gif" hidden>

<div class="preview" id="previewBox">+</div>

<textarea id="caption" placeholder="Write a caption..."></textarea>

<input id="songInput" placeholder="Search song...">
<div id="suggestions"></div>
<div id="songList"></div>

<button class="btn" id="uploadBtn">UPLOAD IMAGE</button>

</div>

<div id="feed"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
"https://cnhaonawapuahzoctqav.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes"
);

let user;
let croppedBlob;
let selectedSong;
let globalAudio = new Audio();

/* INIT */
(async()=>{
  const {data:{session}} = await supabase.auth.getSession();
  if(!session) location.href="index.html";
  user = session.user;
  loadFeed();
  realtime();
})();

/* DROPZONE */
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("file");

dropzone.onclick = ()=>fileInput.click();

dropzone.ondrop = e=>{
  e.preventDefault();
  handleFile(e.dataTransfer.files[0]);
};

fileInput.onchange = e=>{
  handleFile(e.target.files[0]);
};

dropzone.ondragover = e=>{
  e.preventDefault();
};

/* FILE + MODERATION */
async function handleFile(f){
  if(!f) return;

  const allowed = ["image/jpeg","image/png","image/gif"];
  if(!allowed.includes(f.type)){
    alert("Only JPG, PNG or GIF allowed");
    return;
  }

  const formData = new FormData();
  formData.append("file", f);

  const res = await fetch("https://shared-bk4b.onrender.com/moderate",{
    method:"POST",
    body:formData
  });

  const result = await res.json();

  if(!result.ok){
    alert("Image rejected by moderation");
    return;
  }

  const reader = new FileReader();
  const img = new Image();

  reader.onload = e=>img.src=e.target.result;

  img.onload = ()=>{
    const canvas=document.createElement("canvas");
    canvas.width=800;canvas.height=800;

    const size=Math.min(img.width,img.height);
    const ctx=canvas.getContext("2d");

    ctx.drawImage(img,(img.width-size)/2,(img.height-size)/2,size,size,0,0,800,800);

    canvas.toBlob(b=>{
      croppedBlob=b;
      previewBox.innerHTML=`<img src="${URL.createObjectURL(b)}">`;
    },"image/jpeg",0.7);
  };

  reader.readAsDataURL(f);
}

/* UPLOAD */
uploadBtn.onclick = async ()=>{
  if(!croppedBlob) return;

  const path = `${user.id}/${Date.now()}.jpg`;

  await supabase.storage.from("shared").upload(path,croppedBlob);
  const {data}=supabase.storage.from("shared").getPublicUrl(path);

  await supabase.from("posts").insert([{
    user_id:user.id,
    image_url:data.publicUrl,
    caption:caption.value,
    song_preview:selectedSong?.preview,
    song_title:selectedSong?.title
  }]);

  croppedBlob=null;
  selectedSong=null;
  previewBox.innerHTML="+";
  caption.value="";
  songList.innerHTML="";
};

/* LIKE TOGGLE FIXED */
async function toggleLike(post, icon, countEl, liked){

  const newState = !liked;

  icon.classList.toggle("liked", newState);
  countEl.textContent = newState
    ? Number(countEl.textContent) + 1
    : Number(countEl.textContent) - 1;

  if(newState){
    await supabase.from("likes")
      .insert([{post_id:post.id,user_id:user.id}]);
  }else{
    await supabase.from("likes")
      .delete()
      .eq("post_id",post.id)
      .eq("user_id",user.id);
  }
}

/* FEED */
async function loadFeed(){

  const {data:posts} = await supabase
    .from("posts")
    .select("*")
    .order("created_at",{ascending:false});

  const {data:likes} = await supabase
    .from("likes")
    .select("*");

  feed.innerHTML="";

  posts.forEach(p=>{

    const userLikes = likes.filter(l=>l.post_id===p.id);
    const liked = userLikes.some(l=>l.user_id===user.id);

    const div=document.createElement("div");
    div.className="post";

    div.innerHTML=`
      <div class="post-header">
        <div>${p.user_id.slice(0,6)}</div>
        <div>${new Date(p.created_at).toLocaleString()}</div>
        ${p.user_id===user.id
          ? `<div class="delete-btn"><span class="icon">delete</span></div>`
          : ""
        }
      </div>

      <img src="${p.image_url}">
      <div>${p.caption||""}</div>

      <div class="like-row">
        <span class="icon ${liked?'liked':''}">favorite</span>
        <span>${userLikes.length}</span>
      </div>
    `;

    const img = div.querySelector("img");
    const icon = div.querySelector(".icon");
    const count = div.querySelector(".like-row span:last-child");

    img.onclick = ()=>{
      if(globalAudio.src===p.song_preview){
        globalAudio.paused ? globalAudio.play() : globalAudio.pause();
      }else{
        globalAudio.src=p.song_preview;
        globalAudio.play();
      }
    };

    div.querySelector(".like-row").onclick = e=>{
      e.stopPropagation();
      toggleLike(p, icon, count, liked);
    };

    if(p.user_id===user.id){
      div.querySelector(".delete-btn").onclick = e=>{
        e.stopPropagation();
        supabase.from("posts").delete().eq("id",p.id);
        div.remove();
      };
    }

    feed.appendChild(div);
  });
}

/* realtime */
function realtime(){
  supabase.channel("rt")
    .on("postgres_changes",{event:"*",schema:"public",table:"posts"},loadFeed)
    .on("postgres_changes",{event:"*",schema:"public",table:"likes"},loadFeed)
    .subscribe();
}
</script>

</body>
</html>
