<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shared</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#050505;
    --panel:#0d0d0d;
    --panel-2:rgba(13,13,13,.88);
    --text:#fff;
    --muted:#a6a6a6;
    --line:rgba(255,255,255,.10);
    --line-2:rgba(255,255,255,.06);
    --shadow:0 24px 80px rgba(0,0,0,.42);
    --radius:22px;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:
      radial-gradient(circle at 15% 18%, rgba(255,255,255,.08), transparent 22%),
      radial-gradient(circle at 82% 15%, rgba(255,255,255,.06), transparent 18%),
      radial-gradient(circle at 50% 100%, rgba(255,255,255,.05), transparent 28%),
      var(--bg);
    color:var(--text);
    font-family:Inter, system-ui, sans-serif;
  }

  button,input{ font:inherit; }
  a{ color:inherit; text-decoration:none; }
  .hidden{ display:none !important; }

  .loading{
    position:fixed;
    inset:0;
    z-index:1000;
    display:grid;
    place-items:center;
    background:#000;
    color:#fff;
    padding:24px;
  }

  .loading-card{
    width:min(420px, calc(100vw - 32px));
    border:1px solid var(--line);
    border-radius:24px;
    background:rgba(12,12,12,.92);
    box-shadow:var(--shadow);
    padding:26px 20px;
    text-align:center;
  }

  .spinner{
    width:34px;
    height:34px;
    margin:0 auto 18px;
    border-radius:50%;
    border:3px solid rgba(255,255,255,.12);
    border-top-color:#fff;
    animation:spin 1s linear infinite;
  }

  @keyframes spin { to { transform:rotate(360deg); } }

  .loading-title{
    margin:0 0 8px;
    font-family:'Archivo Black', sans-serif;
    font-size:32px;
    line-height:1;
  }

  .loading-sub{
    margin:0;
    color:var(--muted);
    font-size:13px;
    line-height:1.55;
    font-weight:600;
  }

  .app{
    width:100%;
    height:100%;
    position:relative;
    overflow:hidden;
  }

  .topbar{
    position:fixed;
    inset:0 0 auto 0;
    z-index:60;
    padding:12px 12px 0;
    pointer-events:none;
  }

  .topbar-inner{
    pointer-events:auto;
    max-width:1180px;
    margin:0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:999px;
    background:rgba(8,8,8,.72);
    backdrop-filter:blur(18px);
    box-shadow:var(--shadow);
  }

  .brand{
    display:flex;
    align-items:center;
    min-width:0;
  }

  .brand-text{
    font-family:'Archivo Black', sans-serif;
    font-size:19px;
    letter-spacing:.2px;
    line-height:1;
    white-space:nowrap;
  }

  .search-area{
    flex:1 1 auto;
    max-width:720px;
    display:flex;
    align-items:center;
    gap:10px;
    margin:0 10px;
  }

  .searchbar{
    flex:1 1 auto;
  }

  .searchbar input{
    width:100%;
    border-radius:999px;
    border:1px solid var(--line);
    background:rgba(10,10,10,.85);
    color:#fff;
    outline:none;
    padding:13px 16px;
    font-size:14px;
  }

  .searchbar input::placeholder{ color:#7a7a7a; }

  .icon-btn{
    width:42px;
    height:42px;
    border:none;
    border-radius:50%;
    display:grid;
    place-items:center;
    cursor:pointer;
    transition:transform .16s ease, opacity .16s ease, background .16s ease;
    flex:0 0 auto;
  }

  .icon-btn:hover{ transform:translateY(-1px) scale(1.02); }

  .uploadbtn{
    background:#fff;
    color:#000;
    font-size:18px;
    font-weight:800;
  }

  .profile-link{
    width:42px;
    height:42px;
    border-radius:50%;
    overflow:hidden;
    border:1px solid var(--line);
    background:#111;
    display:block;
    flex:0 0 auto;
  }

  .profile-link img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .profile-fallback{
    width:100%;
    height:100%;
    display:grid;
    place-items:center;
    background:#fff;
    color:#000;
    font-family:'Archivo Black', sans-serif;
    font-size:14px;
  }

  .feed{
    position:absolute;
    inset:0;
    padding:96px 14px 24px;
    overflow-y:auto;
    overflow-x:hidden;
  }

  .feed-inner{
    width:min(100%, 680px);
    margin:0 auto;
    display:grid;
    gap:14px;
  }

  .post-card{
    border:1px solid var(--line);
    border-radius:24px;
    background:rgba(12,12,12,.84);
    backdrop-filter:blur(18px);
    box-shadow:var(--shadow);
    overflow:hidden;
  }

  .post-header{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 14px 12px;
  }

  .post-avatar{
    width:42px;
    height:42px;
    border-radius:50%;
    overflow:hidden;
    flex:0 0 auto;
    background:#fff;
    color:#000;
    display:grid;
    place-items:center;
    font-family:'Archivo Black', sans-serif;
    font-size:14px;
  }

  .post-avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .post-author-wrap{
    min-width:0;
    flex:1 1 auto;
  }

  .post-author{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
    min-width:0;
  }

  .post-author-name{
    font-family:'Archivo Black', sans-serif;
    font-size:14px;
    line-height:1.1;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .verified{
    width:16px;
    height:16px;
    border-radius:50%;
    background:#fff;
    color:#000;
    display:grid;
    place-items:center;
    font-size:10px;
    flex:0 0 auto;
  }

  .post-handle{
    margin-top:3px;
    font-size:11px;
    color:var(--muted);
    letter-spacing:.3px;
  }

  .post-time{
    flex:0 0 auto;
    font-size:11px;
    color:var(--muted);
    white-space:nowrap;
  }

  .post-media{
    width:100%;
    aspect-ratio:1 / 1;
    background:#0a0a0a;
    position:relative;
    overflow:hidden;
  }

  .post-media img,
  .post-media video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    background:#0a0a0a;
  }

  .post-body{
    padding:14px 14px 16px;
  }

  .actions-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:12px;
  }

  .like-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    border:none;
    border-radius:999px;
    padding:10px 12px;
    cursor:pointer;
    background:#fff;
    color:#000;
    font-weight:800;
    transition:transform .16s ease, opacity .16s ease;
  }

  .like-btn:hover{ transform:translateY(-1px); }

  .like-btn.liked{
    background:#fff;
    color:#000;
  }

  .like-count{
    font-size:12px;
    color:#fff;
    font-weight:700;
  }

  .caption{
    font-size:13px;
    line-height:1.6;
    color:#f1f1f1;
    font-weight:600;
    margin:0 0 12px;
    white-space:pre-wrap;
  }

  .song-meta{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:12px;
  }

  .chip{
    padding:8px 10px;
    border-radius:999px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.06);
    color:#fff;
    font-size:11px;
    font-weight:700;
  }

  .audio-hidden{
    display:none;
  }

  .empty-state{
    width:min(720px, calc(100vw - 28px));
    margin:0 auto;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    text-align:center;
    border:1px solid var(--line);
    border-radius:28px;
    background:rgba(12,12,12,.72);
    backdrop-filter:blur(14px);
    padding:22px;
    box-shadow:var(--shadow);
    display:none;
    z-index:5;
  }

  .empty-state.show{ display:block; }

  .empty-state h2{
    margin:0 0 8px;
    font-family:'Archivo Black', sans-serif;
    font-size:22px;
  }

  .empty-state p{
    margin:0;
    color:var(--muted);
    line-height:1.55;
    font-size:13px;
    font-weight:600;
  }

  .toast{
    position:fixed;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    z-index:90;
    width:min(920px, calc(100vw - 20px));
    display:none;
  }

  .toast.show{ display:block; }

  .toast-inner{
    border-radius:16px;
    border:1px solid var(--line);
    background:rgba(12,12,12,.94);
    backdrop-filter:blur(14px);
    color:#fff;
    padding:12px 14px;
    box-shadow:var(--shadow);
    font-size:12px;
    line-height:1.45;
    font-weight:600;
  }

  .modal{
    position:fixed;
    inset:0;
    z-index:80;
    display:none;
    align-items:center;
    justify-content:center;
    padding:18px;
    background:rgba(0,0,0,.74);
    backdrop-filter:blur(10px);
  }

  .modal.open{ display:flex; }

  .sheet{
    width:min(760px, 100%);
    border-radius:28px;
    border:1px solid var(--line);
    background:linear-gradient(180deg, rgba(12,12,12,.96), rgba(7,7,7,.98));
    box-shadow:var(--shadow);
    overflow:hidden;
  }

  .sheet-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 18px 14px;
    border-bottom:1px solid rgba(255,255,255,.08);
  }

  .sheet-title{
    font-family:'Archivo Black', sans-serif;
    font-size:20px;
  }

  .close{
    width:42px;
    height:42px;
    border-radius:50%;
    border:1px solid var(--line);
    background:#111;
    color:#fff;
    cursor:pointer;
    font-size:18px;
  }

  .sheet-body{
    display:grid;
    grid-template-columns:1.05fr .95fr;
  }

  .form{
    padding:18px;
    display:grid;
    gap:10px;
  }

  .input,.file{
    width:100%;
    border-radius:16px;
    border:1px solid var(--line);
    background:#000;
    color:#fff;
    outline:none;
    padding:12px 14px;
    font-size:14px;
  }

  .input::placeholder{ color:#7f7f7f; }

  .helper{
    color:var(--muted);
    font-size:12px;
    line-height:1.5;
    margin-top:2px;
  }

  .preview{
    padding:18px 18px 18px 0;
  }

  .preview-card{
    min-height:380px;
    border-radius:24px;
    border:1px solid var(--line);
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,.16), transparent 16%),
      linear-gradient(135deg, #1a1a1a, #333);
    position:relative;
    overflow:hidden;
  }

  .preview-media{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
  }

  .preview-overlay{
    position:absolute;
    inset:auto 0 0 0;
    padding:16px;
    background:linear-gradient(180deg, transparent, rgba(0,0,0,.86));
  }

  .preview-title{
    font-family:'Archivo Black', sans-serif;
    font-size:28px;
    line-height:.96;
    margin:0 0 8px;
  }

  .preview-text{
    margin:0;
    font-size:13px;
    line-height:1.55;
    color:#e8e8e8;
    font-weight:600;
  }

  .sheet-actions{
    display:flex;
    gap:10px;
    justify-content:flex-end;
    padding:0 18px 18px;
  }

  .sheet-actions button{
    border:none;
    border-radius:999px;
    padding:12px 14px;
    cursor:pointer;
    font-weight:700;
  }

  .ghost{
    background:#111;
    color:#fff;
    border:1px solid var(--line);
  }

  .save{
    background:#fff;
    color:#000;
  }

  @media (max-width: 860px){
    .topbar{ padding:10px 10px 0; }
    .topbar-inner{
      border-radius:24px;
      padding:10px 12px;
      gap:10px;
    }

    .brand-text{ font-size:18px; }
    .search-area{ margin:0; gap:8px; }
    .searchbar input{ font-size:13px; padding:13px 14px; }

    .feed{
      padding:88px 10px 20px;
    }

    .post-header{ padding:12px 12px 10px; }
    .post-body{ padding:12px 12px 14px; }
    .post-avatar{ width:38px; height:38px; }
    .post-time{ display:none; }

    .sheet-body{
      grid-template-columns:1fr;
    }

    .preview{
      padding:0 18px 18px;
    }

    .preview-card{
      min-height:260px;
    }

    .preview-title{ font-size:24px; }
    .profile-link,.uploadbtn{ width:40px; height:40px; }
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>

<body>
  <div class="loading" id="loading">
    <div class="loading-card">
      <div class="spinner"></div>
      <h2 class="loading-title">Shared.</h2>
      <p class="loading-sub">Starting the app, then loading data in the background.</p>
    </div>
  </div>

  <div class="toast" id="toast"><div class="toast-inner" id="toastInner"></div></div>

  <div class="app hidden" id="app">
    <div class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-text">Shared.</div>
        </div>

        <div class="search-area">
          <div class="searchbar">
            <input id="searchInput" type="text" placeholder="Search posts, users, tags..." />
          </div>
          <button class="icon-btn uploadbtn" id="openUpload" title="Upload" type="button">+</button>
        </div>

        <a class="profile-link" id="profileLink" href="./login.html" title="Profile">
          <div class="profile-fallback" id="profileFallback">S</div>
          <img id="profileImg" alt="Profile" class="hidden" />
        </a>
      </div>
    </div>

    <div class="feed" id="feed">
      <div class="feed-inner" id="feedInner"></div>
      <div class="empty-state" id="emptyState">
        <h2>No posts found</h2>
        <p>Try another search or create the first post with Upload.</p>
      </div>
    </div>
  </div>

  <div class="modal" id="uploadModal" aria-hidden="true">
    <div class="sheet">
      <div class="sheet-head">
        <div class="sheet-title">New post</div>
        <button class="close" id="closeUpload" type="button">×</button>
      </div>

      <div class="sheet-body">
        <div class="form">
          <input class="input" id="uDisplayName" type="text" placeholder="Display name" />
          <input class="input" id="uCaption" type="text" placeholder="Caption" />
          <input class="input" id="uSongTitle" type="text" placeholder="Song title" />
          <input class="input" id="uSongPreview" type="text" placeholder="Song preview" />
          <input class="file" id="uFile" type="file" accept="image/*,video/*" />
          <input class="file" id="uAudioFile" type="file" accept="audio/*" />
          <div class="helper">
            Uploads to bucket <code>shared</code>. The optional audio file is stored in <code>audio_url</code>.
          </div>
        </div>

        <div class="preview">
          <div class="preview-card" id="previewCard">
            <img class="preview-media" id="previewImg" alt="" />
            <video class="preview-media" id="previewVideo" muted loop playsinline></video>

            <div class="preview-overlay">
              <h3 class="preview-title" id="previewTitle">Preview</h3>
              <p class="preview-text" id="previewText">Your selected content will appear here.</p>
            </div>
          </div>
        </div>
      </div>

      <div class="sheet-actions">
        <button class="ghost" id="cancelUpload" type="button">Cancel</button>
        <button class="save" id="submitUpload" type="button">Publish</button>
      </div>
    </div>
  </div>

<script>
(() => {
  const CONFIG = {
    SUPABASE_URL: "https://cnhaonawapuahzoctqav.supabase.co",
    SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes",
    BUCKET: "shared",
    PROFILE_PAGE: "./profile.html",
    LOGIN_PAGE: "./login.html",
    AUTOPLAY_MS: 5200,
    MAX_POSTS: 50,
    FETCH_TIMEOUT_MS: 8000,
    BOOT_TIMEOUT_MS: 3500
  };

  const el = (id) => document.getElementById(id);

  const ui = {
    loading: el("loading"),
    toast: el("toast"),
    toastInner: el("toastInner"),
    app: el("app"),
    feed: el("feed"),
    feedInner: el("feedInner"),
    emptyState: el("emptyState"),
    uploadModal: el("uploadModal"),
    profileLink: el("profileLink"),
    profileImg: el("profileImg"),
    profileFallback: el("profileFallback"),
    openUpload: el("openUpload"),
    closeUpload: el("closeUpload"),
    cancelUpload: el("cancelUpload"),
    submitUpload: el("submitUpload"),
    searchInput: el("searchInput"),
    uDisplayName: el("uDisplayName"),
    uCaption: el("uCaption"),
    uSongTitle: el("uSongTitle"),
    uSongPreview: el("uSongPreview"),
    uFile: el("uFile"),
    uAudioFile: el("uAudioFile"),
    previewTitle: el("previewTitle"),
    previewText: el("previewText"),
    previewImg: el("previewImg"),
    previewVideo: el("previewVideo")
  };

  let supabase = null;
  let currentUser = null;
  let currentProfile = null;
  let posts = [];
  let currentSearch = "";
  let searchTimer = null;
  let booted = false;
  let audioObserver = null;
  let activeAudio = null;
  let audioUnlocked = false;

  const palettes = [
    ["#121212", "#4b4b4b"],
    ["#0b0b0b", "#2b2b2b"],
    ["#171717", "#575757"],
    ["#1c1c1c", "#383838"],
    ["#101010", "#6b6b6b"]
  ];

  function showApp() {
    ui.loading.classList.add("hidden");
    ui.app.classList.remove("hidden");
  }

  function showToast(message, ms = 4500) {
    ui.toastInner.textContent = message;
    ui.toast.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => ui.toast.classList.remove("show"), ms);
  }

  function esc(str) {
    return String(str ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function sanitizeQuery(str) {
    return String(str ?? "")
      .replaceAll("%", "")
      .replaceAll(",", " ")
      .replaceAll("(", " ")
      .replaceAll(")", " ")
      .trim();
  }

  function normalizeUsername(name) {
    return String(name || "shared_user")
      .trim()
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, "_")
      .replace(/^_+|_+$/g, "")
      .slice(0, 24) || "shared_user";
  }

  function asArray(value) {
    if (Array.isArray(value)) return value;
    if (!value) return [];
    if (typeof value === "string") return [value];
    return [];
  }

  function parseTags(value) {
    if (!value) return [];
    if (Array.isArray(value)) return value.map(String).filter(Boolean);
    if (typeof value === "string") return value.split(",").map(s => s.trim()).filter(Boolean);
    return [];
  }

  function withTimeout(promise, timeoutMs = CONFIG.FETCH_TIMEOUT_MS) {
    return Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(() => reject(new Error("Request timed out.")), timeoutMs))
    ]);
  }

  function getPalette(i) {
    return palettes[i % palettes.length];
  }

  function updateEmptyState() {
    ui.emptyState.classList.toggle("show", posts.length === 0);
  }

  function openModal() {
    if (!currentUser) {
      showToast("Log in first to publish a post.");
      return;
    }
    ui.uploadModal.classList.add("open");
    ui.uploadModal.setAttribute("aria-hidden", "false");
    previewFromForm();
  }

  function closeModal() {
    ui.uploadModal.classList.remove("open");
    ui.uploadModal.setAttribute("aria-hidden", "true");
  }

  function previewFromForm() {
    ui.previewTitle.textContent = ui.uDisplayName.value.trim() || "Preview";
    ui.previewText.textContent = ui.uCaption.value.trim() || "Your selected content will appear here.";
  }

  function resetPreviewMedia() {
    ui.previewImg.style.display = "none";
    ui.previewVideo.style.display = "none";
    ui.previewImg.src = "";
    ui.previewVideo.pause();
    ui.previewVideo.removeAttribute("src");
    ui.previewVideo.load();
  }

  function setHeaderFromSession() {
    const avatarUrl = currentProfile?.avatar_url || currentUser?.user_metadata?.avatar_url || currentUser?.user_metadata?.picture || null;

    if (avatarUrl) {
      ui.profileImg.src = avatarUrl;
      ui.profileImg.classList.remove("hidden");
      ui.profileFallback.classList.add("hidden");
    } else {
      const ch = (currentProfile?.display_name || currentUser?.user_metadata?.display_name || currentUser?.email || "S")
        .trim().charAt(0).toUpperCase();
      ui.profileFallback.textContent = ch;
      ui.profileImg.classList.add("hidden");
      ui.profileFallback.classList.remove("hidden");
    }

    ui.profileLink.href = currentUser
      ? `${CONFIG.PROFILE_PAGE}?id=${encodeURIComponent(currentUser.id)}`
      : CONFIG.LOGIN_PAGE;

    ui.uDisplayName.value = currentProfile?.display_name || currentUser?.user_metadata?.display_name || "";
  }

  function mediaIsVideo(url = "") {
    return /\.(mp4|webm|ogg|mov)(\?|$)/i.test(String(url));
  }

  function renderCards() {
    ui.feedInner.innerHTML = posts.map((post) => {
      const profile = post.profile || {};
      const authorName = profile.display_name || post.username || "User";
      const handle = post.username ? `@${post.username}` : `@${normalizeUsername(authorName)}`;
      const initials = (authorName || "S").trim().charAt(0).toUpperCase();
      const likeCount = Number(post.like_count ?? post.likes ?? 0);
      const liked = !!post.user_liked;
      const verified = !!profile.verified;
      const chips = [...asArray(profile.interests).slice(0, 3), ...parseTags(post.tags).slice(0, 3)].slice(0, 5);

      const avatarHtml = profile.avatar_url
        ? `<img src="${esc(profile.avatar_url)}" alt="">`
        : esc(initials);

      const mediaHtml = post.image_url
        ? (mediaIsVideo(post.image_url)
            ? `<video class="post-media-file" src="${esc(post.image_url)}" autoplay muted loop playsinline preload="metadata"></video>`
            : `<img class="post-media-file" src="${esc(post.image_url)}" alt="">`)
        : `<div style="width:100%;height:100%;background:linear-gradient(135deg,var(--c1),var(--c2));"></div>`;

      const audioHtml = post.audio_url ? `
        <audio class="audio-hidden post-audio" preload="auto" muted loop playsinline src="${esc(post.audio_url)}"></audio>
      ` : "";

      return `
        <article class="post-card" data-post-id="${esc(post.id)}">
          <header class="post-header">
            <a class="post-avatar" href="${CONFIG.PROFILE_PAGE}?id=${encodeURIComponent(post.user_id || "")}" title="Open profile">
              ${avatarHtml}
            </a>

            <div class="post-author-wrap">
              <div class="post-author">
                <a class="post-author-name" href="${CONFIG.PROFILE_PAGE}?id=${encodeURIComponent(post.user_id || "")}">${esc(authorName)}</a>
                ${verified ? `<div class="verified" title="Verified">✓</div>` : ""}
              </div>
              <div class="post-handle">${esc(handle)}</div>
            </div>

            <div class="post-time">${post.created_at ? new Date(post.created_at).toLocaleDateString() : ""}</div>
          </header>

          <div class="post-media">
            ${mediaHtml}
          </div>

          <div class="post-body">
            ${audioHtml}
            <div class="actions-row">
              <button class="like-btn ${liked ? "liked" : ""}" type="button" data-like-btn="1">
                ${liked ? "❤" : "♡"}
                <span class="like-count">${likeCount}</span>
              </button>
            </div>

            ${post.caption ? `<p class="caption">${esc(post.caption)}</p>` : ""}

            ${post.song_title ? `<p class="caption" style="margin-top:-4px;opacity:.78;font-weight:700;">${esc(post.song_title)}</p>` : ""}

            ${chips.length ? `<div class="song-meta">${chips.map(c => `<span class="chip">${esc(c)}</span>`).join("")}</div>` : ""}
          </div>
        </article>
      `;
    }).join("");

    bindCardEvents();
    setupAudioObserver();
    unlockOnFirstGesture();
    updateEmptyState();
  }

  function bindCardEvents() {
    ui.feedInner.querySelectorAll("[data-like-btn='1']").forEach(btn => {
      btn.addEventListener("click", async (e) => {
        const card = e.currentTarget.closest(".post-card");
        if (!card) return;

        if (!currentUser) {
          showToast("Log in to like posts.");
          return;
        }

        const postId = card.dataset.postId;
        const liked = e.currentTarget.classList.contains("liked");
        e.currentTarget.disabled = true;

        try {
          await toggleLike(postId, liked);
          await loadPosts(currentSearch);
        } catch (err) {
          showToast(err?.message || "Like action failed.");
        } finally {
          e.currentTarget.disabled = false;
        }
      });
    });
  }

  function pauseAllAudio() {
    ui.feedInner.querySelectorAll("audio.post-audio").forEach(a => {
      try {
        a.pause();
        a.currentTime = 0;
      } catch {}
      a.dataset.active = "false";
    });
  }

  function playAudioForCard(card) {
    const audio = card.querySelector("audio.post-audio");
    if (!audio) return;

    if (activeAudio && activeAudio !== audio) {
      try {
        activeAudio.pause();
        activeAudio.currentTime = 0;
      } catch {}
      activeAudio.dataset.active = "false";
    }

    activeAudio = audio;
    activeAudio.dataset.active = "true";
    activeAudio.loop = true;
    activeAudio.muted = !audioUnlocked;

    const playPromise = activeAudio.play();
    if (playPromise && typeof playPromise.catch === "function") {
      playPromise.catch(() => {});
    }
  }

  function setupAudioObserver() {
    if (audioObserver) {
      audioObserver.disconnect();
      audioObserver = null;
    }

    pauseAllAudio();

    audioObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        const card = entry.target;
        const visible = entry.isIntersecting && entry.intersectionRatio >= 0.62;

        if (visible) {
          playAudioForCard(card);
        } else {
          const audio = card.querySelector("audio.post-audio");
          if (audio) {
            try {
              audio.pause();
              audio.currentTime = 0;
            } catch {}
            audio.dataset.active = "false";
          }
        }
      });
    }, {
      root: ui.feed,
      threshold: [0.35, 0.62, 0.85]
    });

    ui.feedInner.querySelectorAll(".post-card").forEach(card => audioObserver.observe(card));
  }

  function unlockOnFirstGesture() {
    if (audioUnlocked) return;
    const unlock = () => {
      audioUnlocked = true;
      if (activeAudio) {
        activeAudio.muted = false;
        const p = activeAudio.play();
        if (p && typeof p.catch === "function") p.catch(() => {});
      }
      window.removeEventListener("pointerdown", unlock);
      window.removeEventListener("touchstart", unlock);
      window.removeEventListener("keydown", unlock);
    };

    window.addEventListener("pointerdown", unlock, { once: true });
    window.addEventListener("touchstart", unlock, { once: true });
    window.addEventListener("keydown", unlock, { once: true });
  }

  async function initSupabase() {
    if (!window.supabase || typeof window.supabase.createClient !== "function") {
      throw new Error("Supabase library failed to load.");
    }
    if (!CONFIG.SUPABASE_URL || !CONFIG.SUPABASE_ANON_KEY || CONFIG.SUPABASE_ANON_KEY === "PASTE_YOUR_ANON_KEY_HERE") {
      throw new Error("Set SUPABASE_ANON_KEY before using the app.");
    }
    supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });
  }

  async function getSessionSafe() {
    if (!supabase) return null;
    const res = await withTimeout(supabase.auth.getSession(), CONFIG.FETCH_TIMEOUT_MS);
    return res?.data?.session || null;
  }

  async function loadCurrentProfile() {
    if (!supabase || !currentUser) return null;

    const { data, error } = await withTimeout(
      supabase
        .from("profiles")
        .select("id, created_at, display_name, avatar_url, banner_color, verified, followers_count, following_count, interests, bio")
        .eq("id", currentUser.id)
        .maybeSingle()
    );

    if (error) {
      currentProfile = null;
      setHeaderFromSession();
      return null;
    }

    currentProfile = data || null;
    setHeaderFromSession();
    return currentProfile;
  }

  async function loadProfilesForPosts(userIds) {
    if (!supabase || !userIds.length) return new Map();

    try {
      const { data, error } = await withTimeout(
        supabase
          .from("profiles")
          .select("id, created_at, display_name, avatar_url, banner_color, verified, followers_count, following_count, interests, bio")
          .in("id", userIds)
      );

      if (error) return new Map();
      return new Map((data || []).map(p => [p.id, p]));
    } catch {
      return new Map();
    }
  }

  async function loadLikesForPosts(postIds) {
    if (!supabase || !postIds.length) return { counts: new Map(), likedByUser: new Set() };

    try {
      const { data, error } = await withTimeout(
        supabase
          .from("likes")
          .select("post_id, user_id")
          .in("post_id", postIds)
      );

      if (error) return { counts: new Map(), likedByUser: new Set() };

      const counts = new Map();
      const likedByUser = new Set();

      for (const row of (data || [])) {
        counts.set(row.post_id, (counts.get(row.post_id) || 0) + 1);
        if (currentUser && row.user_id === currentUser.id) likedByUser.add(row.post_id);
      }

      return { counts, likedByUser };
    } catch {
      return { counts: new Map(), likedByUser: new Set() };
    }
  }

  async function fetchPostsByProfiles(profileIds) {
    if (!supabase || !profileIds.length) return [];

    const { data, error } = await withTimeout(
      supabase
        .from("posts")
        .select("id, user_id, image_url, audio_url, caption, created_at, song_preview, song_title, likes, username, tags")
        .in("user_id", profileIds)
        .order("created_at", { ascending: false })
        .limit(CONFIG.MAX_POSTS)
    );

    if (error) return [];
    return data || [];
  }

  async function fetchPublicPosts() {
    if (!supabase) return [];

    const { data, error } = await withTimeout(
      supabase
        .from("posts")
        .select("id, user_id, image_url, audio_url, caption, created_at, song_preview, song_title, likes, username, tags")
        .order("created_at", { ascending: false })
        .limit(CONFIG.MAX_POSTS)
    );

    if (error) throw error;
    return data || [];
  }

  async function loadPosts(query = "") {
    currentSearch = sanitizeQuery(query);

    try {
      let rawPosts = [];

      if (!currentSearch) {
        rawPosts = await fetchPublicPosts();
      } else {
        const textRes = await withTimeout(
          supabase
            .from("posts")
            .select("id, user_id, image_url, audio_url, caption, created_at, song_preview, song_title, likes, username, tags")
            .or(`caption.ilike.%${currentSearch}%,song_title.ilike.%${currentSearch}%,username.ilike.%${currentSearch}%,tags.ilike.%${currentSearch}%`)
            .order("created_at", { ascending: false })
            .limit(CONFIG.MAX_POSTS)
        );

        const textPosts = textRes?.error ? [] : (textRes?.data || []);

        let profileIds = [];
        try {
          const profileHitsRes = await withTimeout(
            supabase
              .from("profiles")
              .select("id")
              .or(`display_name.ilike.%${currentSearch}%,bio.ilike.%${currentSearch}%`)
              .limit(CONFIG.MAX_POSTS)
          );
          if (!profileHitsRes?.error) {
            profileIds = (profileHitsRes?.data || []).map(p => p.id);
          }
        } catch {}

        const profilePosts = await fetchPostsByProfiles(profileIds);

        const merged = [...textPosts, ...profilePosts];
        const dedup = new Map();
        for (const post of merged) dedup.set(post.id, post);
        rawPosts = [...dedup.values()];
      }

      const userIds = [...new Set(rawPosts.map(p => p.user_id).filter(Boolean))];
      const profileMap = await loadProfilesForPosts(userIds);
      const { counts, likedByUser } = await loadLikesForPosts(rawPosts.map(p => p.id));

      posts = rawPosts.map((p, idx) => {
        const [c1, c2] = getPalette(idx);
        return {
          ...p,
          c1,
          c2,
          profile: profileMap.get(p.user_id) || null,
          like_count: counts.get(p.id) ?? Number(p.likes || 0),
          user_liked: likedByUser.has(p.id)
        };
      });

      renderCards();
      updateEmptyState();
    } catch (err) {
      posts = [];
      renderCards();
      updateEmptyState();
      showToast(err?.message || "Posts could not be loaded, but the app is still running.");
    }
  }

  async function toggleLike(postId, liked) {
    if (!currentUser || !supabase) throw new Error("You need to log in.");

    if (liked) {
      const { error } = await supabase
        .from("likes")
        .delete()
        .eq("post_id", postId)
        .eq("user_id", currentUser.id);

      if (error) throw error;
    } else {
      const { error } = await supabase
        .from("likes")
        .insert({ post_id: postId, user_id: currentUser.id });

      if (error) throw error;
    }
  }

  async function uploadToBucket(file, folder = "") {
    if (!currentUser || !supabase) throw new Error("You need to log in to upload.");

    const safeName = file.name.replaceAll(" ", "_");
    const path = `${currentUser.id}/${folder}${Date.now()}-${safeName}`;

    const { error } = await supabase.storage.from(CONFIG.BUCKET).upload(path, file, {
      cacheControl: "3600",
      upsert: false
    });

    if (error) throw error;

    const { data } = supabase.storage.from(CONFIG.BUCKET).getPublicUrl(path);
    return data?.publicUrl || null;
  }

  async function createPost() {
    if (!currentUser || !supabase) {
      showToast("You need to log in to publish.");
      return;
    }

    const displayName = ui.uDisplayName.value.trim() || currentProfile?.display_name || currentUser.email || "User";
    const caption = ui.uCaption.value.trim();
    const songTitle = ui.uSongTitle.value.trim();
    const songPreview = ui.uSongPreview.value.trim();
    const imageFile = ui.uFile.files?.[0] || null;
    const audioFile = ui.uAudioFile.files?.[0] || null;

    if (!displayName || !caption || !imageFile) {
      showToast("Display name, caption, and a media file are required.");
      return;
    }

    ui.submitUpload.disabled = true;

    try {
      const imageUrl = await uploadToBucket(imageFile, "media/");
      let audioUrl = null;
      if (audioFile) {
        audioUrl = await uploadToBucket(audioFile, "audio/");
      }

      const { error } = await supabase
        .from("posts")
        .insert({
          user_id: currentUser.id,
          image_url: imageUrl,
          audio_url: audioUrl,
          caption,
          song_title: songTitle || null,
          song_preview: songPreview || null,
          likes: 0,
          username: normalizeUsername(displayName)
        });

      if (error) throw error;

      closeModal();
      ui.uCaption.value = "";
      ui.uSongTitle.value = "";
      ui.uSongPreview.value = "";
      ui.uFile.value = "";
      ui.uAudioFile.value = "";
      resetPreviewMedia();

      await loadCurrentProfile();
      await loadPosts(currentSearch);
      showToast("Post published.");
    } catch (err) {
      showToast(err?.message || "Publish failed.");
    } finally {
      ui.submitUpload.disabled = false;
    }
  }

  async function trackPresence() {
    if (!currentUser || !supabase) return;

    try {
      const { error } = await supabase
        .from("presence")
        .upsert({
          user_id: currentUser.id,
          last_seen: new Date().toISOString()
        }, { onConflict: "user_id" });

      if (error) console.warn("Presence update failed:", error);
    } catch (err) {
      console.warn("Presence update failed:", err);
    }
  }

  function initEvents() {
    ui.openUpload.addEventListener("click", openModal);
    ui.closeUpload.addEventListener("click", closeModal);
    ui.cancelUpload.addEventListener("click", closeModal);

    ui.uploadModal.addEventListener("click", (e) => {
      if (e.target === ui.uploadModal) closeModal();
    });

    ui.submitUpload.addEventListener("click", createPost);

    ui.uDisplayName.addEventListener("input", previewFromForm);
    ui.uCaption.addEventListener("input", previewFromForm);
    ui.uSongTitle.addEventListener("input", previewFromForm);
    ui.uSongPreview.addEventListener("input", previewFromForm);

    ui.uFile.addEventListener("change", () => {
      const file = ui.uFile.files?.[0];
      resetPreviewMedia();

      if (!file) {
        previewFromForm();
        return;
      }

      const url = URL.createObjectURL(file);

      if (file.type.startsWith("video/")) {
        ui.previewVideo.src = url;
        ui.previewVideo.style.display = "block";
        ui.previewVideo.play().catch(() => {});
      } else {
        ui.previewImg.src = url;
        ui.previewImg.style.display = "block";
      }

      ui.previewTitle.textContent = ui.uDisplayName.value.trim() || file.name;
      ui.previewText.textContent = ui.uCaption.value.trim() || "Your selected content will appear here.";
    });

    ui.searchInput.addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        loadPosts(ui.searchInput.value.trim());
      }, 250);
    });
  }

  async function boot() {
    if (booted) return;
    booted = true;

    showApp();

    const safety = setTimeout(() => {
      showApp();
      if (!posts.length) {
        ui.emptyState.querySelector("h2").textContent = "Fallback mode";
        ui.emptyState.querySelector("p").textContent = "The interface is open. Data loading is taking longer than usual.";
        ui.emptyState.classList.add("show");
      }
    }, CONFIG.BOOT_TIMEOUT_MS);

    try {
      await initSupabase().catch(err => {
        supabase = null;
        showToast(err?.message || "Supabase unavailable. Showing the UI anyway.");
      });

      if (supabase) {
        const session = await getSessionSafe().catch(() => null);
        if (session?.user) {
          currentUser = session.user;
          await loadCurrentProfile().catch(() => {});
        } else {
          currentUser = null;
          currentProfile = null;
          setHeaderFromSession();
        }
      } else {
        currentUser = null;
        currentProfile = null;
        setHeaderFromSession();
      }

      await loadPosts("");
      await trackPresence().catch(() => {});
      setInterval(() => trackPresence().catch(() => {}), 60000);

      if (!posts.length) {
        updateEmptyState();
      }
    } catch (err) {
      console.error("Boot failed:", err);
      showToast(err?.message || "The app started without full data.");
      posts = [];
      renderCards();
      updateEmptyState();
    } finally {
      clearTimeout(safety);
      showApp();
    }
  }

  window.addEventListener("error", (event) => {
    console.error(event.error || event.message);
    showToast(event?.error?.message || event.message || "Unexpected error.");
  });

  window.addEventListener("unhandledrejection", (event) => {
    console.error(event.reason);
    showToast(event.reason instanceof Error ? event.reason.message : String(event.reason || "Unhandled promise rejection"));
  });

  initEvents();
  boot();
})();
</script>
</body>
