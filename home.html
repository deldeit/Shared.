<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shared</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#050505;
    --panel:#0c0c0c;
    --panel-2:rgba(12,12,12,.82);
    --text:#fff;
    --muted:#a6a6a6;
    --line:rgba(255,255,255,.10);
    --line-2:rgba(255,255,255,.06);
    --shadow:0 24px 80px rgba(0,0,0,.42);
    --radius:28px;
    --radius-sm:18px;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:
      radial-gradient(circle at 15% 18%, rgba(255,255,255,.08), transparent 22%),
      radial-gradient(circle at 82% 15%, rgba(255,255,255,.06), transparent 18%),
      radial-gradient(circle at 50% 100%, rgba(255,255,255,.05), transparent 28%),
      var(--bg);
    color:var(--text);
    font-family:Inter, system-ui, sans-serif;
  }

  button,input{ font:inherit; }
  .hidden{ display:none !important; }

  .loading{
    position:fixed;
    inset:0;
    z-index:1000;
    display:grid;
    place-items:center;
    background:#000;
    color:#fff;
    text-align:center;
    padding:24px;
  }

  .loading-card{
    width:min(420px, calc(100vw - 32px));
    border:1px solid var(--line);
    border-radius:24px;
    background:rgba(12,12,12,.88);
    box-shadow:var(--shadow);
    padding:26px 20px;
  }

  .loading-title{
    font-family:'Archivo Black', sans-serif;
    font-size:32px;
    margin:0 0 8px;
    letter-spacing:.2px;
  }

  .loading-sub{
    margin:0;
    color:var(--muted);
    line-height:1.55;
    font-size:13px;
    font-weight:600;
  }

  .spinner{
    width:34px;
    height:34px;
    border-radius:50%;
    border:3px solid rgba(255,255,255,.12);
    border-top-color:#fff;
    margin:0 auto 18px;
    animation:spin 1s linear infinite;
  }

  @keyframes spin { to { transform:rotate(360deg); } }

  .app{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
  }

  .topbar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    z-index:50;
    padding:12px 12px 0;
    pointer-events:none;
  }

  .topbar-inner{
    pointer-events:auto;
    max-width:1280px;
    margin:0 auto;
    display:flex;
    align-items:center;
    gap:12px;
    justify-content:space-between;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:999px;
    background:rgba(8,8,8,.72);
    backdrop-filter:blur(18px);
    box-shadow:var(--shadow);
  }

  .brand{
    min-width:0;
    display:flex;
    align-items:center;
  }

  .brand-text{
    font-family:'Archivo Black', sans-serif;
    font-size:18px;
    line-height:1;
    letter-spacing:.2px;
  }

  .search-area{
    flex:1 1 auto;
    max-width:720px;
    display:flex;
    align-items:center;
    gap:10px;
    margin:0 10px;
  }

  .searchbar{ flex:1 1 auto; }
  .searchbar input{
    width:100%;
    border-radius:999px;
    border:1px solid var(--line);
    background:rgba(10,10,10,.85);
    color:#fff;
    outline:none;
    padding:13px 16px;
    font-size:14px;
  }

  .searchbar input::placeholder{ color:#797979; }

  .icon-btn{
    width:42px;
    height:42px;
    border:none;
    border-radius:50%;
    display:grid;
    place-items:center;
    cursor:pointer;
    transition:transform .16s ease, opacity .16s ease, background .16s ease;
    flex:0 0 auto;
    box-shadow:none;
  }

  .icon-btn:hover{ transform:translateY(-1px) scale(1.02); }

  .uploadbtn{
    background:#fff;
    color:#000;
    font-size:18px;
    font-weight:800;
  }

  .profile-link{
    width:42px;
    height:42px;
    border-radius:50%;
    overflow:hidden;
    border:1px solid var(--line);
    background:#111;
    display:block;
    flex:0 0 auto;
    text-decoration:none;
  }

  .profile-link img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .profile-fallback{
    width:100%;
    height:100%;
    display:grid;
    place-items:center;
    background:#fff;
    color:#000;
    font-family:'Archivo Black', sans-serif;
    font-size:14px;
  }

  .feed{
    height:100%;
    overflow-y:auto;
    overflow-x:hidden;
    scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
    scroll-behavior:smooth;
    padding:92px 14px 26px;
    display:grid;
    gap:18px;
    align-content:start;
    justify-items:center;
  }

  .feed::-webkit-scrollbar{ display:none; }

  .item{
    width:min(100%, 640px);
    border:1px solid var(--line);
    border-radius:24px;
    overflow:hidden;
    background:rgba(10,10,10,.95);
    box-shadow:var(--shadow);
    position:relative;
  }

  .post-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:14px 14px 12px;
    border-bottom:1px solid rgba(255,255,255,.06);
  }

  .profile-anchor{
    text-decoration:none;
    color:inherit;
    display:flex;
    align-items:center;
    gap:12px;
    min-width:0;
    flex:1 1 auto;
  }

  .avatar{
    width:42px;
    height:42px;
    border-radius:50%;
    flex:0 0 auto;
    display:grid;
    place-items:center;
    background:#fff;
    color:#000;
    font-size:14px;
    overflow:hidden;
    font-family:'Archivo Black', sans-serif;
  }

  .avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .author-meta{
    min-width:0;
    flex:1 1 auto;
  }

  .author-line{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }

  .author{
    font-family:'Archivo Black', sans-serif;
    font-size:15px;
    line-height:1.1;
  }

  .verified{
    width:16px;
    height:16px;
    border-radius:50%;
    background:#fff;
    color:#000;
    display:grid;
    place-items:center;
    font-size:10px;
    flex:0 0 auto;
  }

  .handle{
    margin-top:4px;
    font-size:11px;
    color:var(--muted);
    letter-spacing:.4px;
  }

  .profile-stats{
    margin-top:4px;
    font-size:11px;
    color:#d7d7d7;
    font-weight:700;
  }

  .post-time{
    margin:0;
    font-size:11px;
    color:var(--muted);
    white-space:nowrap;
  }

  .media-wrap{
    width:100%;
    position:relative;
    background:#111;
    aspect-ratio:4/5;
    overflow:hidden;
  }

  .media-wrap::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,.02), rgba(0,0,0,.16));
    pointer-events:none;
  }

  .file{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
  }

  .media-fallback{
    width:100%;
    height:100%;
    background:linear-gradient(135deg, var(--c1), var(--c2));
  }

  .audio-hidden{
    display:none;
  }

  .post-body{
    padding:14px 14px 16px;
  }

  .headline{
    margin:0 0 8px;
    font-family:'Archivo Black', sans-serif;
    font-size:clamp(24px, 4vw, 42px);
    line-height:.96;
    letter-spacing:.2px;
    text-wrap:balance;
  }

  .caption{
    margin:0;
    color:#e8e8e8;
    font-size:13px;
    line-height:1.6;
    font-weight:600;
    white-space:pre-wrap;
  }

  .chips{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:12px;
  }

  .chip{
    padding:7px 10px;
    border-radius:999px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.06);
    color:#fff;
    font-size:11px;
    font-weight:700;
  }

  .post-footer{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:12px 14px 14px;
    border-top:1px solid rgba(255,255,255,.06);
  }

  .stats{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    color:#f0f0f0;
    font-size:11px;
    font-weight:700;
  }

  .like-btn{
    width:44px;
    height:44px;
    border-radius:14px;
    border:1px solid var(--line);
    background:#111;
    color:#fff;
    display:grid;
    place-items:center;
    cursor:pointer;
    transition:transform .16s ease, background .16s ease, color .16s ease;
    flex:0 0 auto;
    font-size:17px;
  }

  .like-btn:hover{ transform:translateY(-1px) scale(1.02); }

  .like-btn.liked{
    background:#fff;
    color:#000;
  }


  .post-card{
    width:min(100%, 560px);
    min-height:auto;
    padding:0;
  }

  .post-main{
    display:grid;
    grid-template-columns:minmax(0,1fr) 74px;
    gap:12px;
    padding:12px 12px 0;
    align-items:start;
  }

  .post-side{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    padding-top:4px;
  }

  .side-count{
    border:1px solid var(--line);
    background:rgba(255,255,255,.06);
    color:#fff;
    border-radius:14px;
    padding:10px 8px;
    min-width:58px;
    font-size:11px;
    font-weight:800;
    cursor:pointer;
  }

  .side-count:hover{
    transform:translateY(-1px);
  }

  .like-btn{
    width:52px;
    height:52px;
    border-radius:18px;
    border:1px solid var(--line);
    background:#111;
    color:#fff;
    display:grid;
    place-items:center;
    cursor:pointer;
    transition:transform .16s ease, background .16s ease, color .16s ease;
    flex:0 0 auto;
    font-size:18px;
    font-weight:800;
  }

  .post-media{
    width:100%;
    position:relative;
    overflow:hidden;
    border-radius:20px;
    background:#111;
    aspect-ratio:4/5;
  }

  .post-media img,
  .post-media video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    background:#0a0a0a;
  }

  .post-body{
    padding:12px 14px 14px;
  }

  .post-user-row{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
    margin-bottom:10px;
  }

  .post-user-link{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:0;
    color:inherit;
    text-decoration:none;
  }

  .post-user-meta{
    min-width:0;
  }

  .post-user-name{
    font-family:'Archivo Black', sans-serif;
    font-size:14px;
    line-height:1.1;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .post-user-handle{
    margin-top:3px;
    font-size:11px;
    color:var(--muted);
    letter-spacing:.3px;
  }

  .post-time{
    font-size:11px;
    color:var(--muted);
    white-space:nowrap;
    padding-top:2px;
  }

  .caption{
    margin:0;
    color:#f1f1f1;
    font-size:13px;
    line-height:1.6;
    font-weight:600;
    white-space:pre-wrap;
  }

  .chips{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:12px;
  }

  .chip{
    padding:7px 10px;
    border-radius:999px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.06);
    color:#fff;
    font-size:11px;
    font-weight:700;
  }

  .ad-slot{
    width:min(100%, 560px);
    margin:0 auto;
    border:1px solid var(--line);
    border-radius:24px;
    overflow:hidden;
    background:rgba(12,12,12,.88);
    box-shadow:var(--shadow);
    padding:12px;
  }

  .ad-label{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:1.4px;
    color:var(--muted);
    margin:0 0 8px;
    font-weight:800;
  }

  .adsbygoogle{
    width:100%;
    min-height:120px;
    display:block;
  }

  .likes-list{
    max-height:min(56vh, 520px);
    overflow:auto;
    display:grid;
    gap:10px;
    padding-right:4px;
  }

  .liker-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:18px;
    background:rgba(255,255,255,.04);
  }

  .liker-avatar{
    width:38px;
    height:38px;
    border-radius:50%;
    overflow:hidden;
    background:#fff;
    color:#000;
    display:grid;
    place-items:center;
    flex:0 0 auto;
    font-family:'Archivo Black', sans-serif;
    font-size:14px;
  }

  .liker-avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .liker-meta{
    min-width:0;
    flex:1 1 auto;
  }

  .liker-name{
    margin:0;
    font-family:'Archivo Black', sans-serif;
    font-size:14px;
    line-height:1.1;
  }

  .liker-handle{
    margin-top:3px;
    font-size:11px;
    color:var(--muted);
  }

  .likes-empty{
    color:var(--muted);
    font-size:13px;
    line-height:1.5;
    padding:10px 2px 0;
  }


  .empty-state{
    width:min(720px, calc(100vw - 28px));
    margin:0 auto;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    text-align:center;
    border:1px solid var(--line);
    border-radius:28px;
    background:rgba(12,12,12,.72);
    backdrop-filter:blur(14px);
    padding:22px;
    box-shadow:var(--shadow);
    display:none;
    z-index:5;
  }

  .empty-state.show{ display:block; }

  .empty-state h2{
    margin:0 0 8px;
    font-family:'Archivo Black', sans-serif;
    font-size:22px;
  }

  .empty-state p{
    margin:0;
    color:var(--muted);
    line-height:1.55;
    font-size:13px;
    font-weight:600;
  }

  .toast{
    position:fixed;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    z-index:70;
    width:min(920px, calc(100vw - 20px));
    display:none;
  }

  .toast.show{ display:block; }

  .toast-inner{
    border-radius:16px;
    border:1px solid var(--line);
    background:rgba(12,12,12,.94);
    backdrop-filter:blur(14px);
    color:#fff;
    padding:12px 14px;
    box-shadow:var(--shadow);
    font-size:12px;
    line-height:1.45;
    font-weight:600;
  }

  .modal{
    position:fixed;
    inset:0;
    z-index:80;
    display:none;
    align-items:center;
    justify-content:center;
    padding:18px;
    background:rgba(0,0,0,.74);
    backdrop-filter:blur(10px);
  }

  .modal.open{ display:flex; }

  .sheet{
    width:min(760px, 100%);
    border-radius:28px;
    border:1px solid var(--line);
    background:linear-gradient(180deg, rgba(12,12,12,.96), rgba(7,7,7,.98));
    box-shadow:var(--shadow);
    overflow:hidden;
  }

  .sheet-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 18px 14px;
    border-bottom:1px solid rgba(255,255,255,.08);
  }

  .sheet-title{
    font-family:'Archivo Black', sans-serif;
    font-size:20px;
  }

  .close{
    width:42px;
    height:42px;
    border-radius:50%;
    border:1px solid var(--line);
    background:#111;
    color:#fff;
    cursor:pointer;
    font-size:18px;
  }

  .sheet-body{
    display:grid;
    grid-template-columns:1.05fr .95fr;
  }

  .form{
    padding:18px;
    display:grid;
    gap:10px;
  }

  .input,.file{
    width:100%;
    border-radius:16px;
    border:1px solid var(--line);
    background:#000;
    color:#fff;
    outline:none;
    padding:12px 14px;
    font-size:14px;
  }

  .input::placeholder{ color:#7f7f7f; }

  .helper{
    color:var(--muted);
    font-size:12px;
    line-height:1.5;
    margin-top:2px;
  }

  .preview{
    padding:18px 18px 18px 0;
  }

  .preview-card{
    min-height:380px;
    border-radius:24px;
    border:1px solid var(--line);
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,.16), transparent 16%),
      linear-gradient(135deg, #1a1a1a, #333);
    position:relative;
    overflow:hidden;
  }

  .preview-media{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
  }

  .preview-overlay{
    position:absolute;
    inset:auto 0 0 0;
    padding:16px;
    background:linear-gradient(180deg, transparent, rgba(0,0,0,.86));
  }

  .preview-title{
    font-family:'Archivo Black', sans-serif;
    font-size:28px;
    line-height:.96;
    margin:0 0 8px;
  }

  .preview-text{
    margin:0;
    font-size:13px;
    line-height:1.55;
    color:#e8e8e8;
    font-weight:600;
  }

  .sheet-actions{
    display:flex;
    gap:10px;
    justify-content:flex-end;
    padding:0 18px 18px;
  }

  .sheet-actions button{
    border:none;
    border-radius:999px;
    padding:12px 14px;
    cursor:pointer;
    font-weight:700;
  }

  .ghost{
    background:#111;
    color:#fff;
    border:1px solid var(--line);
  }

  .save{
    background:#fff;
    color:#000;
  }

  @media (max-width: 860px){
    .topbar{ padding:10px 10px 0; }
    .topbar-inner{
      border-radius:24px;
      padding:10px 12px;
      gap:10px;
    }

    .search-area{ margin:0; gap:8px; }
    .searchbar input{ font-size:13px; padding:13px 14px; }

    .feed{
      padding:92px 10px 24px;
      gap:14px;
    }

    .item{ border-radius:22px; }

    .author{ font-size:14px; }
    .post-time{ display:none; }
    .headline{ font-size:clamp(22px, 7vw, 34px); }

    .sheet-body{ grid-template-columns:1fr; }
    .preview{ padding:0 18px 18px; }
    .preview-card{ min-height:260px; }
    .preview-title{ font-size:24px; }
    .profile-link,.uploadbtn{ width:40px; height:40px; }
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8019369535802415" crossorigin="anonymous"></script>
</head>

<body>
  <div class="loading" id="loading">
    <div class="loading-card">
      <div class="spinner"></div>
      <h2 class="loading-title">Shared.</h2>
      <p class="loading-sub">Starting the app, then loading data in the background.</p>
    </div>
  </div>

  <div class="toast" id="toast"><div class="toast-inner" id="toastInner"></div></div>

  <div class="app hidden" id="app">
    <div class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-text">Shared.</div>
        </div>

        <div class="search-area">
          <div class="searchbar">
            <input id="searchInput" type="text" placeholder="Search posts, users, tags..." />
          </div>
          <button class="icon-btn uploadbtn" id="openUpload" title="Upload" type="button">+</button>
        </div>

        <a class="profile-link" id="profileLink" href="./profile.html" title="Profile">
          <div class="profile-fallback" id="profileFallback">S</div>
          <img id="profileImg" alt="Profile" class="hidden" />
        </a>
      </div>
    </div>

    <div class="empty-state" id="emptyState">
      <h2>No posts found</h2>
      <p>Try another search or create the first post with Upload.</p>
    </div>

    <div class="feed" id="feed"></div>
  </div>

  <div class="modal" id="uploadModal" aria-hidden="true">
    <div class="sheet">
      <div class="sheet-head">
        <div class="sheet-title">New post</div>
        <button class="close" id="closeUpload" type="button">×</button>
      </div>

      <div class="sheet-body">
        <div class="form">
          <input class="input" id="uDisplayName" type="text" placeholder="Display name" />
          <input class="input" id="uCaption" type="text" placeholder="Caption" />
          <input class="input" id="uSongTitle" type="text" placeholder="Song title" />
          <input class="input" id="uSongPreview" type="text" placeholder="Song/audio URL (hidden)" />
          <input class="file" id="uFile" type="file" accept="image/*,video/*" />
          <div class="helper">
            Uploads to bucket <code>shared</code>, then stores the post in <code>posts</code>.
          </div>
        </div>

        <div class="preview">

(() => {

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));

  function esc(str) {
    return String(str ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")

  function showApp() {

  function normalizeUsername(name) {
    return String(name || "shared_user")
      .trim()
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, "_")
      .replace(/^_+|_+$/g, "")
      .slice(0, 24) || "shared_user";
  }

  function asArray(value) {
    if (Array.isArray(value)) return value;
    if (!value) return [];
    if (typeof value === "string") return [value];
    return [];
  }

  function parseTags(value) {
    if (!value) return [];
    if (Array.isArray(value)) return value.map(String).filter(Boolean);
    if (typeof value === "string") return value.split(",").map(s => s.trim()).filter(Boolean);
    return [];
  }

  function withTimeout(promise, timeoutMs = CONFIG.FETCH_TIMEOUT_MS) {
    return Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(() => reject(new Error("Request timed out.")), timeoutMs))
    ]);
  }

  function safeCall(fn, fallback = null) {
    return Promise.resolve().then(fn).catch(() => fallback);
  }

  function updateEmptyState() {

  function setHeaderFromSession() {

  function getAudioUrl(post) {
    const candidate = post?.audio_url || post?.song_preview || "";
    if (typeof candidate !== "string") return null;
    const url = candidate.trim();
    if (!url) return null;
    if (/^https?:\/\//i.test(url) || /^\/\//.test(url)) return url;
    return null;
  }

  
  function renderAdSlot(idx) {
    return `
      <div class="ad-slot" data-ad-slot-index="${idx}">
        <div class="ad-label">Sponsored</div>
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-format="fluid"
             data-ad-layout-key="-6t+ed+2i-1n-4w"
             data-ad-client="ca-pub-8019369535802415"
             data-ad-slot="8427156093"></ins>
      </div>
    `;
  }

  function buildFeedHTML(list) {
    const parts = [];
    list.forEach((post, idx) => {
      const profile = post.profile || {};
      const authorName = profile.display_name || post.username || "User";
      const handle = post.username ? `@${post.username}` : `@${normalizeUsername(authorName)}`;
      const initials = (authorName || "S").trim().charAt(0).toUpperCase();
      const likeCount = Number(post.like_count ?? post.likes ?? 0);
      const liked = !!post.user_liked;
      const verified = !!profile.verified;
      const chips = [...asArray(profile.interests).slice(0, 3), ...parseTags(post.tags).slice(0, 3)].slice(0, 5);
      const audioUrl = getAudioUrl(post);
      const profileSlug = encodeURIComponent(post.username || normalizeUsername(authorName));

      const avatarHtml = profile.avatar_url
        ? `<img src="${esc(profile.avatar_url)}" alt="">`
        : esc(initials);

      const mediaHtml = post.image_url
        ? (/\.(mp4|webm|ogg|mov)(\?|$)/i.test(String(post.image_url))
            ? `<video src="${esc(post.image_url)}" autoplay muted loop playsinline preload="metadata"></video>`
            : `<img src="${esc(post.image_url)}" alt="">`)
        : `<div class="media-fallback" style="--c1:${post.c1};--c2:${post.c2};"></div>`;

      parts.push(`
        <article class="item post-card" data-index="${idx}" data-post-id="${post.id}">
          <div class="post-main">
            <div class="post-media">
              ${mediaHtml}
            </div>

            <div class="post-side">
              <button class="like-btn ${liked ? "liked" : ""}" type="button" data-like-btn="1" aria-label="Like">${liked ? "❤" : "♡"}</button>
              <button class="side-count" type="button" data-likes-list-btn="1">${likeCount} likes</button>
            </div>
          </div>

          ${audioUrl ? `<audio class="audio-hidden post-audio" preload="auto" loop playsinline src="${esc(audioUrl)}"></audio>` : ""}

          <div class="post-body">
            <div class="post-user-row">
              <a class="post-user-link" href="${CONFIG.PROFILE_PAGE}?username=${profileSlug}">
                <div class="avatar">${avatarHtml}</div>
                <div class="post-user-meta">
                  <div class="post-user-name">${esc(authorName)}</div>
                  <div class="post-user-handle">${esc(handle)}</div>
                </div>
              </a>
              <div class="post-time">${post.created_at ? new Date(post.created_at).toLocaleDateString() : ""}</div>
            </div>

            ${post.caption ? `<p class="caption">${esc(post.caption)}</p>` : ""}
            ${chips.length ? `<div class="chips">${chips.map(i => `<span class="chip">${esc(i)}</span>`).join("")}</div>` : ""}
          </div>
        </article>
      `);

      if (CONFIG.AD_EVERY > 0 && (idx + 1) % CONFIG.AD_EVERY === 0) {
        parts.push(renderAdSlot(idx));

    return parts.join("");

  function initGoogleAds() {
    if (!window.adsbygoogle) return;
    document.querySelectorAll(".adsbygoogle").forEach((ins) => {
      if (ins.dataset.adInitialized === "1") return;
      ins.dataset.adInitialized = "1";
      try {
        (window.adsbygoogle = window.adsbygoogle || []).push({});

        console.warn("Ad init failed:", err);

  async function loadLikers(postId, post) {
    if (!supabase) {
      showToast("Database unavailable.");
      return;
    }

    ui.likesList.innerHTML = `<div class="likes-empty">Loading likes...</div>`;
    ui.likesModalTitle.textContent = `Likes${post?.caption ? ` · ${post.caption.slice(0, 24)}` : ""}`;
    ui.likesModal.classList.add("open");
    ui.likesModal.setAttribute("aria-hidden", "false");

    try {
      const { data, error } = await withTimeout(
        supabase
          .from("likes")
          .select("user_id, created_at")
          .eq("post_id", postId)
          .order("created_at", { ascending: false })
      );

      if (error) throw error;

      const likes = data || [];
      if (!likes.length) {
        ui.likesList.innerHTML = `<div class="likes-empty">No likes yet.</div>`;
        return;
      }

      const userIds = [...new Set(likes.map(r => r.user_id).filter(Boolean))];
      const profileMap = await loadProfilesForPosts(userIds);

      ui.likesList.innerHTML = likes.map(row => {
        const p = profileMap.get(row.user_id) || {};
        const name = p.display_name || p.username || "User";
        const handle = p.username ? `@${p.username}` : `@${normalizeUsername(name)}`;
        const avatar = p.avatar_url
          ? `<img src="${esc(p.avatar_url)}" alt="">`
          : esc((name || "U").trim().charAt(0).toUpperCase());

        return `
          <div class="liker-row">
            <div class="liker-avatar">${avatar}</div>
            <div class="liker-meta">
              <p class="liker-name">${esc(name)}</p>
              <div class="liker-handle">${esc(handle)}</div>
            </div>
            ${p.verified ? `<div class="verified" title="Verified">✓</div>` : ""}
          </div>
        `;
      }).join("");
    } catch (err) {
      ui.likesList.innerHTML = `<div class="likes-empty">${esc(err?.message || "Could not load likes.")}</div>`;
    }
  }


  function attachHandlers() {
    ui.feed.removeEventListener("click", onFeedClick);
    ui.feed.addEventListener("click", onFeedClick);
  }

  async function onFeedClick(e) {
    const likeBtn = e.target.closest("[data-like-btn='1']");
    const likesListBtn = e.target.closest("[data-likes-list-btn='1']");
    const card = e.target.closest("[data-post-id]");
    if (!card) return;

    const postId = card.dataset.postId;
    const post = posts.find(p => p.id === postId) || null;

    if (likesListBtn) {
      await loadLikers(postId, post);
      return;
    }

    if (likeBtn) {
      if (!currentUser) {
        showToast("Log in to like posts.");
        return;
      }

      const liked = likeBtn.classList.contains("liked");
      likeBtn.disabled = true;

      try {
        await toggleLike(postId, liked);
        await loadPosts(currentSearch, true);
      } catch (err) {
        showToast(err?.message || "Like action failed.");
      } finally {
        likeBtn.disabled = false;
      }
    }
  }

function pauseAllAudios() {
    document.querySelectorAll(".post-audio").forEach(audio => {
      try { audio.pause(); } catch {}
    });
  }

  function activateAudioForCard(card) {
    if (!card) return;

    const audio = card.querySelector(".post-audio");
    pauseAllAudios();

    if (!audio) return;

    audio.loop = true;
    audio.preload = "auto";
    audio.playsInline = true;

    const attempt = audio.play();
    if (attempt && typeof attempt.catch === "function") {
      attempt.catch(() => {
        if (!fallbackAudioResumeBound) {
          fallbackAudioResumeBound = true;
          const resume = () => {
            const current = document.querySelector(`.post-card.is-active .post-audio`);
            if (current) current.play().catch(() => {});
            window.removeEventListener("pointerdown", resume);
            window.removeEventListener("touchstart", resume);
          };
          window.addEventListener("pointerdown", resume, { once: true });
          window.addEventListener("touchstart", resume, { once: true });
        }
      });
    }
  }

  function setupObserver() {
    if (observer) observer.disconnect();
    observer = new IntersectionObserver((entries) => {
      let best = null;
      for (const entry of entries) {
        if (entry.isIntersecting && entry.intersectionRatio >= 0.62) {
          best = entry;
          break;
        }
      }
      if (!best) return;

      document.querySelectorAll(".post-card").forEach(card => card.classList.remove("is-active"));
      best.target.classList.add("is-active");
      activeIndex = Number(best.target.dataset.index || 0);
      activateAudioForCard(best.target);
    }, {
      root: ui.feed,
      threshold: [0.25, 0.5, 0.62, 0.75, 1]
    });

    document.querySelectorAll(".post-card").forEach(card => observer.observe(card));
  }

  function renderFeed() {
    ui.feed.innerHTML = buildFeedHTML(posts);
    attachHandlers();
    updateEmptyState();
    setupObserver();
    initGoogleAds();

    if (posts.length) {
      requestAnimationFrame(() => {
        const first = document.querySelector(".post-card");
        if (first) {
          first.classList.add("is-active");
          activateAudioForCard(first);
        }
      });
    }
  }

  async function initSupabase() {
    if (!window.supabase || typeof window.supabase.createClient !== "function") {
      throw new Error("Supabase library failed to load.");
    }
    if (!CONFIG.SUPABASE_URL || !CONFIG.SUPABASE_ANON_KEY) {
      throw new Error("Missing Supabase config.");
    }
    supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });
  }

  async function getSessionSafe() {
    if (!supabase) return null;
    try {
      const res = await withTimeout(supabase.auth.getSession(), CONFIG.FETCH_TIMEOUT_MS);
      return res?.data?.session || null;
    } catch {
      return null;
    }
  }

  async function loadCurrentProfile() {
    if (!supabase || !currentUser) return null;

    try {
      const { data, error } = await withTimeout(
        supabase
          .from("profiles")
          .select("id, created_at, display_name, avatar_url, banner_color, verified, followers_count, following_count, interests, bio")
          .eq("id", currentUser.id)
          .maybeSingle()
      );

      if (error) throw error;
      currentProfile = data || null;
      setHeaderFromSession();
      return currentProfile;
    } catch {
      currentProfile = null;
      setHeaderFromSession();
      return null;
    }
  }

  async function fetchPublicPosts() {
    if (!supabase) return [];
    const { data, error } = await withTimeout(
      supabase
        .from("posts")
        .select("id, user_id, image_url, audio_url, caption, created_at, song_preview, song_title, likes, username, tags")
        .order("created_at", { ascending: false })
        .limit(CONFIG.MAX_POSTS)
    );
    if (error) throw error;
    return data || [];
  }

  async function fetchPostsByProfiles(profileIds) {
    if (!supabase || !profileIds.length) return [];
    try {
      const { data, error } = await withTimeout(
        supabase
          .from("posts")
          .select("id, user_id, image_url, audio_url, caption, created_at, song_preview, song_title, likes, username, tags")
          .in("user_id", profileIds)
          .order("created_at", { ascending: false })
          .limit(CONFIG.MAX_POSTS)
      );
      if (error) return [];
      return data || [];
    } catch {
      return [];
    }
  }

  async function loadProfilesForPosts(userIds) {
    if (!supabase || !userIds.length) return new Map();
    try {
      const { data, error } = await withTimeout(
        supabase
          .from("profiles")
          .select("id, created_at, display_name, avatar_url, banner_color, verified, followers_count, following_count, interests, bio")
          .in("id", userIds)
      );
      if (error) return new Map();
      return new Map((data || []).map(p => [p.id, p]));
    } catch {
      return new Map();
    }
  }

  async function loadLikesForPosts(postIds) {
    if (!supabase || !postIds.length) return { counts: new Map(), likedByUser: new Set() };
    try {
      const { data, error } = await withTimeout(
        supabase
          .from("likes")
          .select("post_id, user_id")
          .in("post_id", postIds)
      );
      if (error) return { counts: new Map(), likedByUser: new Set() };

      const counts = new Map();
      const likedByUser = new Set();
      for (const row of (data || [])) {
        counts.set(row.post_id, (counts.get(row.post_id) || 0) + 1);
        if (currentUser && row.user_id === currentUser.id) likedByUser.add(row.post_id);
      }
      return { counts, likedByUser };
    } catch {
      return { counts: new Map(), likedByUser: new Set() };
    }
  }

  async function loadPosts(query = "", preserveScroll = true) {
    currentSearch = String(query || "").trim();

    try {
      let rawPosts = [];

      if (!supabase) {
        posts = [];
        renderFeed();
        return;
      }

      if (!currentSearch) {
        rawPosts = await fetchPublicPosts();
      } else {
        const textRes = await withTimeout(
          supabase
            .from("posts")
            .select("id, user_id, image_url, audio_url, caption, created_at, song_preview, song_title, likes, username, tags")
            .or(`caption.ilike.%${currentSearch}%,song_title.ilike.%${currentSearch}%,username.ilike.%${currentSearch}%,tags.ilike.%${currentSearch}%`)
            .order("created_at", { ascending: false })
            .limit(CONFIG.MAX_POSTS)
        );

        const textPosts = textRes?.error ? [] : (textRes?.data || []);

        let profileIds = [];
        try {
          const profileHitsRes = await withTimeout(
            supabase
              .from("profiles")
              .select("id")
              .or(`display_name.ilike.%${currentSearch}%,bio.ilike.%${currentSearch}%`)
              .limit(CONFIG.MAX_POSTS)
          );
          if (!profileHitsRes?.error) {
            profileIds = (profileHitsRes?.data || []).map(p => p.id);
          }
        } catch {}

        const profilePosts = await fetchPostsByProfiles(profileIds);
        const merged = [...textPosts, ...profilePosts];
        const dedup = new Map();
        for (const post of merged) dedup.set(post.id, post);
        rawPosts = [...dedup.values()];
      }

      const userIds = [...new Set(rawPosts.map(p => p.user_id).filter(Boolean))];
      const profileMap = await loadProfilesForPosts(userIds);
      const { counts, likedByUser } = await loadLikesForPosts(rawPosts.map(p => p.id));

      posts = rawPosts.map((p, idx) => {
        const [c1, c2] = palettes[idx % palettes.length];
        return {
          ...p,
          c1,
          c2,
          profile: profileMap.get(p.user_id) || null,
          like_count: counts.get(p.id) ?? Number(p.likes || 0),
          user_liked: likedByUser.has(p.id)
        };
      });

      renderFeed();
      if (!preserveScroll) ui.feed.scrollTop = 0;
    } catch (err) {
      console.warn("Load posts failed:", err);
      posts = [];
      renderFeed();
      showToast(err?.message || "Posts could not be loaded, but the app is still usable.");
    }
  }

  async function toggleLike(postId, liked) {
    if (!currentUser || !supabase) throw new Error("You need to log in.");

    if (liked) {
      const { error } = await supabase
        .from("likes")
        .delete()
        .eq("post_id", postId)
        .eq("user_id", currentUser.id);
      if (error) throw error;
    } else {
      const { error } = await supabase
        .from("likes")
        .insert({ post_id: postId, user_id: currentUser.id });
      if (error) throw error;
    }
  }

  async function uploadMedia(file) {
    if (!currentUser || !supabase) throw new Error("You need to log in to upload.");

    const safeName = file.name.replaceAll(" ", "_");
    const path = `${currentUser.id}/${Date.now()}-${safeName}`;

    const { error } = await supabase.storage.from(CONFIG.BUCKET).upload(path, file, {
      cacheControl: "3600",
      upsert: false
    });

    if (error) throw error;

    const { data } = supabase.storage.from(CONFIG.BUCKET).getPublicUrl(path);
    return data?.publicUrl || null;
  }

  async function createPost() {
    if (!currentUser || !supabase) {
      showToast("You need to log in to publish.");
      return;
    }

    const displayName = ui.uDisplayName.value.trim() || currentProfile?.display_name || currentUser.email || "User";
    const caption = ui.uCaption.value.trim();
    const songTitle = ui.uSongTitle.value.trim();
    const songPreview = ui.uSongPreview.value.trim();
    const file = ui.uFile.files?.[0] || null;

    if (!displayName || !caption || !file) {
      showToast("Display name, caption, and a file are required.");
      return;
    }

    ui.submitUpload.disabled = true;

    try {
      const mediaUrl = await uploadMedia(file);

      const { error } = await supabase
        .from("posts")
        .insert({
          user_id: currentUser.id,
          image_url: mediaUrl,
          caption,
          song_title: songTitle || null,
          song_preview: songPreview || null,
          likes: 0,
          username: normalizeUsername(displayName)
        });

      if (error) throw error;

      closeModal();
      ui.uCaption.value = "";
      ui.uSongTitle.value = "";
      ui.uSongPreview.value = "";
      ui.uFile.value = "";
      resetPreviewMedia();

      await loadCurrentProfile();
      await loadPosts(currentSearch, false);
      showToast("Post published.");
    } catch (err) {
      showToast(err?.message || "Publish failed.");
    } finally {
      ui.submitUpload.disabled = false;
    }
  }

  async function trackPresence() {
    if (!currentUser || !supabase) return;
    try {
      const { error } = await supabase
        .from("presence")
        .upsert({
          user_id: currentUser.id,
          last_seen: new Date().toISOString()
        }, { onConflict: "user_id" });
      if (error) console.warn("Presence update failed:", error);
    } catch (err) {
      console.warn("Presence update failed:", err);
    }
  }

  function initObserver() {
    if (observer) observer.disconnect();
    observer = new IntersectionObserver((entries) => {
      const visible = entries
        .filter(e => e.isIntersecting)
        .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
      if (!visible) return;

      document.querySelectorAll(".post-card").forEach(card => card.classList.remove("is-active"));
      visible.target.classList.add("is-active");
      activeIndex = Number(visible.target.dataset.index || 0);
      const audio = visible.target.querySelector(".post-audio");
      pauseAllAudios();
      if (audio) {
        const p = audio.play();
        if (p && typeof p.catch === "function") p.catch(() => {});
      }
    }, { root: ui.feed, threshold: [0.3, 0.5, 0.62, 0.75, 0.9] });

    document.querySelectorAll(".post-card").forEach(card => observer.observe(card));
  }

  function pauseAllAudios() {
    document.querySelectorAll(".post-audio").forEach(audio => {
      try { audio.pause(); } catch {}
    });
  }

  function initEvents() {
    ui.openUpload.addEventListener("click", () => { window.location.href = "./upload.html"; });
    ui.closeUpload.addEventListener("click", closeModal);
    ui.cancelUpload.addEventListener("click", closeModal);

    ui.closeLikes?.addEventListener("click", () => { ui.likesModal.classList.remove("open"); ui.likesModal.setAttribute("aria-hidden", "true"); });
    ui.likesModal?.addEventListener("click", (e) => {
      if (e.target === ui.likesModal) {
        ui.likesModal.classList.remove("open");
        ui.likesModal.setAttribute("aria-hidden", "true");
      }
    });

    ui.uploadModal.addEventListener("click", (e) => {
      if (e.target === ui.uploadModal) closeModal();
    });

    ui.submitUpload.addEventListener("click", createPost);

    ui.uDisplayName.addEventListener("input", previewFromForm);
    ui.uCaption.addEventListener("input", previewFromForm);
    ui.uSongTitle.addEventListener("input", previewFromForm);
    ui.uSongPreview.addEventListener("input", previewFromForm);

    ui.uFile.addEventListener("change", () => {
      const file = ui.uFile.files?.[0];
      resetPreviewMedia();

      if (!file) {
        previewFromForm();
        return;
      }

      const url = URL.createObjectURL(file);
      if (file.type.startsWith("video/")) {
        ui.previewVideo.src = url;
        ui.previewVideo.style.display = "block";
        ui.previewVideo.play().catch(() => {});
      } else {
        ui.previewImg.src = url;
        ui.previewImg.style.display = "block";
      }

      ui.previewTitle.textContent = ui.uDisplayName.value.trim() || file.name;
      ui.previewText.textContent = ui.uCaption.value.trim() || "Your selected content will appear here.";
    });

    ui.searchInput.addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        loadPosts(ui.searchInput.value.trim(), false);
      }, 120);
    });

    ui.feed.addEventListener("wheel", (e) => {
      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
        e.preventDefault();
        ui.feed.scrollTop += e.deltaY;
      }
    }, { passive:false });

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });
  }

  async function boot() {
    if (booted) return;
    booted = true;

    bootFallbackTimer = setTimeout(() => {
      showApp();
      showToast("Starting in fallback mode...");
    }, CONFIG.BOOT_TIMEOUT_MS);

    try {
      await initSupabase().catch(err => {
        showToast(err?.message || "Supabase not available. App will still open.");
        supabase = null;
      });

      if (supabase) {
        const session = await getSessionSafe();
        if (session?.user) {
          currentUser = session.user;
          await loadCurrentProfile().catch(() => {});
        } else {
          currentUser = null;
          currentProfile = null;
          setHeaderFromSession();
        }
      } else {
        currentUser = null;
        currentProfile = null;
        setHeaderFromSession();
      }

      await loadPosts("", false);
      await safeCall(() => trackPresence(), null);
      setInterval(() => trackPresence().catch(() => {}), 60000);

      showApp();
      initObserver();
    } catch (err) {
      console.error("Boot failed:", err);
      showApp();
      ui.emptyState.querySelector("h2").textContent = "Fallback mode";
      ui.emptyState.querySelector("p").textContent = err?.message || "The app started without data loading.";
      ui.emptyState.classList.add("show");
    } finally {
      clearTimeout(bootFallbackTimer);
      showApp();
    }
  }

  window.addEventListener("error", (event) => {
    console.error(event.error || event.message);
    showToast(event?.error?.message || event.message || "Unexpected error.");
  });

  window.addEventListener("unhandledrejection", (event) => {
    console.error(event.reason);
    showToast(event.reason instanceof Error ? event.reason.message : String(event.reason || "Unhandled promise rejection"));
  });

  initEvents();
  boot();
})();
</script>
</body>
</html>
