<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shared Composer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Inter, sans-serif;
}

body {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #111, #000);
  color:white;
}

/* CARD PRINCIPALE */
.composer {
  width:420px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  border-radius: 26px;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

/* TEXTAREA */
textarea {
  background: transparent;
  border:none;
  outline:none;
  resize:none;
  color:white;
  font-size:14px;
  height:70px;
  line-height:1.4;
}

/* IMAGE PREVIEW */
.preview {
  width:72px;
  height:72px;
  border-radius:18px;
  object-fit:cover;
  display:none;
  border:1px solid rgba(255,255,255,0.1);
}

/* ROW */
.row {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* ICON BUTTONS */
.icon {
  cursor:pointer;
  opacity:0.7;
  transition:0.2s;
  font-size:18px;
  user-select:none;
}

.icon:hover {
  opacity:1;
  transform:scale(1.05);
}

/* INPUT MUSIC */
input[type="text"] {
  width:100%;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  background: rgba(0,0,0,0.3);
  color:white;
  outline:none;
  font-size:13px;
}

/* DROPDOWN SONGS */
.songs {
  background: rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  max-height:140px;
  overflow:auto;
}

.song {
  padding:10px;
  font-size:12px;
  cursor:pointer;
  opacity:0.8;
  transition:0.15s;
}

.song:hover {
  background: rgba(255,255,255,0.06);
  opacity:1;
}

/* FILE INPUT HIDDEN */
input[type="file"] {
  display:none;
}

/* POST BUTTON */
button {
  margin-top:4px;
  padding:10px;
  border-radius:14px;
  border:none;
  background:white;
  color:black;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  transform: translateY(-1px);
}
</style>
</head>

<body>

<div class="composer">

  <!-- TEXT -->
  <textarea id="text" placeholder="What's happening?"></textarea>

  <!-- IMAGE PREVIEW -->
  <img id="preview" class="preview">

  <!-- ACTIONS -->
  <div class="row">
    <label class="icon">
      📎
      <input type="file" id="file" onchange="loadImage(event)">
    </label>

    <div class="icon">🎵</div>
  </div>

  <!-- MUSIC SEARCH -->
  <input id="musicSearch" type="text" placeholder="Search music..." oninput="searchMusic()">

  <div class="songs" id="songs"></div>

  <button onclick="publish()">Publish</button>

</div>

<script>
let selectedSong = null;

/* IMAGE */
function loadImage(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(evt) {
    const img = document.getElementById("preview");
    img.src = evt.target.result;
    img.style.display = "block";
  };

  reader.readAsDataURL(file);
}

/* MUSIC SEARCH */
async function searchMusic() {
  const q = document.getElementById("musicSearch").value;
  const box = document.getElementById("songs");

  if (q.length < 2) {
    box.innerHTML = "";
    return;
  }

  const res = await fetch(`https://api.deezer.com/search?q=${q}`);
  const data = await res.json();

  box.innerHTML = "";

  data.data.slice(0,5).forEach(song => {
    const div = document.createElement("div");
    div.className = "song";

    div.textContent = `${song.title} — ${song.artist.name}`;

    div.onclick = () => {
      selectedSong = song.preview;
      document.getElementById("musicSearch").value = song.title;
      box.innerHTML = "";
    };

    box.appendChild(div);
  });
}

/* PUBLISH (placeholder backend hook) */
function publish() {
  const text = document.getElementById("text").value;

  console.log({
    text,
    image: document.getElementById("preview").src,
    music: selectedSong
  });

  alert("Post ready (hook backend here)");
}
</script>

</body>
</html>
