<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  font-family:'Archivo Black', sans-serif;
}

body{
  margin:0;
  background:#000;
  color:#fff;
}

.container{
  max-width:720px;
  margin:auto;
  padding:20px;
}

.header{
  text-align:center;
  font-size:30px;
  margin-bottom:24px;
}

.upload-box{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:24px;
  padding:16px;
  margin-bottom:18px;
}

.dropzone{
  height:160px;
  border:2px dashed #333;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#777;
  cursor:pointer;
}

.preview{
  width:100%;
  height:160px;
  display:none;
  border-radius:18px;
  overflow:hidden;
  margin-bottom:10px;
}

.preview img{
  width:100%;
  height:100%;
  object-fit:cover;
}

input,textarea{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:14px;
  border:1px solid #222;
  background:#000;
  color:#fff;
}

.song-wrapper{
  position:relative;
}

#suggestions{
  position:absolute;
  top:100%;
  left:0;
  right:0;
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:12px;
  max-height:220px;
  overflow:auto;
  z-index:10;
}

.song-item{
  padding:10px;
  border-bottom:1px solid #222;
  cursor:pointer;
  font-size:12px;
}

.song-item:hover{
  background:#111;
}

button{
  width:100%;
  margin-top:12px;
  padding:14px;
  border-radius:16px;
  border:none;
  background:#fff;
  color:#000;
  cursor:pointer;
}

.post{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:20px;
  padding:14px;
  margin-bottom:16px;
}

.post img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:16px;
}

.post-song{
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.playBtn{
  padding:8px 12px;
  border-radius:999px;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="header">Shared.</div>

<div class="upload-box">

  <div class="dropzone" id="dropzone">Click or Drop</div>

  <div class="preview" id="previewBox"></div>

  <input type="file" id="file" hidden>

  <textarea id="caption" placeholder="caption..."></textarea>

  <div class="song-wrapper">
    <input id="songInput" placeholder="search song...">
    <div id="suggestions"></div>
  </div>

  <div id="songList"></div>

  <button id="uploadBtn">UPLOAD</button>

</div>

<div id="feed"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
"https://cnhaonawapuahzoctqav.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes"
);

let user;
let croppedBlob = null;
let selectedSong = null;
let audio = new Audio();

/* INIT */
(async()=>{
  const {data:{session}} = await supabase.auth.getSession();
  if(!session) location.href="index.html";
  user = session.user;
  loadFeed();
})();

/* IMAGE */
document.getElementById("dropzone").onclick = ()=>fileInput.click();

const fileInput = document.getElementById("file");

fileInput.onchange = e=>{
  const f = e.target.files[0];
  if(!f) return;

  const reader = new FileReader();
  const img = new Image();

  reader.onload = e=>img.src=e.target.result;

  img.onload = ()=>{
    const canvas=document.createElement("canvas");
    canvas.width=800;
    canvas.height=800;

    const size=Math.min(img.width,img.height);
    const ctx=canvas.getContext("2d");

    ctx.drawImage(img,(img.width-size)/2,(img.height-size)/2,size,size,0,0,800,800);

    canvas.toBlob(b=>{
      croppedBlob=b;
      document.getElementById("previewBox").style.display="block";
      document.getElementById("previewBox").innerHTML=`<img src="${URL.createObjectURL(b)}">`;
    },"image/jpeg",0.7);
  };

  reader.readAsDataURL(f);
};

/* DEEZER JSONP */
function deezerSearch(q){
  return new Promise((resolve)=>{
    const cb = "cb_"+Math.random().toString(36).slice(2);

    window[cb] = (data)=>{
      resolve(data);
      delete window[cb];
      script.remove();
    };

    const script = document.createElement("script");
    script.src = `https://api.deezer.com/search?q=${encodeURIComponent(q)}&output=jsonp&callback=${cb}`;
    document.body.appendChild(script);
  });
}

/* SONG SEARCH */
songInput.addEventListener("input", async e=>{
  const q = e.target.value;
  if(q.length < 2) return;

  const data = await deezerSearch(q);

  suggestions.innerHTML="";

  (data.data || []).slice(0,6).forEach(track=>{
    const div = document.createElement("div");
    div.className="song-item";
    div.textContent = track.title + " - " + track.artist.name;

    div.onclick = ()=>{
      selectedSong = {
        title: track.title + " - " + track.artist.name,
        preview: track.preview
      };

      suggestions.innerHTML="";
      songInput.value="";

      audio.src = selectedSong.preview;
      audio.play();
    };

    suggestions.appendChild(div);
  });
});

/* UPLOAD */
document.getElementById("uploadBtn").onclick = async ()=>{

  if(!croppedBlob || !selectedSong) return alert("missing data");

  const path = `${user.id}/${Date.now()}.jpg`;

  await supabase.storage.from("shared").upload(path, croppedBlob);

  const {data} = supabase.storage.from("shared").getPublicUrl(path);

  await supabase.from("posts").insert([{
    user_id: user.id,
    image_url: data.publicUrl,
    caption: document.getElementById("caption").value,
    song_title: selectedSong.title,
    song_preview: selectedSong.preview
  }]);

  loadFeed();
};

/* FEED */
async function loadFeed(){
  const {data} = await supabase.from("posts").select("*");
  const feed = document.getElementById("feed");
  feed.innerHTML="";

  (data || []).reverse().forEach(post=>{
    const div = document.createElement("div");
    div.className="post";

    const a = new Audio(post.song_preview);

    div.innerHTML = `
      <img src="${post.image_url}">
      <div>${post.caption}</div>
      <div class="post-song">
        <div>${post.song_title}</div>
        <button class="playBtn">Play</button>
      </div>
    `;

    div.querySelector(".playBtn").onclick = ()=>{
      if(a.paused){
        a.play();
        div.querySelector(".playBtn").textContent="Pause";
      }else{
        a.pause();
        div.querySelector(".playBtn").textContent="Play";
      }
    };

    feed.appendChild(div);
  });
}
</script>

</body>
</html>
