<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shared</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  font-family:'Archivo Black', sans-serif;
}

body{
  margin:0;
  background:#000;
  color:#fff;
}

.container{
  max-width:720px;
  margin:auto;
  padding:20px;
}

.header{
  text-align:center;
  font-size:30px;
  margin-bottom:24px;
}

/* =========================
   UPLOAD AREA (REDESIGN)
========================= */
.upload-box{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:24px;
  padding:16px;
  margin-bottom:18px;
}

/* DROPZONE MODERNA */
.dropzone{
  width:100%;
  height:160px;
  border-radius:18px;
  border:2px dashed #333;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:6px;
  color:#777;
  cursor:pointer;
  transition:0.2s;
  overflow:hidden;
}

.dropzone:hover{
  border-color:#555;
  color:#aaa;
}

.dropzone.dragover{
  border-color:#fff;
  color:#fff;
}

/* PREVIEW ELEGANTE */
.preview{
  width:100%;
  height:160px;
  border-radius:18px;
  overflow:hidden;
  display:none;
  margin-bottom:10px;
  border:1px solid #222;
}

.preview img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* INPUTS */
input,textarea{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:14px;
  border:1px solid #222;
  background:#000;
  color:#fff;
}

/* SONG */
.song-item{
  padding:10px;
  border:1px solid #222;
  border-radius:12px;
  margin-top:6px;
  cursor:pointer;
  font-size:12px;
}

.song-item:hover{
  background:#111;
}

/* BUTTON */
button{
  width:100%;
  margin-top:12px;
  padding:14px;
  border-radius:16px;
  border:none;
  background:linear-gradient(135deg,#fff,#cfcfcf);
  color:#000;
  cursor:pointer;
}

/* =========================
   POSTS
========================= */
.post{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:20px;
  padding:14px;
  margin-bottom:16px;
}

.post img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:16px;
  margin-bottom:10px;
}

.post-header{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  opacity:0.7;
  margin-bottom:8px;
}

.like-row{
  display:flex;
  gap:8px;
  align-items:center;
  margin-top:10px;
}

.icon{
  font-family:'Material Symbols Outlined';
  font-size:22px;
  cursor:pointer;
}

.liked{
  color:#ff3b3b;
}

.delete-btn{
  background:#ff3b3b;
  width:32px;
  height:32px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<div class="container">

<div class="header">Shared.</div>

<!-- UPLOAD -->
<div class="upload-box">

  <div class="dropzone" id="dropzone">
    <div>⬆ Upload image</div>
    <div style="font-size:12px;opacity:0.6">Drag & drop or click</div>
  </div>

  <div class="preview" id="previewBox"></div>

  <input type="file" id="file" hidden accept="image/png,image/jpeg,image/jpg,image/gif">

  <textarea id="caption" placeholder="Write a caption..."></textarea>

  <input id="songInput" placeholder="Search song...">
  <div id="suggestions"></div>
  <div id="songList"></div>

  <button id="uploadBtn">UPLOAD</button>

</div>

<!-- FEED -->
<div id="feed"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
"https://cnhaonawapuahzoctqav.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes"
);

let user;
let croppedBlob = null;
let selectedSong = null;
let globalAudio = new Audio();

/* INIT */
(async()=>{
  const {data:{session}} = await supabase.auth.getSession();
  if(!session) location.href="index.html";
  user = session.user;
  loadFeed();
  realtime();
})();

/* =========================
   DROPZONE
========================= */
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("file");
const previewBox = document.getElementById("previewBox");

dropzone.onclick = ()=>fileInput.click();

dropzone.ondragover = e=>{
  e.preventDefault();
  dropzone.classList.add("dragover");
};

dropzone.ondragleave = ()=>{
  dropzone.classList.remove("dragover");
};

dropzone.ondrop = e=>{
  e.preventDefault();
  dropzone.classList.remove("dragover");
  handleFile(e.dataTransfer.files[0]);
};

fileInput.onchange = e=>{
  handleFile(e.target.files[0]);
};

/* =========================
   IMAGE PROCESS + MODERATION
========================= */
async function handleFile(f){
  if(!f) return;

  const formData = new FormData();
  formData.append("file", f);

  const res = await fetch("https://shared-bk4b.onrender.com/moderate",{
    method:"POST",
    body:formData
  });

  const result = await res.json();

  if(!result.ok){
    alert("Image rejected");
    return;
  }

  const reader = new FileReader();
  const img = new Image();

  reader.onload = e=>img.src=e.target.result;

  img.onload = ()=>{

    const canvas=document.createElement("canvas");
    canvas.width=800;
    canvas.height=800;

    const size=Math.min(img.width,img.height);
    const ctx=canvas.getContext("2d");

    ctx.drawImage(img,(img.width-size)/2,(img.height-size)/2,size,size,0,0,800,800);

    canvas.toBlob(b=>{
      croppedBlob=b;

      previewBox.style.display="block";
      dropzone.style.display="none";

      previewBox.innerHTML=`
        <img src="${URL.createObjectURL(b)}">
      `;
    },"image/jpeg",0.7);
  };

  reader.readAsDataURL(f);
}

/* =========================
   DEEZER SEARCH
========================= */
window.handleDeezer = function(data){

  const box = document.getElementById("suggestions");
  box.innerHTML="";

  data.data?.slice(0,5).forEach(t=>{

    const div=document.createElement("div");
    div.className="song-item";
    div.textContent=`${t.title} - ${t.artist.name}`;

    div.onclick=()=>{
      selectedSong={
        title:`${t.title} - ${t.artist.name}`,
        preview:t.preview
      };

      songList.innerHTML=`<div class="song-item">✓ ${selectedSong.title}</div>`;
      box.innerHTML="";
      songInput.value="";
    };

    box.appendChild(div);
  });
};

let debounce;
songInput.addEventListener("input",e=>{
  clearTimeout(debounce);
  if(e.target.value.length<2) return;

  debounce=setTimeout(()=>{
    const s=document.createElement("script");
    s.src=`https://api.deezer.com/search?q=${encodeURIComponent(e.target.value)}&output=jsonp&callback=handleDeezer`;
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),2000);
  },250);
});

/* =========================
   UPLOAD VALIDATION
========================= */
uploadBtn.onclick = async ()=>{

  if(!croppedBlob){
    alert("Image required");
    return;
  }

  if(!caption.value.trim()){
    alert("Caption required");
    return;
  }

  if(!selectedSong){
    alert("Select a song");
    return;
  }

  const path = `${user.id}/${Date.now()}.jpg`;

  await supabase.storage.from("shared").upload(path,croppedBlob);
  const {data}=supabase.storage.from("shared").getPublicUrl(path);

  await supabase.from("posts").insert([{
    user_id:user.id,
    image_url:data.publicUrl,
    caption:caption.value,
    song_preview:selectedSong.preview,
    song_title:selectedSong.title
  }]);

  croppedBlob=null;
  selectedSong=null;

  previewBox.innerHTML="";
  previewBox.style.display="none";
  dropzone.style.display="flex";

  caption.value="";
  songList.innerHTML="";
});

/* FEED + REALTIME */
async function loadFeed(){ /* unchanged from your version */ }
function realtime(){ /* unchanged */ }
</script>

</body>
</html>
