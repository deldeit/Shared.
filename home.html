<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared - Homepage</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:'Archivo Black', sans-serif;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

.card{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:20px;
  padding:16px;
  margin-bottom:20px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:14px;
  border:1px solid #222;
  background:#000;
  color:#fff;
  font-family:'Archivo Black', sans-serif;
}

button{
  width:100%;
  margin-top:12px;
  padding:12px;
  border-radius:14px;
  border:none;
  background:#fff;
  color:#000;
  font-family:'Archivo Black', sans-serif;
  cursor:pointer;
}

.post{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:20px;
  padding:12px;
  margin-top:16px;
}

img{
  width:100%;
  border-radius:16px;
  margin-bottom:10px;
}

.status{
  margin-top:10px;
  font-size:12px;
  opacity:0.7;
}

.song-result{
  padding:8px;
  border:1px solid #222;
  border-radius:12px;
  margin-top:6px;
  cursor:pointer;
  font-size:12px;
}
.song-result:hover{
  background:#111;
}
</style>
</head>

<body>

<div class="container">

  <!-- UPLOAD -->
  <div class="card">

    <div>NEW POST</div>

    <input type="file" id="file">
    <textarea id="caption" placeholder="Write caption..."></textarea>

    <!-- SONG SEARCH -->
    <input type="text" id="songSearch" placeholder="Search a song...">
    <div id="songResults"></div>

    <audio id="previewAudio" controls style="width:100%; display:none; margin-top:10px;"></audio>

    <button id="uploadBtn">UPLOAD</button>

    <div id="status" class="status"></div>
  </div>

  <!-- FEED -->
  <div id="feed"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://cnhaonawapuahzoctqav.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes"
);

const BUCKET = "shared";

let user = null;
let file = null;
let selectedSong = null;

const status = document.getElementById("status");
const audio = document.getElementById("previewAudio");

// INIT
async function init(){
  const { data: { session } } = await supabase.auth.getSession();

  if(!session){
    window.location.href = "index.html";
    return;
  }

  user = session.user;
  loadFeed();
}
init();

// FILE
document.getElementById("file").onchange = e => {
  file = e.target.files[0];
};

// IMAGE PROCESSING (crop + compress)
async function processImage(file){
  return new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {
      const size = Math.min(img.width, img.height);

      const canvas = document.createElement("canvas");
      canvas.width = 800;
      canvas.height = 800;

      const ctx = canvas.getContext("2d");

      const sx = (img.width - size) / 2;
      const sy = (img.height - size) / 2;

      ctx.drawImage(img, sx, sy, size, size, 0, 0, 800, 800);

      canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.7);
    };

    reader.readAsDataURL(file);
  });
}

// DEEZER SEARCH
document.getElementById("songSearch").oninput = async (e) => {
  const q = e.target.value;

  if(q.length < 2){
    document.getElementById("songResults").innerHTML = "";
    return;
  }

  const res = await fetch(`https://api.deezer.com/search?q=${q}&output=jsonp`);
  const text = await res.text();

  const json = JSON.parse(text.replace(/^.+\(/,'').slice(0,-2));
  const results = json.data;

  const container = document.getElementById("songResults");
  container.innerHTML = "";

  results.slice(0,5).forEach(track => {
    const div = document.createElement("div");
    div.className = "song-result";

    div.innerText = `${track.title} - ${track.artist.name}`;

    div.onclick = () => {
      selectedSong = track;

      audio.src = track.preview;
      audio.style.display = "block";
      audio.play();

      container.innerHTML = "";
      document.getElementById("songSearch").value =
        `${track.title} - ${track.artist.name}`;
    };

    container.appendChild(div);
  });
};

// UPLOAD
document.getElementById("uploadBtn").onclick = async () => {

  if(!user) return status.innerText = "NOT LOGGED IN";
  if(!file) return status.innerText = "SELECT FILE";

  try {
    status.innerText = "PROCESSING IMAGE...";

    const processedFile = await processImage(file);

    const fileName = `${user.id}/${Date.now()}.jpg`;

    status.innerText = "UPLOADING...";

    const { error: uploadError } = await supabase.storage
      .from(BUCKET)
      .upload(fileName, processedFile, {
        contentType: "image/jpeg"
      });

    if(uploadError) throw uploadError;

    const { data } = supabase.storage
      .from(BUCKET)
      .getPublicUrl(fileName);

    const { error: dbError } = await supabase
      .from("posts")
      .insert([{
        user_id: user.id,
        image_url: data.publicUrl,
        caption: document.getElementById("caption").value,
        song_title: selectedSong
          ? `${selectedSong.title} - ${selectedSong.artist.name}`
          : null,
        song_preview: selectedSong ? selectedSong.preview : null
      }]);

    if(dbError) throw dbError;

    status.innerText = "UPLOAD SUCCESS";

    loadFeed();

  } catch(err){
    status.innerText = "ERROR: " + (err.message || err);
  }
};

// FEED
async function loadFeed(){
  const { data } = await supabase
    .from("posts")
    .select("*")
    .order("created_at",{ascending:false});

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  data.forEach(p => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <img src="${p.image_url}">
      <div>${p.caption || ""}</div>

      ${p.song_title ? `<div style="margin-top:8px;">🎵 ${p.song_title}</div>` : ""}

      ${p.song_preview ? `
        <audio controls style="width:100%; margin-top:8px;">
          <source src="${p.song_preview}" type="audio/mpeg">
        </audio>
      ` : ""}
    `;

    feed.appendChild(div);
  });
}
</script>

</body>
</html>
