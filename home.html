<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared - feed</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:'Archivo Black', sans-serif;
}

.container{
  max-width:720px;
  margin:auto;
  padding:20px;
}

/* HEADER */
.header{
  text-align:center;
  font-size:28px;
  margin-bottom:20px;
}

/* CARD */
.card{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:20px;
  padding:16px;
  margin-bottom:18px;
  overflow:hidden;
}

/* IMAGE PREVIEW */
.preview{
  width:110px;
  height:110px;
  border-radius:28px;
  background:#111;
  margin-bottom:10px;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid #222;
}

.preview img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* FILE INPUT */
input[type="file"]{
  display:none;
}

/* FILE BUTTON */
.file-btn{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid #222;
  background:#000;
  color:#fff;
  cursor:pointer;
  display:block;
  text-align:center;
}

/* INPUTS */
input, textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:14px;
  border:1px solid #222;
  background:#000;
  color:#fff;
  font-family:'Archivo Black', sans-serif;
}

/* SONG ITEM */
.song-item{
  padding:10px;
  border:1px solid #222;
  border-radius:12px;
  margin-top:6px;
  cursor:pointer;
  font-size:12px;
}

.song-item:hover{
  background:#111;
}

/* UPLOAD BUTTON */
button{
  width:100%;
  margin-top:12px;
  padding:14px;
  border-radius:16px;
  border:none;
  background:linear-gradient(135deg,#ffffff,#cfcfcf);
  color:#000;
  cursor:pointer;
  font-family:'Archivo Black';
  font-size:14px;
  letter-spacing:1px;
  transition:0.15s ease;
}

button:hover{
  transform:scale(1.02);
}

button:active{
  transform:scale(0.98);
}

/* POST */
.post{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:20px;
  padding:12px;
  margin-top:16px;
  cursor:pointer;
}

img{
  width:100%;
  border-radius:16px;
  margin-bottom:10px;
}

/* SONG TEXT */
.song-title{
  font-size:18px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">Shared.</div>

  <!-- UPLOAD -->
  <div class="card">

    <div class="preview" id="previewBox">+</div>

    <label class="file-btn">
      Choose Image
      <input type="file" id="file">
    </label>

    <textarea id="caption" placeholder="Write caption..."></textarea>

    <input id="songInput" placeholder="Search song...">
    <div id="suggestions"></div>
    <div id="songList"></div>

    <button id="uploadBtn">UPLOAD</button>
  </div>

  <!-- FEED -->
  <div id="feed"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://cnhaonawapuahzoctqav.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes"
);

const BUCKET = "shared";

let user = null;
let file = null;
let croppedBlob = null;
let selectedSong = null;

/* GLOBAL AUDIO */
let globalAudio = new Audio();
let currentPlayingId = null;

/* INIT */
async function init(){
  const { data:{session} } = await supabase.auth.getSession();
  if(!session) location.href="index.html";
  user = session.user;
  loadFeed();
}
init();

/* IMAGE PROCESS */
document.getElementById("file").onchange = e => {
  file = e.target.files[0];
  if(!file) return;

  const img = new Image();
  const reader = new FileReader();

  reader.onload = ev => img.src = ev.target.result;

  img.onload = () => {
    const size = Math.min(img.width, img.height);

    const canvas = document.createElement("canvas");
    canvas.width = 800;
    canvas.height = 800;

    const ctx = canvas.getContext("2d");

    ctx.drawImage(img,
      (img.width-size)/2,
      (img.height-size)/2,
      size,size,
      0,0,800,800
    );

    canvas.toBlob(blob => {
      croppedBlob = blob;

      const url = URL.createObjectURL(blob);
      document.getElementById("previewBox").innerHTML =
        `<img src="${url}">`;
    }, "image/jpeg", 0.7);
  };

  reader.readAsDataURL(file);
};

/* DEEZER */
window.handleDeezer = function(data){
  const box = document.getElementById('suggestions');
  box.innerHTML = '';

  data.data?.slice(0,5).forEach(t => {
    const div = document.createElement('div');
    div.className = 'song-item';
    div.textContent = `${t.title} - ${t.artist.name}`;

    div.onclick = () => {
      selectedSong = {
        title: `${t.title} - ${t.artist.name}`,
        preview: t.preview
      };

      document.getElementById('songList').innerHTML =
        `<div class="song-item">${selectedSong.title}</div>`;

      globalAudio.src = selectedSong.preview;
      globalAudio.play();

      box.innerHTML = '';
      document.getElementById('songInput').value = '';
    };

    box.appendChild(div);
  });
};

let debounce;
document.getElementById('songInput').addEventListener('input', e => {
  clearTimeout(debounce);
  if(e.target.value.length < 2) return;

  debounce = setTimeout(() => {
    const s = document.createElement('script');
    s.src = `https://api.deezer.com/search?q=${encodeURIComponent(e.target.value)}&output=jsonp&callback=handleDeezer`;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 2000);
  }, 250);
});

/* UPLOAD */
document.getElementById("uploadBtn").onclick = async () => {

  if(!user || !croppedBlob) return;

  const fileName = `${user.id}/${Date.now()}.jpg`;

  await supabase.storage
    .from(BUCKET)
    .upload(fileName, croppedBlob, {
      contentType:"image/jpeg"
    });

  const { data } = supabase.storage
    .from(BUCKET)
    .getPublicUrl(fileName);

  await supabase.from("posts").insert([{
    user_id: user.id,
    image_url: data.publicUrl,
    caption: document.getElementById("caption").value,
    song_title: selectedSong?.title || null,
    song_preview: selectedSong?.preview || null
  }]);

  loadFeed();
};

/* FEED AUDIO TOGGLE */
async function loadFeed(){

  const { data } = await supabase
    .from("posts")
    .select("*")
    .order("created_at",{ascending:false});

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  data.forEach((p, index) => {

    const postId = p.id || index;

    const div = document.createElement("div");
    div.className = "post";

    div.onclick = () => {

      if(!p.song_preview) return;

      if(currentPlayingId === postId){
        if(globalAudio.paused){
          globalAudio.play();
        } else {
          globalAudio.pause();
        }
        return;
      }

      currentPlayingId = postId;
      globalAudio.src = p.song_preview;
      globalAudio.play();
    };

    div.innerHTML = `
      <img src="${p.image_url}">
      <div>${p.caption || ""}</div>

      ${p.song_title ? `
        <div class="song-title">${p.song_title}</div>
      ` : ""}
    `;

    feed.appendChild(div);
  });
}
</script>

</body>
</html>
