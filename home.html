<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shared Snap Feed</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Archivo Black',sans-serif;background:#000;color:#fff;overflow:hidden}

:root{
  --glass:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.15);
}

.topbar{
  position:fixed;top:0;left:0;right:0;height:60px;
  display:flex;align-items:center;padding:0 16px;
  backdrop-filter:blur(30px) saturate(180%);
  background:var(--glass);
  border-bottom:1px solid var(--border);
  z-index:10;
}

.feed{
  position:absolute;
  top:60px;bottom:0;left:0;right:0;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.post{
  height:calc(100vh - 60px);
  width:100%;
  scroll-snap-align:start;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}

.post img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  padding:20px;
  background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
}

.user{
  font-size:18px;
}

.caption{
  font-size:14px;
  opacity:.8;
}

.actions{
  position:absolute;
  right:16px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.btn{
  width:50px;height:50px;
  border-radius:50%;
  backdrop-filter:blur(20px);
  background:var(--glass);
  border:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

</style>
</head>
<body>

<div class="topbar">Shared.</div>

<div class="feed" id="feed">

  <div class="post">
    <img src="https://picsum.photos/800/1200?1">
    <div class="overlay">
      <div class="user">@leo</div>
      <div class="caption">Minimal black & white aesthetic</div>
    </div>
    <div class="actions">
      <div class="btn">❤</div>
      <div class="btn">💬</div>
    </div>
  </div>

  <div class="post">
    <img src="https://picsum.photos/800/1200?2">
    <div class="overlay">
      <div class="user">@alex</div>
      <div class="caption">Liquid glass vibes</div>
    </div>
    <div class="actions">
      <div class="btn">❤</div>
      <div class="btn">💬</div>
    </div>
  </div>

  <div class="post">
    <img src="https://picsum.photos/800/1200?3">
    <div class="overlay">
      <div class="user">@mike</div>
      <div class="caption">Full snap scrolling</div>
    </div>
    <div class="actions">
      <div class="btn">❤</div>
      <div class="btn">💬</div>
    </div>
  </div>

</div>

</body>
</html>
