<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shared.</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#050505;}
button,input,textarea{font:inherit;border:none;background:none;color:inherit;outline:none;}
button{cursor:pointer;}
a{color:inherit;text-decoration:none;}
img,video{display:block;}
.hidden{display:none!important;}

:root{
  --bg:#050505;
  --bg2:rgba(255,255,255,.035);
  --bg3:rgba(255,255,255,.06);
  --bg4:rgba(255,255,255,.085);
  --glass:rgba(255,255,255,.055);
  --glass2:rgba(255,255,255,.08);
  --border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.16);
  --text:#f5f5f5;
  --muted:#9b9b9b;
  --shadow:0 20px 60px rgba(0,0,0,.55);
  --font:'Archivo Black',sans-serif;
  --topbar:64px;
  --bottombar:64px;
}

body,button,input,textarea{
  font-family:var(--font);
  letter-spacing:-.01em;
}

/* Material icons */
.mi{
  font-family:'Material Symbols Rounded';
  font-size:22px;
  line-height:1;
  display:inline-block;
  font-weight:300;
  font-style:normal;
  letter-spacing:normal;
  text-transform:none;
  white-space:nowrap;
  -webkit-font-smoothing:antialiased;
  font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24;
  user-select:none;
  vertical-align:middle;
}
.mi.fill{font-variation-settings:'FILL' 1,'wght' 500,'GRAD' 0,'opsz' 24;}

/* Loading */
#loading{
  position:fixed;
  inset:0;
  z-index:2000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:22px;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.08), transparent 32%),
    radial-gradient(circle at 80% 80%, rgba(255,255,255,.06), transparent 28%),
    var(--bg);
}
.load-wordmark{
  font-size:48px;
  color:var(--text);
  letter-spacing:-2px;
  text-shadow:0 0 30px rgba(255,255,255,.08);
  animation:loadpulse 1.5s ease-in-out infinite;
}
.load-track{
  width:120px;
  height:2px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  overflow:hidden;
}
.load-fill{
  height:100%;
  width:0;
  background:rgba(255,255,255,.92);
  border-radius:999px;
  animation:loadbar 1.35s ease-in-out infinite;
}
@keyframes loadpulse{0%,100%{opacity:1;}50%{opacity:.25;}}
@keyframes loadbar{0%{width:0;margin-left:0;}60%{width:100%;margin-left:0;}100%{width:0;margin-left:100%;}}

/* App shell */
#app{
  display:flex;
  flex-direction:column;
  height:100dvh;
  width:100%;
  overflow:hidden;
  color:var(--text);
  background:
    radial-gradient(circle at 15% 15%, rgba(255,255,255,.04), transparent 22%),
    radial-gradient(circle at 80% 0%, rgba(255,255,255,.025), transparent 18%),
    var(--bg);
}

/* Liquid glass surfaces */
.glass{
  background:var(--glass);
  backdrop-filter:blur(28px) saturate(160%);
  -webkit-backdrop-filter:blur(28px) saturate(160%);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  position:relative;
  overflow:hidden;
}
.glass::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    linear-gradient(135deg, rgba(255,255,255,.18), transparent 22%),
    linear-gradient(315deg, rgba(255,255,255,.08), transparent 26%);
  pointer-events:none;
  opacity:.85;
}

/* Topbar */
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:100;
  height:var(--topbar);
  display:flex;
  align-items:center;
  gap:12px;
  padding:0 16px;
  background:var(--glass);
  backdrop-filter:blur(28px) saturate(160%);
  -webkit-backdrop-filter:blur(28px) saturate(160%);
  border-bottom:1px solid rgba(255,255,255,.09);
  box-shadow:0 10px 40px rgba(0,0,0,.45);
}
.topbar::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    linear-gradient(120deg, rgba(255,255,255,.14), transparent 18%),
    radial-gradient(circle at 50% 0%, rgba(255,255,255,.05), transparent 35%);
  pointer-events:none;
}
.topbar-logo{
  font-size:21px;
  letter-spacing:-1px;
  flex-shrink:0;
  position:relative;
  z-index:1;
}
.topbar-search{
  flex:1 1 auto;
  display:flex;
  align-items:center;
  gap:8px;
  height:40px;
  padding:0 12px;
  border-radius:14px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
  position:relative;
  z-index:1;
}
.topbar-search:focus-within{
  background:rgba(255,255,255,.06);
  border-color:rgba(255,255,255,.18);
}
.topbar-search .mi{
  font-size:18px;
  color:var(--muted);
}
.topbar-search input{
  width:100%;
  font-size:13px;
  color:var(--text);
}
.topbar-search input::placeholder{color:var(--muted);}
.topbar-right{
  display:flex;
  align-items:center;
  gap:4px;
  flex-shrink:0;
  position:relative;
  z-index:1;
}
.tb-btn{
  width:40px;
  height:40px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform .14s ease, background .14s ease, border-color .14s ease;
  background:rgba(255,255,255,.03);
  border:1px solid transparent;
}
.tb-btn:hover{
  background:rgba(255,255,255,.06);
  border-color:rgba(255,255,255,.1);
}
.tb-btn:active{transform:scale(.92);}
.tb-avatar{
  width:30px;
  height:30px;
  border-radius:11px;
  overflow:hidden;
  background:rgba(255,255,255,.06);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  border:1px solid rgba(255,255,255,.14);
}
.tb-avatar img{width:100%;height:100%;object-fit:cover;}

/* Main */
.main{
  flex:1 1 auto;
  margin-top:var(--topbar);
  overflow-y:auto;
  overflow-x:hidden;
  scrollbar-width:thin;
  scrollbar-color:rgba(255,255,255,.22) transparent;
  padding-bottom:calc(var(--bottombar) + 18px);
  display:flex;
  flex-direction:column;
  align-items:center;
}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-thumb{background:rgba(255,255,255,.22);border-radius:999px;}
.page{
  width:100%;
  max-width:980px;
  display:flex;
  gap:28px;
  padding:16px 12px 0;
  align-items:flex-start;
}
.feed-col{
  flex:1 1 auto;
  min-width:0;
  display:flex;
  flex-direction:column;
}

/* Stories */
.stories-wrap{
  margin-bottom:14px;
  border-radius:22px;
  padding:10px 8px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(24px) saturate(160%);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
  box-shadow:var(--shadow);
  overflow-x:auto;
  overflow-y:hidden;
  scrollbar-width:none;
  position:relative;
}
.stories-wrap::-webkit-scrollbar{display:none;}
.stories-wrap::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.12), transparent 24%);
  pointer-events:none;
}
.stories-row{
  display:flex;
  gap:8px;
  width:max-content;
  padding:2px 2px 4px;
  position:relative;
  z-index:1;
}
.story-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  padding:4px 8px;
  flex-shrink:0;
  cursor:pointer;
}
.story-ring,
.story-add-ring{
  width:58px;
  height:58px;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08), 0 10px 24px rgba(0,0,0,.25);
}
.story-ring::before,
.story-add-ring::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.15), transparent 26%);
  pointer-events:none;
}
.story-inner{
  width:100%;
  height:100%;
  border-radius:18px;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.16);
}
.story-inner img{width:100%;height:100%;object-fit:cover;}
.story-name{
  font-size:10px;
  color:var(--text);
  max-width:70px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  text-align:center;
  opacity:.92;
}
.story-add-ring{
  border-style:dashed;
}
.story-add-ring .mi{
  font-size:24px;
  color:var(--text);
  opacity:.8;
}
.story-ring:hover,
.story-add-ring:hover{
  transform:translateY(-1px) scale(1.03);
}

/* Posts */
.post-card{
  margin-bottom:14px;
  border-radius:24px;
  background:rgba(255,255,255,.035);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(26px) saturate(160%);
  -webkit-backdrop-filter:blur(26px) saturate(160%);
  overflow:hidden;
  box-shadow:var(--shadow);
  animation:fadeUp .28s ease both;
  position:relative;
}
.post-card::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    linear-gradient(135deg, rgba(255,255,255,.1), transparent 18%),
    radial-gradient(circle at 80% 0%, rgba(255,255,255,.04), transparent 24%);
  pointer-events:none;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:none;}
}
.post-head{
  display:flex;
  align-items:center;
  gap:10px;
  padding:13px 14px;
  position:relative;
  z-index:1;
}
.ph-avatar{
  width:36px;
  height:36px;
  border-radius:13px;
  overflow:hidden;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.14);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  flex-shrink:0;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
}
.ph-avatar img{width:100%;height:100%;object-fit:cover;}
.ph-info{flex:1 1 auto;min-width:0;}
.ph-name{
  font-size:13px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.ph-sub{
  font-size:10px;
  color:var(--muted);
  margin-top:2px;
  display:flex;
  align-items:center;
  gap:4px;
}
.ph-more{
  width:36px;
  height:36px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.03);
  border:1px solid transparent;
  transition:background .14s, transform .14s;
}
.ph-more:hover{background:rgba(255,255,255,.06);}
.ph-more:active{transform:scale(.9);}
.ph-more .mi{font-size:18px;color:var(--muted);}

/* Media */
.post-media{
  width:100%;
  aspect-ratio:1/1;
  background:rgba(255,255,255,.03);
  overflow:hidden;
  position:relative;
  border-top:1px solid rgba(255,255,255,.06);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.post-media img,
.post-media video{
  width:100%;
  height:100%;
  object-fit:cover;
}
.media-bg{
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 30% 20%, rgba(255,255,255,.2), transparent 18%),
    radial-gradient(circle at 70% 80%, rgba(255,255,255,.12), transparent 22%),
    linear-gradient(135deg, var(--c1), var(--c2));
  filter:grayscale(1);
}
.like-flash{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  opacity:0;
}
.like-flash .mi{
  font-size:88px;
  color:#fff;
  font-variation-settings:'FILL' 1,'wght' 700,'GRAD' 0,'opsz' 48;
  text-shadow:0 8px 30px rgba(0,0,0,.55);
}
.like-flash.pop{animation:lflash .55s ease both;}
@keyframes lflash{
  0%{opacity:0;transform:scale(.4);}
  30%{opacity:1;transform:scale(1.25);}
  60%{opacity:.9;transform:scale(1);}
  100%{opacity:0;}
}

/* Actions */
.post-actions{
  display:flex;
  align-items:center;
  gap:4px;
  padding:8px 12px 2px;
  position:relative;
  z-index:1;
}
.act{
  width:40px;
  height:40px;
  border-radius:13px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background .14s, transform .13s;
  background:rgba(255,255,255,.03);
}
.act:hover{background:rgba(255,255,255,.06);}
.act:active{transform:scale(.86);}
.act .mi{font-size:22px;}
.act.liked .mi{
  color:var(--text);
  font-variation-settings:'FILL' 1,'wght' 700,'GRAD' 0,'opsz' 24;
  animation:heartpop .32s cubic-bezier(.17,.89,.32,1.5);
}
@keyframes heartpop{
  0%{transform:scale(1);}
  45%{transform:scale(1.45);}
  100%{transform:scale(1);}
}
.act.saved .mi{
  font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;
}
.spacer{flex:1 1 auto;}

/* Meta */
.post-meta{
  padding:4px 14px 10px;
  position:relative;
  z-index:1;
}
.post-likes{
  font-size:13px;
  margin-bottom:5px;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:5px;
}
.post-likes:hover{opacity:.82;}
.post-likes .mi{
  font-size:14px;
  color:var(--text);
}
.post-caption{
  font-size:13px;
  line-height:1.55;
  color:#dedede;
  margin-bottom:5px;
}
.cap-author{color:var(--text);}
.post-tags{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-bottom:5px;
}
.post-tag{
  font-size:11px;
  color:#bdbdbd;
  opacity:.95;
}
.post-time{
  font-size:10px;
  color:var(--muted);
  letter-spacing:.6px;
}

/* Comment bar */
.post-cmt{
  display:flex;
  align-items:center;
  gap:10px;
  border-top:1px solid rgba(255,255,255,.08);
  padding:9px 14px;
  position:relative;
  z-index:1;
  background:rgba(255,255,255,.02);
}
.cmt-av{
  width:28px;
  height:28px;
  border-radius:10px;
  overflow:hidden;
  background:rgba(255,255,255,.06);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  flex-shrink:0;
  border:1px solid rgba(255,255,255,.12);
}
.cmt-av img{width:100%;height:100%;object-fit:cover;}
.cmt-input{
  flex:1;
  font-size:12px;
  color:var(--text);
}
.cmt-input::placeholder{color:var(--muted);}
.cmt-post{
  font-size:12px;
  color:var(--text);
  opacity:0;
  transition:opacity .14s;
}
.cmt-post.vis{opacity:1;}

/* Right column */
.right-col{
  width:280px;
  flex-shrink:0;
  position:sticky;
  top:16px;
  display:flex;
  flex-direction:column;
  gap:14px;
}
.r-card{
  background:rgba(255,255,255,.035);
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;
  overflow:hidden;
  backdrop-filter:blur(26px) saturate(160%);
  -webkit-backdrop-filter:blur(26px) saturate(160%);
  box-shadow:var(--shadow);
  position:relative;
}
.r-card::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.1), transparent 18%);
  pointer-events:none;
}
.r-profile{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px;
  position:relative;
  z-index:1;
}
.r-avatar{
  width:44px;
  height:44px;
  border-radius:15px;
  overflow:hidden;
  background:rgba(255,255,255,.06);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  flex-shrink:0;
  border:1px solid rgba(255,255,255,.14);
}
.r-avatar img{width:100%;height:100%;object-fit:cover;}
.r-name{font-size:13px;}
.r-handle{font-size:10px;color:var(--muted);margin-top:2px;}
.r-view{font-size:11px;color:var(--text);margin-left:auto;opacity:.82;}
.r-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 14px 8px;
  position:relative;
  z-index:1;
}
.r-label{
  font-size:10px;
  color:var(--muted);
  letter-spacing:.8px;
  text-transform:uppercase;
}
.r-seeall{
  font-size:11px;
  color:var(--text);
  opacity:.82;
}
.r-suggest{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 14px;
  transition:background .13s;
  cursor:pointer;
  position:relative;
  z-index:1;
}
.r-suggest:hover{background:rgba(255,255,255,.04);}
.r-sav{
  width:36px;
  height:36px;
  border-radius:13px;
  overflow:hidden;
  background:rgba(255,255,255,.06);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  flex-shrink:0;
  border:1px solid rgba(255,255,255,.12);
}
.r-sav img{width:100%;height:100%;object-fit:cover;}
.r-sname{font-size:12px;}
.r-ssub{font-size:10px;color:var(--muted);margin-top:1px;}
.r-follow{
  font-size:11px;
  color:var(--text);
  margin-left:auto;
  flex-shrink:0;
  opacity:.82;
}
.r-footer{
  font-size:10px;
  color:var(--muted);
  line-height:1.9;
  padding:12px 14px;
  border-top:1px solid rgba(255,255,255,.08);
  position:relative;
  z-index:1;
}

/* Bottom nav */
.bottom-nav{
  display:none;
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  z-index:100;
  height:var(--bottombar);
  background:var(--glass);
  backdrop-filter:blur(28px) saturate(160%);
  -webkit-backdrop-filter:blur(28px) saturate(160%);
  border-top:1px solid rgba(255,255,255,.09);
  align-items:center;
  justify-content:space-around;
  padding:0 4px;
  box-shadow:0 -10px 40px rgba(0,0,0,.45);
}
.bottom-nav::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    linear-gradient(25deg, rgba(255,255,255,.12), transparent 20%),
    radial-gradient(circle at 50% 100%, rgba(255,255,255,.06), transparent 30%);
  pointer-events:none;
}
.bn{
  flex:1;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:16px;
  opacity:.55;
  transition:opacity .14s, transform .13s, background .13s;
  position:relative;
  z-index:1;
}
.bn.active{
  opacity:1;
  background:rgba(255,255,255,.05);
}
.bn:active{transform:scale(.86);}
.bn .mi{font-size:25px;}
.bn-av{
  width:28px;
  height:28px;
  border-radius:10px;
  overflow:hidden;
  background:rgba(255,255,255,.06);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  border:1px solid rgba(255,255,255,.14);
}
.bn-av img{width:100%;height:100%;object-fit:cover;}

/* Toast */
.toast{
  position:fixed;
  bottom:calc(var(--bottombar) + 16px);
  left:50%;
  transform:translateX(-50%);
  z-index:400;
  display:none;
  pointer-events:none;
}
.toast.show{display:block;}
.toast-inner{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.16);
  border-radius:16px;
  padding:10px 18px;
  font-size:12px;
  color:var(--text);
  white-space:nowrap;
  box-shadow:0 16px 40px rgba(0,0,0,.55);
  backdrop-filter:blur(18px) saturate(160%);
  -webkit-backdrop-filter:blur(18px) saturate(160%);
}

/* Empty */
.empty{
  text-align:center;
  padding:60px 24px;
  display:none;
}
.empty.show{display:block;}
.empty .mi{
  font-size:52px;
  color:var(--muted);
  margin-bottom:12px;
}
.empty h3{font-size:18px;margin-bottom:6px;}

/* Modal base */
.modal{
  position:fixed;
  inset:0;
  z-index:200;
  display:none;
  align-items:flex-end;
  justify-content:center;

/* Likes sheet */
.likes-sheet{
  width:min(480px,100%);

  flex-direction:column;
  overflow:hidden;
  box-shadow:var(--shadow);
  animation:slideup .22s cubic-bezier(.22,1,.36,1);
  position:relative;
}
.likes-sheet::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.12), transparent 22%);
  pointer-events:none;
}
@keyframes slideup{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sheet-handle{
  width:38px;
  height:4px;
  border-radius:999px;
  background:rgba(255,255,255,.18);
  margin:12px auto 0;
  flex-shrink:0;
  position:relative;
  z-index:1;
}
.sheet-title{
  font-size:14px;
  padding:12px 16px;
  border-bottom:1px solid rgba(255,255,255,.08);
  text-align:center;
  flex-shrink:0;
  position:relative;
  z-index:1;
}
.likes-list{
  overflow-y:auto;
  flex:1;
  padding:8px 0;
  position:relative;
  z-index:1;
}
.liker{
  display:flex;
  align-items:center;
  gap:12px;
  padding:8px 16px;
  transition:background .13s;
  cursor:pointer;
}
.liker:hover{background:rgba(255,255,255,.04);}
.liker-av{
  width:38px;
  height:38px;
  border-radius:13px;
  overflow:hidden;
  background:rgba(255,255,255,.06);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  flex-shrink:0;
  border:1px solid rgba(255,255,255,.12);
}
.liker-av img{width:100%;height:100%;object-fit:cover;}
.liker-name{font-size:13px;}
.liker-handle{font-size:10px;color:var(--muted);margin-top:2px;}
.liker-follow{font-size:11px;color:var(--text);margin-left:auto;opacity:.82;}
.likes-empty{padding:24px;text-align:center;font-size:12px;color:var(--muted);}

/* Upload modal */
.upload-modal{align-items:center;}
.upload-sheet{
  width:min(520px,96vw);
  border-radius:26px;
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.1);
  overflow:hidden;
  backdrop-filter:blur(28px) saturate(160%);
  -webkit-backdrop-filter:blur(28px) saturate(160%);
  box-shadow:var(--shadow);
  animation:scaleup .2s cubic-bezier(.22,1,.36,1);
  position:relative;
}
.upload-sheet::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.12), transparent 22%);
  pointer-events:none;
}
@keyframes scaleup{from{opacity:0;transform:scale(.88);}to{opacity:1;transform:scale(1);}}
.upload-head{
  display:flex;
  align-items:center;
  padding:14px 16px;
  border-bottom:1px solid rgba(255,255,255,.08);
  position:relative;
  z-index:1;
}
.upload-title{
  flex:1;
  text-align:center;
  font-size:14px;
}
.upload-close,
.upload-share{
  width:36px;
  height:36px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background .13s;
}
.upload-close:hover,
.upload-share:hover{background:rgba(255,255,255,.06);}
.upload-close .mi{font-size:20px;}
.upload-share{
  width:auto;
  padding:0 12px;
  color:var(--text);
  font-size:13px;
}
.upload-body{
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
  position:relative;
  z-index:1;
}
.ig-inp{
  width:100%;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  color:var(--text);
  padding:12px 14px;
  font-size:13px;
  transition:border-color .15s, background .15s;
}
.ig-inp:focus{

}
.ig-inp::placeholder{color:var(--muted);}
.file-drop{
  border:1.5px dashed rgba(255,255,255,.16);
  border-radius:16px;

  text-align:center;

}
.file-drop:hover{
  background:rgba(255,255,255,.06);
  border-color:rgba(255,255,255,.26);
}
.file-drop input{
  position:absolute;
  inset:0;
  opacity:0;
  cursor:pointer;
  width:100%;
  height:100%;
}
.file-drop .mi{
  font-size:32px;
  color:var(--text);
  opacity:.78;
  margin-bottom:8px;
}
.file-drop-lbl{
  font-size:12px;
  color:var(--muted);
}
.file-drop-lbl strong{color:var(--text);}

/* Responsive */
@media(max-width:900px){
  .right-col{display:none;}
  .page{max-width:760px;}
}
@media(max-width:640px){
  .bottom-nav{display:flex;}

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(() => {
'use strict';
const CFG = {
  URL:'https://cnhaonawapuahzoctqav.supabase.co',
  KEY:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes',
  BUCKET:'shared',
  MAX:50,
  TIMEOUT:9000,
  BOOT_FB:4000,
  PROFILE:'./profile.html',
};

const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const slug=s=>String(s||'user').trim().toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'').slice(0,24)||'user';
const asArr=v=>Array.isArray(v)?v:(!v?[]:[v]);
const parseTags=v=>{if(!v)return[];if(Array.isArray(v))return v.map(String).filter(Boolean);if(typeof v==='string')return v.split(',').map(s=>s.trim()).filter(Boolean);return[];};
const tout=(p,ms=CFG.TIMEOUT)=>Promise.race([p,new Promise((_,r)=>setTimeout(()=>r(new Error('Timeout')),ms))]);
const ago=d=>{if(!d)return'';const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return s+'S AGO';if(s<3600)return Math.floor(s/60)+'M AGO';if(s<86400)return Math.floor(s/3600)+'H AGO';if(s<604800)return Math.floor(s/86400)+'D AGO';return new Date(d).toLocaleDateString('en',{month:'short',day:'numeric'}).toUpperCase();};

const PAL=[['#101010','#2a2a2a'],['#0b0b0b','#1d1d1d'],['#151515','#313131'],['#090909','#252525'],['#121212','#2b2b2b'],['#0f0f0f','#202020']];

let sb=null,user=null,profile=null,posts=[],searchT=null,booted=false;

const ui={
  loading:$('loading'),toast:$('toast'),toastTxt:$('toastTxt'),
  app:$('app'),feed:$('feed'),empty:$('emptyState'),
  storiesRow:$('storiesRow'),
  likesModal:$('likesModal'),likesTitle:$('likesTitle'),likesList:$('likesList'),
  uploadModal:$('uploadModal'),closeUpload:$('closeUpload'),submitUpload:$('submitUpload'),
  searchInput:$('searchInput'),
  uName:$('uName'),uCaption:$('uCaption'),uSongTitle:$('uSongTitle'),uAudioUrl:$('uAudioUrl'),
  uFile:$('uFile'),fileIcon:$('fileIcon'),fileLbl:$('fileLbl'),
  tbAvatar:$('tbAvatar'),rAvatar:$('rAvatar'),rName:$('rName'),rHandle:$('rHandle'),
  suggestedList:$('suggestedList'),
  btnUpload:$('btnUpload'),bnCreate:$('bnCreate'),bnAvatar:$('bnAvatar'),
  mainScroll:$('mainScroll'),
};

function toast(msg,ms=3500){
  ui.toastTxt.textContent=msg;
  ui.toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>ui.toast.classList.remove('show'),ms);
}
function showApp(){ui.loading.classList.add('hidden');ui.app.classList.remove('hidden');}

function updateHeader(){
  const av=profile?.avatar_url||user?.user_metadata?.avatar_url||null;
  const name=profile?.display_name||user?.user_metadata?.display_name||user?.email||'shared_user';
  const init=(name||'S').trim()[0].toUpperCase();
  const avHtml=av?`<img src="${esc(av)}" alt="">`:`${init}`;
  [ui.tbAvatar,ui.rAvatar,ui.bnAvatar].forEach(el=>{if(el)el.innerHTML=avHtml;});
  ui.rName.textContent=name;
  ui.rHandle.textContent='@'+slug(name);
  ui.uName.value=profile?.display_name||'';

  ui.suggestedList.innerHTML=['aurora.lens','pixel.studio','neon.frames','lens.lab','soft.grain'].map((n,i)=>`
    <div class="r-suggest">
      <div class="r-sav">${n[0].toUpperCase()}</div>
      <div><div class="r-sname">${n}</div><div class="r-ssub">Suggested for you</div></div>
      <button class="r-follow">Follow</button>
    </div>`).join('');
}

function renderStories(list){
  const seen=new Set();const users=[];
  for(const p of list){if(!p.user_id||seen.has(p.user_id))continue;seen.add(p.user_id);users.push(p);}
  const items=users.slice(0,14).map(p=>{
    const pr=p.profile||{};const name=pr.display_name||p.username||'User';
    const init=(name||'U')[0].toUpperCase();
    const avHtml=pr.avatar_url?`<img src="${esc(pr.avatar_url)}" alt="">`:`${init}`;
    return `<div class="story-item"><div class="story-ring"><div class="story-inner">${avHtml}</div></div><div class="story-name">${esc(name)}</div></div>`;
  }).join('');
  ui.storiesRow.innerHTML=`
    <div class="story-item" id="myStoryBtn">
      <div class="story-add-ring"><span class="mi">add</span></div>
      <div class="story-name">Your story</div>
    </div>${items}`;
  $('myStoryBtn')?.addEventListener('click',openUpload);
}

function buildFeed(list){
  return list.map((p,i)=>{
    const pr=p.profile||{};const name=pr.display_name||p.username||'User';
    const handle=slug(name);const init=(name||'U')[0].toUpperCase();
    const avHtml=pr.avatar_url?`<img src="${esc(pr.avatar_url)}" alt="">`:`${init}`;
    const likes=Number(p.like_count??p.likes??0);const liked=!!p.user_liked;
    const tags=[...asArr(pr.interests).slice(0,2),...parseTags(p.tags).slice(0,3)].slice(0,4);
    const [c1,c2]=PAL[i%PAL.length];const profileSlug=encodeURIComponent(p.username||handle);

    let media='';
    if(p.image_url){
      media=/\.(mp4|webm|ogg|mov)(\?|$)/i.test(p.image_url)
        ?`<video src="${esc(p.image_url)}" autoplay muted loop playsinline preload="metadata"></video>`
        :`<img src="${esc(p.image_url)}" alt="" loading="lazy">`;
    }else{
      media=`<div class="media-bg" style="--c1:${c1};--c2:${c2}"></div>`;
    }

    const audioUrl=/^https?:\/\//i.test(p.audio_url||'')?p.audio_url:/^https?:\/\//i.test(p.song_preview||'')?p.song_preview:'';
    const audioHtml=audioUrl?`<audio class="hidden post-audio" preload="auto" loop src="${esc(audioUrl)}"></audio>`:'';

    const tagsHtml=tags.length?`<div class="post-tags">${tags.map(t=>`<span class="post-tag">#${esc(t)}</span>`).join('')}</div>`:'';

    return `
      <article class="post-card" data-post-id="${esc(p.id)}" data-idx="${i}" style="animation-delay:${i*35}ms">
        <div class="post-head">
          <a href="${CFG.PROFILE}?username=${profileSlug}" class="ph-avatar">${avHtml}</a>
          <div class="ph-info">
            <div class="ph-name">${esc(name)}</div>
            ${p.song_title?`<div class="ph-sub"><span class="mi" style="font-size:11px">music_note</span>${esc(p.song_title)}</div>`:''}
          </div>
          <button class="ph-more"><span class="mi">more_horiz</span></button>
        </div>

        <div class="post-media" data-mwrap>
          ${media}
          <div class="like-flash"><span class="mi">favorite</span></div>
        </div>

        ${audioHtml}
        <div class="post-actions">
          <button class="act${liked?' liked':''}" data-like-btn aria-label="Like"><span class="mi${liked?' fill':''}">favorite</span></button>
          <button class="act" aria-label="Comment"><span class="mi">chat_bubble</span></button>
          <button class="act" aria-label="Share"><span class="mi">send</span></button>
          <div class="spacer"></div>
          <button class="act save-btn" aria-label="Save"><span class="mi">bookmark</span></button>
        </div>

        <div class="post-meta">
          <div class="post-likes" data-likes-btn><span class="mi fill">favorite</span>${likes.toLocaleString()} like${likes!==1?'s':''}</div>
          ${p.caption?`<div class="post-caption"><span class="cap-author">${esc(name)}&nbsp;</span>${esc(p.caption)}</div>`:''}
          ${tagsHtml}
          <div class="post-time">${ago(p.created_at)}</div>
        </div>

        <div class="post-cmt">
          <div class="cmt-av" data-cav></div>
          <input class="cmt-input" type="text" placeholder="Add a comment…"/>
          <button class="cmt-post" type="button">Post</button>
        </div>
      </article>`;
  }).join('');
}

function renderFeed(list){
  ui.feed.innerHTML=list.length?buildFeed(list):'';
  ui.empty.classList.toggle('show',list.length===0);
  bindFeedUI();
  updateCmtAvatars();
}

function updateCmtAvatars(){
  const av=profile?.avatar_url||user?.user_metadata?.avatar_url||null;
  const init=((profile?.display_name||user?.email||'S')[0]||'S').toUpperCase();
  document.querySelectorAll('[data-cav]').forEach(el=>{
    el.innerHTML=av?`<img src="${esc(av)}" alt="">`:`${init}`;
  });
}

function bindFeedUI(){
  document.querySelectorAll('.cmt-input').forEach(inp=>{
    const btn=inp.nextElementSibling;
    inp.addEventListener('input',()=>btn.classList.toggle('vis',inp.value.trim().length>0));
  });
  document.querySelectorAll('.save-btn').forEach(btn=>btn.addEventListener('click',()=>btn.classList.toggle('saved')));

  let lastTap=0;
  ui.feed.addEventListener('touchend',e=>{
    const card=e.target.closest('[data-post-id]');if(!card)return;
    const now=Date.now();
    if(now-lastTap<280){
      const flash=card.querySelector('.like-flash');
      const lb=card.querySelector('[data-like-btn]');
      if(flash){flash.classList.remove('pop');void flash.offsetWidth;flash.classList.add('pop');}
      if(lb&&!lb.classList.contains('liked'))lb.click();
    }
    lastTap=now;
  },{passive:true});
}

ui.feed.addEventListener('click',async e=>{
  const lb=e.target.closest('[data-like-btn]');
  const likesBtn=e.target.closest('[data-likes-btn]');
  const card=e.target.closest('[data-post-id]');
  if(!card)return;
  const postId=card.dataset.postId;
  const post=posts.find(p=>p.id===postId)||null;

  if(likesBtn){await openLikesModal(postId,post);return;}

  if(lb){
    if(!user){toast('Log in to like posts.');return;}
    const liked=lb.classList.contains('liked');
    lb.disabled=true;
    try{
      await toggleLike(postId,liked);
      await loadPosts(ui.searchInput.value.trim(),true);
    }catch(err){
      toast(err?.message||'Failed.');
    }finally{
      lb.disabled=false;
    }
  }
});

async function openLikesModal(postId,post){
  if(!sb){toast('Database unavailable.');return;}
  ui.likesList.innerHTML='<div class="likes-empty">Loading…</div>';
  ui.likesTitle.textContent=post?.caption?'Likes · '+post.caption.slice(0,22):'Likes';
  ui.likesModal.classList.add('open');
  try{
    const{data,error}=await tout(sb.from('likes').select('user_id,created_at').eq('post_id',postId).order('created_at',{ascending:false}));
    if(error)throw error;
    const rows=data||[];
    if(!rows.length){ui.likesList.innerHTML='<div class="likes-empty">No likes yet.</div>';return;}
    const ids=[...new Set(rows.map(r=>r.user_id).filter(Boolean))];
    const pm=await loadProfiles(ids);
    ui.likesList.innerHTML=rows.map(row=>{
      const p=pm.get(row.user_id)||{};const name=p.display_name||p.username||'User';
      const av=p.avatar_url?`<img src="${esc(p.avatar_url)}" alt="">`:(name[0]||'U').toUpperCase();
      return `<div class="liker"><div class="liker-av">${av}</div><div><div class="liker-name">${esc(name)}</div><div class="liker-handle">@${slug(name)}</div></div><button class="liker-follow">Follow</button></div>`;
    }).join('');
  }catch(err){
    ui.likesList.innerHTML=`<div class="likes-empty">${esc(err?.message||'Could not load.')}</div>`;
  }
}

function openUpload(){
  if(!user){toast('Log in to publish.');return;}
  ui.uploadModal.classList.add('open');
}
function closeUploadFn(){ui.uploadModal.classList.remove('open');}

async function initSB(){
  if(!window.supabase?.createClient)throw new Error('Supabase not loaded.');
  sb=window.supabase.createClient(CFG.URL,CFG.KEY,{
    auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}
  });
}
async function getSession(){
  if(!sb)return null;
  try{return(await tout(sb.auth.getSession()))?.data?.session||null;}catch{return null;}
}
async function loadProfileData(){
  if(!sb||!user)return;
  try{
    const{data}=await tout(sb.from('profiles').select('*').eq('id',user.id).maybeSingle());
    profile=data||null;
  }catch{
    profile=null;
  }
}
async function loadProfiles(ids){
  if(!sb||!ids.length)return new Map();
  try{
    const{data}=await tout(sb.from('profiles').select('*').in('id',ids));
    return new Map((data||[]).map(p=>[p.id,p]));
  }catch{
    return new Map();
  }
}

async function fetchPostsData(q=''){
  if(!sb)return[];
  const cols='id,user_id,image_url,audio_url,caption,created_at,song_preview,song_title,likes,username,tags';
  if(!q){
    const{data,error}=await tout(sb.from('posts').select(cols).order('created_at',{ascending:false}).limit(CFG.MAX));
    if(error)throw error;
    return data||[];
  }
  const{data,error}=await tout(sb.from('posts').select(cols).or(`caption.ilike.%${q}%,song_title.ilike.%${q}%,username.ilike.%${q}%,tags.ilike.%${q}%`).order('created_at',{ascending:false}).limit(CFG.MAX));
  if(error)throw error;
  return data||[];
}

async function fetchLikesData(ids){
  if(!sb||!ids.length)return{counts:new Map(),liked:new Set()};
  try{
    const{data}=await tout(sb.from('likes').select('post_id,user_id').in('post_id',ids));
    const counts=new Map();const liked=new Set();
    for(const r of(data||[])){
      counts.set(r.post_id,(counts.get(r.post_id)||0)+1);
      if(user&&r.user_id===user.id)liked.add(r.post_id);
    }
    return{counts,liked};
  }catch{
    return{counts:new Map(),liked:new Set()};
  }
}

async function loadPosts(q='',preserve=true){
  try{
    if(!sb){renderFeed([]);return;}
    const raw=await fetchPostsData(q);
    const uids=[...new Set(raw.map(p=>p.user_id).filter(Boolean))];
    const [pm,{counts,liked}]=await Promise.all([loadProfiles(uids),fetchLikesData(raw.map(p=>p.id))]);
    posts=raw.map((p)=>({...p,profile:pm.get(p.user_id)||null,like_count:counts.get(p.id)??Number(p.likes||0),user_liked:liked.has(p.id)}));
    renderFeed(posts);
    renderStories(posts);
    if(!preserve)ui.mainScroll.scrollTop=0;
  }catch(err){
    console.warn(err);
    renderFeed([]);
    toast(err?.message||'Could not load posts.');
  }
}

async function toggleLike(postId,liked){
  if(!user||!sb)throw new Error('Log in first.');
  if(liked){
    const{error}=await sb.from('likes').delete().eq('post_id',postId).eq('user_id',user.id);
    if(error)throw error;
  }else{
    const{error}=await sb.from('likes').insert({post_id:postId,user_id:user.id});
    if(error)throw error;
  }
}

async function uploadMedia(file){
  if(!user||!sb)throw new Error('Log in to upload.');
  const path=`${user.id}/${Date.now()}_${file.name.replace(/\s/g,'_')}`;
  const{error}=await sb.storage.from(CFG.BUCKET).upload(path,file,{cacheControl:'3600',upsert:false});
  if(error)throw error;
  return sb.storage.from(CFG.BUCKET).getPublicUrl(path).data?.publicUrl||null;
}

async function createPost(){
  if(!user||!sb){toast('Log in to publish.');return;}
  const name=ui.uName.value.trim()||profile?.display_name||'User';
  const caption=ui.uCaption.value.trim();
  const songTitle=ui.uSongTitle.value.trim();
  const audioUrl=ui.uAudioUrl.value.trim();
  const file=ui.uFile.files?.[0]||null;
  if(!caption||!file){toast('Caption and a file are required.');return;}

  ui.submitUpload.disabled=true;
  ui.submitUpload.textContent='Sharing…';

  try{
    const mediaUrl=await uploadMedia(file);
    const{error}=await sb.from('posts').insert({
      user_id:user.id,
      image_url:mediaUrl,
      caption,
      song_title:songTitle||null,
      song_preview:audioUrl||null,
      audio_url:audioUrl||null,
      likes:0,
      username:slug(name)
    });
    if(error)throw error;

    closeUploadFn();
    [ui.uCaption,ui.uSongTitle,ui.uAudioUrl].forEach(el=>el.value='');
    ui.uFile.value='';
    ui.fileIcon.textContent='photo_library';
    ui.fileLbl.innerHTML='<strong>Select photo or video</strong><br>or drag and drop';
    toast('Post shared!');
    await loadPosts('',false);
  }catch(err){
    toast(err?.message||'Publish failed.');
  }finally{
    ui.submitUpload.disabled=false;
    ui.submitUpload.textContent='Share';
  }
}

function initEvents(){
  [ui.btnUpload,ui.bnCreate].forEach(b=>b?.addEventListener('click',openUpload));
  ui.closeUpload.addEventListener('click',closeUploadFn);
  ui.submitUpload.addEventListener('click',createPost);
  ui.uploadModal.addEventListener('click',e=>{if(e.target===ui.uploadModal)closeUploadFn();});
  ui.likesModal.addEventListener('click',e=>{if(e.target===ui.likesModal)ui.likesModal.classList.remove('open');});
  ui.searchInput.addEventListener('input',()=>{
    clearTimeout(searchT);
    searchT=setTimeout(()=>loadPosts(ui.searchInput.value.trim(),false),180);
  });
  ui.uFile.addEventListener('change',()=>{
    const f=ui.uFile.files?.[0];
    if(!f)return;
    ui.fileIcon.textContent=f.type.startsWith('video/')?'videocam':'check_circle';
    ui.fileLbl.innerHTML=`<strong>${esc(f.name)}</strong>`;
  });
  window.addEventListener('keydown',e=>{
    if(e.key==='Escape'){
      closeUploadFn();
      ui.likesModal.classList.remove('open');
    }
  });
  setInterval(()=>{
    if(!sb||!user)return;
    sb.from('presence').upsert(
      {user_id:user.id,last_seen:new Date().toISOString()},
      {onConflict:'user_id'}
    ).catch(()=>{});
  },60000);
}

async function boot(){
  if(booted)return;
  booted=true;

  const fb=setTimeout(()=>{
    showApp();
    toast('App started in fallback mode.');
  },CFG.BOOT_FB);

  try{
    await initSB().catch(()=>{sb=null;});
    if(sb){
      const session=await getSession();
      if(session?.user){
        user=session.user;
        await loadProfileData().catch(()=>{});
      }
    }
    updateHeader();
    await loadPosts('',false);
    if(sb&&user){
      sb.from('presence').upsert(
        {user_id:user.id,last_seen:new Date().toISOString()},
        {onConflict:'user_id'}
      ).catch(()=>{});
    }
    showApp();
  }catch(err){
    console.error(err);
    renderFeed([]);
    showApp();
    toast(err?.message||'Fallback mode.');
  }finally{
    clearTimeout(fb);
    showApp();
  }
}

window.addEventListener('error',e=>toast(e?.error?.message||e.message||'Error.'));
window.addEventListener('unhandledrejection',e=>toast(e.reason instanceof Error?e.reason.message:String(e.reason||'Error.')));
initEvents();
boot();
})();
</script>
</body>
</html>
