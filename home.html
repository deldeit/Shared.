<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Shared.</title>
<meta name="theme-color" content="#000000">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
:root{
  --bg:#000;--text:#fff;--muted:rgba(255,255,255,.68);--muted-2:rgba(255,255,255,.48);
  --border:rgba(255,255,255,.14);--panel:rgba(255,255,255,.05);--panel-2:rgba(255,255,255,.08);
  --danger:#ff3b30;--like:#ff2d55;--sidebar-w:330px;--feed-width:440px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  --squircle-radius:28px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:#000;color:#fff;font-family:'Archivo Black',sans-serif;overflow:hidden;}
button,input,a{font-family:'Archivo Black',sans-serif;}

/* Sidebar */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:19;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .28s,visibility .28s;}
.sidebar-overlay.open{opacity:1;visibility:visible;pointer-events:auto;}
.hamburger{position:fixed;top:14px;left:16px;z-index:22;width:44px;height:44px;border-radius:14px;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.92);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .18s,transform .18s;}
.hamburger:hover{background:rgba(255,255,255,.08);}
.hamburger:active{transform:scale(.94);}
.hamburger .material-symbols-rounded{font-size:24px;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);padding:18px 16px;display:flex;flex-direction:column;gap:14px;border-right:1px solid rgba(255,255,255,.1);background:#000;z-index:21;overflow:hidden;transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
.sidebar.open{transform:translateX(0);}
.sidebar-top{display:flex;flex-direction:column;gap:14px;min-height:0;flex:1;padding-top:56px;}
.sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;gap:10px;}
.profile-card{display:flex;align-items:center;gap:12px;padding:14px;border-radius:18px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);}
.profile-avatar{width:54px;height:54px;border-radius:50%;object-fit:cover;border:1px solid rgba(255,255,255,.12);background:#111;flex:0 0 auto;}
.profile-meta{min-width:0;flex:1}
.profile-label{font-size:11px;color:var(--muted-2);letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px;}
.profile-name{display:flex;align-items:center;gap:6px;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.profile-handle{margin-top:3px;font-size:11px;color:var(--muted-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.search-wrap{position:relative}
.search{width:100%;display:block;padding:14px 16px;border-radius:18px;border:1px solid rgba(255,255,255,.18);background:#111;color:#fff;outline:none;font-size:15px;}
.search::placeholder{color:rgba(255,255,255,.4)}
.suggestions{position:absolute;left:0;right:0;top:calc(100% + 8px);display:none;background:#0b0b0b;border:1px solid rgba(255,255,255,.14);border-radius:16px;overflow:hidden;max-height:320px;overflow-y:auto;z-index:30;}
.suggestion{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.06);}
.suggestion:last-child{border-bottom:0}
.suggestion:hover{background:rgba(255,255,255,.06)}
.suggestion-avatar{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.1);flex:0 0 auto;object-fit:cover;background:#111;}
.suggestion-meta{min-width:0;flex:1}
.suggestion-title{display:flex;align-items:center;gap:6px;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.suggestion-subtitle{margin-top:3px;font-size:11px;color:var(--muted-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-btn{display:flex;align-items:center;gap:12px;padding:14px 15px;border-radius:14px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#fff;cursor:pointer;transition:.2s;text-decoration:none;user-select:none;line-height:1;font-size:15px;justify-content:flex-start;}
.nav-btn:hover{background:rgba(255,255,255,.09)}
.nav-btn.logout{background:rgba(255,59,48,.12);color:#ff7a73;border-color:rgba(255,59,48,.24);}
.nav-btn .material-symbols-rounded{font-size:22px;line-height:1;}

/* Main */
.main{width:100%;height:100vh;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}

/* Header */
.header{text-align:center;padding:18px 72px 14px;font-size:30px;letter-spacing:-.05em;border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;background:#000;z-index:5;}

/* Stories / Moments shared strip */
.stories-section{padding-top:8px;}
.section-head{display:flex;align-items:center;justify-content:space-between;padding:0 12px 10px;}
.section-title{font-size:12px;color:var(--muted-2);letter-spacing:.14em;text-transform:uppercase;}

/* Stories row */
.stories{display:flex;gap:14px;overflow-x:auto;padding:8px 12px 6px;scrollbar-width:none;}
.stories::-webkit-scrollbar{display:none}
.story{min-width:70px;text-align:center;cursor:pointer;flex:0 0 auto;background:transparent;border:0;color:#fff;}
.story img{width:60px;height:60px;border-radius:50%;border:2px solid #fff;display:block;margin:0 auto 8px;object-fit:cover;background:#111;}
.story div{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px;}

/* Moments horizontal strip */
.moments-section{padding:12px 0 4px;}
.moments-strip{display:flex;gap:10px;overflow-x:auto;padding:4px 12px 10px;scrollbar-width:none;}
.moments-strip::-webkit-scrollbar{display:none}
.moment-card{
  flex:0 0 auto;width:130px;border-radius:18px;overflow:hidden;cursor:pointer;
  position:relative;border:1px solid rgba(255,255,255,.1);
  background:#0a0a0a;transition:transform .18s;
}
.moment-card:hover{transform:scale(1.03);}
.moment-card:active{transform:scale(.97);}
.moment-thumb{width:130px;height:180px;object-fit:cover;display:block;background:#111;}
.moment-grad{position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.75) 0%,transparent 50%);}
.moment-meta{position:absolute;bottom:0;left:0;right:0;padding:10px 10px 12px;}
.moment-avatar{width:26px;height:26px;border-radius:50%;border:1.5px solid #fff;object-fit:cover;background:#111;display:block;margin-bottom:5px;}
.moment-name{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;}
.moment-caption{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}

/* Feed section label */
.feed-label{
  display:flex;align-items:center;gap:8px;
  padding:6px 12px 0;font-size:11px;color:var(--muted-2);letter-spacing:.12em;text-transform:uppercase;
}
.feed-label .material-symbols-rounded{font-size:14px;}

/* Feed */
.feed{display:flex;flex-direction:column;gap:20px;padding:12px 0 80px;}

/* Post */
.post{
  width:min(var(--feed-width),calc(100vw - 24px));margin:0 auto;
  border:1px solid rgba(255,255,255,.12);border-radius:var(--squircle-radius);
  overflow:hidden;background:#0a0a0a;
  transition:transform .2s ease,box-shadow .2s ease;
  animation:fadeUp .35s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.post:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.5);}

/* Post header */
.post-header{display:flex;align-items:center;gap:12px;padding:12px 14px 10px;}
.avatar{width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,255,255,.12);flex:0 0 auto;object-fit:cover;background:#111;}
.user-meta{flex:1;min-width:0;}
.username{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:15px;line-height:1.1;white-space:nowrap;overflow:hidden;}
.verified{font-size:15px;color:#fff;flex:0 0 auto;font-variation-settings:'FILL' 1;}
.post-time{margin-top:4px;font-size:10px;color:var(--muted-2);}
.following-badge{
  margin-left:auto;padding:4px 9px;border-radius:999px;
  font-size:10px;border:1px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.05);color:var(--muted-2);white-space:nowrap;flex:0 0 auto;
}

/* Media */
.media{position:relative;width:100%;aspect-ratio:4/3;background:#111;overflow:hidden;}
.media img{width:100%;height:100%;display:block;object-fit:cover;}
.like-pop{position:absolute;inset:auto auto 50% 50%;transform:translate(-50%,50%) scale(.8);pointer-events:none;opacity:0;z-index:3;color:var(--like);transition:opacity .15s,transform .15s;}
.like-pop.show{opacity:1;transform:translate(-50%,50%) scale(1);}
.like-pop .material-symbols-rounded{font-size:72px;font-variation-settings:'FILL' 1,'wght' 700,'GRAD' 0,'opsz' 48;}

/* Actions */
.actions{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px 0;}
.like-row{display:flex;align-items:center;gap:10px;}
.like-btn{width:40px;height:40px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:#fff;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:.18s;flex:0 0 auto;}
.like-btn:hover{background:rgba(255,255,255,.09)}
.like-btn:active{transform:scale(.96)}
.like-btn.liked{color:var(--like);background:rgba(255,45,85,.08);border-color:rgba(255,45,85,.28)}
.like-btn .material-symbols-rounded{font-size:20px;font-variation-settings:'FILL' 1,'wght' 700,'GRAD' 0,'opsz' 24;}
.count{font-size:12px;color:var(--muted);cursor:pointer;user-select:none;}

/* Location */
.location-row{display:flex;align-items:center;gap:5px;padding:8px 14px 0;font-size:11px;color:var(--muted-2);}
.location-row .material-symbols-rounded{font-size:13px;flex:0 0 auto;}

/* Tags */
.tag-row{display:flex;flex-wrap:wrap;gap:6px;padding:8px 14px 0;}
.tag-pill{padding:5px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#fff;font-size:11px;}

/* Caption — always visible */
.caption{
  padding:10px 14px 0;font-size:14px;line-height:1.5;color:var(--muted);
  display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;
}
.caption .author-handle{color:#fff;margin-right:6px;}
.caption.expanded{display:block;-webkit-line-clamp:unset;}
.caption-toggle{padding:2px 14px 0;font-size:12px;color:var(--muted-2);cursor:pointer;display:none;}
.caption-toggle.visible{display:block;}

/* Song card */
.song-card{
  display:flex;align-items:center;gap:12px;padding:11px;margin:10px 10px 0;
  border-radius:16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  cursor:pointer;transition:background .18s;
}
.song-card:hover{background:rgba(255,255,255,.09);}
.song-card.playing{border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.08);}
.music-bars{display:none;align-items:flex-end;gap:2px;width:18px;height:18px;flex:0 0 auto;}
.song-card.playing .music-bars{display:flex;}
.music-bars span{display:block;width:3px;border-radius:2px;background:#fff;animation:bar .7s ease infinite alternate;}
.music-bars span:nth-child(1){height:6px;animation-delay:0s;}
.music-bars span:nth-child(2){height:12px;animation-delay:.18s;}
.music-bars span:nth-child(3){height:8px;animation-delay:.32s;}
@keyframes bar{to{height:3px;}}
.album-cover{width:46px;height:46px;border-radius:10px;border:1px solid rgba(255,255,255,.12);flex:0 0 auto;object-fit:cover;background:#111;}
.note-cover{width:46px;height:46px;border-radius:10px;border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;background:#111;flex:0 0 auto;}
.note-cover .material-symbols-rounded{font-size:24px;}
.song-info{min-width:0;flex:1;}
.song-title{font-size:14px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.song-author{margin-top:4px;font-size:11px;color:var(--muted-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* Audio bar */
#audioBar{
  position:fixed;bottom:0;left:0;right:0;z-index:50;display:none;
  align-items:center;gap:12px;
  padding:10px 16px calc(10px + var(--safe-bottom));
  background:rgba(10,10,10,.96);border-top:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
#audioBar.visible{display:flex;}
#audioBarCover{width:38px;height:38px;border-radius:8px;object-fit:cover;background:#111;border:1px solid rgba(255,255,255,.12);flex:0 0 auto;}
#audioBarInfo{flex:1;min-width:0;}
#audioBarTitle{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#audioBarArtist{font-size:10px;color:var(--muted-2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#audioBarToggle{width:38px;height:38px;border-radius:999px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto;}
#audioBarToggle .material-symbols-rounded{font-size:20px;}
#audioBarClose{width:34px;height:34px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:var(--muted-2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto;}
#audioBarClose .material-symbols-rounded{font-size:16px;}

/* Skeleton */
.skeleton-post{width:min(var(--feed-width),calc(100vw - 24px));margin:0 auto;border:1px solid rgba(255,255,255,.07);border-radius:var(--squircle-radius);overflow:hidden;background:#0a0a0a;}
.skel-header{display:flex;align-items:center;gap:12px;padding:12px 14px;}
.skel-circle{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.07);flex:0 0 auto;animation:shimmer 1.4s ease infinite;}
.skel-lines{flex:1;display:flex;flex-direction:column;gap:6px;}
.skel-line{height:10px;border-radius:6px;background:rgba(255,255,255,.07);animation:shimmer 1.4s ease infinite;}
.skel-line.short{width:40%;}
.skel-image{width:100%;aspect-ratio:4/3;background:rgba(255,255,255,.05);animation:shimmer 1.4s ease infinite;}
.skel-caption{height:12px;margin:12px 14px;border-radius:6px;background:rgba(255,255,255,.05);animation:shimmer 1.4s ease infinite;}
@keyframes shimmer{0%{opacity:.5}50%{opacity:1}100%{opacity:.5}}

/* Moment viewer overlay */
.moment-viewer{position:fixed;inset:0;z-index:110;display:grid;place-items:center;background:#000;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .2s,visibility .2s;}
.moment-viewer.open{opacity:1;visibility:visible;pointer-events:auto;}
.moment-stage{width:100%;height:100%;position:relative;max-width:420px;margin:0 auto;}
.moment-stage img{width:100%;height:100%;object-fit:cover;display:block;}
.moment-stage video{width:100%;height:100%;object-fit:cover;display:block;}
.moment-gradient{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.62),transparent 18%,transparent 72%,rgba(0,0,0,.8));pointer-events:none;}
.moment-top{position:absolute;top:0;left:0;right:0;z-index:2;padding:calc(14px + var(--safe-top)) 12px 12px;display:grid;gap:10px;background:linear-gradient(180deg,rgba(0,0,0,.56),transparent);}
.moment-progress-row{display:flex;gap:4px;}
.moment-prog{flex:1;height:3px;background:rgba(255,255,255,.18);border-radius:999px;overflow:hidden;}
.moment-prog > span{display:block;width:0%;height:100%;background:#fff;border-radius:inherit;}
.moment-meta{display:flex;align-items:center;justify-content:space-between;gap:12px;color:#fff;}
.moment-meta-left{display:flex;align-items:center;gap:10px;min-width:0;}
.moment-meta-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1px solid rgba(255,255,255,.16);background:#111;}
.moment-meta-name{font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.moment-bottom{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:0 16px calc(24px + var(--safe-bottom));}
.moment-caption-display{font-size:15px;line-height:1.5;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.8);max-height:100px;overflow:hidden;}
.close-btn{width:42px;height:42px;border-radius:999px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:#fff;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;}
.moment-tap-zone{position:absolute;inset:0;z-index:1;display:grid;grid-template-columns:1fr 1fr;}

/* Load more */
#loadMore{
  display:flex;align-items:center;justify-content:center;
  width:min(var(--feed-width),calc(100vw - 24px));margin:0 auto 80px;
  padding:16px;border-radius:16px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.04);color:var(--muted);font-size:14px;cursor:pointer;
  transition:.2s;font-family:'Archivo Black',sans-serif;gap:8px;
}
#loadMore:hover{background:rgba(255,255,255,.08);}
#loadMore.hidden{display:none;}

/* Modal */
.modal{position:fixed;inset:0;z-index:120;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.88);padding:16px;}
.modal.open{display:flex}
.modal-box{width:min(92vw,520px);max-height:min(80vh,760px);overflow:auto;background:#0b0b0b;border:1px solid rgba(255,255,255,.14);border-radius:22px;padding:14px;}
.modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;}
.modal-title{font-size:18px}
.modal-close{width:38px;height:38px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:#fff;cursor:pointer;font-family:'Archivo Black',sans-serif;}
.list-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px 8px;border-radius:14px;cursor:pointer;transition:background .14s;}
.list-item:hover{background:rgba(255,255,255,.05)}
.list-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;background:#111;border:1px solid rgba(255,255,255,.10);flex:0 0 auto;}
.list-main{min-width:0;flex:1}
.list-name{display:flex;align-items:center;gap:6px;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-sub{margin-top:2px;color:var(--muted-2);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.empty{margin:16px 14px 0;padding:22px;border-radius:22px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--muted);text-align:center;font-size:15px;}
.post > *:last-child{margin-bottom:14px;}

@media(max-width:860px){
  .header{font-size:28px}
  .post{width:calc(100vw - 18px)}
  .skeleton-post{width:calc(100vw - 18px)}
}
</style>
</head>
<body>

<button class="hamburger" id="hamburgerBtn" type="button" aria-label="Open menu" aria-expanded="false">
  <span class="material-symbols-rounded" id="hamburgerIcon">menu</span>
</button>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<aside class="sidebar" id="sidebar" aria-hidden="true">
  <div class="sidebar-top">
    <div class="profile-card">
      <img id="profileAvatar" class="profile-avatar" alt="Profile avatar" src="">
      <div class="profile-meta">
        <div class="profile-label">Account</div>
        <div class="profile-name" id="profileName">Loading…</div>
        <div class="profile-handle" id="profileHandle">@shared</div>
      </div>
    </div>
    <div class="search-wrap">
      <input id="search" class="search" placeholder="Search" autocomplete="off">
      <div id="suggestions" class="suggestions"></div>
    </div>
  </div>
  <div class="sidebar-bottom">
    <button class="nav-btn" type="button" onclick="goUpload()">
      <span class="material-symbols-rounded">upload</span><span>Upload</span>
    </button>
    <a class="nav-btn" href="settings.html">
      <span class="material-symbols-rounded">settings</span><span>Settings</span>
    </a>
    <a class="nav-btn" href="about.html">
      <span class="material-symbols-rounded">info</span><span>About</span>
    </a>
    <button class="nav-btn logout" type="button" onclick="logout()">
      <span class="material-symbols-rounded">logout</span><span>Logout</span>
    </button>
  </div>
</aside>

<main class="main" id="mainScroll">
  <div class="header">Shared.</div>

  <!-- Stories -->
  <section id="storiesSection" class="stories-section" style="display:none">
    <div class="section-head"><div class="section-title">Stories</div></div>
    <div id="stories" class="stories"></div>
  </section>

  <!-- Moments -->
  <section id="momentsSection" class="moments-section" style="display:none">
    <div class="section-head">
      <div class="section-title">Moments</div>
    </div>
    <div id="momentsStrip" class="moments-strip"></div>
  </section>

  <!-- Feed -->
  <div id="feedFollowing" class="feed-label" style="display:none">
    <span class="material-symbols-rounded">group</span>
    <span>From people you follow</span>
  </div>
  <div id="feedDiscoverLabel" class="feed-label" style="display:none">
    <span class="material-symbols-rounded">explore</span>
    <span>Discover</span>
  </div>
  <div id="feed" class="feed"></div>

<script type="module">
const API_BASE = "https://api.sharedweb.org";
const BATCH = 12; // post per caricamento

const state = {
  profiles: [],
  posts: [],        // tutti i post caricati (sorted)
  moments: [],      // moments / video brevi
  likes: [],
  follows: [],      // [{follower_id, following_id}]
  currentUserId: null,
  currentUserProfile: null,
  storyQueue: [],

  // paginazione
  followingPosts: [],
  discoverPosts: [],
  renderedCount: 0,
  allLoaded: false,

  // moment viewer
  momentQueue: [],
  momentIndex: 0,
  momentTimer: null,
  momentRaf: null,
  momentStartTs: 0,
  momentDurationMs: 8000,

  // audio
  audioPostId: null,
  audioPlaying: false,

  // like deltas ottimistici
  likeDeltas: {},
  searchQuery: "",
};

/* ─── Elementi ─────────────────────────────────── */
const el = id => document.getElementById(id);
const els = {
  mainScroll:      el("mainScroll"),
  storiesSection:  el("storiesSection"),
  stories:         el("stories"),
  momentsSection:  el("momentsSection"),
  momentsStrip:    el("momentsStrip"),
  feed:            el("feed"),
  feedFollowing:   el("feedFollowing"),
  feedDiscoverLabel: el("feedDiscoverLabel"),
  loadMore:        el("loadMore"),
  search:          el("search"),
  suggestions:     el("suggestions"),
  likesModal:      el("likesModal"),
  likesList:       el("likesList"),
  closeLikesBtn:   el("closeLikesBtn"),
  sidebar:         el("sidebar"),
  sidebarOverlay:  el("sidebarOverlay"),
  hamburgerBtn:    el("hamburgerBtn"),
  hamburgerIcon:   el("hamburgerIcon"),
  profileAvatar:   el("profileAvatar"),
  profileName:     el("profileName"),
  profileHandle:   el("profileHandle"),
  audioBar:        el("audioBar"),
  audioBarCover:   el("audioBarCover"),
  audioBarTitle:   el("audioBarTitle"),
  audioBarArtist:  el("audioBarArtist"),
  audioBarToggle:  el("audioBarToggle"),
  audioBarIcon:    el("audioBarIcon"),
  audioBarClose:   el("audioBarClose"),
  globalAudio:     el("globalAudio"),
  momentViewer:    el("momentViewer"),
  momentStage:     el("momentStage"),
  momentImg:       el("momentImg"),
  momentAvatar:    el("momentAvatar"),
  momentName:      el("momentName"),
  momentProgRow:   el("momentProgRow"),
  closeMoment:     el("closeMoment"),
  prevMoment:      el("prevMoment"),
  nextMoment:      el("nextMoment"),
  momentCaptionDisplay: el("momentCaptionDisplay"),
};

/* ─── Sidebar ──────────────────────────────────── */
let sidebarOpen = false;
const openSidebar  = () => { sidebarOpen=true;  els.sidebar.classList.add("open");    els.sidebarOverlay.classList.add("open");    els.hamburgerIcon.textContent="close"; els.hamburgerBtn.setAttribute("aria-expanded","true");  };
const closeSidebar = () => { sidebarOpen=false; els.sidebar.classList.remove("open"); els.sidebarOverlay.classList.remove("open"); els.hamburgerIcon.textContent="menu";  els.hamburgerBtn.setAttribute("aria-expanded","false"); };
els.hamburgerBtn.addEventListener("click",()=>sidebarOpen?closeSidebar():openSidebar());
els.sidebarOverlay.addEventListener("click",closeSidebar);
window.addEventListener("keydown",e=>{if(e.key==="Escape"&&sidebarOpen)closeSidebar();});

/* ─── Utils ────────────────────────────────────── */
const safeArr   = v => Array.isArray(v) ? v : [];
const esc       = s => String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
const fmtN      = n => { const x=Number(n||0); return x>=1e6?`${(x/1e6).toFixed(1)}M`:x>=1000?`${(x/1000).toFixed(1)}K`:String(x); };
const normUrl   = p => (!p||/^https?:\/\//i.test(p)||p.startsWith("data:"))?p:p;
const profileById = id => state.profiles.find(p=>String(p.id)===String(id))||null;

const defAvatar = () => `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"><rect width="120" height="120" rx="60" fill="#111"/><circle cx="60" cy="48" r="18" fill="#fff"/><path d="M24 102c7-20 24-30 36-30s29 10 36 30" fill="#fff"/></svg>`)}`;
const defImg    = () => `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><rect width="800" height="600" fill="#111"/><circle cx="320" cy="260" r="44" fill="#222"/></svg>`)}`;

function timeAgo(v){
  const d=v?new Date(v):null; if(!d||isNaN(d))return"";
  const diff=Math.max(0,Date.now()-d.getTime()), m=Math.floor(diff/6e4), h=Math.floor(diff/36e5), dy=Math.floor(diff/864e5);
  return m<1?"just now":m<60?`${m}m`:h<24?`${h}h`:dy<7?`${dy}d`:d.toLocaleDateString([],{month:"short",day:"numeric"});
}

function avatarForPost(post){
  const p = profileById(post.user_id)||profileById(post.profile_id);
  return normUrl(post.avatar_url||p?.avatar_url||p?.avatar||p?.profile_image||"")||defAvatar();
}
function avatarForProfile(p){
  return normUrl(p?.avatar_url||p?.avatar||p?.profile_image||"")||defAvatar();
}
function usernameForPost(post){
  const p=profileById(post.user_id)||profileById(post.profile_id);
  return post.username||p?.username||p?.full_name||"user";
}
function isVerified(p){return p?.verified===true||p?.verified==='true'||p?.verified===1;}
function tagsFor(post){
  const r=post.tags; if(!r)return[];
  return (Array.isArray(r)?r:String(r).split(",")).map(t=>String(t).trim()).filter(Boolean).slice(0,8);
}
function locationFor(post){ return post.location||post.place||post.city||post.location_name||""; }

/* ─── Like helpers ─────────────────────────────── */
function likeCount(postId){
  const s = state.likes.filter(l=>String(l.post_id??l.postId??l.postid)===String(postId)).length;
  return Math.max(0, s + (state.likeDeltas[postId]??0));
}
function likedByMe(postId){
  return state.currentUserId
    ? state.likes.some(l=>String(l.post_id??l.postId??l.postid)===String(postId)&&String(l.user_id)===String(state.currentUserId))
    : false;
}

/* ─── Follow helpers ───────────────────────────── */
function iFollow(userId){
  return state.currentUserId && state.follows.some(f=>
    String(f.follower_id??f.follower??f.from_user_id??f.from)===String(state.currentUserId) &&
    String(f.following_id??f.following??f.to_user_id??f.to)===String(userId)
  );
}
function followsMe(userId){
  return state.currentUserId && state.follows.some(f=>
    String(f.follower_id??f.follower??f.from_user_id??f.from)===String(userId) &&
    String(f.following_id??f.following??f.to_user_id??f.to)===String(state.currentUserId)
  );
}
function isMutual(userId){ return iFollow(userId)&&followsMe(userId); }

/* ─── API ──────────────────────────────────────── */
async function apiFetch(path){
  const r=await fetch(`${API_BASE}${path}`,{headers:{Accept:"application/json"}});
  if(!r.ok) throw new Error(`${r.status} ${path}`);
  return r.json();
}
async function apiSend(path,method,body){
  const r=await fetch(`${API_BASE}${path}`,{method,headers:{Accept:"application/json","Content-Type":"application/json"},body:body?JSON.stringify(body):undefined});
  if(!r.ok) throw new Error(`${r.status} ${method} ${path}`);
  return r.json().catch(()=>null);
}
async function tryPaths(paths){
  for(const p of paths){ try{ return await apiFetch(p); }catch(e){ if(!String(e).includes("404"))throw e; } }
  return null;
}

async function fetchPosts(){ 
  const d=await tryPaths(["/posts","/feed","/home","/content"]); 
  return safeArr(Array.isArray(d)?d:(d?.posts||d?.data||d?.results||[])); 
}
async function fetchProfiles(){ 
  const d=await tryPaths(["/profiles","/users","/accounts"]); 
  return safeArr(Array.isArray(d)?d:(d?.profiles||d?.users||d?.data||[])); 
}
async function fetchLikes(){ 
  const d=await tryPaths(["/likes","/reactions","/post-likes"]); 
  return safeArr(Array.isArray(d)?d:(d?.likes||d?.reactions||d?.data||[])); 
}
async function fetchFollows(){
  const d=await tryPaths([
    "/follows","/follow","/followers","/following",
    state.currentUserId?`/users/${state.currentUserId}/follows`:null,
    state.currentUserId?`/profiles/${state.currentUserId}/follows`:null,
  ].filter(Boolean));
  return safeArr(Array.isArray(d)?d:(d?.follows||d?.data||[]));
}
async function fetchMoments(){
  const d=await tryPaths(["/moments","/reels","/stories","/shorts","/videos"]);
  return safeArr(Array.isArray(d)?d:(d?.moments||d?.reels||d?.stories||d?.data||[]));
}

/* ─── Current user ─────────────────────────────── */
async function fetchCurrentUser(){
  const id=localStorage.getItem("shared_current_user_id");
  const un=localStorage.getItem("shared_current_username");
  const av=localStorage.getItem("shared_current_avatar");
  if(id||un) return{id:id||null,username:un||"you",avatar_url:av||""};
  return state.profiles[0]||null;
}

function renderCurrentUser(){
  const p=state.currentUserProfile;
  const username=p?.username||p?.full_name||"you";
  const handle=p?.handle||p?.username?`@${String(p?.handle||p?.username).replace(/^@/,"")}` :"@shared";
  els.profileName.textContent=username;
  els.profileHandle.textContent=handle;
  els.profileAvatar.src=avatarForProfile(p)||defAvatar();
}

/* ─── Skeleton ─────────────────────────────────── */
function renderSkeletons(n=3){
  els.feed.innerHTML=Array.from({length:n},()=>`
    <div class="skeleton-post">
      <div class="skel-header"><div class="skel-circle"></div><div class="skel-lines"><div class="skel-line"></div><div class="skel-line short"></div></div></div>
      <div class="skel-image"></div>
      <div class="skel-caption"></div>
    </div>`).join("");
}

/* ─── Stories from profiles ────────────────────── */
function buildStoryQueue(){
  return state.profiles.map(p=>{
    const av=normUrl(p.avatar_url||p.avatar||p.profile_image||"")||defAvatar();
    const st=normUrl(p.story_url||p.story_image||p.story||p.latest_story||"");
    return{id:p.id,username:p.username||p.full_name||"user",avatar:av,story:st,profile:p};
  }).filter(x=>x.story||x.avatar);
}
function renderStories(){
  if(!state.storyQueue.length){els.storiesSection.style.display="none";return;}
  els.storiesSection.style.display="block";
  els.stories.innerHTML=state.storyQueue.map((s,i)=>`
    <button class="story" data-story-index="${i}" type="button">
      <img loading="lazy" src="${s.avatar}" alt="${esc(s.username)}">
      <div>${esc(s.username)}</div>
    </button>`).join("");
  els.stories.querySelectorAll("[data-story-index]").forEach(b=>{
    b.addEventListener("click",()=>openMomentViewer(state.storyQueue,Number(b.dataset.storyIndex),"story"));
  });
}

/* ─── Moments ──────────────────────────────────── */
function renderMoments(){
  if(!state.moments.length){els.momentsSection.style.display="none";return;}
  els.momentsSection.style.display="block";
  els.momentsStrip.innerHTML=state.moments.map((m,i)=>{
    const profile=profileById(m.user_id||m.profile_id);
    const av=normUrl(m.avatar_url||profile?.avatar_url||profile?.avatar||"")||defAvatar();
    const thumb=normUrl(m.thumbnail||m.thumb||m.cover||m.image_url||m.image||m.video_url||"");
    const username=m.username||profile?.username||profile?.full_name||"user";
    const caption=m.caption||m.text||"";
    return `
      <div class="moment-card" data-moment-index="${i}">
        <img class="moment-thumb" src="${thumb||defImg()}" alt="${esc(username)}" loading="lazy">
        <div class="moment-grad"></div>
        <div class="moment-meta">
          <img class="moment-avatar" src="${av}" alt="">
          <div class="moment-name">${esc(username)}</div>
          ${caption?`<div class="moment-caption">${esc(caption)}</div>`:""}
        </div>
      </div>`;
  }).join("");
  els.momentsStrip.querySelectorAll("[data-moment-index]").forEach(c=>{
    c.addEventListener("click",()=>openMomentViewer(state.moments,Number(c.dataset.momentIndex),"moment"));
  });
}

/* ─── Moment viewer ────────────────────────────── */
let _mvQueue=[], _mvIndex=0, _mvType="moment";
function openMomentViewer(queue,index,type){
  _mvQueue=queue; _mvIndex=index; _mvType=type;
  els.momentViewer.classList.add("open");
  els.momentViewer.setAttribute("aria-hidden","false");
  document.body.style.overflow="hidden";
  renderMomentSlide();
  startMomentTimer();
}
function closeMomentViewer(){
  stopMomentTimer();
  els.momentViewer.classList.remove("open");
  els.momentViewer.setAttribute("aria-hidden","true");
  document.body.style.overflow="hidden";
}
function renderMomentSlide(){
  const item=_mvQueue[_mvIndex]; if(!item) return;
  const profile=profileById(item.user_id||item.profile_id||item.id);
  const av = _mvType==="story"
    ? (item.avatar||defAvatar())
    : normUrl(item.avatar_url||profile?.avatar_url||profile?.avatar||"")||defAvatar();
  const img = _mvType==="story"
    ? (item.story||item.avatar||defAvatar())
    : normUrl(item.thumbnail||item.thumb||item.cover||item.image_url||item.image||"");
  const username = _mvType==="story"
    ? item.username
    : (item.username||profile?.username||profile?.full_name||"user");
  const caption = item.caption||item.text||"";

  els.momentImg.src=img||defImg();
  els.momentAvatar.src=av;
  els.momentName.textContent=username;
  els.momentCaptionDisplay.textContent=caption;
  // progress bars
  const total=_mvQueue.length;
  els.momentProgRow.innerHTML=Array.from({length:total},(_,i)=>
    `<div class="moment-prog"><span style="width:${i<_mvIndex?100:0}%"></span></div>`
  ).join("");
}
function updateMomentProgress(){
  const bars=[...els.momentProgRow.querySelectorAll(".moment-prog > span")];
  bars.forEach((b,i)=>{
    if(i<_mvIndex)b.style.width="100%";
    else if(i>_mvIndex)b.style.width="0%";
    else{ const e=performance.now()-state.momentStartTs; b.style.width=`${Math.min(100,(e/state.momentDurationMs)*100)}%`; }
  });
  state.momentRaf=requestAnimationFrame(updateMomentProgress);
}
function startMomentTimer(){
  stopMomentTimer();
  state.momentStartTs=performance.now();
  state.momentTimer=setTimeout(()=>advanceMoment(1),state.momentDurationMs);
  state.momentRaf=requestAnimationFrame(updateMomentProgress);
}
function stopMomentTimer(){ clearTimeout(state.momentTimer); cancelAnimationFrame(state.momentRaf); }
function advanceMoment(dir){
  _mvIndex=(_mvIndex+dir+_mvQueue.length)%_mvQueue.length;
  renderMomentSlide(); startMomentTimer();
}
els.closeMoment.addEventListener("click",closeMomentViewer);
els.prevMoment.addEventListener("click",e=>{e.stopPropagation();advanceMoment(-1);});
els.nextMoment.addEventListener("click",e=>{e.stopPropagation();advanceMoment(1);});
els.momentViewer.addEventListener("click",e=>{if(e.target===els.momentViewer)closeMomentViewer();});

/* ─── Post HTML ────────────────────────────────── */
function buildPostHtml(post, badge=""){
  const username = usernameForPost(post);
  const profile  = profileById(post.user_id)||profileById(post.profile_id);
  const avatar   = avatarForPost(post);
  const image    = normUrl(post.image_url||post.media_url||post.image||"");
  const caption  = post.caption||post.text||"";
  const songTitle  = post.song_title||post.song||"";
  const songAuthor = post.song_author||post.song_artist||post.song_by||"";
  const songPreview= post.song_preview||post.audio_url||post.preview_url||"";
  const songCover  = normUrl(post.song_cover||post.album_cover||post.album_image||post.cover_url||post.artwork_url||post.album_art||"");
  const createdAt  = post.created_at||post.inserted_at||post.updated_at||"";
  const likes      = likeCount(post.id);
  const liked      = likedByMe(post.id)||!!post.liked;
  const tags       = tagsFor(post);
  const location   = locationFor(post);
  const isPlaying  = state.audioPostId===String(post.id)&&state.audioPlaying;

  return `
<article class="post" data-post-id="${esc(post.id)}">
  <div class="post-header">
    <img class="avatar" loading="lazy" src="${avatar}" alt="${esc(username)}">
    <div class="user-meta">
      <div class="username" data-profile-id="${esc(post.user_id||post.profile_id||"")}">
        <span>${esc(username)}</span>
        ${profile&&isVerified(profile)?`<span class="material-symbols-rounded verified">verified</span>`:""}
      </div>
      <div class="post-time">${esc(timeAgo(createdAt))}</div>
    </div>
    ${badge?`<div class="following-badge">${badge}</div>`:""}
  </div>

  <div class="media" data-like-zone="${esc(post.id)}">
    <img class="lazy-media" loading="lazy" data-src="${esc(image)}" alt="Post di ${esc(username)}" src="${defImg()}">
    <div class="like-pop" aria-hidden="true"><span class="material-symbols-rounded">favorite</span></div>
  </div>

  <div class="actions">
    <div class="like-row">
      <button class="like-btn${liked?" liked":""}" data-like-btn="${esc(post.id)}" type="button" aria-label="Like">
        <span class="material-symbols-rounded">favorite</span>
      </button>
      <div class="count" data-like-count="${esc(post.id)}">${fmtN(likes)} likes</div>
    </div>
  </div>

  ${location?`<div class="location-row"><span class="material-symbols-rounded">location_on</span><span>${esc(location)}</span></div>`:""}
  ${tags.length?`<div class="tag-row">${tags.map(t=>`<span class="tag-pill">${esc(t)}</span>`).join("")}</div>`:""}

  ${caption?`
    <div class="caption" id="cap-${esc(post.id)}"><span class="author-handle">${esc(username)}</span>${esc(caption)}</div>
    <div class="caption-toggle" id="captog-${esc(post.id)}" data-cap-id="${esc(post.id)}">Leggi tutto</div>
  `:""}

  ${(songTitle||songPreview)?`
    <div class="song-card${isPlaying?" playing":""}" data-song-play="${esc(post.id)}"
         data-audio="${esc(songPreview)}" data-song-title="${esc(songTitle)}"
         data-song-artist="${esc(songAuthor)}" data-song-cover="${esc(songCover)}">
      ${songCover
        ?`<img class="album-cover" src="${songCover}" alt="Album cover">`
        :`<div class="note-cover"><span class="material-symbols-rounded">music_note</span></div>`}
      <div class="song-info">
        ${songTitle ?`<div class="song-title">${esc(songTitle)}</div>`:""}
        ${songAuthor?`<div class="song-author">${esc(songAuthor)}</div>`:""}
      </div>
      <div class="music-bars"><span></span><span></span><span></span></div>
    </div>
  `:""}
</article>`;
}

/* ─── Feed rendering ───────────────────────────── */
function sortPosts(){
  const all = [...state.posts].sort((a,b)=>new Date(b.created_at||b.inserted_at||0)-new Date(a.created_at||a.inserted_at||0));
  // Split: mutual first, then following, then rest
  const mutual=[], following=[], discover=[];
  all.forEach(p=>{
    const uid=p.user_id||p.profile_id;
    if(isMutual(uid)) mutual.push({post:p,badge:"Mutuo"});
    else if(iFollow(uid)) following.push({post:p,badge:"Segui"});
    else discover.push({post:p,badge:""});
  });
  // shuffle discover
  for(let i=discover.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[discover[i],discover[j]]=[discover[j],discover[i]];}
  state.followingPosts=[...mutual,...following];
  state.discoverPosts=discover;
}

function getNextBatch(){
  const result=[];
  const fi=state.renderedCount; // index into followingPosts for this batch
  // We interleave: first take from following, then fill up with discover
  const followChunk=state.followingPosts.slice(fi);
  result.push(...followChunk);
  // then discover - track separately
  const di=Math.max(0, state.renderedCount - state.followingPosts.length);
  const discoverChunk=state.discoverPosts.slice(di, di + BATCH);
  result.push(...discoverChunk);
  return result.slice(0, BATCH);
}

async function renderFeed(append=false){
  if(!append){
    els.feed.innerHTML="";
    state.renderedCount=0;
    sortPosts();
  }

  const combined=[...state.followingPosts,...state.discoverPosts];
  const batch=combined.slice(state.renderedCount, state.renderedCount+BATCH);

  if(!batch.length && !append){
    els.feed.innerHTML=`<div class="empty">Nessun post trovato.</div>`;
    els.loadMore.classList.add("hidden");
    return;
  }

  // Show labels
  if(!append){
    els.feedFollowing.style.display   = state.followingPosts.length?"flex":"none";
    els.feedDiscoverLabel.style.display= state.discoverPosts.length?"flex":"none";
  }

  const frag=document.createElement("div");
  frag.innerHTML=batch.map(item=>buildPostHtml(item.post||item, item.badge||"")).join("");

  const articles=[...frag.children];
  articles.forEach(c=>{
    c.style.animationDelay=`${articles.indexOf(c)*40}ms`;
    els.feed.appendChild(c);
  });

  state.renderedCount+=batch.length;
  if(state.renderedCount>=combined.length){ state.allLoaded=true; els.loadMore.classList.add("hidden"); }

  wireLazy();
  wireInteractions();
  wireSongCards();
  wireDoubleTap();
  wireCaptionToggles();
}

/* ─── Lazy images ──────────────────────────────── */
function wireLazy(){
  const imgs=[...document.querySelectorAll("img.lazy-media[data-src]")];
  const io=new IntersectionObserver((entries,obs)=>{
    entries.forEach(e=>{
      if(!e.isIntersecting)return;
      const img=e.target; img.src=img.dataset.src||""; img.removeAttribute("data-src"); obs.unobserve(img);
    });
  },{root:els.mainScroll,threshold:0.1,rootMargin:"200px 0px"});
  imgs.forEach(i=>io.observe(i));
}

/* ─── Caption expand ───────────────────────────── */
function wireCaptionToggles(){
  document.querySelectorAll(".caption").forEach(cap=>{
    // show toggle only if text overflows
    requestAnimationFrame(()=>{
      if(cap.scrollHeight > cap.clientHeight + 2){
        const togId="captog-"+cap.id.replace("cap-","");
        const tog=document.getElementById(togId);
        if(tog) tog.classList.add("visible");
      }
    });
  });
  document.querySelectorAll(".caption-toggle").forEach(tog=>{
    tog.addEventListener("click",()=>{
      const cap=document.getElementById("cap-"+tog.dataset.capId);
      if(!cap)return;
      const expanded=cap.classList.toggle("expanded");
      tog.textContent=expanded?"Mostra meno":"Leggi tutto";
    });
  });
}

/* ─── Like ─────────────────────────────────────── */
function showPulse(postId){
  const zone=document.querySelector(`[data-like-zone="${CSS.escape(postId)}"]`);
  const pulse=zone?.querySelector(".like-pop"); if(!pulse)return;
  pulse.classList.add("show"); setTimeout(()=>pulse.classList.remove("show"),220);
}
function refreshLikeUi(postId){
  const btn=document.querySelector(`[data-like-btn="${CSS.escape(postId)}"]`);
  const cnt=document.querySelector(`[data-like-count="${CSS.escape(postId)}"]`);
  if(!btn||!cnt)return;
  btn.classList.toggle("liked", likedByMe(postId)||(state.likeDeltas[postId]??0)>0);
  cnt.textContent=`${fmtN(likeCount(postId))} likes`;
}
async function persistLike(postId, wasLiked){
  if(!state.currentUserId)return;
  state.likeDeltas[postId]=(state.likeDeltas[postId]??0)+(wasLiked?-1:1);
  refreshLikeUi(postId);
  try{
    if(wasLiked) await apiSend("/likes","DELETE",{post_id:postId,user_id:state.currentUserId});
    else         await apiSend("/likes","POST",  {post_id:postId,user_id:state.currentUserId});
    state.likes=await fetchLikes();
    state.likeDeltas[postId]=0;
  }catch(e){
    state.likeDeltas[postId]=(state.likeDeltas[postId]??0)+(wasLiked?1:-1);
    console.error(e);
  }
  refreshLikeUi(postId);
}
function toggleLike(postId){
  const btn=document.querySelector(`[data-like-btn="${CSS.escape(postId)}"]`); if(!btn)return;
  showPulse(postId);
  persistLike(postId, btn.classList.contains("liked")).catch(console.error);
}

/* ─── Wire interactions ────────────────────────── */
function wireInteractions(){
  document.querySelectorAll("[data-profile-id]").forEach(n=>{
    n.addEventListener("click",()=>{ if(n.dataset.profileId) window.location.href=`profile.html?id=${encodeURIComponent(n.dataset.profileId)}`; });
  });
  document.querySelectorAll("[data-like-btn]").forEach(b=>{b.addEventListener("click",()=>toggleLike(b.dataset.likeBtn));});
  document.querySelectorAll("[data-like-count]").forEach(c=>{c.addEventListener("click",()=>openLikesModal(c.dataset.likeCount));});
}

function wireDoubleTap(){
  const lastTap=new Map();
  document.querySelectorAll("[data-like-zone]").forEach(zone=>{
    zone.addEventListener("dblclick",()=>toggleLike(zone.dataset.likeZone));
    let ts=0,last=null;
    zone.addEventListener("touchend",()=>{
      const id=zone.dataset.likeZone, now=Date.now();
      if(last===id&&now-ts<320){toggleLike(id);last=null;return;}
      ts=now; last=id;
    },{passive:true});
  });
}

/* ─── Audio ─────────────────────────────────────── */
function wireSongCards(){
  document.querySelectorAll("[data-song-play]").forEach(card=>{
    card.addEventListener("click",()=>{
      const id=card.dataset.songPlay, src=card.dataset.audio;
      if(!src)return;
      if(state.audioPostId===id){ state.audioPlaying?pauseAudio():resumeAudio(); return; }
      startAudio(id,src,card.dataset.songTitle,card.dataset.songArtist,card.dataset.songCover);
    });
  });
}

function startAudio(postId,src,title,artist,cover){
  if(state.audioPostId){
    document.querySelector(`[data-song-play="${CSS.escape(state.audioPostId)}"]`)?.classList.remove("playing");
  }
  state.audioPostId=postId; state.audioPlaying=true;
  els.globalAudio.src=src; els.globalAudio.volume=0.22;
  els.globalAudio.play().catch(()=>{});
  els.audioBarCover.src=cover||defAvatar();
  els.audioBarTitle.textContent=title||"Now playing";
  els.audioBarArtist.textContent=artist||"";
  els.audioBarIcon.textContent="pause";
  els.audioBar.classList.add("visible");
  document.querySelector(`[data-song-play="${CSS.escape(postId)}"]`)?.classList.add("playing");
}
function pauseAudio(){
  state.audioPlaying=false; els.globalAudio.pause();
  els.audioBarIcon.textContent="play_arrow";
  document.querySelector(`[data-song-play="${CSS.escape(state.audioPostId)}"]`)?.classList.remove("playing");
}
function resumeAudio(){
  state.audioPlaying=true; els.globalAudio.play().catch(()=>{});
  els.audioBarIcon.textContent="pause";
  document.querySelector(`[data-song-play="${CSS.escape(state.audioPostId)}"]`)?.classList.add("playing");
}
function stopAudio(){
  pauseAudio(); state.audioPostId=null; els.audioBar.classList.remove("visible"); els.globalAudio.src="";
}
els.audioBarToggle.addEventListener("click",()=>state.audioPlaying?pauseAudio():resumeAudio());
els.audioBarClose.addEventListener("click",stopAudio);

/* ─── Load more ────────────────────────────────── */
els.loadMore.addEventListener("click",async()=>{
  if(state.allLoaded)return;
  els.loadMore.innerHTML="<span>Caricamento…</span>";
  await renderFeed(true);
  els.loadMore.innerHTML=`<span class="material-symbols-rounded">add</span>Carica altri`;
});

/* ─── Likes modal ──────────────────────────────── */
function openLikesModal(postId){
  const items=state.likes.filter(l=>String(l.post_id??l.postId??l.postid)===String(postId)).map(l=>{
    const p=profileById(l.user_id);
    return{id:p?.id||l.user_id,name:p?.username||p?.full_name||"user",avatar:avatarForProfile(p),sub:p?.bio||"",verified:isVerified(p)};
  });
  els.likesList.innerHTML=items.length?items.map(x=>`
    <div class="list-item" data-open-profile="${esc(x.id)}">
      <img class="list-avatar" src="${x.avatar}" alt="">
      <div class="list-main">
        <div class="list-name"><span>${esc(x.name)}</span>${x.verified?`<span class="material-symbols-rounded verified" style="font-size:14px;font-variation-settings:'FILL' 1">verified</span>`:""}</div>
        <div class="list-sub">${esc(x.sub)}</div>
      </div>
    </div>`).join(""):`<div class="empty" style="margin:0">Nessun like ancora.</div>`;
  els.likesModal.classList.add("open");
  els.likesList.querySelectorAll("[data-open-profile]").forEach(item=>{
    item.addEventListener("click",()=>{ if(item.dataset.openProfile) window.location.href=`profile.html?id=${encodeURIComponent(item.dataset.openProfile)}`; });
  });
}
function closeLikesModal(){ els.likesModal.classList.remove("open"); }
els.closeLikesBtn.addEventListener("click",closeLikesModal);
els.likesModal.addEventListener("click",e=>{if(e.target===els.likesModal)closeLikesModal();});

/* ─── Search ───────────────────────────────────── */
function updateSuggestions(){
  const q=state.searchQuery.trim().toLowerCase();
  if(!q){els.suggestions.style.display="none";els.suggestions.innerHTML="";return;}
  const matches=state.profiles.filter(p=>{
    const u=String(p.username||p.full_name||"").toLowerCase();
    return u.includes(q)||String(p.bio||"").toLowerCase().includes(q);
  }).slice(0,8);
  if(!matches.length){els.suggestions.style.display="none";return;}
  els.suggestions.innerHTML=matches.map(p=>`
    <div class="suggestion" data-sid="${esc(p.id)}">
      <img class="suggestion-avatar" src="${avatarForProfile(p)}" alt="">
      <div class="suggestion-meta">
        <div class="suggestion-title"><span>${esc(p.username||p.full_name||"user")}</span>${isVerified(p)?`<span>✓</span>`:""}</div>
        <div class="suggestion-subtitle">${esc(p.bio||"Apri profilo")}</div>
      </div>
    </div>`).join("");
  els.suggestions.style.display="block";
  els.suggestions.querySelectorAll("[data-sid]").forEach(n=>{
    n.addEventListener("click",()=>window.location.href=`profile.html?id=${encodeURIComponent(n.dataset.sid)}`);
  });
}
els.search.addEventListener("input",()=>{state.searchQuery=els.search.value;updateSuggestions();});
els.search.addEventListener("focus",updateSuggestions);
document.addEventListener("click",e=>{if(!e.target.closest(".search-wrap"))els.suggestions.style.display="none";});

/* ─── Keyboard ─────────────────────────────────── */
window.addEventListener("keydown",e=>{
  if(els.momentViewer.classList.contains("open")){
    if(e.key==="Escape")closeMomentViewer();
    if(e.key==="ArrowLeft")advanceMoment(-1);
    if(e.key==="ArrowRight")advanceMoment(1);
  }
  if(els.likesModal.classList.contains("open")&&e.key==="Escape")closeLikesModal();
});
document.addEventListener("visibilitychange",()=>{
  if(document.hidden) stopMomentTimer();
  else if(els.momentViewer.classList.contains("open")) startMomentTimer();
});

/* ─── Bootstrap ────────────────────────────────── */
async function loadData(){
  renderSkeletons(4);
  try{
    const [rawPosts,rawProfiles,rawLikes,rawMoments]=await Promise.all([
      fetchPosts(), fetchProfiles(), fetchLikes(), fetchMoments()
    ]);
    state.profiles=rawProfiles;
    state.currentUserProfile=await fetchCurrentUser();
    state.currentUserId=state.currentUserProfile?.id||null;

    // fetch follows after we know current user
    state.follows=await fetchFollows().catch(()=>[]);

    state.posts=rawPosts;
    state.likes=rawLikes;
    state.moments=rawMoments;
    state.storyQueue=buildStoryQueue();

    renderCurrentUser();
    renderStories();
    renderMoments();
    await renderFeed(false);

    updateSuggestions();
  }catch(err){
    console.error(err);
    els.feed.innerHTML=`<div class="empty">Impossibile caricare i contenuti.</div>`;
    state.currentUserProfile=await fetchCurrentUser().catch(()=>null);
    renderCurrentUser();
  }
}

window.goUpload=()=>window.location.href="upload.html";
window.logout=()=>{
  ["shared_current_user_id","shared_current_username","shared_current_avatar"].forEach(k=>localStorage.removeItem(k));
  window.location.href="index.html";
};

loadData();
</script>
