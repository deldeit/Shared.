<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Shared.</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black:#000; --white:#fff; --surface:#111; --card-bg:#0d0d0d;
    --border:#1e1e1e; --muted:#555; --red:#e53935;
    --squircle:24px; --pill:999px;
    --skel:#1c1c1c; --skel-shine:#282828; --nav-h:56px;
  }
  html,body { background:var(--black); color:var(--white); font-family:'Archivo Black',sans-serif; min-height:100vh; overflow-x:hidden; -webkit-tap-highlight-color:transparent; }

  /* NAV */
  nav { position:fixed; top:0; left:0; right:0; height:var(--nav-h); background:var(--black); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:center; z-index:100; padding:0 12px; }
  .nav-logo { font-size:1.25rem; letter-spacing:-.5px; }
  .nav-menu-btn { position:absolute; left:12px; background:none; border:none; cursor:pointer; color:var(--white); display:flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:10px; }
  .nav-menu-btn:active { background:var(--border); }
  .nav-menu-btn .material-icons { font-size:24px; }

  /* SIDEBAR */
  .sidebar-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200; opacity:0; pointer-events:none; transition:opacity .22s; }
  .sidebar-overlay.open { opacity:1; pointer-events:all; }
  .sidebar { position:fixed; top:0; left:0; width:min(300px,85vw); height:100%; background:var(--surface); border-right:1px solid var(--border); z-index:201; display:flex; flex-direction:column; padding:52px 14px 32px; transform:translateX(-100%); transition:transform .26s cubic-bezier(.4,0,.2,1); overflow-y:auto; }
  .sidebar.open { transform:translateX(0); }
  .sidebar-close { position:absolute; top:10px; right:10px; background:none; border:none; color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; width:36px; height:36px; border-radius:8px; }
  .sidebar-close:active { background:var(--border); }

  /* sidebar profile — skeleton while loading */
  .sidebar-profile { display:flex; align-items:center; gap:11px; border:1.5px solid var(--border); border-radius:var(--pill); padding:10px 14px; color:var(--white); font-family:'Archivo Black',sans-serif; font-size:.88rem; text-decoration:none; margin-bottom:18px; min-height:56px; }
  .sidebar-profile:active { background:var(--border); }
  .sidebar-profile-avatar { width:34px; height:34px; border-radius:50%; object-fit:cover; flex-shrink:0; background:var(--skel); }
  .sidebar-profile-name { flex:1; }
  .sidebar-profile-name.loading { height:12px; border-radius:6px; background:var(--skel); width:60%; }

  .search-wrap { position:relative; margin-bottom:18px; }
  .sidebar-search { display:flex; align-items:center; gap:8px; background:var(--black); border:1.5px solid var(--border); border-radius:var(--pill); padding:9px 14px; transition:border-color .15s; }
  .sidebar-search.focused { border-color:#444; }
  .sidebar-search .material-icons { color:var(--muted); font-size:17px; flex-shrink:0; }
  .sidebar-search input { background:none; border:none; outline:none; color:var(--white); font-family:'Archivo Black',sans-serif; font-size:.83rem; width:100%; min-width:0; }
  .sidebar-search input::placeholder { color:var(--muted); }
  .search-dropdown { position:absolute; top:calc(100% + 6px); left:0; right:0; background:#161616; border:1px solid var(--border); border-radius:16px; z-index:10; max-height:220px; overflow-y:auto; display:none; }
  .search-dropdown.open { display:block; }
  .search-result { display:flex; align-items:center; gap:10px; padding:10px 14px; cursor:pointer; }
  .search-result:active { background:var(--border); }
  .search-result img { width:32px; height:32px; border-radius:50%; object-fit:cover; flex-shrink:0; background:var(--skel); }
  .search-result-name { font-size:.82rem; }
  .search-result-handle { font-size:.7rem; color:var(--muted); margin-top:1px; }
  .search-empty { padding:14px; font-size:.78rem; color:var(--muted); text-align:center; }

  .sidebar-spacer { flex:1; min-height:20px; }
  .sidebar-nav { display:flex; flex-direction:column; gap:6px; }
  .sidebar-btn { display:flex; align-items:center; gap:12px; background:none; border:1.5px solid var(--border); border-radius:var(--pill); padding:12px 16px; color:var(--white); font-family:'Archivo Black',sans-serif; font-size:.88rem; cursor:pointer; width:100%; text-decoration:none; }
  .sidebar-btn:active { background:var(--border); }
  .sidebar-btn .material-icons { font-size:20px; }
  .sidebar-btn.logout { color:var(--red); border-color:#3a1212; }
  .sidebar-btn.logout:active { background:#1a0808; }
  .sidebar-btn.logout .material-icons { color:var(--red); }

  /* FEED */
  .feed { max-width:540px; margin:0 auto; padding:calc(var(--nav-h) + 16px) 12px 48px; display:flex; flex-direction:column; gap:16px; }

  /* UPLOAD CARD */
  .upload-card { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--squircle); overflow:visible; padding:18px 16px 20px; display:flex; flex-direction:column; gap:14px; }
  .upload-card-title { font-size:.82rem; color:var(--muted); display:flex; align-items:center; gap:6px; }
  .upload-card-title .material-icons { font-size:15px; }
  .drop-zone { border:1.5px dashed var(--border); border-radius:16px; aspect-ratio:1/1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; cursor:pointer; transition:border-color .18s,background .18s; position:relative; overflow:hidden; background:#0a0a0a; }
  .drop-zone:hover,.drop-zone.drag-over { border-color:#555; background:#111; }
  .drop-zone.has-image { border-style:solid; border-color:var(--border); }
  .drop-zone-icon { color:var(--muted); }
  .drop-zone-icon .material-icons { font-size:36px; }
  .drop-zone-label { font-size:.78rem; color:var(--muted); text-align:center; line-height:1.5; }
  .drop-zone-sub { font-size:.68rem; color:#3a3a3a; }
  .drop-zone-btn { background:var(--white); color:var(--black); border:none; border-radius:var(--pill); padding:8px 18px; font-family:'Archivo Black',sans-serif; font-size:.76rem; cursor:pointer; display:flex; align-items:center; gap:5px; margin-top:4px; }
  .drop-zone-btn .material-icons { font-size:15px; }
  .drop-zone input[type=file] { display:none; }
  .drop-preview { position:absolute; inset:0; object-fit:cover; width:100%; height:100%; display:none; }
  .drop-preview.visible { display:block; }
  .drop-clear { position:absolute; top:8px; right:8px; background:rgba(0,0,0,.7); border:none; border-radius:50%; width:28px; height:28px; display:none; align-items:center; justify-content:center; cursor:pointer; color:var(--white); }
  .drop-clear.visible { display:flex; }
  .drop-clear .material-icons { font-size:15px; }

  .upload-field { display:flex; flex-direction:column; gap:6px; position:relative; }
  .upload-field-label { font-size:.7rem; color:var(--muted); display:flex; align-items:center; gap:5px; }
  .upload-field-label .material-icons { font-size:13px; }
  .upload-input-wrap { display:flex; align-items:center; gap:8px; background:var(--black); border:1.5px solid var(--border); border-radius:14px; padding:10px 13px; transition:border-color .15s; }
  .upload-input-wrap:focus-within { border-color:#444; }
  .upload-input-wrap .material-icons { color:var(--muted); font-size:16px; flex-shrink:0; }
  .upload-input-wrap textarea, .upload-input-wrap input { background:none; border:none; outline:none; color:var(--white); font-family:'Archivo Black',sans-serif; font-size:.82rem; width:100%; min-width:0; resize:none; }
  .upload-input-wrap textarea { min-height:60px; line-height:1.5; }
  .upload-input-wrap textarea::placeholder, .upload-input-wrap input::placeholder { color:#333; }
  .ac-dropdown { position:absolute; top:calc(100% + 4px); left:0; right:0; background:#161616; border:1px solid var(--border); border-radius:14px; z-index:50; max-height:180px; overflow-y:auto; display:none; }
  .ac-dropdown.open { display:block; }
  .ac-item { display:flex; align-items:center; gap:10px; padding:9px 13px; cursor:pointer; font-size:.8rem; }
  .ac-item:active { background:var(--border); }
  .ac-item .material-icons { font-size:15px; color:var(--muted); flex-shrink:0; }
  .ac-item-sub { font-size:.68rem; color:var(--muted); margin-top:1px; }
  .song-pill { display:none; align-items:center; gap:9px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:7px 10px; margin-top:2px; }
  .song-pill.visible { display:flex; }
  .song-pill img { width:34px; height:34px; border-radius:7px; object-fit:cover; flex-shrink:0; background:#222; }
  .song-pill-info { flex:1; min-width:0; }
  .song-pill-title { font-size:.78rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .song-pill-artist { font-size:.68rem; color:var(--muted); margin-top:1px; }
  .song-pill-clear { background:none; border:none; color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; width:24px; height:24px; flex-shrink:0; }
  .song-pill-clear .material-icons { font-size:16px; }
  .upload-submit { background:var(--white); color:var(--black); border:none; border-radius:var(--pill); padding:12px; font-family:'Archivo Black',sans-serif; font-size:.88rem; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px; width:100%; transition:opacity .15s; }
  .upload-submit:disabled { opacity:.4; cursor:not-allowed; }
  .upload-submit .material-icons { font-size:18px; }

  /* SKELETON */
  @keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
  .skel { background:linear-gradient(90deg,var(--skel) 25%,var(--skel-shine) 50%,var(--skel) 75%); background-size:400px 100%; animation:shimmer 1.3s infinite linear; border-radius:6px; }
  .skel-card { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--squircle); overflow:hidden; padding-bottom:14px; }
  .skel-header { display:flex; align-items:center; gap:10px; padding:13px 14px 11px; }
  .skel-avatar { width:36px; height:36px; border-radius:50%; flex-shrink:0; }
  .skel-meta { flex:1; display:flex; flex-direction:column; gap:6px; }
  .skel-line { height:10px; }
  .skel-line.s{width:38%} .skel-line.m{width:62%} .skel-line.l{width:88%} .skel-line.f{width:100%}
  .skel-image { width:100%; aspect-ratio:1/1; border-radius:0; }
  .skel-body { padding:12px 14px 0; display:flex; flex-direction:column; gap:9px; }
  .skel-song { display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:8px 10px; margin-top:2px; }
  .skel-song-cover { width:38px; height:38px; border-radius:7px; flex-shrink:0; }
  .skel-song-info { flex:1; display:flex; flex-direction:column; gap:6px; }
  .skel-actions { display:flex; gap:8px; margin-top:2px; }
  .skel-btn { height:32px; border-radius:var(--pill); }
  .skel-btn.w1{width:74px} .skel-btn.w2{width:94px}

  /* POST */
  .post { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--squircle); overflow:hidden; opacity:0; transform:translateY(6px); transition:opacity .3s ease,transform .3s ease; }
  .post.visible { opacity:1; transform:translateY(0); }
  .post-header { display:flex; align-items:center; gap:10px; padding:13px 14px 10px; }
  .post-avatar { width:36px; height:36px; border-radius:50%; object-fit:cover; background:var(--skel); flex-shrink:0; display:block; }
  .post-meta { flex:1; min-width:0; }
  .post-username { font-size:.83rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--white); text-decoration:none; display:block; }
  .post-username:hover { text-decoration:underline; }
  .post-date { font-size:.7rem; color:var(--muted); margin-top:1px; }
  .post-image { width:100%; aspect-ratio:1/1; object-fit:cover; background:var(--skel); display:block; }
  .post-body { padding:12px 14px 14px; }
  .post-location { display:flex; align-items:center; gap:3px; font-size:.7rem; color:var(--muted); margin-bottom:7px; }
  .post-location .material-icons { font-size:12px; }
  .post-caption { font-size:.8rem; line-height:1.55; margin-bottom:12px; color:#ccc; }
  .post-song { display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:8px 10px; margin-bottom:12px; }
  .song-cover { width:38px; height:38px; border-radius:7px; background:var(--skel); object-fit:cover; flex-shrink:0; }
  .song-info { flex:1; min-width:0; }
  .song-title { font-size:.78rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .song-artist { font-size:.68rem; color:var(--muted); margin-top:2px; }
  .song-icon .material-icons { font-size:17px; color:var(--muted); }
  .post-actions { display:flex; gap:8px; }
  .action-btn { display:flex; align-items:center; gap:5px; background:var(--white); color:var(--black); border:none; border-radius:var(--pill); padding:8px 14px; font-family:'Archivo Black',sans-serif; font-size:.76rem; cursor:pointer; touch-action:manipulation; transition:opacity .15s; }
  .action-btn:active { opacity:.75; }
  .action-btn.liked { background:#222; color:var(--white); }
  .action-btn .material-icons { font-size:15px; }
  .like-count-link { cursor:pointer; text-decoration:underline; text-underline-offset:2px; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:300; display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity .2s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal-sheet { background:var(--surface); border:1px solid var(--border); border-radius:22px 22px 0 0; width:100%; max-width:540px; max-height:72vh; display:flex; flex-direction:column; transform:translateY(30px); transition:transform .24s cubic-bezier(.4,0,.2,1); }
  .modal-overlay.open .modal-sheet { transform:translateY(0); }
  .modal-handle { width:34px; height:4px; background:var(--border); border-radius:2px; margin:10px auto 0; flex-shrink:0; }
  .modal-header { display:flex; align-items:center; gap:8px; padding:12px 18px 10px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .modal-header .material-icons { font-size:18px; color:var(--muted); }
  .modal-title { font-size:.88rem; flex:1; }
  .modal-body { overflow-y:auto; padding:6px 0 8px; -webkit-overflow-scrolling:touch; flex:1; }
  .modal-row { display:flex; align-items:flex-start; gap:11px; padding:10px 18px; }
  .modal-avatar { width:34px; height:34px; border-radius:50%; background:var(--skel); object-fit:cover; flex-shrink:0; }
  .modal-user { font-size:.8rem; }
  .modal-time { font-size:.68rem; color:var(--muted); }
  .modal-comment-text { font-size:.78rem; color:#ccc; margin-top:2px; line-height:1.4; }
  .modal-empty { padding:20px 18px; font-size:.78rem; color:var(--muted); display:flex; align-items:center; gap:8px; }
  .modal-empty .material-icons { font-size:16px; }

  /* LIKES LIST ROW */
  .likes-user-row { display:flex; align-items:center; gap:11px; padding:10px 18px; }
  .likes-user-row img { width:36px; height:36px; border-radius:50%; object-fit:cover; flex-shrink:0; background:var(--skel); }
  .likes-user-name { font-size:.82rem; }
  .likes-user-handle { font-size:.7rem; color:var(--muted); margin-top:1px; }

  /* COMMENT INPUT */
  .comment-input-bar { display:flex; align-items:center; gap:10px; padding:10px 14px 14px; border-top:1px solid var(--border); flex-shrink:0; }
  .comment-bar-avatar { width:30px; height:30px; border-radius:50%; object-fit:cover; flex-shrink:0; background:var(--skel); }
  .comment-input-wrap { flex:1; display:flex; align-items:center; gap:8px; background:var(--black); border:1.5px solid var(--border); border-radius:var(--pill); padding:8px 12px; transition:border-color .15s; }
  .comment-input-wrap:focus-within { border-color:#444; }
  .comment-input-wrap input { flex:1; background:none; border:none; outline:none; color:var(--white); font-family:'Archivo Black',sans-serif; font-size:.8rem; min-width:0; }
  .comment-input-wrap input::placeholder { color:#333; }
  .comment-send-btn { background:none; border:none; cursor:pointer; color:var(--muted); display:flex; align-items:center; padding:0; flex-shrink:0; transition:color .15s; }
  .comment-send-btn.active { color:var(--white); }
  .comment-send-btn .material-icons { font-size:20px; }

  /* TOAST */
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:#1a1a1a; border:1px solid var(--border); border-radius:var(--pill); padding:10px 20px; font-size:.78rem; color:var(--white); opacity:0; transition:opacity .2s,transform .2s; pointer-events:none; z-index:999; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ERROR BANNER */
  .error-banner { background:#1a0808; border:1px solid #3a1212; border-radius:14px; padding:14px 16px; font-size:.78rem; color:#ff6b6b; display:flex; align-items:center; gap:10px; }
  .error-banner .material-icons { font-size:18px; flex-shrink:0; }
  .error-banner strong { display:block; margin-bottom:2px; }

  /* EMPTY FEED */
  .feed-empty { padding:40px 16px; text-align:center; color:var(--muted); font-size:.82rem; display:flex; flex-direction:column; align-items:center; gap:10px; }
  .feed-empty .material-icons { font-size:36px; }

  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .comment-input-bar { padding-bottom:calc(14px + env(safe-area-inset-bottom)); }
    .feed { padding-bottom:calc(48px + env(safe-area-inset-bottom)); }
  }

  @keyframes spin { to { transform:rotate(360deg) } }
</style>
</head>
<body>

<nav>
  <button class="nav-menu-btn" onclick="toggleSidebar()">
    <span class="material-icons">menu</span>
  </button>
  <span class="nav-logo">Shared.</span>
</nav>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <button class="sidebar-close" onclick="toggleSidebar()">
    <span class="material-icons">close</span>
  </button>
  <!-- populated by JS after resolveMe() -->
  <div class="sidebar-profile" id="sidebarProfile">
    <div class="sidebar-profile-avatar skel" id="sidebarAvatar"></div>
    <div class="sidebar-profile-name loading skel" id="sidebarName"></div>
  </div>
  <div class="search-wrap">
    <div class="sidebar-search" id="searchBox">
      <span class="material-icons">search</span>
      <input type="text" id="searchInput" placeholder="Search users…" autocomplete="off"
             oninput="handleSearch(this.value)" onfocus="onSearchFocus()" onblur="onSearchBlur()">
    </div>
    <div class="search-dropdown" id="searchDropdown"></div>
  </div>
  <div class="sidebar-spacer"></div>
  <div class="sidebar-nav">
    <button class="sidebar-btn logout" onclick="handleLogout()">
      <span class="material-icons">logout</span> Logout
    </button>
  </div>
</aside>

<main class="feed" id="feed"></main>

<!-- MODAL LIKES -->
<div class="modal-overlay" id="modalLikes" onclick="closeModal('modalLikes')">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="material-icons">bolt</span>
      <span class="modal-title" id="likesTitle">Likes</span>
    </div>
    <div class="modal-body" id="modalLikesBody"></div>
  </div>
</div>

<!-- MODAL COMMENTS -->
<div class="modal-overlay" id="modalComments" onclick="closeModal('modalComments')">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="material-icons">chat_bubble_outline</span>
      <span class="modal-title" id="commentsTitle">Comments</span>
    </div>
    <div class="modal-body" id="modalCommentsBody"></div>
    <div class="comment-input-bar">
      <div class="comment-bar-avatar skel" id="commentBarAvatar"></div>
      <div class="comment-input-wrap">
        <input type="text" id="commentInput" placeholder="Add a comment…"
               oninput="onCommentInput()" onkeydown="if(event.key==='Enter')submitComment()">
        <button class="comment-send-btn" id="commentSendBtn" onclick="submitComment()">
          <span class="material-icons">send</span>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════════════ */
const API_BASE = 'https://api.sharedweb.org';

// Current user — populated entirely from the API. No hardcoded values.
let ME = null;

/* ══════════════════════════════════════════════════════
   API HELPER
══════════════════════════════════════════════════════ */
async function apiFetch(path, opts = {}) {
  const isFormData = opts.body instanceof FormData;
  const headers = {
    'Accept': 'application/json',
    ...(isFormData ? {} : { 'Content-Type': 'application/json' }),
    ...opts.headers,
  };
  const res = await fetch(API_BASE + path, {
    mode: 'cors',
    credentials: 'omit',
    ...opts,
    headers,
  });
  if (!res.ok) {
    let msg = res.statusText;
    try { const j = await res.json(); msg = j.detail || msg; } catch(_) {}
    throw new Error(msg);
  }
  if (res.status === 204) return null;
  return res.json();
}

/* ══════════════════════════════════════════════════════
   AVATAR RESOLUTION — no external placeholder services
══════════════════════════════════════════════════════ */
// Generates a simple SVG-based initials avatar as a data URL
function initialsAvatar(name, username) {
  const label = name
    ? name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase()
    : (username || '?')[0].toUpperCase();
  // deterministic hue from username
  let h = 0;
  const s = username || name || '';
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) & 0xffff;
  const hue = h % 360;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80">
    <rect width="80" height="80" fill="hsl(${hue},40%,20%)"/>
    <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle"
      fill="hsl(${hue},60%,80%)" font-family="sans-serif" font-size="28" font-weight="bold">${label}</text>
  </svg>`;
  return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
}

function resolvedAvatar(user) {
  if (!user) return initialsAvatar('', 'unknown');
  if (user.avatar_url) {
    return user.avatar_url.startsWith('http')
      ? user.avatar_url
      : API_BASE + user.avatar_url;
  }
  return initialsAvatar(user.name, user.username);
}

// Attach onerror fallback to an <img> element
function withFallback(img, user) {
  img.onerror = () => {
    img.src = initialsAvatar(user.name, user.username);
    img.onerror = null;
  };
}

/* ══════════════════════════════════════════════════════
   RESOLVE CURRENT USER — from API only
   Uses first user from /users if no session concept exists
══════════════════════════════════════════════════════ */
async function resolveMe() {
  // Try to get the "me" user. The API uses user_id='me' as convention.
  // Attempt to load it; fall back to first user in the list.
  let user = null;
  try {
    user = await apiFetch('/users/me');
  } catch(_) {}

  if (!user) {
    try {
      const list = await apiFetch('/users?q=');
      if (list && list.length) user = list[0];
    } catch(_) {}
  }

  if (!user) {
    // API completely unreachable — show error state in sidebar
    document.getElementById('sidebarName').textContent = 'Not connected';
    document.getElementById('sidebarName').classList.remove('loading', 'skel');
    return;
  }

  ME = user;

  // Sidebar profile
  const av = resolvedAvatar(ME);
  const avatarEl = document.getElementById('sidebarAvatar');
  avatarEl.classList.remove('skel');
  avatarEl.outerHTML = `<img class="sidebar-profile-avatar" id="sidebarAvatar" src="${av}" alt="${ME.name}">`;
  withFallback(document.getElementById('sidebarAvatar'), ME);

  const nameEl = document.getElementById('sidebarName');
  nameEl.classList.remove('loading', 'skel');
  nameEl.textContent = `@${ME.username}`;

  // Comment bar avatar
  const cba = document.getElementById('commentBarAvatar');
  cba.classList.remove('skel');
  cba.outerHTML = `<img class="comment-bar-avatar" id="commentBarAvatar" src="${av}" alt="${ME.username}">`;
  withFallback(document.getElementById('commentBarAvatar'), ME);
}

   SIDEBAR SEARCH  →  GET /users?q=
══════════════════════════════════════════════════════ */
let searchTimer = null, searchBlurTimer = null;

function handleSearch(q) {
  clearTimeout(searchTimer);
  const dd = document.getElementById('searchDropdown');
  if (!q.trim()) { dd.innerHTML = ''; dd.classList.remove('open'); return; }
  searchTimer = setTimeout(async () => {
    try {
      const users = await apiFetch(`/users?q=${encodeURIComponent(q.trim())}`);
      if (!users.length) {
        dd.innerHTML = `<div class="search-empty">No users found</div>`;
      } else {
        dd.innerHTML = users.map(u => {
          const av = resolvedAvatar(u);
          return `<div class="search-result" onmousedown="location.href='user.html?u=${encodeURIComponent(u.username)}'">
            <img src="${av}" alt="${u.name}" onerror="this.src='${initialsAvatar(u.name, u.username)}'">
            <div>
              <div class="search-result-name">${u.name}</div>
              <div class="search-result-handle">@${u.username}</div>
            </div>
          </div>`;
        }).join('');
      }
      dd.classList.add('open');
    } catch(e) {
      dd.innerHTML = `<div class="search-empty">Search unavailable</div>`;
      dd.classList.add('open');
    }
  }, 250);
}
function onSearchFocus() { clearTimeout(searchBlurTimer); document.getElementById('searchBox').classList.add('focused'); }
function onSearchBlur()  {
  searchBlurTimer = setTimeout(() => {
    document.getElementById('searchDropdown').classList.remove('open');
    document.getElementById('searchBox').classList.remove('focused');
  }, 180);
}

/* Drop zone */
let uploadFile = null;
function onDragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('drag-over'); }
function onDragLeave()  { document.getElementById('dropZone').classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadImageFile(f);
}
function onFileChange(e) { const f = e.target.files[0]; if (f) loadImageFile(f); }
function loadImageFile(file) {
  uploadFile = file;
  const r = new FileReader();
  r.onload = ev => {
    document.getElementById('dropPreview').src = ev.target.result;
    document.getElementById('dropPreview').classList.add('visible');
    document.getElementById('dropClear').classList.add('visible');
    ['dropIcon','dropLabel','dropBtn'].forEach(id => document.getElementById(id).style.display='none');
    document.getElementById('dropZone').classList.add('has-image');
  };
  r.readAsDataURL(file);
}
function clearImage(e) {
  e && e.stopPropagation();
  uploadFile = null;
  document.getElementById('dropPreview').classList.remove('visible');
  document.getElementById('dropPreview').src = '';
  document.getElementById('dropClear').classList.remove('visible');
  ['dropIcon','dropLabel','dropBtn'].forEach(id => document.getElementById(id).style.display='');
  document.getElementById('dropZone').classList.remove('has-image');
  document.getElementById('fileInput').value = '';
}

/* Location autocomplete */

function handleLocation(q) {
  const dd = document.getElementById('locDropdown'), v = q.trim().toLowerCase();

  const res = CITIES.filter(c => c.toLowerCase().includes(v)).slice(0, 7);

      <span class="material-icons">location_on</span><div>${c}</div>

}
function onLocFocus() { clearTimeout(locBlurTimer); const v = document.getElementById('locationInput').value.trim(); if (v) handleLocation(v); }
function onLocBlur()  { locBlurTimer = setTimeout(() => document.getElementById('locDropdown').classList.remove('open'), 180); }
function selectCity(c) { document.getElementById('locationInput').value = c; document.getElementById('locDropdown').classList.remove('open'); }

/* Song autocomplete */
let songBlurTimer = null, selectedSong = null;
function handleSong(q) {
  const dd = document.getElementById('songDropdown'), v = q.trim().toLowerCase();
  if (!v) { dd.classList.remove('open'); return; }
  const res = SONGS.filter(s => s.title.toLowerCase().includes(v) || s.artist.toLowerCase().includes(v)).slice(0, 6);

/* Submit → POST /posts */
async function handleSubmit() {
  if (!ME) { showToast('Not logged in.'); return; }
  if (!uploadFile) { showToast('Select a photo first.'); return; }

  const btn = document.getElementById('uploadSubmit');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-icons" style="animation:spin 1s linear infinite;display:inline-block">refresh</span> Publishing…';

  const fd = new FormData();
  fd.append('user_id',     ME.id);
  fd.append('caption',     document.getElementById('captionInput').value.trim());
  fd.append('location',    document.getElementById('locationInput').value.trim());
  fd.append('song_title',  selectedSong?.title  || '');
  fd.append('song_artist', selectedSong?.artist || '');
  fd.append('song_cover',  '');
  fd.append('image', uploadFile, uploadFile.name);

  try {
    const post = await apiFetch('/posts', { method: 'POST', body: fd });
    clearImage();
    document.getElementById('captionInput').value = '';
    document.getElementById('locationInput').value = '';
    clearSong();
    const feed = document.getElementById('feed');
    const uploadCard = feed.firstElementChild;
    const el = buildPostEl(post);
    el.classList.add('visible');
    feed.insertBefore(el, uploadCard.nextSibling);
    // Remove empty-feed message if present
    const empty = feed.querySelector('.feed-empty');
    if (empty) empty.remove();
    showToast('Post published.');
  } catch(e) {
    showToast('Failed to publish: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span class="material-icons">send</span> Publish';
  }
}

/* ══════════════════════════════════════════════════════
   POST ELEMENT
══════════════════════════════════════════════════════ */
function resolvedImageUrl(url) {
  if (!url) return null;
  return url.startsWith('http') ? url : API_BASE + url;
}

function buildPostEl(p) {
  const el = document.createElement('article');
  el.className = 'post';
  el.dataset.postId = p.id;

  const imageUrl  = resolvedImageUrl(p.image_url);
  const avatarUrl = resolvedAvatar(p.user);
  const coverUrl  = p.song_cover ? resolvedImageUrl(p.song_cover) : null;

  // Image tag — if no URL at all, show nothing (shouldn't happen per API spec)
  const imgTag = imageUrl
    ? `<img class="post-image" src="${imageUrl}" alt="post" loading="lazy"
         onerror="this.style.background='#1a1a1a';this.removeAttribute('src')">`
    : `<div class="post-image" style="background:#0a0a0a;display:flex;align-items:center;justify-content:center">
         <span class="material-icons" style="color:#333;font-size:36px">broken_image</span>
       </div>`;

  // Song block — no cover image if none, just music icon
  const songBlock = p.song_title ? `
    <div class="post-song">
      ${coverUrl
        ? `<img class="song-cover" src="${coverUrl}" alt="album" onerror="this.style.display='none'">`
        : `<span class="material-icons" style="color:var(--muted);font-size:24px;flex-shrink:0">album</span>`}
      <div class="song-info">
        <div class="song-title">${p.song_title}</div>
        ${p.song_artist ? `<div class="song-artist">${p.song_artist}</div>` : ''}
      </div>
      <div class="song-icon"><span class="material-icons">music_note</span></div>
    </div>` : '';

  el.innerHTML = `
    <div class="post-header">
      <img class="post-avatar" id="av-${p.id}" src="${avatarUrl}" alt="${p.user.username}">
      <div class="post-meta">
        <span class="post-username">@${p.user.username}</span>
        <div class="post-date">${p.time_human}</div>
      </div>
    </div>
    ${imgTag}
    <div class="post-body">
      ${p.location ? `<div class="post-location"><span class="material-icons">location_on</span>${p.location}</div>` : ''}
      ${p.caption  ? `<div class="post-caption">${p.caption}</div>` : ''}
      ${songBlock}
      <div class="post-actions">
        <button class="action-btn ${p.liked_by_me ? 'liked' : ''}" id="like-btn-${p.id}" onclick="toggleLike('${p.id}')">
          <span class="material-icons">bolt</span>
          <span class="like-count-link" id="like-count-${p.id}"
                onclick="event.stopPropagation();openLikes('${p.id}',${p.like_count})">${p.like_count}</span>
        </button>
        <button class="action-btn" onclick="openComments('${p.id}')">
          <span class="material-icons">chat_bubble_outline</span>
          <span id="ccount-${p.id}">${p.comment_count}</span>
        </button>
      </div>
    </div>`;

  // Attach avatar fallback after element exists
  setTimeout(() => {
    const avEl = document.getElementById(`av-${p.id}`);
    if (avEl) withFallback(avEl, p.user);
  }, 0);

  return el;
}

/* ══════════════════════════════════════════════════════
   FEED  →  GET /feed
══════════════════════════════════════════════════════ */
function buildSkeleton() {
  const el = document.createElement('div');
  el.className = 'skel-card';
  el.innerHTML = `
    <div class="skel-header">
      <div class="skel skel-avatar"></div>
      <div class="skel-meta"><div class="skel skel-line m"></div><div class="skel skel-line s"></div></div>
    </div>
    <div class="skel skel-image"></div>
    <div class="skel-body">
      <div class="skel skel-line s"></div>
      <div class="skel skel-line l"></div>
      <div class="skel skel-line f"></div>
      <div class="skel skel-line m"></div>
      <div class="skel-song">
        <div class="skel skel-song-cover"></div>
        <div class="skel-song-info"><div class="skel skel-line m"></div><div class="skel skel-line s"></div></div>
      </div>
      <div class="skel-actions"><div class="skel skel-btn w1"></div><div class="skel skel-btn w2"></div></div>
    </div>`;
  return el;
}

async function buildFeed() {
  const feed = document.getElementById('feed');
  feed.appendChild(buildUploadCard());
  const skels = Array.from({length: 4}, () => { const s = buildSkeleton(); feed.appendChild(s); return s; });

  let posts = [];
  let error = null;
  try {
    const viewerId = ME ? encodeURIComponent(ME.id) : 'me';
    posts = await apiFetch(`/feed?viewer=${viewerId}&limit=20`);
  } catch(e) {
    error = e.message;
  }

  skels.forEach(s => s.remove());

  if (error) {
    const banner = document.createElement('div');
    banner.className = 'error-banner';
    banner.innerHTML = `<span class="material-icons">wifi_off</span>
      <div><strong>Can't reach the server</strong>${error}</div>`;
    feed.appendChild(banner);
    return;
  }

  if (!posts.length) {
    const empty = document.createElement('div');
    empty.className = 'feed-empty';
    empty.innerHTML = `<span class="material-icons">photo_camera</span>No posts yet. Be the first to share something.`;
    feed.appendChild(empty);
    return;
  }

  posts.forEach((p, i) => {
    const el = buildPostEl(p);
    feed.appendChild(el);
    setTimeout(() => el.classList.add('visible'), 60 + i * 90);
  });
}

/* ══════════════════════════════════════════════════════
   LIKES  →  POST/DELETE /posts/:id/likes
══════════════════════════════════════════════════════ */
async function toggleLike(postId) {
  if (!ME) { showToast('Log in to like posts.'); return; }
  const btn   = document.getElementById(`like-btn-${postId}`);
  const count = document.getElementById(`like-count-${postId}`);
  const liked = btn.classList.contains('liked');
  const prev  = parseInt(count.textContent) || 0;

  // Optimistic
  btn.classList.toggle('liked', !liked);
  count.textContent = liked ? Math.max(0, prev - 1) : prev + 1;

  try {
    const res = liked
      ? await apiFetch(`/posts/${postId}/likes?user_id=${encodeURIComponent(ME.id)}`, { method: 'DELETE' })
      : await apiFetch(`/posts/${postId}/likes?user_id=${encodeURIComponent(ME.id)}`, { method: 'POST' });
    if (res && typeof res.like_count === 'number') count.textContent = res.like_count;
  } catch(e) {
    // Revert
    btn.classList.toggle('liked', liked);
    count.textContent = prev;
    showToast(e.message);
  }
}

/* ══════════════════════════════════════════════════════
   LIKES MODAL  →  GET /posts/:id/likes
══════════════════════════════════════════════════════ */
async function openLikes(postId, knownCount) {
  const body  = document.getElementById('modalLikesBody');
  const title = document.getElementById('likesTitle');
  title.textContent = knownCount > 0 ? `Likes (${knownCount})` : 'Likes';
  body.innerHTML = `<div class="modal-empty"><span class="material-icons">hourglass_empty</span>Loading…</div>`;
  document.getElementById('modalLikes').classList.add('open');

  try {
    const likes = await apiFetch(`/posts/${postId}/likes`);
    title.textContent = `Likes (${likes.length})`;
    if (!likes.length) {
      body.innerHTML = `<div class="modal-empty"><span class="material-icons">bolt</span>No likes yet.</div>`;
      return;
    }
    body.innerHTML = likes.map(u => {
      const av = resolvedAvatar(u);
      return `<div class="likes-user-row">
        <img src="${av}" alt="${u.name}" onerror="this.src='${initialsAvatar(u.name, u.username)}'">
        <div>
          <div class="likes-user-name">${u.name}</div>
          <div class="likes-user-handle">@${u.username}</div>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    body.innerHTML = `<div class="modal-empty"><span class="material-icons">wifi_off</span>Couldn't load likes.</div>`;
  }
}

/* ══════════════════════════════════════════════════════
   COMMENTS  →  GET/POST /posts/:id/comments
══════════════════════════════════════════════════════ */
let activePostId = null;

async function openComments(postId) {
  activePostId = postId;
  document.getElementById('commentInput').value = '';
  document.getElementById('commentSendBtn').classList.remove('active');
  document.getElementById('modalCommentsBody').innerHTML =
    `<div class="modal-empty"><span class="material-icons">hourglass_empty</span>Loading…</div>`;
  document.getElementById('commentsTitle').textContent = 'Comments';
  document.getElementById('modalComments').classList.add('open');

  try {
    const comments = await apiFetch(`/posts/${postId}/comments`);
    renderComments(comments);
    document.getElementById('commentsTitle').textContent = `Comments (${comments.length})`;
  } catch(e) {
    document.getElementById('modalCommentsBody').innerHTML =
      `<div class="modal-empty"><span class="material-icons">wifi_off</span>Couldn't load comments.</div>`;
  }
  setTimeout(() => document.getElementById('commentInput').focus(), 300);
}

function renderComments(comments) {
  const body = document.getElementById('modalCommentsBody');
  if (!comments.length) {
    body.innerHTML = `<div class="modal-empty"><span class="material-icons">chat_bubble_outline</span>No comments yet.</div>`;
    return;
  }
  body.innerHTML = comments.map(c => {
    const av = resolvedAvatar(c.user);
    return `<div class="modal-row">
      <img class="modal-avatar" src="${av}" alt="${c.user.username}"
           onerror="this.src='${initialsAvatar(c.user.name, c.user.username)}'">
      <div>
        <div class="modal-user">
          <span>@${c.user.username}</span>
          <span class="modal-time"> · ${c.time_human}</span>
        </div>
        <div class="modal-comment-text">${c.text}</div>
      </div>
    </div>`;
  }).join('');
}

function onCommentInput() {
  const v = document.getElementById('commentInput').value.trim();
  document.getElementById('commentSendBtn').classList.toggle('active', v.length > 0);
}

async function submitComment() {
  if (!ME) { showToast('Log in to comment.'); return; }
  const input = document.getElementById('commentInput');
  const text  = input.value.trim();
  if (!text || !activePostId) return;
  input.value = '';
  document.getElementById('commentSendBtn').classList.remove('active');

  try {
    const c = await apiFetch(`/posts/${activePostId}/comments`, {
      method: 'POST',
      body: JSON.stringify({ user_id: ME.id, text }),
    });
    const body = document.getElementById('modalCommentsBody');
    if (body.querySelector('.modal-empty')) body.innerHTML = '';
    const av = resolvedAvatar(ME);
    body.insertAdjacentHTML('beforeend', `
      <div class="modal-row">
        <img class="modal-avatar" src="${av}" alt="${ME.username}"
             onerror="this.src='${initialsAvatar(ME.name, ME.username)}'">
        <div>
          <div class="modal-user">
            <span>@${ME.username}</span>
            <span class="modal-time"> · just now</span>
          </div>
          <div class="modal-comment-text">${c.text}</div>
        </div>
      </div>`);
    body.scrollTop = body.scrollHeight;
    const cc = document.getElementById(`ccount-${activePostId}`);
    if (cc) cc.textContent = parseInt(cc.textContent || 0) + 1;
    const titleEl = document.getElementById('commentsTitle');
    const cur = parseInt(titleEl.textContent.match(/\d+/)?.[0] || 0);
    titleEl.textContent = `Comments (${cur + 1})`;
  } catch(e) {
    showToast('Failed to post comment: ' + e.message);
    input.value = text;
    document.getElementById('commentSendBtn').classList.add('active');
  }
}

/* ══════════════════════════════════════════════════════
   MODALS & SIDEBAR
══════════════════════════════════════════════════════ */
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  if (id === 'modalComments') activePostId = null;
}

function toggleSidebar() {
  const s = document.getElementById('sidebar');
  const o = document.getElementById('sidebarOverlay');
  s.classList.toggle('open');
  o.classList.toggle('open');
  if (!s.classList.contains('open')) {
    document.getElementById('searchInput').value = '';
    document.getElementById('searchDropdown').classList.remove('open');
  }
}

/* ── INIT ── */
(async () => {
  await resolveMe();
  await buildFeed();
})();
</script>
