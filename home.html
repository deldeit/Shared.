<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Homepage</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Inter, sans-serif;
}

body {
  background:#000;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* HEADER */
header {
  width:100%;
  max-width:900px;
  padding:20px;
  font-size:18px;
  opacity:0.8;
}

/* CONTAINER */
.container {
  width:100%;
  max-width:900px;
  display:flex;
  flex-direction:column;
  gap:18px;
  padding:20px;
}

/* CARD */
.card {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* IMAGE */
.preview {
  width:100%;
  max-height:320px;
  object-fit:cover;
  border-radius:14px;
  display:none;
}

/* INPUTS */
textarea, input {
  background:rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.08);
  color:white;
  padding:10px;
  border-radius:12px;
  outline:none;
  font-size:13px;
}

/* MUSIC LIST */
.songs {
  background:rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  max-height:140px;
  overflow:auto;
}

.song {
  padding:10px;
  font-size:13px;
  cursor:pointer;
}

.song:hover {
  background:rgba(255,255,255,0.06);
}

/* BUTTON */
button {
  padding:10px;
  border:none;
  border-radius:12px;
  background:#fff;
  color:#000;
  font-weight:600;
  cursor:pointer;
}

/* POST */
.post {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  overflow:hidden;
}

.post img {
  width:100%;
  display:block;
}

.post-body {
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size:13px;
  opacity:0.9;
}
</style>
</head>

<body>

<header>Homepage</header>

<div class="container">

  <!-- CREATOR -->
  <div class="card">

    <input type="file" id="file" onchange="loadImage(event)">
    <img id="preview" class="preview">

    <textarea id="caption" placeholder="Write a caption"></textarea>

    <input id="musicSearch" placeholder="Search music..." oninput="searchMusic()">

    <div class="songs" id="songs"></div>

    <button onclick="publishPost()">Publish</button>
  </div>

  <!-- FEED -->
  <div id="feed"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://cnhaonawapuahzoctqav.supabase.co",
  "YOUR_ANON_KEY"
);

/* SESSION */
const { data: sessionData } = await supabase.auth.getSession();

if (!sessionData.session) {
  window.location.href = "index.html";
}

const user = sessionData.session.user;

/* IMAGE PREVIEW */
window.loadImage = (e) => {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = (evt) => {
    const img = document.getElementById("preview");
    img.src = evt.target.result;
    img.style.display = "block";
  };

  reader.readAsDataURL(file);
};

/* MUSIC SEARCH (DEEZER) */
let selectedMusic = null;

window.searchMusic = async () => {
  const q = document.getElementById("musicSearch").value;
  const box = document.getElementById("songs");

  if (q.length < 2) return box.innerHTML = "";

  const res = await fetch(`https://api.deezer.com/search?q=${q}`);
  const data = await res.json();

  box.innerHTML = "";

  data.data.slice(0,5).forEach(song => {
    const div = document.createElement("div");
    div.className = "song";

    div.textContent = song.title + " - " + song.artist.name;

    div.onclick = () => {
      selectedMusic = {
        title: song.title,
        preview: song.preview
      };

      document.getElementById("musicSearch").value = song.title;
      box.innerHTML = "";
    };

    box.appendChild(div);
  });
};

/* PUBLISH POST */
window.publishPost = async () => {
  const caption = document.getElementById("caption").value;
  const image = document.getElementById("preview").src;

  await supabase.from("posts").insert([
    {
      user_id: user.id,
      image_url: image,
      caption,
      music_title: selectedMusic?.title || null,
      music_preview: selectedMusic?.preview || null
    }
  ]);

  loadFeed();
};

/* LOAD FEED */
async function loadFeed() {
  const { data } = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending:false });

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  data.forEach(post => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <img src="${post.image_url}">
      <div class="post-body">
        <div>${post.caption || ""}</div>
        <div>${post.music_title || ""}</div>
      </div>
    `;

    feed.appendChild(div);
  });
}

loadFeed();
</script>

</body>
</html>
