<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared Home</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:'Archivo Black',sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.container{
  width:100%;
  max-width:900px;
  padding:20px;
}

.card{
  padding:16px;
  border:1px solid #222;
  border-radius:14px;
  margin-bottom:16px;
}

input,textarea,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button{
  background:white;
  color:black;
  cursor:pointer;
}

img{
  width:100%;
  border-radius:12px;
}

.post{
  margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <input type="file" id="file">
    <textarea id="caption" placeholder="Caption..."></textarea>
    <button id="uploadBtn">Upload</button>
  </div>

  <div id="feed"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://cnhaonawapuahzoctqav.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true
    }
  }
);

let user = null;
let file = null;
const BUCKET = "shared";

// 🔴 FIX SESSION (CORRETTO)
async function init(){
  const { data: { session } } = await supabase.auth.getSession();

  if(!session){
    window.location.href = "index.html";
    return;
  }

  user = session.user;
  loadFeed();
}

init();

// FILE
document.getElementById("file").onchange = e => {
  file = e.target.files[0];
};

// UPLOAD
document.getElementById("uploadBtn").onclick = async () => {

  if(!user) return alert("Not logged in");
  if(!file) return alert("No file");

  const ext = file.name.split(".").pop();
  const fileName = `${user.id}/${Date.now()}.${ext}`;

  // 🔴 STORAGE FIXATO
  const { error: uploadError } = await supabase.storage
    .from(BUCKET)
    .upload(fileName, file);

  if(uploadError) return alert(uploadError.message);

  const { data } = supabase.storage
    .from(BUCKET)
    .getPublicUrl(fileName);

  const { error: dbError } = await supabase
    .from("posts")
    .insert([{
      user_id: user.id,
      image_url: data.publicUrl,
      caption: document.getElementById("caption").value
    }]);

  if(dbError) return alert(dbError.message);

  loadFeed();
};

// FEED
async function loadFeed(){

  const { data } = await supabase
    .from("posts")
    .select("*")
    .order("created_at",{ascending:false});

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  data.forEach(p => {
    const div = document.createElement("div");
    div.className = "post";
    div.innerHTML = `
      <img src="${p.image_url}">
      <p>${p.caption || ""}</p>
    `;
    feed.appendChild(div);
  });
}

</script>

</body>
</html>
