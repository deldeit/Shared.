<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Archivo Black',sans-serif}
body{background:#000;color:#fff;display:flex;flex-direction:column;align-items:center}

header{
  width:100%;
  max-width:900px;
  padding:20px;
  font-size:22px;
  letter-spacing:1px;
}

.container{
  width:100%;
  max-width:900px;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

.card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.dropzone{
  border:1px dashed rgba(255,255,255,.25);
  border-radius:14px;
  padding:18px;
  text-align:center;
  font-size:13px;
  opacity:.8;
  cursor:pointer;
}

.preview{
  width:100%;
  max-height:340px;
  object-fit:cover;
  border-radius:14px;
  display:none;
}

input,textarea{
  background:rgba(0,0,0,.4);
  border:1px solid rgba(255,255,255,.08);
  color:#fff;
  padding:10px;
  border-radius:12px;
  outline:none;
  font-size:13px;
}

.songs{
  background:rgba(0,0,0,.6);
  border-radius:12px;
  border:1px solid rgba(255,255,255,.08);
  max-height:160px;
  overflow:auto;
}

.song{
  padding:10px;
  font-size:12px;
  cursor:pointer;
}

button{
  padding:12px;
  border:none;
  border-radius:12px;
  background:#fff;
  color:#000;
  font-weight:600;
  cursor:pointer;
}

button:disabled{opacity:.5}

.post{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  overflow:hidden;
}

.post img{
  width:100%;
}

.post-body{
  padding:12px;
  font-size:13px;
}

.lock{
  opacity:.4;
  pointer-events:none;
}
</style>
</head>

<body>

<header>Shared</header>

<div class="container">

<div id="creator" class="card lock">

<div id="dropzone" class="dropzone">Drag & drop image here</div>
<input type="file" id="file" accept=".jpg,.jpeg,.png,.gif">
<img id="preview" class="preview">
<textarea id="caption" placeholder="Write something..."></textarea>
<input id="songInput" placeholder="Search music...">
<div id="suggestions" class="songs"></div>
<button id="publishBtn">Publish</button>

</div>

<div id="feed"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://cnhaonawapuahzoctqav.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes"
);

let user=null;
let imageFile=null;
let selectedMusic=null;
let audio=null;

const creator=document.getElementById("creator");

async function init(){
  const { data:{ session } } = await supabase.auth.getSession();

  if(!session){
    window.location.replace("index.html");
    return;
  }

  user=session.user;
  unlock();
}

supabase.auth.onAuthStateChange((event,session)=>{
  if(!session){
    window.location.replace("index.html");
    return;
  }

  user=session.user;
  unlock();
});

function unlock(){
  creator.classList.remove("lock");
}

function handleFile(file){
  if(!file)return;
  imageFile=file;

  const r=new FileReader();
  r.onload=e=>{
    const img=document.getElementById("preview");
    img.src=e.target.result;
    img.style.display="block";
  };
  r.readAsDataURL(file);
}

document.getElementById("file").onchange=e=>handleFile(e.target.files[0]);

document.getElementById("dropzone").ondrop=e=>{
  e.preventDefault();
  handleFile(e.dataTransfer.files[0]);
};

window.handleDeezer=function(data){
  const box=document.getElementById("suggestions");
  box.innerHTML="";

  data.data?.slice(0,5).forEach(t=>{
    const d=document.createElement("div");
    d.className="song";
    d.textContent=t.title+" - "+t.artist.name;
    d.onclick=()=>selectedMusic=t;
    box.appendChild(d);
  });
};

let debounce;
document.getElementById("songInput").oninput=e=>{
  clearTimeout(debounce);
  if(e.target.value.length<2)return;

  debounce=setTimeout(()=>{
    const s=document.createElement("script");
    s.src=`https://api.deezer.com/search?q=${encodeURIComponent(e.target.value)}&output=jsonp&callback=handleDeezer`;
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),2000);
  },300);
};

function reset(){
  imageFile=null;
  selectedMusic=null;

  document.getElementById("caption").value="";
  document.getElementById("file").value="";
  document.getElementById("preview").style.display="none";
  document.getElementById("suggestions").innerHTML="";
}

document.getElementById("publishBtn").onclick=async()=>{

  if(!user)return alert("login required");
  if(!imageFile)return alert("no image");

  const btn=document.getElementById("publishBtn");
  btn.disabled=true;
  btn.textContent="Uploading...";

  try{
    const ext=imageFile.name.split('.').pop();
    const fileName=user.id+"-"+Date.now()+"."+ext;

    const { error } = await supabase.storage
      .from("images")
      .upload(fileName,imageFile,{
        contentType:imageFile.type
      });

    if(error)throw error;

    const { data } = supabase.storage
      .from("images")
      .getPublicUrl(fileName);

    await supabase.from("posts").insert([{
      user_id:user.id,
      image_url:data.publicUrl,
      caption:document.getElementById("caption").value,
      music_title:selectedMusic?.title||null
    }]);

    reset();
    loadFeed();
    window.scrollTo(0,0);

  }catch(e){
    console.error(e);
    alert(e.message);
  }

  btn.disabled=false;
  btn.textContent="Publish";
};

async function loadFeed(){
  const { data } = await supabase
    .from("posts")
    .select("*")
    .order("created_at",{ascending:false});

  const feed=document.getElementById("feed");
  feed.innerHTML="";

  data.forEach(p=>{
    const d=document.createElement("div");
    d.className="post";

    d.innerHTML=`
      <img src="${p.image_url}?twic=v1/cover=1/resize=800">
      <div class="post-body">
        <div>${p.caption||""}</div>
        <div>${p.music_title||""}</div>
      </div>
    `;

    feed.appendChild(d);
  });
}

init();
loadFeed();
</script>

</body>
</html>
