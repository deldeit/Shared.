<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:'Archivo Black', sans-serif;
}

.container{
  max-width:720px;
  margin:auto;
  padding:20px;
}

.header{
  text-align:center;
  font-size:28px;
  margin-bottom:20px;
}

.card{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:20px;
  padding:16px;
  margin-bottom:18px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:14px;
  border:1px solid #222;
  background:#000;
  color:#fff;
  font-family:'Archivo Black', sans-serif;
}

button{
  width:100%;
  margin-top:12px;
  padding:12px;
  border-radius:14px;
  border:none;
  background:#fff;
  color:#000;
  cursor:pointer;
}

.post{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:20px;
  padding:12px;
  margin-top:16px;
  cursor:pointer;
  transition:0.15s;
}

.post:active{
  transform:scale(0.99);
}

img{
  width:100%;
  border-radius:16px;
  margin-bottom:10px;
}

/* SONG TITLE BIGGER */
.song-title{
  font-size:18px;
  margin-top:10px;
}

.song-sub{
  font-size:12px;
  opacity:0.7;
  margin-top:4px;
}

.song-result{
  padding:10px;
  border:1px solid #222;
  border-radius:12px;
  margin-top:8px;
  cursor:pointer;
  font-size:12px;
}

.song-result:hover{
  background:#111;
}

.status{
  font-size:12px;
  opacity:0.7;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">Shared.</div>

  <!-- UPLOAD -->
  <div class="card">

    <input type="file" id="file">
    <textarea id="caption" placeholder="Write a caption..."></textarea>

    <input type="text" id="songSearch" placeholder="Search a song...">
    <div id="songResults"></div>

    <button id="uploadBtn">UPLOAD</button>

    <div class="status" id="status"></div>
  </div>

  <!-- FEED -->
  <div id="feed"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://cnhaonawapuahzoctqav.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes"
);

const BUCKET = "shared";

let user = null;
let file = null;
let selectedSong = null;

/* AUDIO GLOBAL (IMPORTANT) */
let globalAudio = new Audio();

/* INIT */
async function init(){
  const { data: { session } } = await supabase.auth.getSession();

  if(!session){
    window.location.href = "index.html";
    return;
  }

  user = session.user;
  loadFeed();
}
init();

/* FILE */
document.getElementById("file").onchange = e => {
  file = e.target.files[0];
};

/* IMAGE PROCESS */
async function processImage(file){
  return new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {
      const size = Math.min(img.width, img.height);

      const canvas = document.createElement("canvas");
      canvas.width = 800;
      canvas.height = 800;

      const ctx = canvas.getContext("2d");

      ctx.drawImage(
        img,
        (img.width - size)/2,
        (img.height - size)/2,
        size,
        size,
        0,0,800,800
      );

      canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.7);
    };

    reader.readAsDataURL(file);
  });
}

/* DEEZER SEARCH */
document.getElementById("songSearch").oninput = async (e) => {
  const q = e.target.value;

  if(q.length < 2){
    document.getElementById("songResults").innerHTML = "";
    return;
  }

  const res = await fetch(`https://api.deezer.com/search?q=${encodeURIComponent(q)}`);
  const data = await res.json();

  const container = document.getElementById("songResults");
  container.innerHTML = "";

  data.data.slice(0,5).forEach(track => {

    const div = document.createElement("div");
    div.className = "song-result";
    div.innerText = `${track.title} - ${track.artist.name}`;

    div.onclick = () => {
      selectedSong = track;

      globalAudio.src = track.preview;
      globalAudio.play();

      container.innerHTML = "";
      document.getElementById("songSearch").value =
        `${track.title} - ${track.artist.name}`;
    };

    container.appendChild(div);
  });
};

/* UPLOAD */
document.getElementById("uploadBtn").onclick = async () => {

  if(!user) return;
  if(!file) return;

  const processed = await processImage(file);
  const fileName = `${user.id}/${Date.now()}.jpg`;

  await supabase.storage
    .from(BUCKET)
    .upload(fileName, processed, {
      contentType:"image/jpeg"
    });

  const { data } = supabase.storage
    .from(BUCKET)
    .getPublicUrl(fileName);

  await supabase.from("posts").insert([{
    user_id: user.id,
    image_url: data.publicUrl,
    caption: document.getElementById("caption").value,
    song_title: selectedSong
      ? `${selectedSong.title} - ${selectedSong.artist.name}`
      : null,
    song_preview: selectedSong?.preview || null
  }]);

  loadFeed();
};

/* FEED */
async function loadFeed(){

  const { data } = await supabase
    .from("posts")
    .select("*")
    .order("created_at",{ascending:false});

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  data.forEach(p => {

    const div = document.createElement("div");
    div.className = "post";

    div.onclick = () => {
      if(p.song_preview){
        globalAudio.src = p.song_preview;
        globalAudio.play();
      }
    };

    div.innerHTML = `
      <img src="${p.image_url}">
      <div>${p.caption || ""}</div>

      ${p.song_title ? `
        <div class="song-title">🎵 ${p.song_title}</div>
        <div class="song-sub">Tap to play</div>
      ` : ""}
    `;

    feed.appendChild(div);
  });
}
</script>

</body>
</html>
