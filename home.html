<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shared</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#000;
    --panel:#0c0c0c;
    --text:#fff;
    --muted:#a0a0a0;
    --shadow:0 24px 80px rgba(0,0,0,.48);
    --radius:28px;
  }

  *{ box-sizing:border-box; }

  html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:
      radial-gradient(circle at 18% 20%, rgba(255,255,255,.06), transparent 24%),
      radial-gradient(circle at 82% 12%, rgba(255,255,255,.05), transparent 20%),
      radial-gradient(circle at 50% 100%, rgba(255,255,255,.04), transparent 26%),
      #000;
    color:var(--text);
    font-family:'Archivo Black', system-ui, sans-serif;
  }

  .loading{
    position:fixed;
    inset:0;
    z-index:100;
    display:grid;
    place-items:center;
    background:#000;
    color:#fff;
    font-family:system-ui, sans-serif;
    letter-spacing:.4px;
  }

  .hidden{ display:none !important; }

  .app{
    width:100%;
    height:100%;
    position:relative;
    overflow:hidden;
  }

  .topbar{
    position:fixed;
    inset:0 0 auto 0;
    z-index:60;
    padding:12px 12px 0;
    pointer-events:none;
  }

  .topbar-inner{
    pointer-events:auto;
    max-width:1220px;
    margin:0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:12px 14px;
    border:1px solid rgba(255,255,255,.08);
    border-radius:999px;
    background:rgba(8,8,8,.72);
    backdrop-filter:blur(16px);
    box-shadow:var(--shadow);
  }

  .brand{
    display:flex;
    align-items:baseline;
    gap:10px;
    flex:0 0 auto;
  }

  .brand .logo{
    font-size:20px;
    letter-spacing:.4px;
  }

  .search-area{
    flex:1 1 auto;
    display:flex;
    align-items:center;
    gap:10px;
    max-width:760px;
    margin:0 10px;
  }

  .searchbar{
    flex:1 1 auto;
    display:flex;
    gap:10px;
  }

  .searchbar input{
    width:100%;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.10);
    background:rgba(9,9,9,.82);
    color:#fff;
    outline:none;
    padding:14px 16px;
    font-family:system-ui, sans-serif;
    font-size:14px;
    backdrop-filter:blur(16px);
  }

  .searchbar input::placeholder{ color:#7b7b7b; }

  .iconbtn{
    width:42px;
    height:42px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,.08);
    background:#0d0d0d;
    color:#fff;
    display:grid;
    place-items:center;
    cursor:pointer;
    transition:.16s ease;
    flex:0 0 auto;
  }

  .iconbtn:hover{ transform:translateY(-1px) scale(1.02); }

  .uploadbtn{
    width:42px;
    height:42px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,.08);
    background:#fff;
    color:#000;
    display:grid;
    place-items:center;
    cursor:pointer;
    transition:.16s ease;
    flex:0 0 auto;
    font-size:18px;
    font-family:inherit;
  }

  .uploadbtn:hover{ transform:translateY(-1px) scale(1.02); }

  .profile-link{
    width:42px;
    height:42px;
    border-radius:50%;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.10);
    background:#111;
    display:block;
    flex:0 0 auto;
    text-decoration:none;
  }

  .profile-link img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .profile-fallback{
    width:100%;
    height:100%;
    display:grid;
    place-items:center;
    background:#fff;
    color:#000;
    font-family:inherit;
    font-size:14px;
  }

  .progress-wrap{
    position:fixed;
    top:74px;
    left:50%;
    transform:translateX(-50%);
    width:min(760px, calc(100vw - 20px));
    z-index:55;
    pointer-events:none;
  }

  .segments{
    display:flex;
    gap:6px;
    width:100%;
  }

  .segment{
    flex:1;
    height:4px;
    border-radius:999px;
    overflow:hidden;
    background:rgba(255,255,255,.10);
  }

  .segment > span{
    display:block;
    width:0%;
    height:100%;
    border-radius:inherit;
    background:#fff;
  }

  .feed{
    height:100%;
    display:flex;
    overflow-x:auto;
    overflow-y:hidden;
    scroll-snap-type:x mandatory;
    scroll-behavior:smooth;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }

  .feed::-webkit-scrollbar{ display:none; }

  .item{
    flex:0 0 100vw;
    height:100vh;
    scroll-snap-align:start;
    position:relative;
    isolation:isolate;
  }

  .media{
    position:absolute;
    inset:0;
    z-index:0;
    transform:scale(1.03);
  }

  .media.gradient{
    background:
      radial-gradient(circle at 20% 18%, rgba(255,255,255,.18), transparent 18%),
      radial-gradient(circle at 75% 26%, rgba(255,255,255,.10), transparent 20%),
      linear-gradient(135deg, var(--c1), var(--c2));
  }

  .media::after{
    content:"";
    position:absolute;
    inset:0;
    background:
      linear-gradient(180deg, rgba(0,0,0,.04), rgba(0,0,0,.72) 76%, rgba(0,0,0,.95)),
      linear-gradient(115deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.08) 18%, rgba(255,255,255,0) 36%);
    pointer-events:none;
  }

  .media .file{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
  }

  .content{
    position:absolute;
    inset:auto 0 0 0;
    z-index:2;
    padding:24px;
    display:grid;
    grid-template-columns:minmax(0,1fr) auto;
    align-items:end;
    gap:18px;
  }

  .card{
    width:min(760px, calc(100vw - 92px));
    max-width:100%;
    border-radius:var(--radius);
    border:1px solid rgba(255,255,255,.10);
    background:linear-gradient(180deg, rgba(12,12,12,.35), rgba(12,12,12,.82));
    backdrop-filter:blur(16px);
    box-shadow:var(--shadow);
    padding:18px;
  }

  .author-row{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:14px;
  }

  .avatar{
    width:46px;
    height:46px;
    border-radius:50%;
    flex:0 0 auto;
    display:grid;
    place-items:center;
    background:#fff;
    color:#000;
    font-size:15px;
    overflow:hidden;
  }

  .avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .author-meta{ min-width:0; }

  .author{
    font-size:16px;
    line-height:1.1;
    margin-bottom:4px;
  }

  .handle{
    font-size:11px;
    color:var(--muted);
    letter-spacing:.8px;
  }

  .headline{
    margin:0 0 10px;
    font-size:clamp(28px, 5vw, 58px);
    line-height:.95;
    letter-spacing:.2px;
    text-wrap:balance;
  }

  .caption{
    margin:0 0 16px;
    max-width:62ch;
    color:#e9e9e9;
    opacity:.95;
    font-family:system-ui, sans-serif;
    font-size:13px;
    line-height:1.65;
    font-weight:600;
  }

  .meta{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:16px;
  }

  .chip{
    padding:8px 10px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.10);
    background:rgba(255,255,255,.06);
    color:#fff;
    font-size:11px;
  }

  .footerline{
    padding-top:14px;
    border-top:1px solid rgba(255,255,255,.08);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
  }

  .stats{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    color:#f0f0f0;
    font-family:system-ui, sans-serif;
    font-size:11px;
    font-weight:700;
  }

  .cta{
    display:flex;
    gap:10px;
  }

  .cta button{
    border:none;
    border-radius:999px;
    padding:12px 14px;
    font-family:inherit;
    font-size:12px;
    cursor:pointer;
    transition:.16s ease;
  }

  .primary{
    background:#fff;
    color:#000;
  }

  .secondary{
    background:#111;
    color:#fff;
    border:1px solid rgba(255,255,255,.12);
  }

  .cta button:hover{ transform:translateY(-1px); }

  .actions{
    display:flex;
    flex-direction:column;
    gap:10px;
    padding-bottom:2px;
  }

  .action{
    width:52px;
    height:52px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.10);
    background:rgba(10,10,10,.72);
    backdrop-filter:blur(12px);
    color:#fff;
    display:grid;
    place-items:center;
    font-size:18px;
    cursor:pointer;
    box-shadow:var(--shadow);
    transition:.16s ease;
  }

  .action:hover{ transform:translateY(-1px) scale(1.03); }

  .action.liked{
    background:#fff;
    color:#000;
  }

  .badge{
    position:absolute;
    top:24px;
    left:24px;
    z-index:3;
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 12px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.10);
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(12px);
    font-size:11px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:#fff;
  }

  .badge .dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#fff;
  }

  .sidehint{
    position:absolute;
    right:18px;
    top:50%;
    transform:translateY(-50%);
    z-index:3;
    display:flex;
    align-items:center;
    gap:10px;
    color:rgba(255,255,255,.75);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1.4px;
    font-family:system-ui, sans-serif;
    pointer-events:none;
  }

  .sidehint .line{
    width:54px;
    height:1px;
    background:rgba(255,255,255,.2);
  }

  .ad-card .media{
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,.14), transparent 20%),
      radial-gradient(circle at 80% 18%, rgba(255,255,255,.08), transparent 18%),
      linear-gradient(135deg, #0b0b0b, #262626);
  }

  .ad-card .headline{
    font-size:clamp(26px, 4.4vw, 52px);
  }

  .ad-box{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
  }

  .ad-label{
    padding:8px 10px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.10);
    background:rgba(255,255,255,.07);
    color:#fff;
    font-size:11px;
  }

  .ad-brand{
    font-size:13px;
    color:var(--muted);
    font-family:system-ui, sans-serif;
    font-weight:700;
    letter-spacing:.4px;
  }

  .fab{
    position:fixed;
    right:18px;
    bottom:18px;
    z-index:70;
    display:flex;
    align-items:center;
    gap:10px;
    padding:14px 16px;
    border:none;
    border-radius:999px;
    background:#fff;
    color:#000;
    box-shadow:var(--shadow);
    cursor:pointer;
    font-family:inherit;
    font-size:12px;
    transition:.16s ease;
  }

  .fab:hover{ transform:translateY(-2px) scale(1.01); }

  .fab .plus{
    width:28px;
    height:28px;
    border-radius:50%;
    background:#000;
    color:#fff;
    display:grid;
    place-items:center;
    font-size:16px;
  }

  .modal{
    position:fixed;
    inset:0;
    z-index:80;
    display:none;
    align-items:center;
    justify-content:center;
    padding:18px;
    background:rgba(0,0,0,.72);
    backdrop-filter:blur(10px);
  }

  .modal.open{ display:flex; }

  .sheet{
    width:min(720px, 100%);
    border-radius:28px;
    border:1px solid rgba(255,255,255,.10);
    background:linear-gradient(180deg, rgba(12,12,12,.96), rgba(7,7,7,.98));
    box-shadow:var(--shadow);
    overflow:hidden;
  }

  .sheet-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 18px 14px;
    border-bottom:1px solid rgba(255,255,255,.08);
  }

  .sheet-title{
    font-size:20px;
    letter-spacing:.4px;
  }

  .close{
    width:42px;
    height:42px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,.10);
    background:#111;
    color:#fff;
    cursor:pointer;
    font-size:18px;
  }

  .sheet-body{
    display:grid;
    grid-template-columns:1.15fr .85fr;
    gap:0;
  }

  .form{
    padding:18px;
    display:grid;
    gap:10px;
  }

  .input, .textarea, .file{
    width:100%;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.10);
    background:#000;
    color:#fff;
    outline:none;
    font-family:system-ui, sans-serif;
    padding:12px 14px;
    font-size:14px;
  }

  .textarea{
    min-height:140px;
    resize:vertical;
  }

  .input::placeholder,
  .textarea::placeholder{
    color:#7f7f7f;
  }

  .helper{
    color:var(--muted);
    font-family:system-ui, sans-serif;
    font-size:12px;
    line-height:1.5;
    margin-top:2px;
  }

  .preview{
    padding:18px 18px 18px 0;
  }

  .preview-card{
    height:100%;
    min-height:380px;
    border-radius:24px;
    border:1px solid rgba(255,255,255,.10);
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,.16), transparent 16%),
      linear-gradient(135deg, #1a1a1a, #333);
    position:relative;
    overflow:hidden;
  }

  .preview-media{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
  }

  .preview-overlay{
    position:absolute;
    inset:auto 0 0 0;
    padding:16px;
    background:linear-gradient(180deg, transparent, rgba(0,0,0,.86));
  }

  .preview-title{
    font-size:28px;
    line-height:.96;
    margin:0 0 8px;
  }

  .preview-text{
    margin:0;
    font-family:system-ui, sans-serif;
    font-size:13px;
    line-height:1.55;
    color:#e8e8e8;
    font-weight:600;
  }

  .sheet-actions{
    display:flex;
    gap:10px;
    justify-content:flex-end;
    padding:0 18px 18px;
  }

  .sheet-actions button{
    border:none;
    border-radius:999px;
    padding:12px 14px;
    font-family:inherit;
    font-size:12px;
    cursor:pointer;
  }

  .ghost{
    background:#111;
    color:#fff;
    border:1px solid rgba(255,255,255,.10);
  }

  .save{
    background:#fff;
    color:#000;
  }

  .empty-state{
    width:min(720px, calc(100vw - 28px));
    margin:0 auto;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    text-align:center;
    border:1px solid rgba(255,255,255,.10);
    border-radius:28px;
    background:rgba(12,12,12,.72);
    backdrop-filter:blur(14px);
    padding:22px;
    box-shadow:var(--shadow);
    display:none;
    z-index:5;
  }

  .empty-state.show{
    display:block;
  }

  .empty-state h2{
    margin:0 0 8px;
    font-size:22px;
  }

  .empty-state p{
    margin:0;
    font-family:system-ui, sans-serif;
    color:var(--muted);
    line-height:1.55;
    font-size:13px;
    font-weight:600;
  }

  @media (max-width: 860px){
    .topbar{
      padding:10px 10px 0;
    }

    .topbar-inner{
      border-radius:24px;
      padding:10px 12px;
      gap:10px;
    }

    .search-area{
      margin:0;
      gap:8px;
    }

    .progress-wrap{
      top:156px;
      width:calc(100vw - 16px);
    }

    .searchbar input{
      font-size:13px;
      padding:13px 14px;
    }

    .content{
      padding:14px;
      grid-template-columns:1fr;
    }

    .card{
      width:100%;
      border-radius:24px;
      padding:16px;
    }

    .actions{
      flex-direction:row;
      justify-content:flex-end;
    }

    .action{
      width:48px;
      height:48px;
      border-radius:16px;
    }

    .sidehint{
      display:none;
    }

    .fab{
      right:14px;
      bottom:14px;
      padding:13px 14px;
    }

    .sheet-body{
      grid-template-columns:1fr;
    }

    .preview{
      padding:0 18px 18px;
    }

    .preview-card{
      min-height:260px;
    }

    .preview-title{
      font-size:24px;
    }

    .brand .logo{
      font-size:18px;
    }

    .profile-link,
    .uploadbtn,
    .iconbtn{
      width:40px;
      height:40px;
    }
  }
</style>
</head>

<body>
<div class="loading" id="loading">Loading Shared...</div>

<div class="app hidden" id="app">
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="logo">Shared.</div>
      </div>

      <div class="search-area">
        <div class="searchbar">
          <input id="searchInput" type="text" placeholder="Cerca post o profili..." />
        </div>
        <button class="uploadbtn" id="openUpload" title="Upload">+</button>
      </div>

      <a class="profile-link" id="profileLink" href="./profile.html" title="Profilo">
        <div class="profile-fallback" id="profileFallback">S</div>
        <img id="profileImg" alt="Profilo" class="hidden" />
      </a>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="segments" id="segments"></div>
  </div>

  <div class="empty-state" id="emptyState">
    <h2>Nessun contenuto trovato</h2>
    <p>Prova a cercare un altro contenuto o crea il primo post con Upload.</p>
  </div>

  <div class="feed" id="feed"></div>
</div>

<div class="modal" id="uploadModal" aria-hidden="true">
  <div class="sheet">
    <div class="sheet-head">
      <div class="sheet-title">New content</div>
      <button class="close" id="closeUpload">×</button>
    </div>

    <div class="sheet-body">
      <div class="form">
        <input class="input" id="uName" type="text" placeholder="Username" />
        <input class="input" id="uHandle" type="text" placeholder="@handle" />
        <input class="input" id="uTitle" type="text" placeholder="Titolo post" />
        <textarea class="textarea" id="uCaption" placeholder="Caption"></textarea>
        <input class="file" id="uFile" type="file" accept="image/*,video/*" />
        <div class="helper">
          Il file viene caricato nel bucket <code>shared</code> e il post viene salvato in <code>posts</code>.
        </div>
      </div>

      <div class="preview">
        <div class="preview-card" id="previewCard">
          <img class="preview-media" id="previewImg" alt="" />
          <video class="preview-media" id="previewVideo" muted loop playsinline></video>

          <div class="preview-overlay">
            <h3 class="preview-title" id="previewTitle">Preview</h3>
            <p class="preview-text" id="previewText">Qui vedrai l’anteprima del contenuto che stai preparando.</p>
          </div>
        </div>
      </div>
    </div>

    <div class="sheet-actions">
      <button class="ghost" id="cancelUpload">Cancel</button>
      <button class="save" id="submitUpload">Publish</button>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

  const SUPABASE_URL = "https://cnhaonawapuahzoctqav.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes";

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  });

  const loading = document.getElementById("loading");
  const app = document.getElementById("app");
  const feed = document.getElementById("feed");
  const emptyState = document.getElementById("emptyState");
  const segmentsWrap = document.getElementById("segments");
  const uploadModal = document.getElementById("uploadModal");
  const profileImg = document.getElementById("profileImg");
  const profileFallback = document.getElementById("profileFallback");

  const openUploadBtn = document.getElementById("openUpload");
  const closeUploadBtn = document.getElementById("closeUpload");
  const cancelUploadBtn = document.getElementById("cancelUpload");
  const submitUploadBtn = document.getElementById("submitUpload");

  const searchInput = document.getElementById("searchInput");

  const uName = document.getElementById("uName");
  const uHandle = document.getElementById("uHandle");
  const uTitle = document.getElementById("uTitle");
  const uCaption = document.getElementById("uCaption");
  const uFile = document.getElementById("uFile");

  const previewTitle = document.getElementById("previewTitle");
  const previewText = document.getElementById("previewText");
  const previewImg = document.getElementById("previewImg");
  const previewVideo = document.getElementById("previewVideo");

  const AUTOPLAY_MS = 5200;
  const AD_MS = 4200;

  let currentUser = null;
  let currentProfile = null;
  let allPosts = [];
  let visiblePosts = [];
  let timeline = [];
  let activeIndex = 0;
  let progressStart = performance.now();
  let isAutoScrolling = false;
  let searchTimer = null;
  let rafId = null;

  function clamp(v, min, max){
    return Math.max(min, Math.min(max, v));
  }

  function escapeHtml(str){
    return String(str ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function sanitizeQuery(str){
    return String(str ?? "")
      .replaceAll("%", "")
      .replaceAll(",", " ")
      .replaceAll("(", " ")
      .replaceAll(")", " ")
      .trim();
  }

  function getPalette(i){
    const palettes = [
      ["#111111", "#4c4c4c"],
      ["#090909", "#262626"],
      ["#131313", "#555555"],
      ["#1a1a1a", "#373737"]
    ];
    return palettes[i % palettes.length];
  }

  function openModal(){
    uploadModal.classList.add("open");
    uploadModal.setAttribute("aria-hidden", "false");
    previewFromForm();
  }

  function closeModal(){
    uploadModal.classList.remove("open");
    uploadModal.setAttribute("aria-hidden", "true");
  }

  function resetFilePreview(){
    previewImg.style.display = "none";
    previewVideo.style.display = "none";
    previewImg.src = "";
    previewVideo.pause();
    previewVideo.removeAttribute("src");
    previewVideo.load();
  }

  function previewFromForm(){
    previewTitle.textContent = uTitle.value.trim() || "Preview";
    previewText.textContent = uCaption.value.trim() || "Qui vedrai l’anteprima del contenuto che stai preparando.";
  }

  function buildTimeline(posts){
    const items = [];
    posts.forEach((post, index) => {
      items.push({ type:"post", data:post });
      items.push({
        type:"ad",
        data:{
          brand:["North","Pulse","Mono","Aurora"][index % 4],
          title:[
            "A better way to reach people.",
            "Minimal tools. Maximum attention.",
            "Built for fast-moving communities.",
            "Design that keeps the scroll alive."
          ][index % 4],
          caption:[
            "Promoted placement inside Shared, in line with the visual style of the app.",
            "Ad cards are intentionally calm and clean so they fit the feed naturally.",
            "Use this slot for sponsorships, brand drops, or native campaigns.",
            "The ad system can later be replaced by real inventory from your backend."
          ][index % 4]
        }
      });
    });
    return items;
  }

  function renderSegments(){
    segmentsWrap.innerHTML = "";
    timeline.forEach(() => {
      const seg = document.createElement("div");
      seg.className = "segment";
      seg.innerHTML = "<span></span>";
      segmentsWrap.appendChild(seg);
    });
  }

  function updateEmptyState(){
    emptyState.classList.toggle("show", timeline.length === 0);
  }

  function renderFeed(){
    timeline = buildTimeline(visiblePosts.length ? visiblePosts : allPosts);
    renderSegments();

    if (!timeline.length) {
      feed.innerHTML = "";
      updateEmptyState();
      return;
    }

    feed.innerHTML = timeline.map((item, idx) => {
      if (item.type === "post") {
        const post = item.data;
        const profile = post.profile || {};
        const authorName = profile.display_name || profile.username || "User";
        const authorHandle = profile.username ? `@${profile.username}` : "@user";
        const avatar = (authorName || "S").trim().charAt(0).toUpperCase();
        const likesCount = post.like_count ?? 0;
        const userLiked = !!post.user_liked;
        const mediaHtml = post.media_url
          ? (
              post.media_type === "video"
                ? `<video class="file" src="${escapeHtml(post.media_url)}" muted loop playsinline></video>`
                : `<img class="file" src="${escapeHtml(post.media_url)}" alt="">`
            )
          : "";

        return `
          <section class="item post-card" data-index="${idx}" data-type="post" data-post-id="${post.id}">
            <div class="media gradient" style="--c1:${post.color1 || '#111111'};--c2:${post.color2 || '#444444'};">
              ${mediaHtml}
            </div>

            <div class="badge"><span class="dot"></span> Post</div>
            <div class="sidehint"><span class="line"></span> swipe <span class="line"></span></div>

            <div class="content">
              <div class="card">
                <div class="author-row">
                  <div class="avatar">
                    ${profile.avatar_url
                      ? `<img src="${escapeHtml(profile.avatar_url)}" alt="">`
                      : escapeHtml(avatar)}
                  </div>
                  <div class="author-meta">
                    <div class="author">${escapeHtml(authorName)}</div>
                    <div class="handle">${escapeHtml(authorHandle)}</div>
                  </div>
                </div>

                <h2 class="headline">${escapeHtml(post.title || "")}</h2>
                <p class="caption">${escapeHtml(post.caption || "")}</p>

                <div class="meta">
                  <span class="chip">#shared</span>
                  <span class="chip">#post</span>
                  <span class="chip">${userLiked ? "#liked" : "#fresh"}</span>
                </div>

                <div class="footerline">
                  <div class="stats">
                    <span>${likesCount} likes</span>
                    <span>${post.view_count ?? 0} views</span>
                    <span>${post.share_count ?? 0} shares</span>
                  </div>
                  <div class="cta">
                    <button class="secondary saveBtn">Save</button>
                    <button class="primary openBtn">Open</button>
                  </div>
                </div>
              </div>

              <div class="actions">
                <button class="action likeBtn ${userLiked ? "liked" : ""}" aria-label="Like">${userLiked ? "❤" : "❤"}</button>
                <button class="action" aria-label="Comment">✦</button>
                <button class="action" aria-label="Share">↗</button>
              </div>
            </div>
          </section>
        `;
      }

      const ad = item.data;
      return `
        <section class="item ad-card" data-index="${idx}" data-type="ad">
          <div class="media"></div>

          <div class="badge"><span class="dot"></span> Sponsored</div>
          <div class="sidehint"><span class="line"></span> ad <span class="line"></span></div>

          <div class="content">
            <div class="card">
              <div class="ad-box">
                <div class="ad-label">Sponsored</div>
                <div class="ad-brand">${escapeHtml(ad.brand)}</div>
              </div>

              <h2 class="headline">${escapeHtml(ad.title)}</h2>
              <p class="caption">${escapeHtml(ad.caption)}</p>

              <div class="meta">
                <span class="chip">#native</span>
                <span class="chip">#promotion</span>
                <span class="chip">#brand</span>
              </div>

              <div class="footerline">
                <div class="stats">
                  <span>Reach more users</span>
                  <span>Premium placement</span>
                  <span>Native integration</span>
                </div>
                <div class="cta">
                  <button class="secondary">Details</button>
                  <button class="primary">Open ad</button>
                </div>
              </div>
            </div>

            <div class="actions">
              <button class="action" aria-label="Info">i</button>
              <button class="action" aria-label="Save">▣</button>
              <button class="action" aria-label="Share">↗</button>
            </div>
          </div>
        </section>
      `;
    }).join("");

    attachHandlers();
    updateSegments();
    bindMediaAutoplay();
    updateEmptyState();
    scrollToIndex(0, false);
  }

  function attachHandlers(){
    document.querySelectorAll(".likeBtn").forEach(btn => {
      btn.addEventListener("click", async (e) => {
        const card = e.currentTarget.closest("[data-post-id]");
        if (!card) return;

        const postId = card.dataset.postId;
        const liked = e.currentTarget.classList.contains("liked");

        e.currentTarget.disabled = true;
        try {
          await toggleLike(postId, liked);
          await loadPosts(searchInput.value.trim(), false);
        } finally {
          e.currentTarget.disabled = false;
        }
      });
    });

    document.querySelectorAll(".openBtn").forEach(btn => {
      btn.addEventListener("click", () => {
        const card = btn.closest("[data-post-id]");
        if (!card) return;
        const postId = card.dataset.postId;
        const post = allPosts.find(p => p.id === postId);
        if (post?.media_url) window.open(post.media_url, "_blank", "noopener,noreferrer");
      });
    });
  }

  function bindMediaAutoplay(){
    document.querySelectorAll("video.file").forEach(v => {
      v.play().catch(() => {});
    });
  }

  function updateSegments(){
    const spans = [...document.querySelectorAll(".segment > span")];
    spans.forEach((s, i) => {
      if (i < activeIndex) s.style.width = "100%";
      else if (i > activeIndex) s.style.width = "0%";
    });
  }

  function scrollToIndex(index, smooth = true){
    activeIndex = clamp(index, 0, Math.max(timeline.length - 1, 0));
    if (!timeline.length) return;

    isAutoScrolling = true;
    feed.scrollTo({
      left: activeIndex * window.innerWidth,
      behavior: smooth ? "smooth" : "auto"
    });
    progressStart = performance.now();
    updateSegments();
    setTimeout(() => { isAutoScrolling = false; }, 450);
  }

  function tick(now){
    if (!timeline.length) {
      rafId = requestAnimationFrame(tick);
      return;
    }

    const current = timeline[activeIndex];
    const duration = current?.type === "ad" ? AD_MS : AUTOPLAY_MS;
    const elapsed = now - progressStart;
    const pct = clamp((elapsed / duration) * 100, 0, 100);

    const spans = [...document.querySelectorAll(".segment > span")];
    if (spans[activeIndex]) spans[activeIndex].style.width = pct + "%";

    if (pct >= 100){
      scrollToIndex((activeIndex + 1) % timeline.length, true);
    }

    rafId = requestAnimationFrame(tick);
  }

  function syncActiveFromScroll(){
    if (!timeline.length) return;
    const idx = clamp(Math.round(feed.scrollLeft / window.innerWidth), 0, timeline.length - 1);
    if (idx !== activeIndex && !isAutoScrolling){
      activeIndex = idx;
      progressStart = performance.now();
      updateSegments();
    }
  }

  function getRandomPalette(i){
    const palettes = [
      ["#111111", "#4c4c4c"],
      ["#090909", "#262626"],
      ["#131313", "#555555"],
      ["#1a1a1a", "#373737"]
    ];
    return palettes[i % palettes.length];
  }

  async function ensureSession(){
    const { data, error } = await supabase.auth.getSession();
    if (error) console.error(error);
    if (!data?.session){
      window.location.replace("./login.html");
      return null;
    }
    return data.session;
  }

  async function loadCurrentProfile(){
    const { data: userData, error: userError } = await supabase.auth.getUser();
    if (userError) {
      console.error(userError);
      return null;
    }

    currentUser = userData?.user || null;
    if (!currentUser) return null;

    const { data: profile, error } = await supabase
      .from("profiles")
      .select("id, username, display_name, avatar_url, bio")
      .eq("id", currentUser.id)
      .maybeSingle();

    if (error) {
      console.error(error);
      profileFallback.textContent = (currentUser.email || "S").trim().charAt(0).toUpperCase();
      profileImg.classList.add("hidden");
      profileFallback.classList.remove("hidden");
      return null;
    }

    currentProfile = profile || null;

    const avatarUrl = profile?.avatar_url || currentUser.user_metadata?.avatar_url || currentUser.user_metadata?.picture || null;

    if (avatarUrl) {
      profileImg.src = avatarUrl;
      profileImg.classList.remove("hidden");
      profileFallback.classList.add("hidden");
    } else {
      profileFallback.textContent = (profile?.display_name || profile?.username || currentUser.email || "S").trim().charAt(0).toUpperCase();
      profileImg.classList.add("hidden");
      profileFallback.classList.remove("hidden");
    }

    uName.value = profile?.display_name || "";
    uHandle.value = profile?.username ? `@${profile.username}` : "";
    return profile;
  }

  async function fetchPosts(query){
    let q = supabase
      .from("posts")
      .select(`
        id,
        user_id,
        title,
        caption,
        media_url,
        media_type,
        created_at,
        view_count,
        share_count
      `)
      .order("created_at", { ascending: false })
      .limit(50);

    if (query) {
      q = q.or(`title.ilike.%${query}%,caption.ilike.%${query}%`);
    }

    const { data, error } = await q;
    if (error) {
      console.error(error);
      return [];
    }
    return data || [];
  }

  async function loadPosts(query = "", preserveScroll = true){
    const q = sanitizeQuery(query);
    const posts = await fetchPosts(q);

    const userIds = [...new Set(posts.map(p => p.user_id).filter(Boolean))];
    const postIds = posts.map(p => p.id);

    let profileRows = [];
    if (userIds.length) {
      const { data, error } = await supabase
        .from("profiles")
        .select("id, username, display_name, avatar_url")
        .in("id", userIds);

      if (error) console.error(error);
      profileRows = data || [];
    }

    const profileMap = new Map(profileRows.map(p => [p.id, p]));

    const likeCounts = new Map();
    const userLikes = new Set();

    if (postIds.length) {
      const { data: likesRows, error: likesError } = await supabase
        .from("likes")
        .select("post_id, user_id")
        .in("post_id", postIds);

      if (likesError) console.error(likesError);

      for (const row of (likesRows || [])) {
        likeCounts.set(row.post_id, (likeCounts.get(row.post_id) || 0) + 1);
        if (currentUser && row.user_id === currentUser.id) {
          userLikes.add(row.post_id);
        }
      }
    }

    allPosts = posts.map((p, idx) => {
      const [c1, c2] = getRandomPalette(idx);
      return {
        ...p,
        color1: c1,
        color2: c2,
        profile: profileMap.get(p.user_id) || null,
        like_count: likeCounts.get(p.id) || 0,
        user_liked: userLikes.has(p.id)
      };
    });

    visiblePosts = allPosts;
    renderFeed();

    if (!preserveScroll) scrollToIndex(0, false);
  }

  async function toggleLike(postId, liked){
    if (!currentUser) return;

    if (liked) {
      const { error } = await supabase
        .from("likes")
        .delete()
        .eq("post_id", postId)
        .eq("user_id", currentUser.id);

      if (error) throw error;
    } else {
      const { error } = await supabase
        .from("likes")
        .insert({
          post_id: postId,
          user_id: currentUser.id
        });

      if (error) throw error;
    }
  }

  async function uploadMediaIfNeeded(file){
    if (!file) return { url: null, type: null };

    const safeName = file.name.replaceAll(" ", "_");
    const path = `${currentUser.id}/${Date.now()}-${safeName}`;

    const { error: uploadError } = await supabase
      .storage
      .from("shared")
      .upload(path, file, {
        cacheControl: "3600",
        upsert: false
      });

    if (uploadError) throw uploadError;

    const { data } = supabase
      .storage
      .from("shared")
      .getPublicUrl(path);

    return {
      url: data.publicUrl,
      type: file.type.startsWith("video/") ? "video" : "image"
    };
  }

  async function createPost(){
    if (!currentUser) return;

    const displayName = uName.value.trim();
    const handle = uHandle.value.trim().replace(/^@/, "");
    const title = uTitle.value.trim();
    const caption = uCaption.value.trim();
    const file = uFile.files?.[0] || null;

    if (!displayName || !handle || !title || !caption) {
      alert("Compila username, handle, titolo e caption.");
      return;
    }

    submitUploadBtn.disabled = true;

    try {
      const { error: profileUpsertError } = await supabase
        .from("profiles")
        .upsert({
          id: currentUser.id,
          username: handle,
          display_name: displayName,
          avatar_url: currentProfile?.avatar_url || null
        }, { onConflict: "id" });

      if (profileUpsertError) throw profileUpsertError;

      const media = await uploadMediaIfNeeded(file);

      const { error: postError } = await supabase
        .from("posts")
        .insert({
          user_id: currentUser.id,
          title,
          caption,
          media_url: media.url,
          media_type: media.type
        });

      if (postError) throw postError;

      closeModal();
      uName.value = "";
      uHandle.value = "";
      uTitle.value = "";
      uCaption.value = "";
      uFile.value = "";
      resetFilePreview();

      await loadCurrentProfile();
      await loadPosts(searchInput.value.trim(), false);
    } catch (err) {
      console.error(err);
      alert(err?.message || "Errore durante il publish.");
    } finally {
      submitUploadBtn.disabled = false;
    }
  }

  function initSearch(){
    searchInput.addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        loadPosts(searchInput.value.trim(), false);
      }, 250);
    });
  }

  function initUploadModal(){
    openUploadBtn.addEventListener("click", openModal);
    closeUploadBtn.addEventListener("click", closeModal);
    cancelUploadBtn.addEventListener("click", closeModal);

    uploadModal.addEventListener("click", (e) => {
      if (e.target === uploadModal) closeModal();
    });

    submitUploadBtn.addEventListener("click", createPost);

    uName.addEventListener("input", previewFromForm);
    uHandle.addEventListener("input", previewFromForm);
    uTitle.addEventListener("input", previewFromForm);
    uCaption.addEventListener("input", previewFromForm);

    uFile.addEventListener("change", () => {
      const file = uFile.files?.[0];
      resetFilePreview();

      if (!file) {
        previewFromForm();
        return;
      }

      const url = URL.createObjectURL(file);

      if (file.type.startsWith("video/")) {
        previewVideo.src = url;
        previewVideo.style.display = "block";
        previewVideo.play().catch(() => {});
      } else {
        previewImg.src = url;
        previewImg.style.display = "block";
      }

      previewTitle.textContent = uTitle.value.trim() || file.name;
      previewText.textContent = uCaption.value.trim() || "Anteprima del file selezionato.";
    });
  }

  function initFeedControls(){
    feed.addEventListener("wheel", (e) => {
      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
        e.preventDefault();
        feed.scrollLeft += e.deltaY;
      }
    }, { passive:false });

    feed.addEventListener("scroll", syncActiveFromScroll);

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") scrollToIndex(activeIndex + 1, true);
      if (e.key === "ArrowLeft") scrollToIndex(activeIndex - 1, true);
    });

    window.addEventListener("resize", () => scrollToIndex(activeIndex, false));
  }

  async function ensureReady(){
    const session = await ensureSession();
    if (!session) return;

    await loadCurrentProfile();
    await loadPosts("", false);

    loading.classList.add("hidden");
    app.classList.remove("hidden");

    rafId = requestAnimationFrame(tick);
  }

  initSearch();
  initUploadModal();
  initFeedControls();
  ensureReady();
</script>
</body>
</html>
