<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shared</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:'Archivo Black', sans-serif;
}

.container{
  max-width:720px;
  margin:auto;
  padding:20px;
}

/* HEADER */
.header{
  text-align:center;
  font-size:30px;
  letter-spacing:1px;
  margin-bottom:22px;
}

/* CARD */
.card{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:20px;
  padding:16px;
  margin-bottom:18px;
}

/* PREVIEW */
.preview{
  width:110px;
  height:110px;
  border-radius:28px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:12px;
  border:1px solid #222;
  overflow:hidden;
}

.preview img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* INPUT */
input,textarea{
  width:100%;
  margin-top:10px;
  padding:11px;
  border-radius:14px;
  border:1px solid #222;
  background:#000;
  color:#fff;
  font-family:'Archivo Black', sans-serif;
}

/* BUTTON */
button{
  width:100%;
  margin-top:12px;
  padding:14px;
  border-radius:16px;
  border:none;
  background:linear-gradient(135deg,#fff,#cfcfcf);
  color:#000;
  font-family:'Archivo Black';
  cursor:pointer;
  transition:0.15s ease;
}

button:hover{
  transform:scale(1.02);
}

button:active{
  transform:scale(0.98);
}

/* POST */
.post{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:20px;
  padding:14px;
  margin-bottom:16px;
}

/* IMAGE */
.post img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:16px;
  margin-bottom:10px;
}

/* HEADER POST */
.post-header{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  opacity:0.7;
  margin-bottom:8px;
}

/* ICONS */
.icon{
  font-family:'Material Symbols Outlined';
  font-size:22px;
  cursor:pointer;
  user-select:none;
}

.delete-btn{
  background:#ff3b3b;
  width:32px;
  height:32px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* LIKE */
.like-row{
  display:flex;
  gap:8px;
  align-items:center;
  margin-top:10px;
}

.liked{
  color:#ff3b3b;
}

/* SONG LIST */
#suggestions .song-item,
#songList .song-item{
  padding:10px;
  border:1px solid #222;
  border-radius:12px;
  margin-top:6px;
  cursor:pointer;
  font-size:12px;
}

#suggestions .song-item:hover{
  background:#111;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">Shared.</div>

  <!-- UPLOAD -->
  <div class="card">

    <div class="preview" id="previewBox">+</div>

    <input type="file" id="file" accept="image/png,image/jpeg,image/jpg,image/gif">

    <textarea id="caption" placeholder="Write a caption..."></textarea>

    <input id="songInput" placeholder="Search for a song...">
    <div id="suggestions"></div>
    <div id="songList"></div>

    <button id="uploadBtn">UPLOAD</button>

  </div>

  <!-- FEED -->
  <div id="feed"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://cnhaonawapuahzoctqav.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes"
);

let user;
let croppedBlob;
let selectedSong;

let globalAudio = new Audio();

/* restore audio */
const saved = localStorage.getItem("playingPreview");
if(saved){
  globalAudio.src = saved;
  globalAudio.play().catch(()=>{});
}

/* init */
(async()=>{
  const {data:{session}} = await supabase.auth.getSession();
  if(!session) location.href="index.html";
  user = session.user;
  loadFeed();
  realtime();
})();

/* FILE + MODERATION */
file.onchange = async e => {

  const f = e.target.files[0];
  if(!f) return;

  const allowed = ["image/jpeg","image/png","image/gif"];
  if(!allowed.includes(f.type)){
    alert("Only JPG, PNG or GIF allowed");
    file.value="";
    return;
  }

  const formData = new FormData();
  formData.append("file", f);

  const res = await fetch("https://shared-bk4b.onrender.com/moderate",{
    method:"POST",
    body:formData
  });

  const result = await res.json();

  if(!result.ok){
    alert("Image rejected by moderation");
    file.value="";
    return;
  }

  const reader = new FileReader();
  const img = new Image();

  reader.onload = ev => img.src = ev.target.result;

  img.onload = () => {
    const canvas = document.createElement("canvas");
    canvas.width = 800;
    canvas.height = 800;

    const size = Math.min(img.width, img.height);
    const ctx = canvas.getContext("2d");

    ctx.drawImage(
      img,
      (img.width-size)/2,
      (img.height-size)/2,
      size,size,
      0,0,800,800
    );

    canvas.toBlob(b=>{
      croppedBlob = b;
      previewBox.innerHTML = `<img src="${URL.createObjectURL(b)}">`;
    },"image/jpeg",0.7);
  };

  reader.readAsDataURL(f);
};

/* upload */
uploadBtn.onclick = async () => {
  if(!croppedBlob) return;

  const path = `${user.id}/${Date.now()}.jpg`;

  await supabase.storage.from("shared").upload(path,croppedBlob);
  const {data} = supabase.storage.from("shared").getPublicUrl(path);

  await supabase.from("posts").insert([{
    user_id:user.id,
    image_url:data.publicUrl,
    caption:caption.value,
    song_preview:selectedSong?.preview,
    song_title:selectedSong?.title
  }]);

  croppedBlob=null;
  selectedSong=null;
  previewBox.innerHTML="+";
  caption.value="";
  songList.innerHTML="";
};

/* delete */
async function deletePost(id,el){
  el.remove();
  await supabase.from("posts").delete().eq("id",id);
}

/* like */
async function toggleLike(p,liked,icon,countEl){
  if(liked){
    icon.classList.remove("liked");
    countEl.textContent--;
    await supabase.from("likes")
      .delete().eq("post_id",p.id).eq("user_id",user.id);
  }else{
    icon.classList.add("liked");
    countEl.textContent++;
    await supabase.from("likes")
      .insert([{post_id:p.id,user_id:user.id}]);
  }
}

/* feed */
async function loadFeed(){

  const {data:posts} = await supabase
    .from("posts")
    .select("*")
    .order("created_at",{ascending:false});

  const {data:likes} = await supabase
    .from("likes")
    .select("*");

  feed.innerHTML = "";

  posts.forEach(p=>{

    const userLikes = likes.filter(l=>l.post_id===p.id);
    const liked = userLikes.some(l=>l.user_id===user.id);

    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <div class="post-header">
        <div>${p.user_id.slice(0,6)}</div>
        ${p.user_id===user.id
          ? `<div class="delete-btn"><span class="icon">delete</span></div>`
          : ""
        }
      </div>

      <img src="${p.image_url}">
      <div>${p.caption||""}</div>

      <div class="like-row">
        <span class="icon ${liked?'liked':''}">favorite</span>
        <span>${userLikes.length}</span>
      </div>
    `;

    const img = div.querySelector("img");
    const icon = div.querySelector(".icon");
    const count = div.querySelector(".like-row span:last-child");

    let clickTimeout;

    img.onclick = () => {
      if(clickTimeout){
        clearTimeout(clickTimeout);
        clickTimeout=null;
        toggleLike(p,icon.classList.contains("liked"),icon,count);
      }else{
        clickTimeout=setTimeout(()=>{
          if(globalAudio.src===p.song_preview){
            globalAudio.paused ? globalAudio.play() : globalAudio.pause();
          }else{
            globalAudio.src=p.song_preview;
            globalAudio.play();
            localStorage.setItem("playingPreview",p.song_preview);
          }
          clickTimeout=null;
        },250);
      }
    };

    if(p.user_id===user.id){
      div.querySelector(".delete-btn").onclick=e=>{
        e.stopPropagation();
        deletePost(p.id,div);
      };
    }

    div.querySelector(".like-row").onclick=e=>{
      e.stopPropagation();
      toggleLike(p,liked,icon,count);
    };

    feed.appendChild(div);
  });
}

/* realtime */
function realtime(){
  supabase.channel("rt")
    .on("postgres_changes",{event:"*",schema:"public",table:"posts"},loadFeed)
    .on("postgres_changes",{event:"*",schema:"public",table:"likes"},loadFeed)
    .subscribe();
}
</script>

</body>
</html>
