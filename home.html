<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shared</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  font-family:'Archivo Black', sans-serif;
}

:root{
  --bg:#000;
  --panel:#0f0f0f;
  --panel-2:#111;
  --border:#222;
  --border-2:#333;
  --text:#fff;
  --muted:rgba(255,255,255,.65);
}

html, body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

body{
  min-height:100vh;
}

.container{
  max-width:720px;
  margin:0 auto;
  padding:20px;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:20px;
}

.header{
  font-size:30px;
  line-height:1;
  text-align:center;
  flex:1;
}

.icon-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  border:none;
  border-radius:999px;
  padding:10px 14px;
  cursor:pointer;
  font-size:12px;
  background:#fff;
  color:#000;
  white-space:nowrap;
}

.icon-btn.secondary{
  background:#1a1a1a;
  color:#fff;
  border:1px solid #333;
}

.icon-btn.liked{
  color:#ff2d55;
}

.material-symbols-outlined{
  font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
  line-height:1;
  font-size:20px;
}

.icon-btn.liked .material-symbols-outlined{
  font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;
}

.upload-box{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:24px;
  padding:16px;
  margin-bottom:18px;
}

.dropzone{
  width:100%;
  min-height:160px;
  border-radius:18px;
  border:2px dashed var(--border-2);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:8px;
  color:#777;
  cursor:pointer;
  transition:.2s;
  user-select:none;
  text-align:center;
  padding:18px;
}

.dropzone.dragover{
  border-color:#fff;
  color:#fff;
}

.preview{
  width:100%;
  height:160px;
  border-radius:18px;
  overflow:hidden;
  display:none;
  margin-bottom:10px;
  border:1px solid var(--border);
}

.preview img{
  width:100%;
  height:100%;
  object-fit:cover;
}

input,textarea{
  width:100%;
  margin-top:10px;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:#000;
  color:#fff;
  outline:none;
}

textarea{
  min-height:100px;
  resize:vertical;
}

.song-wrapper{
  position:relative;
}

#suggestions{
  position:absolute;
  top:100%;
  left:0;
  right:0;
  margin-top:6px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  max-height:260px;
  overflow:auto;
  z-index:20;
  display:none;
}

.song-item{
  padding:12px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  font-size:12px;
}

.song-item:last-child{
  border-bottom:none;
}

.song-item:hover{
  background:#151515;
}

.song-item small{
  display:block;
  margin-top:4px;
  opacity:.7;
  font-size:11px;
  font-family:inherit;
}

.selected-song{
  margin-top:10px;
  border:1px solid var(--border);
  border-radius:16px;
  background:var(--panel-2);
  padding:12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.selected-song .meta{
  min-width:0;
  flex:1;
}

.selected-song .title{
  font-size:12px;
  line-height:1.35;
}

.selected-song .artist{
  display:block;
  margin-top:4px;
  font-size:11px;
  opacity:.72;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.selected-song-actions{
  display:flex;
  gap:8px;
  align-items:center;
  flex:0 0 auto;
}

.primary-btn{
  width:100%;
  margin-top:12px;
  padding:14px;
  border-radius:16px;
  border:none;
  background:linear-gradient(135deg,#fff,#d7d7d7);
  color:#000;
  cursor:pointer;
  font-size:14px;
}

#feed{
  display:grid;
  gap:16px;
}

.post{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:20px;
  padding:14px;
}

.post img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:16px;
  margin-bottom:10px;
}

.post-header{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
  margin-bottom:10px;
}

.post-user{
  display:flex;
  flex-direction:column;
  gap:4px;
  min-width:0;
}

.post-user .name{
  font-size:13px;
}

.post-user .time{
  font-size:11px;
  opacity:.72;
  display:flex;
  align-items:center;
  gap:6px;
}

.post-caption{
  font-size:14px;
  line-height:1.4;
  white-space:pre-wrap;
  margin-top:8px;
}

.post-song{
  margin-top:12px;
  padding-top:12px;
  border-top:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.song-meta{
  min-width:0;
}

.song-title{
  font-size:12px;
  line-height:1.35;
}

.song-sub{
  margin-top:4px;
  font-size:11px;
  opacity:.7;
}

.post-actions{
  margin-top:12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}

.like-wrap{
  display:flex;
  align-items:center;
  gap:8px;
}

.like-count{
  font-size:12px;
  opacity:.85;
  min-width:16px;
  text-align:center;
}

.empty-state{
  opacity:.6;
  font-size:13px;
  text-align:center;
  padding:24px 0;
}

/* Sidebar */
#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  z-index:50;
  display:none;
}

#overlay.show{
  display:block;
}

#sidebar{
  position:fixed;
  top:0;
  left:-340px;
  width:300px;
  max-width:88vw;
  height:100vh;
  background:#0f0f0f;
  border-right:1px solid #222;
  z-index:60;
  transition:left .25s ease;
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

#sidebar.open{
  left:0;
}

.sidebar-title{
  font-size:18px;
  margin-bottom:4px;
}

.search-box{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.search-box input{
  margin-top:0;
}

#userResults{
  display:flex;
  flex-direction:column;
  gap:8px;
  max-height:55vh;
  overflow:auto;
}

.user-item{
  border:1px solid #222;
  background:#000;
  border-radius:14px;
  padding:12px;
  cursor:pointer;
  transition:.15s ease;
}

.user-item:hover{
  background:#111;
}

.user-item .display-name{
  font-size:12px;
  line-height:1.35;
}

.user-item .meta{
  display:block;
  margin-top:4px;
  opacity:.7;
  font-size:11px;
  font-family:inherit;
}

.sidebar-spacer{
  flex:1;
}

@media (max-width:520px){
  .topbar{
    align-items:center;
  }

  .post-actions,
  .post-song,
  .selected-song{
    flex-direction:column;
    align-items:flex-start;
  }

  .selected-song-actions{
    width:100%;
    justify-content:space-between;
  }

  .icon-btn{
    width:auto;
  }

  .header{
    font-size:26px;
  }

  #sidebar{
    width:86vw;
  }
}
</style>
</head>

<body>
<div id="overlay"></div>

<aside id="sidebar" aria-label="Sidebar menu">

    <div id="userResults"></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://cnhaonawapuahzoctqav.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes"
);

const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("file");
const previewBox = document.getElementById("previewBox");
const captionInput = document.getElementById("caption");
const songInput = document.getElementById("songInput");
const suggestions = document.getElementById("suggestions");
const songList = document.getElementById("songList");
const feed = document.getElementById("feed");
const uploadBtn = document.getElementById("uploadBtn");
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const userSearch = document.getElementById("userSearch");
const userResults = document.getElementById("userResults");
const logoutSidebarBtn = document.getElementById("logoutSidebarBtn");

let user = null;
let displayName = "user";
let croppedBlob = null;
let selectedSong = null;
let debounceSong = null;
let debounceUser = null;
let globalAudio = new Audio();
let activePlayButton = null;
let jsonpScript = null;
let postState = new Map();
let canSaveUsername = false;

function getFallbackName(sessionUser){
  return (
    sessionUser?.user_metadata?.display_name ||
    sessionUser?.user_metadata?.username ||
    sessionUser?.user_metadata?.name ||
    sessionUser?.email?.split("@")?.[0] ||
    "user"
  );
}

function formatDateTime(value){
  const d = value ? new Date(value) : null;
  if(!d || Number.isNaN(d.getTime())) return "";
  return new Intl.DateTimeFormat("it-IT", {
    dateStyle: "medium",
    timeStyle: "short"
  }).format(d);
}

function setAudioButtonState(button, playing){
  if(!button) return;
  const icon = button.querySelector(".material-symbols-outlined");
  const label = button.querySelector(".btn-label");
  if(!icon || !label) return;

  if(playing){
    icon.textContent = "pause";
    label.textContent = "Pause preview";
    button.dataset.playing = "1";
  }else{
    icon.textContent = "play_arrow";
    label.textContent = "Play preview";
    button.dataset.playing = "0";
  }
}

async function playPreview(url, button){
  if(!url || !button) return;

  if(activePlayButton && activePlayButton !== button){
    setAudioButtonState(activePlayButton, false);
  }

  if(globalAudio.src !== url){
    globalAudio.pause();
    globalAudio.src = url;
  }

  if(globalAudio.paused){
    try{
      await globalAudio.play();
      setAudioButtonState(button, true);
      activePlayButton = button;
    }catch(err){
      console.error("audio play error", err);
    }
  }else{
    globalAudio.pause();
    setAudioButtonState(button, false);
    if(activePlayButton === button) activePlayButton = null;
  }
}

globalAudio.addEventListener("ended", ()=>{
  if(activePlayButton){
    setAudioButtonState(activePlayButton, false);
    activePlayButton = null;
  }
});

function openSidebar(){
  sidebar.classList.add("open");
  overlay.classList.add("show");
}

function closeSidebar(){
  sidebar.classList.remove("open");
  overlay.classList.remove("show");
}

menuBtn.onclick = openSidebar;
overlay.onclick = closeSidebar;

logoutSidebarBtn.onclick = async ()=>{
  await supabase.auth.signOut();
  location.href = "index.html";
};

(async ()=>{
  const { data: { session } } = await supabase.auth.getSession();
  if(!session) location.href = "index.html";

  user = session.user;
  displayName = getFallbackName(user);

  await detectUsernameColumn();
  await loadFeed();
  realtime();
})();

async function detectUsernameColumn(){
  try{
    const { error } = await supabase
      .from("posts")
      .select("username")
      .limit(1);

    canSaveUsername = !error;
    if(error) console.warn("username column not available:", error.message);
  }catch(_){
    canSaveUsername = false;
  }
}

/* image picker */
dropzone.onclick = ()=> fileInput.click();

dropzone.ondragover = e=>{
  e.preventDefault();
  dropzone.classList.add("dragover");
};

dropzone.ondragleave = ()=>{
  dropzone.classList.remove("dragover");
};

dropzone.ondrop = e=>{
  e.preventDefault();
  dropzone.classList.remove("dragover");
  handleFile(e.dataTransfer.files[0]);
};

fileInput.onchange = e=>{
  handleFile(e.target.files[0]);
};

async function handleFile(file){
  if(!file) return;

  const reader = new FileReader();
  const img = new Image();

  reader.onload = e=>{
    img.src = e.target.result;
  };

  img.onload = ()=>{
    const canvas = document.createElement("canvas");
    canvas.width = 800;
    canvas.height = 800;

    const size = Math.min(img.width, img.height);
    const ctx = canvas.getContext("2d");

    ctx.drawImage(
      img,
      (img.width - size) / 2,
      (img.height - size) / 2,
      size,
      size,
      0,
      0,
      800,
      800
    );

    canvas.toBlob(blob=>{
      croppedBlob = blob;
      previewBox.style.display = "block";
      dropzone.style.display = "none";
      previewBox.innerHTML = `<img src="${URL.createObjectURL(blob)}" alt="preview">`;
    }, "image/jpeg", 0.75);
  };

  reader.readAsDataURL(file);
}

/* Deezer JSONP */
function deezerSearch(query){
  return new Promise((resolve, reject)=>{
    if(jsonpScript){
      jsonpScript.remove();
      jsonpScript = null;
    }

    const callbackName = `dz_cb_${Date.now()}_${Math.random().toString(36).slice(2)}`;
    const timeout = setTimeout(()=>{
      cleanup();
      reject(new Error("Deezer request timeout"));
    }, 10000);

    function cleanup(){
      clearTimeout(timeout);
      try{ delete window[callbackName]; }catch(_){}
      if(jsonpScript && jsonpScript.parentNode){
        jsonpScript.parentNode.removeChild(jsonpScript);
      }
      jsonpScript = null;
    }

    window[callbackName] = data=>{
      cleanup();
      resolve(data);
    };

    const script = document.createElement("script");
    jsonpScript = script;
    script.onerror = ()=>{
      cleanup();
      reject(new Error("Deezer request failed"));
    };

    script.src = `https://api.deezer.com/search?q=${encodeURIComponent(query)}&output=jsonp&callback=${callbackName}`;
    document.body.appendChild(script);
  });
}

/* selected song */
function renderSelectedSong(){
  if(!selectedSong){
    songList.innerHTML = "";
    return;
  }

  songList.innerHTML = `
    <div class="selected-song">
      <div class="meta">
        <div class="title">Selected: ${selectedSong.title}</div>
        <span class="artist">${selectedSong.artist || ""}</span>
      </div>

      <div class="selected-song-actions">
        <button type="button" class="icon-btn secondary" id="selectedPlayBtn">
          <span class="material-symbols-outlined">play_arrow</span>
          <span class="btn-label">Play preview</span>
        </button>

        <button type="button" class="icon-btn secondary" id="clearSongBtn" title="Remove song">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
    </div>
  `;

  const selectedPlayBtn = document.getElementById("selectedPlayBtn");
  const clearSongBtn = document.getElementById("clearSongBtn");

  selectedPlayBtn.onclick = ()=>{
    playPreview(selectedSong.preview, selectedPlayBtn);
  };

  clearSongBtn.onclick = ()=>{
    selectedSong = null;
    songList.innerHTML = "";
  };
}

/* search songs */
songInput.addEventListener("input", async e=>{
  clearTimeout(debounceSong);
  const q = e.target.value.trim();

  if(q.length < 2){
    suggestions.innerHTML = "";
    suggestions.style.display = "none";
    return;
  }

  debounceSong = setTimeout(async ()=>{
    try{
      const data = await deezerSearch(q);
      const tracks = (data?.data || []).filter(track => track && track.preview);

      suggestions.innerHTML = "";

      if(tracks.length === 0){
        suggestions.innerHTML = `<div class="song-item">No results</div>`;
        suggestions.style.display = "block";
        return;
      }

      tracks.slice(0, 6).forEach(track=>{
        const row = document.createElement("div");
        row.className = "song-item";
        row.innerHTML = `
          ${track.title}
          <small>${track.artist?.name || "Unknown artist"}</small>
        `;

        row.onclick = ()=>{
          selectedSong = {
            title: track.title,
            artist: track.artist?.name || "",
            preview: track.preview,
            id: track.id
          };
          renderSelectedSong();
          suggestions.innerHTML = "";
          suggestions.style.display = "none";
          songInput.value = "";
        };

        suggestions.appendChild(row);
      });

      suggestions.style.display = "block";
    }catch(err){
      console.error(err);
      suggestions.innerHTML = `<div class="song-item">Search failed</div>`;
      suggestions.style.display = "block";
    }
  }, 250);
});

document.addEventListener("click", e=>{
  if(!e.target.closest(".song-wrapper")){
    suggestions.style.display = "none";
  }
});

/* search users in sidebar */
userSearch.addEventListener("input", async e=>{
  clearTimeout(debounceUser);
  const q = e.target.value.trim();

  if(q.length < 2){
    userResults.innerHTML = "";
    return;
  }

  debounceUser = setTimeout(async ()=>{
    const { data, error } = await supabase
      .from("profiles")
      .select("id, display_name")
      .ilike("display_name", `%${q}%`)
      .order("display_name", { ascending: true })
      .limit(8);

    if(error){
      console.error(error);
      userResults.innerHTML = `<div class="empty-state">Search unavailable.</div>`;
      return;
    }

    const rows = data || [];
    if(rows.length === 0){
      userResults.innerHTML = `<div class="empty-state">No profiles found.</div>`;
      return;
    }

    userResults.innerHTML = "";

    rows.forEach(profile=>{
      const item = document.createElement("div");
      item.className = "user-item";
      item.innerHTML = `
        <div class="display-name">${profile.display_name || "Unnamed profile"}</div>
        <small class="meta">Tap to use this name</small>
      `;

      item.onclick = ()=>{
        userSearch.value = profile.display_name || "";
        userResults.innerHTML = "";
      };

      userResults.appendChild(item);
    });
  }, 250);
});

/* upload */
uploadBtn.onclick = async ()=>{
  if(!croppedBlob){
    alert("Image required");
    return;
  }

  if(!captionInput.value.trim()){
    alert("Caption required");
    return;
  }

  if(!selectedSong){
    alert("Select a song");
    return;
  }

  const path = `${user.id}/${Date.now()}.jpg`;

  const { error: uploadError } = await supabase.storage
    .from("shared")
    .upload(path, croppedBlob, {
      contentType: "image/jpeg",
      upsert: false
    });

  if(uploadError){
    console.error(uploadError);
    alert(uploadError.message || "Upload failed");
    return;
  }

  const { data } = supabase.storage.from("shared").getPublicUrl(path);

  const payload = {
    user_id: user.id,
    image_url: data.publicUrl,
    caption: captionInput.value.trim(),
    song_title: selectedSong.title,
    song_preview: selectedSong.preview,
    created_at: new Date().toISOString()
  };

  if(canSaveUsername){
    payload.username = displayName;
  }

  const { error: insertError } = await supabase.from("posts").insert([payload]);

  if(insertError){
    console.error(insertError);
    alert(insertError.message || "Post failed");
    return;
  }

  croppedBlob = null;
  selectedSong = null;

  previewBox.innerHTML = "";
  previewBox.style.display = "none";
  dropzone.style.display = "flex";

  captionInput.value = "";
  songInput.value = "";
  songList.innerHTML = "";
  suggestions.innerHTML = "";
  suggestions.style.display = "none";

  await loadFeed();
};

/* likes */
async function toggleLike(postId){
  const { data: { session } } = await supabase.auth.getSession();
  if(!session) return;

  const uid = session.user.id;
  const state = postState.get(postId);
  if(!state) return;

  const { data: existing, error: findError } = await supabase
    .from("likes")
    .select("id")
    .eq("post_id", postId)
    .eq("user_id", uid)
    .maybeSingle();

  if(findError){
    console.error(findError);
    return;
  }

  const row = state.element;
  const likeBtn = row.querySelector(".likeBtn");
  const likeCountEl = row.querySelector(".likeCount");
  const iconEl = likeBtn.querySelector(".material-symbols-outlined");

  if(existing){
    const { error } = await supabase
      .from("likes")
      .delete()
      .eq("id", existing.id);

    if(error){
      console.error(error);
      alert(error.message || "Unlike failed");
      return;
    }

    state.likedByMe = false;
    state.count = Math.max(0, state.count - 1);
  }else{
    const { error } = await supabase
      .from("likes")
      .insert([{ post_id: postId, user_id: uid }]);

    if(error){
      console.error(error);
      alert(error.message || "Like failed");
      return;
    }

    state.likedByMe = true;
    state.count += 1;
  }

  likeCountEl.textContent = String(state.count);

  if(state.likedByMe){
    likeBtn.classList.add("liked");
    iconEl.textContent = "favorite";
  }else{
    likeBtn.classList.remove("liked");
    iconEl.textContent = "favorite_border";
  }
}

/* delete own post */
async function deletePost(postId){
  const { data: { session } } = await supabase.auth.getSession();
  if(!session) return;

  const confirmDelete = confirm("Delete this post?");
  if(!confirmDelete) return;

  const { error } = await supabase
    .from("posts")
    .delete()
    .eq("id", postId)
    .eq("user_id", user.id);

  if(error){
    console.error(error);
    alert(error.message || "Delete failed");
    return;
  }

  await loadFeed();
}

/* feed */
async function loadFeed(){
  const { data: posts, error: postsError } = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  if(postsError){
    console.error(postsError);
    feed.innerHTML = `<div class="empty-state">Unable to load feed.</div>`;
    return;
  }

  const rows = posts || [];
  feed.innerHTML = "";
  postState.clear();

  if(rows.length === 0){
    feed.innerHTML = `<div class="empty-state">No posts yet.</div>`;
    return;
  }

  const postIds = rows.map(p => p.id);
  let likes = [];

  if(postIds.length){
    const { data: likesData, error: likesError } = await supabase
      .from("likes")
      .select("post_id,user_id")
      .in("post_id", postIds);

    if(likesError){
      console.error(likesError);
    }else{
      likes = likesData || [];
    }
  }

  const likeCountMap = new Map();
  const likedByMeMap = new Map();

  likes.forEach(row=>{
    likeCountMap.set(row.post_id, (likeCountMap.get(row.post_id) || 0) + 1);
    if(row.user_id === user.id){
      likedByMeMap.set(row.post_id, true);
    }
  });

  rows.sort((a, b)=>{
    const diffLikes = (likeCountMap.get(b.id) || 0) - (likeCountMap.get(a.id) || 0);
    if(diffLikes !== 0) return diffLikes;
    return new Date(b.created_at || 0) - new Date(a.created_at || 0);
  });

  for(const post of rows){
    const likeCount = likeCountMap.get(post.id) || 0;
    const likedByMe = likedByMeMap.get(post.id) || false;
    const postEl = renderPost(post, likeCount, likedByMe);
    feed.appendChild(postEl);

    postState.set(post.id, {
      count: likeCount,
      likedByMe,
      element: postEl
    });
  }
}

function renderPost(post, likeCount, likedByMe){
  const postDiv = document.createElement("div");
  postDiv.className = "post";
  postDiv.dataset.postId = post.id;

  const author = post.username || "user";
  const formattedDate = formatDateTime(post.created_at);

  postDiv.innerHTML = `
    <img src="${post.image_url}" alt="post image">

    <div class="post-header">
      <div class="post-user">
        <div class="name">${author}</div>
        <div class="time">
          <span class="material-symbols-outlined" style="font-size:16px;">schedule</span>
          <span>${formattedDate || ""}</span>
        </div>
      </div>

      ${
        post.user_id === user.id
          ? `<button type="button" class="icon-btn secondary deleteBtn" title="Delete post">
              <span class="material-symbols-outlined">delete</span>
              Delete
            </button>`
          : `<span class="material-symbols-outlined" style="opacity:.6;">more_horiz</span>`
      }
    </div>

    <div class="post-caption">${post.caption || ""}</div>

    <div class="post-song">
      <div class="song-meta">
        <div class="song-title">
          <span class="material-symbols-outlined" style="font-size:16px;vertical-align:-3px;margin-right:4px;">music_note</span>
          ${post.song_title || "Unknown song"}
        </div>
        <div class="song-sub">Hover to play preview</div>
      </div>

      <button type="button" class="icon-btn secondary playBtn">
        <span class="material-symbols-outlined">play_arrow</span>
        <span class="btn-label">Play preview</span>
      </button>
    </div>

    <div class="post-actions">
      <div class="like-wrap">
        <button type="button" class="icon-btn likeBtn ${likedByMe ? "liked" : ""}">
          <span class="material-symbols-outlined">${likedByMe ? "favorite" : "favorite_border"}</span>
          <span>Like</span>
        </button>

        <div class="like-count">
          <span class="likeCount">${likeCount}</span> likes
        </div>
      </div>
    </div>
  `;

  const playBtn = postDiv.querySelector(".playBtn");
  const likeBtn = postDiv.querySelector(".likeBtn");
  const deleteBtn = postDiv.querySelector(".deleteBtn");

  playBtn.onclick = ()=>{
    playPreview(post.song_preview, playBtn);
  };

  postDiv.addEventListener("mouseenter", ()=>{
    if(post.song_preview){
      playPreview(post.song_preview, playBtn);
    }
  });

  postDiv.addEventListener("mouseleave", ()=>{
    if(globalAudio.src === post.song_preview){
      globalAudio.pause();
      setAudioButtonState(playBtn, false);
      if(activePlayButton === playBtn) activePlayButton = null;
    }
  });

  likeBtn.onclick = async ()=>{
    await toggleLike(post.id);
  };

  if(deleteBtn){
    deleteBtn.onclick = async ()=>{
      await deletePost(post.id);
    };
  }

  return postDiv;
}

function realtime(){
  supabase
    .channel("shared-posts-likes")
    .on("postgres_changes", {
      event: "*",
      schema: "public",
      table: "posts"
    }, async ()=>{
      await loadFeed();
    })
    .on("postgres_changes", {
      event: "*",
      schema: "public",
      table: "likes"
    }, async ()=>{
      await loadFeed();
    })
    .subscribe();
}
</script>
