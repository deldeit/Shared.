<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Settings - Shared</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
  box-sizing:border-box;
  font-family:'Archivo Black',sans-serif;
}

:root{
  --bg:#000;
  --panel:#0f0f0f;
  --border:#222;
  --text:#fff;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:900px;
  margin:0 auto;
  padding:20px;
}

/* TOP BAR */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:relative;
  margin-bottom:25px;
}

.back{
  display:flex;
  align-items:center;
  gap:6px;
  cursor:pointer;
  color:#fff;
  text-decoration:none;
  font-size:12px;
}

.logo{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
}

/* SECTIONS */
.section{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:22px;
  padding:16px;
  margin-bottom:16px;
}

.section h3{
  margin:0 0 12px 0;
  font-size:14px;
}

.small{
  opacity:.6;
  font-size:12px;
  margin-bottom:12px;
}

/* TOPICS */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.topic{
  background:#111;
  border:1px solid #222;
  border-radius:16px;
  padding:12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:10px;
}

.topic.selected{
  border-color:#fff;
  background:#1a1a1a;
}

/* BUTTONS */
.actions{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.btn{
  border:none;
  border-radius:999px;
  padding:12px;
  cursor:pointer;
  font-size:12px;
}

.save{
  background:#fff;
  color:#000;
}

.danger{
  background:#ff2a2a;
  color:#fff;
}

/* password input */
.input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #333;
  background:#111;
  color:#fff;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="topbar">
    <a class="back" href="home.html">
      <span class="material-symbols-outlined">arrow_back</span>
    </a>

    <div class="logo">Shared.</div>

    <div style="width:40px;"></div>
  </div>

  <!-- INTERESTS -->
  <div class="section">
    <h3>Choose up to 3 interests</h3>
    <div class="small">Personalize your feed</div>
    <div class="grid" id="topics"></div>
  </div>

  <!-- PASSWORD -->
  <div class="section">
    <h3>Change password</h3>

    <input type="password" id="newPassword" class="input" placeholder="New password">

    <button class="btn save" id="passwordBtn">Update password</button>
  </div>

  <!-- ACCOUNT -->
  <div class="section">
    <h3>Account</h3>

    <div class="actions">
      <button class="btn save" id="saveBtn">Save interests</button>
      <button class="btn danger" id="deleteBtn">Delete account</button>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = "https://cnhaonawapuahzoctqav.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let user = null;
let selected = [];

const topics = [
  { id:"music", label:"Music", icon:"music_note" },
  { id:"gaming", label:"Gaming", icon:"sports_esports" },
  { id:"sports", label:"Sports", icon:"sports_soccer" },
  { id:"tech", label:"Tech", icon:"devices" },
  { id:"ai", label:"AI", icon:"smart_toy" },
  { id:"art", label:"Art", icon:"brush" },
  { id:"travel", label:"Travel", icon:"flight" },
  { id:"food", label:"Food", icon:"restaurant" },
  { id:"movies", label:"Movies", icon:"movie" },
  { id:"anime", label:"Anime", icon:"auto_awesome" },
  { id:"cars", label:"Cars", icon:"directions_car" },
  { id:"finance", label:"Finance", icon:"trending_up" },
  { id:"science", label:"Science", icon:"science" },
  { id:"fitness", label:"Fitness", icon:"fitness_center" },
  { id:"photo", label:"Photography", icon:"photo_camera" },
  { id:"nature", label:"Nature", icon:"forest" },
  { id:"books", label:"Books", icon:"menu_book" },
  { id:"memes", label:"Memes", icon:"mood" },
  { id:"coding", label:"Coding", icon:"code" },
  { id:"fashion", label:"Fashion", icon:"styler" }
];

function renderTopics(){
  const el = document.getElementById("topics");

  el.innerHTML = topics.map(t => `
    <div class="topic ${selected.includes(t.id) ? "selected":""}" data-id="${t.id}">
      <span class="material-symbols-outlined">${t.icon}</span>
      ${t.label}
    </div>
  `).join("");

  el.querySelectorAll(".topic").forEach(div=>{
    div.onclick = ()=>{

      const id = div.dataset.id;

      if(selected.includes(id)){
        selected = selected.filter(x=>x!==id);
      } else {
        if(selected.length >= 3){
          alert("You can select max 3 interests");
          return;
        }
        selected.push(id);
      }

      renderTopics();
    };
  });
}

async function loadUser(){
  const { data } = await supabaseClient.auth.getUser();
  user = data.user;

  if(!user){
    location.href="index.html";
    return;
  }

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("interests")
    .eq("id", user.id)
    .single();

  selected = profile?.interests || [];
  renderTopics();
}

document.getElementById("saveBtn").onclick = async ()=>{
  const { error } = await supabaseClient
    .from("profiles")
    .update({ interests: selected })
    .eq("id", user.id);

  if(error) return alert(error.message);

  alert("Interests saved!");
};

document.getElementById("passwordBtn").onclick = async ()=>{
  const pass = document.getElementById("newPassword").value;

  if(pass.length < 6){
    alert("Password too short");
    return;
  }

  const { error } = await supabaseClient.auth.updateUser({
    password: pass
  });

  if(error){
    alert(error.message);
    return;
  }

  alert("Password updated!");
  document.getElementById("newPassword").value = "";
};

document.getElementById("deleteBtn").onclick = async ()=>{
  const ok = confirm("Delete account permanently?");
  if(!ok) return;

  await supabaseClient.from("profiles").delete().eq("id", user.id);
  await supabaseClient.auth.signOut();

  location.href="index.html";
};

loadUser();
</script>

</body>
</html>
