<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shared - Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
  box-sizing:border-box;
  font-family:'Archivo Black', sans-serif;
}

:root{
  --bg:#000;
  --panel:#0f0f0f;
  --panel-2:#111;
  --border:#222;
  --border-2:#333;
  --text:#fff;
  --muted:rgba(255,255,255,.65);
}

html, body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

body{
  min-height:100vh;
}

.container{
  max-width:720px;
  margin:0 auto;
  padding:20px;
}

.topbar{
  display:flex;
  justify-content:center;
  align-items:center;
  margin-bottom:20px;
}

.logo-link{
  text-decoration:none;
  color:#fff;
  display:inline-flex;
  align-items:center;
}

.header{
  font-size:30px;
  line-height:1;
  text-align:center;
  letter-spacing:-.5px;
}

.profile-card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:24px;
  overflow:hidden;
  margin-bottom:18px;
}

.cover{
  height:180px;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.18), transparent 32%),
    radial-gradient(circle at 80% 30%, rgba(255,255,255,.12), transparent 28%),
    linear-gradient(135deg, #111, #050505 60%, #111);
  border-bottom:1px solid var(--border);
}

.profile-main{
  padding:18px;
}

.profile-top{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:16px;
  margin-top:-54px;
  margin-bottom:14px;
}

.avatar{
  width:108px;
  height:108px;
  border-radius:50%;
  border:4px solid #000;
  background:linear-gradient(135deg,#444,#111);
  box-shadow:0 8px 30px rgba(0,0,0,.45);
  overflow:hidden;
  flex:0 0 auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  letter-spacing:-2px;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.profile-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:flex-end;
  align-items:center;
}

.icon-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  border:none;
  border-radius:999px;
  padding:10px 14px;
  cursor:pointer;
  font-size:12px;
  white-space:nowrap;
}

.icon-btn.follow{
  background:#fff;
  color:#000;
}

.icon-btn.message{
  background:#1a1a1a;
  color:#fff;
  border:1px solid #333;
}

.material-symbols-outlined{
  font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
  line-height:1;
  font-size:20px;
}

.profile-name{
  font-size:24px;
  line-height:1.05;
  margin:0;
}

.profile-id{
  margin-top:8px;
  font-size:11px;
  opacity:.65;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:18px;
}

.stat{
  background:var(--panel-2);
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px;
  text-align:center;
}

.stat .value{
  font-size:18px;
  line-height:1;
}

.stat .label{
  margin-top:6px;
  font-size:11px;
  opacity:.68;
}

.section{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:24px;
  padding:16px;
  margin-bottom:16px;
}

.section-title{
  font-size:14px;
  margin-bottom:12px;
  opacity:.9;
}

.feed{
  display:grid;
  gap:14px;
}

.post{
  background:#000;
  border:1px solid #222;
  border-radius:20px;
  overflow:hidden;
}

.post img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  display:block;
}

.post-body{
  padding:12px;
}

.post-top{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
}

.post-date{
  font-size:11px;
  opacity:.65;
  white-space:nowrap;
}

.post-caption{
  font-size:13px;
  line-height:1.45;
  margin-top:10px;
  white-space:pre-wrap;
}

.post-song{
  margin-top:12px;
  padding-top:12px;
  border-top:1px solid #222;
}

.song-title{
  font-size:12px;
  line-height:1.35;
}

.song-sub{
  margin-top:4px;
  font-size:11px;
  opacity:.7;
}

.empty-state{
  padding:22px 10px;
  text-align:center;
  opacity:.6;
  font-size:13px;
}

.error-state{
  padding:22px 10px;
  text-align:center;
  opacity:.8;
  font-size:13px;
}

@media (max-width:520px){
  .header{
    font-size:26px;
  }

  .cover{
    height:150px;
  }

  .profile-top{
    flex-direction:column;
    align-items:flex-start;
    margin-top:-44px;
  }

  .profile-actions{
    width:100%;
    justify-content:flex-start;
  }

  .stats{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a class="logo-link" href="home.html" aria-label="Go to home">
        <div class="header">Shared.</div>
      </a>
    </div>

    <div class="profile-card">
      <div class="cover"></div>

      <div class="profile-main">
        <div class="profile-top">
          <div class="avatar" id="avatar">S</div>

          <div class="profile-actions">
            <button class="icon-btn follow" id="followBtn">
              <span class="material-symbols-outlined">person_add</span>
              Follow
            </button>
            <button class="icon-btn message" id="messageBtn">
              <span class="material-symbols-outlined">chat_bubble</span>
              Message
            </button>
          </div>
        </div>

        <h1 class="profile-name" id="displayName">User</h1>
        <div class="profile-id" id="profileId">ID</div>

        <div class="stats" id="stats">
          <div class="stat">
            <div class="value" id="postsCount">0</div>
            <div class="label">Posts</div>
          </div>
          <div class="stat">
            <div class="value" id="followersCount">0</div>
            <div class="label">Followers</div>
          </div>
          <div class="stat">
            <div class="value" id="followingCount">0</div>
            <div class="label">Following</div>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Posts</div>
      <div class="feed" id="feed">
        <div class="empty-state">Loading posts...</div>
      </div>
    </div>
  </div>

<script>
  // =========================
  // CONFIG SUPABASE
  // =========================
  const SUPABASE_URL = "https://cnhaonawapuahzoctqav.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // =========================
  // URL PARAMS
  // =========================
  const params = new URLSearchParams(window.location.search);
  const userId = params.get("id") || "";
  const userName = params.get("name") || "User";

  // =========================
  // ELEMENTS
  // =========================
  const avatarEl = document.getElementById("avatar");
  const displayNameEl = document.getElementById("displayName");
  const profileIdEl = document.getElementById("profileId");
  const feedEl = document.getElementById("feed");
  const postsCountEl = document.getElementById("postsCount");
  const followersCountEl = document.getElementById("followersCount");
  const followingCountEl = document.getElementById("followingCount");
  const followBtn = document.getElementById("followBtn");
  const messageBtn = document.getElementById("messageBtn");

  // =========================
  // HEADER / PROFILE
  // =========================
  displayNameEl.textContent = userName;
  profileIdEl.textContent = userId ? userId : "Unknown ID";
  avatarEl.textContent = userName.charAt(0).toUpperCase();

  // =========================
  // OPTIONAL FOLLOW TOGGLE
  // =========================
  let following = false;
  followBtn.addEventListener("click", () => {
    following = !following;
    followBtn.innerHTML = following
      ? '<span class="material-symbols-outlined">person_check</span> Following'
      : '<span class="material-symbols-outlined">person_add</span> Follow';
  });

  messageBtn.addEventListener("click", () => {
    alert("Message button clicked");
  });

  // =========================
  // HELPERS
  // =========================
  function escapeHtml(str) {
    return String(str ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function formatDate(value) {
    if (!value) return "";
    const d = new Date(value);
    if (Number.isNaN(d.getTime())) return "";
    return d.toLocaleDateString("it-IT", {
      day: "2-digit",
      month: "short",
      year: "numeric"
    });
  }

  function renderEmpty(message) {
    feedEl.innerHTML = `<div class="empty-state">${escapeHtml(message)}</div>`;
  }

  function renderError(message) {
    feedEl.innerHTML = `<div class="error-state">${escapeHtml(message)}</div>`;
  }

  function renderPost(post) {
    const imageHtml = post.image_url
      ? `<img src="${escapeHtml(post.image_url)}" alt="Post image">`
      : "";

    const captionHtml = post.caption
      ? `<div class="post-caption">${escapeHtml(post.caption)}</div>`
      : "";

    const songHtml = (post.song_title || post.song_artist)
      ? `
        <div class="post-song">
          <div class="song-title">${escapeHtml(post.song_title || "Unknown song")}</div>
          <div class="song-sub">${escapeHtml(post.song_artist || "")}</div>
        </div>
      `
      : "";

    const dateHtml = post.created_at
      ? `<div class="post-date">${escapeHtml(formatDate(post.created_at))}</div>`
      : "";

    return `
      <article class="post">
        ${imageHtml}
        <div class="post-body">
          <div class="post-top">
            <div></div>
            ${dateHtml}
          </div>
          ${captionHtml}
          ${songHtml}
        </div>
      </article>
    `;
  }

  async function loadProfileStats() {
    try {
      // Prova a leggere statistiche base da una tabella profiles, se esiste.
      // Se i nomi colonne sono diversi, lascia i fallback a 0.
      const { data, error } = await supabaseClient
        .from("profiles")
        .select("followers_count, following_count")
        .eq("id", userId)
        .maybeSingle();

      if (!error && data) {
        followersCountEl.textContent = Number(data.followers_count ?? 0);
        followingCountEl.textContent = Number(data.following_count ?? 0);
      }
    } catch (_) {
      // fallback silenzioso
    }
  }

  async function loadPosts() {
    if (!userId) {
      renderError("Missing user id in URL.");
      return;
    }

    feedEl.innerHTML = `<div class="empty-state">Loading posts...</div>`;

    try {
      const { data, error } = await supabaseClient
        .from("posts")
        .select("*")
        .eq("user_id", userId)
        .order("created_at", { ascending: false });

      if (error) {
        renderError("Unable to load posts.");
        return;
      }

      const posts = data || [];
      postsCountEl.textContent = posts.length;

      if (!posts.length) {
        renderEmpty("No posts yet.");
        return;
      }

      feedEl.innerHTML = posts.map(renderPost).join("");
    } catch (err) {
      renderError("Unable to load posts.");
    }
  }

  loadProfileStats();
  loadPosts();
</script>
</body>
</html>
