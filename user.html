<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared - Profile</title>

  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Archivo Black', sans-serif;
    }

    :root {
      --bg: #000;
      --panel: #0f0f0f;
      --panel-2: #111;
      --border: #222;
      --border-2: #333;
      --text: #fff;
      --muted: rgba(255,255,255,.68);
      --cover-color: #111111;
    }

    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
    }

    body.modal-open {
      overflow: hidden;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
      text-decoration: none;
      flex: 0 0 auto;
    }

    .header {
      font-size: 30px;
      line-height: 1;
      text-align: center;
      letter-spacing: -.5px;
      flex: 1;
    }

    .profile-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .cover {
      position: relative;
      height: 220px;
      border-bottom: 1px solid var(--border);
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.16), transparent 32%),
        radial-gradient(circle at 80% 30%, rgba(0,0,0,.18), transparent 28%),
        linear-gradient(135deg, color-mix(in srgb, var(--cover-color) 92%, #ffffff 8%), var(--cover-color));
      background-color: var(--cover-color);
      transition: filter .15s ease;
      overflow: hidden;
    }

    .cover:hover {
      filter: brightness(1.03);
    }

    .cover-tools {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease;
    }

    .cover:hover .cover-tools,
    .cover:focus-within .cover-tools {
      opacity: 1;
      pointer-events: auto;
    }

    @media (hover: none) {
      .cover-tools {
        opacity: 1;
        pointer-events: auto;
      }
    }

    .cover-edit {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      padding: 10px 12px;
      background: rgba(0,0,0,.45);
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 24px rgba(0,0,0,.25);
      font-size: 11px;
      line-height: 1;
      user-select: none;
    }

    .cover-edit:hover {
      transform: translateY(-1px);
    }

    .cover-edit .material-symbols-outlined {
      font-size: 18px;
    }

    .cover-color-input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      border: 0;
      padding: 0;
      margin: 0;
    }

    .profile-main {
      padding: 0 18px 18px;
    }

    .profile-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-top: -78px;
      margin-bottom: 14px;
      position: relative;
      z-index: 2;
    }

    .avatar {
      position: relative;
      width: 132px;
      height: 132px;
      border-radius: 50%;
      border: 6px solid #000;
      background: linear-gradient(135deg,#444,#111);
      box-shadow: 0 10px 34px rgba(0,0,0,.5);
      overflow: hidden;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      user-select: none;
    }

    .avatar-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .avatar-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      letter-spacing: -2px;
      color: #fff;
      z-index: 1;
    }

    .avatar-edit {
      position: absolute;
      inset: auto 10px 10px auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      padding: 8px 10px;
      background: rgba(0,0,0,.52);
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 22px rgba(0,0,0,.25);
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease, transform .15s ease;
      z-index: 2;
      font-size: 11px;
      line-height: 1;
    }

    .avatar:hover .avatar-edit,
    .avatar:focus-within .avatar-edit {
      opacity: 1;
      pointer-events: auto;
    }

    @media (hover: none) {
      .avatar-edit {
        opacity: 1;
        pointer-events: auto;
      }
    }

    .avatar-edit:hover {
      transform: translateY(-1px);
    }

    .avatar-edit .material-symbols-outlined {
      font-size: 17px;
    }

    .avatar-file-input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      border: 0;
      padding: 0;
      margin: 0;
    }

    .profile-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 4px;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
      transition: transform .15s ease, opacity .15s ease, background .15s ease;
    }

    .icon-btn:hover {
      transform: translateY(-1px);
    }

    .icon-btn.follow {
      background: #fff;
      color: #000;
    }

    .icon-btn.message {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
    }

    .icon-btn.secondary {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
    }

    .icon-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
      line-height: 1;
      font-size: 20px;
    }

    .profile-name {
      font-size: 24px;
      line-height: 1.05;
      margin: 0;
      word-break: break-word;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .verified-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
      transform: translateY(-1px);
    }

    .verified-badge svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .profile-subtitle {
      margin-top: 8px;
      font-size: 11px;
      opacity: .65;
      min-height: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 10px;
      margin-top: 18px;
    }

    .stat {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: transform .15s ease, border-color .15s ease;
    }

    .stat:hover {
      transform: translateY(-1px);
      border-color: var(--border-2);
    }

    .stat .value {
      font-size: 18px;
      line-height: 1;
    }

    .stat .label {
      margin-top: 6px;
      font-size: 11px;
      opacity: .68;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 14px;
      margin-bottom: 12px;
      opacity: .9;
    }

    .feed {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .post {
      background: #070707;
      border: 1px solid #222;
      border-radius: 18px;
      overflow: hidden;
      display: block;
      min-width: 0;
      cursor: pointer;
      transition: transform .15s ease, border-color .15s ease, filter .15s ease;
    }

    .post:hover {
      transform: translateY(-2px);
      border-color: #333;
      filter: brightness(1.04);
    }

    .post-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #111;
      overflow: hidden;
    }

    .post-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .empty-state,
    .error-state,
    .loading-state {
      padding: 22px 10px;
      text-align: center;
      opacity: .7;
      font-size: 13px;
    }

    .error-state {
      opacity: .95;
    }

    .hidden {
      display: none !important;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 1000;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .post-modal {
      width: 100%;
      height: 100%;
      background: #000;
      position: relative;
      overflow: hidden;
      border-radius: 0;
    }

    .post-modal-media {
      position: absolute;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .post-modal-media img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
    }

    .post-modal-side {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2;
      padding: 18px;
      background: linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,.92));
      border-top: 1px solid rgba(255,255,255,.08);
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 42vh;
      overflow: auto;
    }

    .post-modal-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .post-modal-author {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      line-height: 1.1;
    }

    .post-modal-author-link {
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      line-height: 1.2;
    }

    .post-modal-author-link:hover {
      text-decoration: underline;
    }

    .post-modal-date {
      margin-top: 8px;
      font-size: 11px;
      opacity: .68;
      line-height: 1.4;
    }

    .post-modal-caption {
      font-size: 13px;
      line-height: 1.8;
      white-space: pre-wrap;
      color: rgba(255,255,255,.88);
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }

    .post-modal-music {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(10,10,10,.78);
      backdrop-filter: blur(8px);
    }

    .post-modal-song-title {
      font-size: 12px;
      line-height: 1.5;
    }

    .post-modal-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: auto;
    }

    .post-modal-like-btn {
      background: #fff;
      color: #000;
    }

    .post-modal-like-btn.liked {
      color: #ff2d55;
    }

    .modal-close {
      border: none;
      background: rgba(23,23,23,.92);
      color: #fff;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .modal-close:hover {
      transform: translateY(-1px);
    }

    .user-list {
      display: grid;
      gap: 8px;
    }

    .user-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border-radius: 18px;
      border: 1px solid #222;
      background: #0a0a0a;
    }

    .user-row-left {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-row-badge {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #444, #111);
      flex: 0 0 auto;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
    }

    .user-row-badge img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .user-row-name {
      font-size: 13px;
      line-height: 1.25;
      word-break: break-word;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .user-row-meta {
      font-size: 11px;
      opacity: .65;
      margin-top: 4px;
    }

    .user-row-action {
      border: none;
      background: #fff;
      color: #000;
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 11px;
      cursor: pointer;
      flex: 0 0 auto;
    }

    @media (max-width: 820px) {
      .feed {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      .header {
        font-size: 26px;
      }

      .cover {
        height: 170px;
      }

      .profile-top {
        flex-direction: column;
        align-items: flex-start;
        margin-top: -58px;
      }

      .profile-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .feed {
        grid-template-columns: 1fr;
      }

      .avatar {
        width: 120px;
        height: 120px;
      }

      .post-modal-side {
        padding: 14px;
        max-height: 48vh;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a class="back-link" href="home.html" aria-label="Back to homepage">
        <span class="material-symbols-outlined">arrow_back</span>
      </a>

      <div class="header">Shared.</div>

      <div style="width:44px;"></div>
    </div>

    <div class="profile-card">
      <div class="cover" id="cover">
        <div class="cover-tools hidden" id="coverTools">
          <label class="cover-edit" title="Change banner color">
            <span class="material-symbols-outlined">palette</span>
            <span>Banner</span>
            <input
              type="color"
              id="bannerColorInput"
              class="cover-color-input"
              aria-label="Choose banner color"
              value="#111111"
            />
          </label>
        </div>
      </div>

      <div class="profile-main">
        <div class="profile-top">
          <div class="avatar" id="avatar">
            <img id="avatarImg" class="avatar-img hidden" alt="Profile picture">
            <span id="avatarFallback" class="avatar-fallback">U</span>
            <label class="avatar-edit hidden" id="avatarEdit">
              <span class="material-symbols-outlined">photo_camera</span>
              <span>Photo</span>
              <input
                type="file"
                id="avatarFileInput"
                class="avatar-file-input"
                accept="image/*"
                aria-label="Upload profile photo"
              >
            </label>
          </div>

          <div class="profile-actions" id="profileActions">
            <button class="icon-btn follow" id="followBtn">
              <span class="material-symbols-outlined">person_add</span>
              Follow
            </button>
            <button class="icon-btn message" id="messageBtn">
              <span class="material-symbols-outlined">chat_bubble</span>
              Message
            </button>
          </div>
        </div>

        <h1 class="profile-name" id="displayName">User</h1>
        <div class="profile-subtitle" id="subtitle"></div>

        <div class="stats">
          <div class="stat" id="postsStat" role="button" tabindex="0">
            <div class="value" id="postsCount">0</div>
            <div class="label">Posts</div>
          </div>
          <div class="stat" id="followersStat" role="button" tabindex="0">
            <div class="value" id="followersCount">0</div>
            <div class="label">Followers</div>
          </div>
          <div class="stat" id="followingStat" role="button" tabindex="0">
            <div class="value" id="followingCount">0</div>
            <div class="label">Following</div>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Posts</div>
      <div class="feed" id="feed">
        <div class="loading-state">Loading posts...</div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="listModalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="listModalTitle">
      <div class="modal-head">
        <div class="modal-title" id="listModalTitle">Users</div>
        <button class="modal-close" id="modalCloseBtn" aria-label="Close">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="modal-body">
        <div class="user-list" id="userList"></div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="postModalBackdrop" aria-hidden="true">
    <div class="post-modal" role="dialog" aria-modal="true" aria-labelledby="postModalTitle">
      <div class="post-modal-media">
        <img id="postModalImage" alt="Post image">
      </div>

      <div class="post-modal-side">
        <div class="post-modal-head">
          <div style="min-width:0;">
            <div class="section-title" id="postModalTitle">Post</div>
            <div class="post-modal-author">
              <a href="#" class="post-modal-author-link" id="postModalAuthorLink">
                <span id="postModalAuthorName"></span>
              </a>
            </div>
            <div class="post-modal-date" id="postModalDate"></div>
          </div>

          <button class="modal-close" id="postModalCloseBtn" aria-label="Close post">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>

        <div class="post-modal-caption" id="postModalCaption"></div>

        <div class="post-modal-music">
          <div class="section-title" style="margin:0;">Music</div>
          <div class="post-modal-song-title" id="postModalSongTitle"></div>

          <button type="button" class="icon-btn secondary" id="postModalPlayBtn">
            <span class="material-symbols-outlined">play_arrow</span>
            <span class="btn-label">Play preview</span>
          </button>
        </div>

        <div class="post-modal-actions">
          <button type="button" class="icon-btn post-modal-like-btn" id="postModalLikeBtn">
            <span class="material-symbols-outlined">favorite_border</span>
            <span class="post-modal-like-text">Like</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://cnhaonawapuahzoctqav.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes";
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const DEFAULT_BANNER_COLOR = "#111111";

    const params = new URLSearchParams(window.location.search);
    const profileId = params.get("id") || "";
    const fallbackName = params.get("name") || "User";

    const coverEl = document.getElementById("cover");
    const coverToolsEl = document.getElementById("coverTools");
    const bannerColorInput = document.getElementById("bannerColorInput");

    const avatarEl = document.getElementById("avatar");
    const avatarImgEl = document.getElementById("avatarImg");
    const avatarFallbackEl = document.getElementById("avatarFallback");
    const avatarEditEl = document.getElementById("avatarEdit");
    const avatarFileInput = document.getElementById("avatarFileInput");

    const displayNameEl = document.getElementById("displayName");
    const subtitleEl = document.getElementById("subtitle");
    const feedEl = document.getElementById("feed");
    const postsCountEl = document.getElementById("postsCount");
    const followersCountEl = document.getElementById("followersCount");
    const followingCountEl = document.getElementById("followingCount");
    const followBtn = document.getElementById("followBtn");
    const messageBtn = document.getElementById("messageBtn");
    const profileActions = document.getElementById("profileActions");
    const followersStat = document.getElementById("followersStat");
    const followingStat = document.getElementById("followingStat");
    const postsStat = document.getElementById("postsStat");

    const modalBackdrop = document.getElementById("listModalBackdrop");
    const modalCloseBtn = document.getElementById("modalCloseBtn");
    const listModalTitle = document.getElementById("listModalTitle");
    const userListEl = document.getElementById("userList");

    const postModalBackdrop = document.getElementById("postModalBackdrop");
    const postModalCloseBtn = document.getElementById("postModalCloseBtn");
    const postModalTitle = document.getElementById("postModalTitle");
    const postModalImage = document.getElementById("postModalImage");
    const postModalAuthorLink = document.getElementById("postModalAuthorLink");
    const postModalAuthorName = document.getElementById("postModalAuthorName");
    const postModalDate = document.getElementById("postModalDate");
    const postModalCaption = document.getElementById("postModalCaption");
    const postModalSongTitle = document.getElementById("postModalSongTitle");
    const postModalPlayBtn = document.getElementById("postModalPlayBtn");
    const postModalLikeBtn = document.getElementById("postModalLikeBtn");
    const postModalLikeText = postModalLikeBtn.querySelector(".post-modal-like-text");
    const postModalLikeIcon = postModalLikeBtn.querySelector(".material-symbols-outlined");

    let currentUser = null;
    let profile = null;
    let isOwnProfile = false;
    let isFollowingTarget = false;
    let postsMap = new Map();

    let modalCurrentPost = null;
    let modalCurrentLikeCount = 0;
    let modalCurrentLikedByMe = false;
    let modalAudio = new Audio();
    let modalAudioButton = null;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeHexColor(value) {
      const match = /^#([0-9a-fA-F]{6})$/.exec(String(value || ""));
      return match ? `#${match[1].toUpperCase()}` : DEFAULT_BANNER_COLOR;
    }

    function verifiedBadgeHtml() {
      return `
        <span class="verified-badge" aria-label="Verified" title="Verified">
          <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
            <circle cx="12" cy="12" r="11" fill="#FFFFFF"></circle>
            <path d="M10.1 15.0L6.6 11.5 5.2 12.9l4.9 4.9 8.1-8.1-1.4-1.4z" fill="#000000"></path>
          </svg>
        </span>
      `;
    }

    function renderName(name, verified) {
      return `
        ${escapeHtml(name || "User")}
        ${verified ? verifiedBadgeHtml() : ""}
      `;
    }

    function setAvatar(name, avatarUrl) {
      const initial = (name || "U").trim().charAt(0).toUpperCase() || "U";

      if (avatarUrl) {
        avatarImgEl.src = avatarUrl;
        avatarImgEl.classList.remove("hidden");
        avatarFallbackEl.classList.add("hidden");
      } else {
        avatarImgEl.removeAttribute("src");
        avatarImgEl.classList.add("hidden");
        avatarFallbackEl.textContent = initial;
        avatarFallbackEl.classList.remove("hidden");
      }
    }

    function setBannerColor(color) {
      const safeColor = normalizeHexColor(color);
      coverEl.style.setProperty("--cover-color", safeColor);
      bannerColorInput.value = safeColor;
      return safeColor;
    }

    function renderEmpty(message) {
      feedEl.innerHTML = `<div class="empty-state">${escapeHtml(message)}</div>`;
    }

    function renderError(message) {
      feedEl.innerHTML = `<div class="error-state">${escapeHtml(message)}</div>`;
    }

    function renderLoading(message) {
      feedEl.innerHTML = `<div class="loading-state">${escapeHtml(message)}</div>`;
    }

    function openModal() {
      modalBackdrop.classList.add("open");
      modalBackdrop.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      modalBackdrop.classList.remove("open");
      modalBackdrop.setAttribute("aria-hidden", "true");
      userListEl.innerHTML = "";
    }

    function openPostModal() {
      postModalBackdrop.classList.add("open");
      postModalBackdrop.setAttribute("aria-hidden", "false");
      document.body.classList.add("modal-open");
    }

    function closePostModal() {
      postModalBackdrop.classList.remove("open");
      postModalBackdrop.setAttribute("aria-hidden", "true");
      document.body.classList.remove("modal-open");
      modalAudio.pause();
      modalAudio.src = "";
      setModalAudioButtonState(false);
      modalCurrentPost = null;
    }

    function setModalAudioButtonState(playing) {
      if (!modalAudioButton) return;
      const icon = modalAudioButton.querySelector(".material-symbols-outlined");
      const label = modalAudioButton.querySelector(".btn-label");
      if (!icon || !label) return;

      if (playing) {
        icon.textContent = "pause";
        label.textContent = "Pause preview";
        modalAudioButton.dataset.playing = "1";
      } else {
        icon.textContent = "play_arrow";
        label.textContent = "Play preview";
        modalAudioButton.dataset.playing = "0";
      }
    }

    async function playModalPreview(url) {
      if (!url || !modalAudioButton) return;

      if (modalAudio.src !== url) {
        modalAudio.pause();
        modalAudio.src = url;
      }

      if (modalAudio.paused) {
        try {
          await modalAudio.play();
          setModalAudioButtonState(true);
        } catch (err) {
          console.error("MODAL AUDIO PLAY ERROR:", err);
        }
      } else {
        modalAudio.pause();
        setModalAudioButtonState(false);
      }
    }

    modalAudio.addEventListener("ended", () => {
      setModalAudioButtonState(false);
    });

    modalCloseBtn.addEventListener("click", closeModal);
    modalBackdrop.addEventListener("click", (e) => {
      if (e.target === modalBackdrop) closeModal();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeModal();
        closePostModal();
      }
    });

    postModalCloseBtn.addEventListener("click", closePostModal);
    postModalBackdrop.addEventListener("click", (e) => {
      if (e.target === postModalBackdrop) closePostModal();
    });

    avatarImgEl.addEventListener("error", () => {
      avatarImgEl.classList.add("hidden");
      avatarFallbackEl.classList.remove("hidden");
    });

    async function getCurrentUser() {
      const { data: sessionData, error: sessionError } = await supabaseClient.auth.getSession();

      if (!sessionError && sessionData?.session?.user) {
        currentUser = sessionData.session.user;
        return currentUser;
      }

      const savedSessionRaw = sessionStorage.getItem("shared-session");
      if (savedSessionRaw) {
        try {
          const savedSession = JSON.parse(savedSessionRaw);

          if (savedSession?.access_token && savedSession?.refresh_token) {
            const { data, error } = await supabaseClient.auth.setSession({
              access_token: savedSession.access_token,
              refresh_token: savedSession.refresh_token
            });

            if (!error && data?.user) {
              currentUser = data.user;
              return currentUser;
            }
          }
        } catch (err) {
          console.error("SESSION RESTORE ERROR:", err);
        }
      }

      currentUser = null;
      return null;
    }

    async function loadProfile() {
      if (!profileId) {
        displayNameEl.textContent = fallbackName;
        setAvatar(fallbackName, "");
        subtitleEl.textContent = "Missing profile id in URL";
        renderError("Missing user id in the URL.");
        followBtn.disabled = true;
        messageBtn.disabled = true;
        coverToolsEl.classList.add("hidden");
        avatarEditEl.classList.add("hidden");
        return false;
      }

      const { data, error } = await supabaseClient
        .from("profiles")
        .select("id, display_name, verified, banner_color, avatar_url")
        .eq("id", profileId)
        .maybeSingle();

      if (error) {
        console.error("PROFILE LOAD ERROR:", error);
      }

      profile = data || {
        id: profileId,
        display_name: fallbackName,
        verified: false,
        banner_color: DEFAULT_BANNER_COLOR,
        avatar_url: ""
      };

      const display = profile.display_name || fallbackName;
      displayNameEl.innerHTML = renderName(display, !!profile.verified);
      subtitleEl.textContent = "";
      setAvatar(display, profile.avatar_url || "");
      setBannerColor(profile.banner_color || DEFAULT_BANNER_COLOR);

      isOwnProfile = !!currentUser && currentUser.id === profileId;

      if (isOwnProfile) {
        profileActions.classList.add("hidden");
        coverToolsEl.classList.remove("hidden");
        avatarEditEl.classList.remove("hidden");
      } else {
        profileActions.classList.remove("hidden");
        coverToolsEl.classList.add("hidden");
        avatarEditEl.classList.add("hidden");
      }

      return true;
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(new Error("Unable to read file."));
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
      });
    }

    function imageFromDataUrl(dataUrl) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error("Unable to load image."));
        img.src = dataUrl;
      });
    }

    async function squareCropToJpegBlob(file) {
      const dataUrl = await fileToDataUrl(file);
      const img = await imageFromDataUrl(dataUrl);

      const size = Math.min(img.width, img.height);
      const sourceX = (img.width - size) / 2;
      const sourceY = (img.height - size) / 2;

      const canvas = document.createElement("canvas");
      canvas.width = 1024;
      canvas.height = 1024;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(
        img,
        sourceX,
        sourceY,
        size,
        size,
        0,
        0,
        canvas.width,
        canvas.height
      );

      return new Promise((resolve, reject) => {
        canvas.toBlob(
          blob => {
            if (!blob) {
              reject(new Error("Unable to convert image."));
              return;
            }
            resolve(blob);
          },
          "image/jpeg",
          0.9
        );
      });
    }

    async function uploadAvatar(file) {
      if (!currentUser || !isOwnProfile || !file) return;

      if (!file.type || !file.type.startsWith("image/")) {
        alert("Please choose an image file.");
        return;
      }

      avatarFileInput.disabled = true;
      avatarEditEl.style.opacity = "0.65";

      try {
        const jpegBlob = await squareCropToJpegBlob(file);
        const path = `${currentUser.id}/${Date.now()}.jpg`;

        const { error: uploadError } = await supabaseClient.storage
          .from("avatars")
          .upload(path, jpegBlob, {
            upsert: true,
            contentType: "image/jpeg"
          });

        if (uploadError) throw uploadError;

        const { data: publicData } = supabaseClient.storage
          .from("avatars")
          .getPublicUrl(path);

        const publicUrl = publicData?.publicUrl;
        if (!publicUrl) throw new Error("Could not generate public URL.");

        const { error: updateError } = await supabaseClient
          .from("profiles")
          .update({ avatar_url: publicUrl })
          .eq("id", currentUser.id);

        if (updateError) throw updateError;

        if (profile) profile.avatar_url = publicUrl;
        setAvatar(profile?.display_name || fallbackName, publicUrl);
      } catch (err) {
        console.error("AVATAR UPLOAD ERROR:", err);
        alert(err?.message || "Unable to upload profile photo.");
      } finally {
        avatarFileInput.disabled = false;
        avatarEditEl.style.opacity = "";
        avatarFileInput.value = "";
      }
    }

    avatarFileInput.addEventListener("change", async () => {
      const file = avatarFileInput.files && avatarFileInput.files[0];
      if (!file) return;
      await uploadAvatar(file);
    });

    async function loadStats() {
      if (!profileId) return;

      const [{ count: followersCount }, { count: followingCount }] = await Promise.all([
        supabaseClient
          .from("follows")
          .select("*", { count: "exact", head: true })
          .eq("following_id", profileId),
        supabaseClient
          .from("follows")
          .select("*", { count: "exact", head: true })
          .eq("follower_id", profileId)
      ]);

      followersCountEl.textContent = followersCount || 0;
      followingCountEl.textContent = followingCount || 0;
    }

    async function checkFollowState() {
      if (!currentUser || !profileId || isOwnProfile) {
        isFollowingTarget = false;
        return;
      }

      const { data, error } = await supabaseClient
        .from("follows")
        .select("id")
        .eq("follower_id", currentUser.id)
        .eq("following_id", profileId)
        .maybeSingle();

      if (error) {
        console.error("FOLLOW STATE ERROR:", error);
      }

      isFollowingTarget = !!data;
    }

    function updateFollowButton() {
      if (isOwnProfile) {
        followBtn.disabled = true;
        followBtn.innerHTML = `<span class="material-symbols-outlined">person</span> You`;
        return;
      }

      if (!currentUser) {
        followBtn.disabled = true;
        followBtn.innerHTML = `<span class="material-symbols-outlined">lock</span> Login`;
        return;
      }

      followBtn.disabled = false;
      followBtn.innerHTML = isFollowingTarget
        ? `<span class="material-symbols-outlined">person_check</span> Following`
        : `<span class="material-symbols-outlined">person_add</span> Follow`;
    }

    followBtn.addEventListener("click", async () => {
      if (!currentUser || isOwnProfile || !profileId) return;

      followBtn.disabled = true;

      try {
        if (isFollowingTarget) {
          const { error } = await supabaseClient
            .from("follows")
            .delete()
            .eq("follower_id", currentUser.id)
            .eq("following_id", profileId);

          if (error) throw error;
          isFollowingTarget = false;
        } else {
          const { error } = await supabaseClient
            .from("follows")
            .upsert(
              {
                follower_id: currentUser.id,
                following_id: profileId
              },
              { onConflict: "follower_id,following_id" }
            );

          if (error) throw error;
          isFollowingTarget = true;
        }

        updateFollowButton();
        await loadStats();
      } catch (err) {
        console.error("FOLLOW TOGGLE ERROR:", err);
        alert(err?.message || "Unable to update follow state.");
      } finally {
        updateFollowButton();
      }
    });

    messageBtn.addEventListener("click", () => {
      if (!profileId) return;
      const name = encodeURIComponent(profile?.display_name || fallbackName);
      window.location.href = `chat.html?id=${encodeURIComponent(profileId)}&name=${name}`;
    });

    bannerColorInput.addEventListener("change", async () => {
      if (!currentUser || !isOwnProfile || !profileId) return;

      const nextColor = normalizeHexColor(bannerColorInput.value);
      setBannerColor(nextColor);

      try {
        const { error } = await supabaseClient
          .from("profiles")
          .update({ banner_color: nextColor })
          .eq("id", currentUser.id);

        if (error) throw error;

        if (profile) profile.banner_color = nextColor;
      } catch (err) {
        console.error("BANNER COLOR UPDATE ERROR:", err);
        alert(err?.message || "Unable to update banner color.");
        const fallback = normalizeHexColor(profile?.banner_color || DEFAULT_BANNER_COLOR);
        setBannerColor(fallback);
      }
    });

    async function fetchProfilesByIds(ids) {
      const cleanIds = [...new Set((ids || []).filter(Boolean))];
      if (!cleanIds.length) return {};

      const { data, error } = await supabaseClient
        .from("profiles")
        .select("id, display_name, verified, avatar_url")
        .in("id", cleanIds);

      if (error) throw error;

      const map = {};
      for (const row of data || []) {
        map[row.id] = row;
      }
      return map;
    }

    async function openRelationshipList(mode) {
      if (!profileId) return;

      const isFollowers = mode === "followers";
      const title = isFollowers ? "Followers" : "Following";
      listModalTitle.textContent = title;
      userListEl.innerHTML = `<div class="loading-state">Loading ${title.toLowerCase()}...</div>`;
      openModal();

      try {
        const columnToMatch = isFollowers ? "following_id" : "follower_id";
        const columnToRead = isFollowers ? "follower_id" : "following_id";

        const { data, error } = await supabaseClient
          .from("follows")
          .select(`id, ${columnToRead}, created_at`)
          .eq(columnToMatch, profileId)
          .order("created_at", { ascending: false });

        if (error) throw error;

        const rows = data || [];
        const ids = rows.map(r => r[columnToRead]);
        const profileMap = await fetchProfilesByIds(ids);

        if (!rows.length) {
          userListEl.innerHTML = `<div class="empty-state">No ${title.toLowerCase()} yet.</div>`;
          return;
        }

        userListEl.innerHTML = rows.map(row => {
          const user = profileMap[row[columnToRead]] || {};
          const displayName = user.display_name || "User";
          const initial = displayName.trim().charAt(0).toUpperCase() || "U";

          return `
            <div class="user-row">
              <div class="user-row-left">
                <div class="user-row-badge">
                  ${user.avatar_url ? `<img src="${escapeHtml(user.avatar_url)}" alt="${escapeHtml(displayName)}">` : escapeHtml(initial)}
                </div>
                <div style="min-width:0">
                  <div class="user-row-name">
                    ${renderName(displayName, !!user.verified)}
                  </div>
                  <div class="user-row-meta">${isFollowers ? "Follower" : "Following"}</div>
                </div>
              </div>
              <button class="user-row-action" data-user-id="${escapeHtml(user.id || row[columnToRead])}" data-user-name="${escapeHtml(displayName)}">
                Open
              </button>
            </div>
          `;
        }).join("");

        userListEl.querySelectorAll(".user-row-action").forEach(btn => {
          btn.addEventListener("click", () => {
            const id = btn.getAttribute("data-user-id");
            const name = btn.getAttribute("data-user-name");
            if (!id) return;
            window.location.href = `user.html?id=${encodeURIComponent(id)}&name=${encodeURIComponent(name || "User")}`;
          });
        });
      } catch (err) {
        console.error("RELATION LIST ERROR:", err);
        userListEl.innerHTML = `<div class="error-state">Unable to load ${escapeHtml(title.toLowerCase())}.<br>${escapeHtml(err?.message || "Unknown error")}</div>`;
      }
    }

    followersStat.addEventListener("click", () => openRelationshipList("followers"));
    followingStat.addEventListener("click", () => openRelationshipList("following"));

    followersStat.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") openRelationshipList("followers");
    });

    followingStat.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") openRelationshipList("following");
    });

    postsStat.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") feedEl.scrollIntoView({ behavior: "smooth", block: "start" });
    });

    async function getPostLikeState(postId) {
      const countPromise = supabaseClient
        .from("likes")
        .select("id", { count: "exact", head: true })
        .eq("post_id", postId);

      const likedPromise = currentUser
        ? supabaseClient
            .from("likes")
            .select("id")
            .eq("post_id", postId)
            .eq("user_id", currentUser.id)
            .maybeSingle()
        : Promise.resolve({ data: null, error: null });

      const [countRes, likedRes] = await Promise.all([countPromise, likedPromise]);

      return {
        count: countRes?.count || 0,
        likedByMe: !!likedRes?.data
      };
    }

    function renderModalLikeButton() {
      postModalLikeBtn.classList.toggle("liked", modalCurrentLikedByMe);
      postModalLikeIcon.textContent = modalCurrentLikedByMe ? "favorite" : "favorite_border";
      postModalLikeText.textContent = `${modalCurrentLikeCount} ${modalCurrentLikeCount === 1 ? "like" : "likes"}`;
      postModalLikeBtn.disabled = !currentUser;
    }

    async function openPostModal(post) {
      if (!post) return;

      modalCurrentPost = post;
      postModalTitle.textContent = "Post";
      postModalImage.src = post.image_url || "";
      postModalAuthorLink.href = `user.html?id=${encodeURIComponent(profileId || "")}&name=${encodeURIComponent(profile?.display_name || fallbackName)}`;
      postModalAuthorName.innerHTML = renderName(profile?.display_name || fallbackName, !!profile?.verified);
      postModalDate.textContent = post.created_at ? new Intl.DateTimeFormat("it-IT", { dateStyle: "medium", timeStyle: "short" }).format(new Date(post.created_at)) : "";
      postModalCaption.textContent = post.caption || "No caption.";
      postModalSongTitle.textContent = post.song_title || "Unknown song";

      modalCurrentLikeCount = 0;
      modalCurrentLikedByMe = false;
      modalAudio.pause();
      modalAudio.src = "";
      modalAudioButton = postModalPlayBtn;
      setModalAudioButtonState(false);

      postModalPlayBtn.disabled = !post.song_preview;
      postModalPlayBtn.querySelector(".material-symbols-outlined").textContent = post.song_preview ? "play_arrow" : "music_off";
      postModalPlayBtn.querySelector(".btn-label").textContent = post.song_preview ? "Play preview" : "No preview";

      openPostModal();

      try {
        const likeState = await getPostLikeState(post.id);
        modalCurrentLikeCount = likeState.count;
        modalCurrentLikedByMe = likeState.likedByMe;
        renderModalLikeButton();
      } catch (err) {
        console.error("POST MODAL LIKE STATE ERROR:", err);
      }
    }

    postModalPlayBtn.addEventListener("click", async () => {
      if (!modalCurrentPost?.song_preview) return;
      await playModalPreview(modalCurrentPost.song_preview);
    });

    postModalLikeBtn.addEventListener("click", async () => {
      if (!currentUser || !modalCurrentPost) return;

      postModalLikeBtn.disabled = true;

      try {
        const { data: existing, error: findError } = await supabaseClient
          .from("likes")
          .select("id")
          .eq("post_id", modalCurrentPost.id)
          .eq("user_id", currentUser.id)
          .maybeSingle();

        if (findError) throw findError;

        if (existing) {
          const { error } = await supabaseClient
            .from("likes")
            .delete()
            .eq("id", existing.id);

          if (error) throw error;

          modalCurrentLikedByMe = false;
          modalCurrentLikeCount = Math.max(0, modalCurrentLikeCount - 1);
        } else {
          const { error } = await supabaseClient
            .from("likes")
            .insert([{ post_id: modalCurrentPost.id, user_id: currentUser.id }]);

          if (error) throw error;

          modalCurrentLikedByMe = true;
          modalCurrentLikeCount += 1;
        }

        renderModalLikeButton();
      } catch (err) {
        console.error("MODAL LIKE TOGGLE ERROR:", err);
        alert(err?.message || "Unable to update like.");
      } finally {
        postModalLikeBtn.disabled = !currentUser;
      }
    });

    function renderPost(post) {
      if (!post.image_url) return "";

      return `
        <article class="post" data-post-id="${escapeHtml(post.id)}" tabindex="0" role="button" aria-label="Open post">
          <div class="post-thumb">
            <img src="${escapeHtml(post.image_url)}" alt="Post image">
          </div>
        </article>
      `;
    }

    feedEl.addEventListener("click", (e) => {
      const card = e.target.closest(".post");
      if (!card) return;
      const postId = card.getAttribute("data-post-id");
      const post = postsMap.get(postId);
      if (post) openPostModal(post);
    });

    feedEl.addEventListener("keydown", (e) => {
      const card = e.target.closest(".post");
      if (!card) return;
      if (e.key === "Enter" || e.key === " ") {
        const postId = card.getAttribute("data-post-id");
        const post = postsMap.get(postId);
        if (post) openPostModal(post);
      }
    });

    async function loadPosts() {
      if (!profileId) {
        renderError("Missing user id in URL.");
        return;
      }

      renderLoading("Loading posts...");

      try {
        const { data, error } = await supabaseClient
          .from("posts")
          .select("id, image_url, created_at, caption, song_title, song_preview, user_id")
          .eq("user_id", profileId)
          .not("image_url", "is", null)
          .order("created_at", { ascending: false });

        if (error) throw error;

        const posts = data || [];
        postsCountEl.textContent = posts.length;
        postsMap = new Map(posts.map(post => [post.id, post]));

        if (!posts.length) {
          renderEmpty("No image posts yet.");
          return;
        }

        feedEl.innerHTML = posts.map(renderPost).join("");
      } catch (err) {
        console.error("POST LOAD ERROR:", err);
        renderError("Unable to load posts.");
      }
    }

    async function init() {
      await getCurrentUser();
      const ok = await loadProfile();
      if (!ok) return;

      await Promise.all([
        loadStats(),
        (async () => {
          await checkFollowState();
          updateFollowButton();
        })(),
        loadPosts()
      ]);

      updateFollowButton();
    }

    init();
  </script>
</body>
</html>
