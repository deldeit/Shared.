<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared - Profile</title>

  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Archivo Black', sans-serif;
    }

    :root {
      --bg: #000;
      --panel: #0f0f0f;
      --panel-2: #111;
      --border: #222;
      --border-2: #333;
      --text: #fff;
      --muted: rgba(255,255,255,.68);
    }

    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
    }

    .logo-link {
      text-decoration: none;
      color: #fff;
      display: inline-flex;
      align-items: center;
    }

    .header {
      font-size: 30px;
      line-height: 1;
      text-align: center;
      letter-spacing: -.5px;
    }

    .profile-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .cover {
      height: 180px;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.18), transparent 32%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,.12), transparent 28%),
        linear-gradient(135deg, #111, #050505 60%, #111);
      border-bottom: 1px solid var(--border);
    }

    .profile-main {
      padding: 18px;
    }

    .profile-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-top: -54px;
      margin-bottom: 14px;
    }

    .avatar {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      border: 4px solid #000;
      background: linear-gradient(135deg,#444,#111);
      box-shadow: 0 8px 30px rgba(0,0,0,.45);
      overflow: hidden;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      letter-spacing: -2px;
      color: #fff;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .profile-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
      transition: transform .15s ease, opacity .15s ease, background .15s ease;
    }

    .icon-btn:hover {
      transform: translateY(-1px);
    }

    .icon-btn.follow {
      background: #fff;
      color: #000;
    }

    .icon-btn.message {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
    }

    .icon-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
      line-height: 1;
      font-size: 20px;
    }

    .profile-name {
      font-size: 24px;
      line-height: 1.05;
      margin: 0;
      word-break: break-word;
    }

    .profile-subtitle {
      margin-top: 8px;
      font-size: 11px;
      opacity: .65;
      min-height: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 10px;
      margin-top: 18px;
    }

    .stat {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: transform .15s ease, border-color .15s ease;
    }

    .stat:hover {
      transform: translateY(-1px);
      border-color: var(--border-2);
    }

    .stat .value {
      font-size: 18px;
      line-height: 1;
    }

    .stat .label {
      margin-top: 6px;
      font-size: 11px;
      opacity: .68;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 14px;
      margin-bottom: 12px;
      opacity: .9;
    }

    .feed {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .post {
      background: #070707;
      border: 1px solid #222;
      border-radius: 18px;
      overflow: hidden;
      display: block;
      min-width: 0;
    }

    .post-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #111;
      overflow: hidden;
    }

    .post-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .post-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,.35);
      font-size: 12px;
      text-align: center;
      padding: 10px;
    }

    .empty-state,
    .error-state,
    .loading-state {
      padding: 22px 10px;
      text-align: center;
      opacity: .7;
      font-size: 13px;
    }

    .error-state {
      opacity: .95;
    }

    .hidden {
      display: none !important;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 1000;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(520px, 100%);
      max-height: min(78vh, 720px);
      overflow: hidden;
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      display: flex;
      flex-direction: column;
    }

    .modal-head {
      padding: 16px 16px 12px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .modal-title {
      font-size: 15px;
      line-height: 1.1;
    }

    .modal-close {
      border: none;
      background: #171717;
      color: #fff;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .modal-body {
      padding: 8px;
      overflow: auto;
    }

    .user-list {
      display: grid;
      gap: 8px;
    }

    .user-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border-radius: 18px;
      border: 1px solid #222;
      background: #0a0a0a;
    }

    .user-row-left {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-row-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #444, #111);
      overflow: hidden;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .user-row-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .user-row-name {
      font-size: 13px;
      line-height: 1.25;
      word-break: break-word;
    }

    .user-row-meta {
      font-size: 11px;
      opacity: .65;
      margin-top: 4px;
    }

    .user-row-action {
      border: none;
      background: #fff;
      color: #000;
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 11px;
      cursor: pointer;
      flex: 0 0 auto;
    }

    @media (max-width: 820px) {
      .feed {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      .header {
        font-size: 26px;
      }

      .cover {
        height: 150px;
      }

      .profile-top {
        flex-direction: column;
        align-items: flex-start;
        margin-top: -44px;
      }

      .profile-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .feed {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a class="logo-link" href="home.html" aria-label="Go to home">
        <div class="header">Shared.</div>
      </a>
    </div>

    <div class="profile-card">
      <div class="cover"></div>

      <div class="profile-main">
        <div class="profile-top">
          <div class="avatar" id="avatar">U</div>

          <div class="profile-actions" id="profileActions">
            <button class="icon-btn follow" id="followBtn">
              <span class="material-symbols-outlined">person_add</span>
              Follow
            </button>
            <button class="icon-btn message" id="messageBtn">
              <span class="material-symbols-outlined">chat_bubble</span>
              Message
            </button>
          </div>
        </div>

        <h1 class="profile-name" id="displayName">User</h1>
        <div class="profile-subtitle" id="subtitle"></div>

        <div class="stats">
          <div class="stat" id="postsStat" role="button" tabindex="0">
            <div class="value" id="postsCount">0</div>
            <div class="label">Posts</div>
          </div>
          <div class="stat" id="followersStat" role="button" tabindex="0">
            <div class="value" id="followersCount">0</div>
            <div class="label">Followers</div>
          </div>
          <div class="stat" id="followingStat" role="button" tabindex="0">
            <div class="value" id="followingCount">0</div>
            <div class="label">Following</div>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Posts</div>
      <div class="feed" id="feed">
        <div class="loading-state">Loading posts...</div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="listModalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="listModalTitle">
      <div class="modal-head">
        <div class="modal-title" id="listModalTitle">Users</div>
        <button class="modal-close" id="modalCloseBtn" aria-label="Close">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="modal-body">
        <div class="user-list" id="userList"></div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://cnhaonawapuahzoctqav.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(window.location.search);
    const profileId = params.get("id") || "";
    const fallbackName = params.get("name") || "User";

    const avatarEl = document.getElementById("avatar");
    const displayNameEl = document.getElementById("displayName");
    const subtitleEl = document.getElementById("subtitle");
    const feedEl = document.getElementById("feed");
    const postsCountEl = document.getElementById("postsCount");
    const followersCountEl = document.getElementById("followersCount");
    const followingCountEl = document.getElementById("followingCount");
    const followBtn = document.getElementById("followBtn");
    const messageBtn = document.getElementById("messageBtn");
    const profileActions = document.getElementById("profileActions");
    const followersStat = document.getElementById("followersStat");
    const followingStat = document.getElementById("followingStat");
    const postsStat = document.getElementById("postsStat");

    const modalBackdrop = document.getElementById("listModalBackdrop");
    const modalCloseBtn = document.getElementById("modalCloseBtn");
    const listModalTitle = document.getElementById("listModalTitle");
    const userListEl = document.getElementById("userList");

    let currentUser = null;
    let profile = null;
    let isOwnProfile = false;
    let isFollowingTarget = false;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return "";
      return d.toLocaleDateString("it-IT", {
        day: "2-digit",
        month: "short",
        year: "numeric"
      });
    }

    function setAvatar(name, avatarUrl) {
      const initial = (name || "U").trim().charAt(0).toUpperCase() || "U";
      if (avatarUrl) {
        avatarEl.innerHTML = `<img src="${escapeHtml(avatarUrl)}" alt="Avatar">`;
      } else {
        avatarEl.textContent = initial;
      }
    }

    function renderEmpty(message) {
      feedEl.innerHTML = `<div class="empty-state">${escapeHtml(message)}</div>`;
    }

    function renderError(message) {
      feedEl.innerHTML = `<div class="error-state">${escapeHtml(message)}</div>`;
    }

    function renderLoading(message) {
      feedEl.innerHTML = `<div class="loading-state">${escapeHtml(message)}</div>`;
    }

    function openModal() {
      modalBackdrop.classList.add("open");
      modalBackdrop.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      modalBackdrop.classList.remove("open");
      modalBackdrop.setAttribute("aria-hidden", "true");
      userListEl.innerHTML = "";
    }

    modalCloseBtn.addEventListener("click", closeModal);
    modalBackdrop.addEventListener("click", (e) => {
      if (e.target === modalBackdrop) closeModal();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });

    async function getCurrentUser() {
      const { data, error } = await supabaseClient.auth.getUser();
      if (error || !data?.user) {
        window.location.replace("index.html");
        return null;
      }
      currentUser = data.user;
      return currentUser;
    }

    async function loadProfile() {
      if (!profileId) {
        displayNameEl.textContent = fallbackName;
        setAvatar(fallbackName, null);
        subtitleEl.textContent = "Missing profile id in URL";
        renderError("Missing user id in the URL.");
        followBtn.disabled = true;
        messageBtn.disabled = true;
        return false;
      }

      const { data, error } = await supabaseClient
        .from("profiles")
        .select("id, username, avatar_url")
        .eq("id", profileId)
        .maybeSingle();

      if (error) {
        console.error("PROFILE LOAD ERROR:", error);
      }

      profile = data || {
        id: profileId,
        username: fallbackName,
        avatar_url: null
      };

      displayNameEl.textContent = profile.username || fallbackName;
      subtitleEl.textContent = "";
      setAvatar(profile.username || fallbackName, profile.avatar_url || null);

      isOwnProfile = !!currentUser && currentUser.id === profileId;

      if (isOwnProfile) {
        profileActions.classList.add("hidden");
      } else {
        profileActions.classList.remove("hidden");
      }

      return true;
    }

    async function loadStats() {
      if (!profileId) return;

      const [{ count: followersCount }, { count: followingCount }] = await Promise.all([
        supabaseClient
          .from("follows")
          .select("*", { count: "exact", head: true })
          .eq("following_id", profileId),
        supabaseClient
          .from("follows")
          .select("*", { count: "exact", head: true })
          .eq("follower_id", profileId)
      ]);

      followersCountEl.textContent = followersCount || 0;
      followingCountEl.textContent = followingCount || 0;
    }

    async function checkFollowState() {
      if (!currentUser || !profileId || isOwnProfile) {
        isFollowingTarget = false;
        return;
      }

      const { data, error } = await supabaseClient
        .from("follows")
        .select("id")
        .eq("follower_id", currentUser.id)
        .eq("following_id", profileId)
        .maybeSingle();

      if (error) {
        console.error("FOLLOW STATE ERROR:", error);
      }

      isFollowingTarget = !!data;
    }

    function updateFollowButton() {
      if (isOwnProfile) {
        followBtn.disabled = true;
        followBtn.innerHTML = `<span class="material-symbols-outlined">person</span> You`;
        return;
      }

      if (!currentUser) {
        followBtn.disabled = true;
        followBtn.innerHTML = `<span class="material-symbols-outlined">lock</span> Login`;
        return;
      }

      followBtn.disabled = false;
      followBtn.innerHTML = isFollowingTarget
        ? `<span class="material-symbols-outlined">person_check</span> Following`
        : `<span class="material-symbols-outlined">person_add</span> Follow`;
    }

    followBtn.addEventListener("click", async () => {
      if (!currentUser || isOwnProfile || !profileId) return;

      followBtn.disabled = true;

      try {
        if (isFollowingTarget) {
          const { error } = await supabaseClient
            .from("follows")
            .delete()
            .eq("follower_id", currentUser.id)
            .eq("following_id", profileId);

          if (error) throw error;
          isFollowingTarget = false;
        } else {
          const { error } = await supabaseClient
            .from("follows")
            .upsert(
              {
                follower_id: currentUser.id,
                following_id: profileId
              },
              { onConflict: "follower_id,following_id" }
            );

          if (error) throw error;
          isFollowingTarget = true;
        }

        updateFollowButton();
        await loadStats();
      } catch (err) {
        console.error("FOLLOW TOGGLE ERROR:", err);
        alert(err?.message || "Unable to update follow state.");
      } finally {
        updateFollowButton();
      }
    });

    messageBtn.addEventListener("click", () => {
      if (!profileId) return;
      const name = encodeURIComponent(profile?.username || fallbackName);
      window.location.href = `chat.html?id=${encodeURIComponent(profileId)}&name=${name}`;
    });

    async function fetchProfilesByIds(ids) {
      const cleanIds = [...new Set((ids || []).filter(Boolean))];
      if (!cleanIds.length) return {};

      const { data, error } = await supabaseClient
        .from("profiles")
        .select("id, username, avatar_url")
        .in("id", cleanIds);

      if (error) throw error;

      const map = {};
      for (const row of data || []) {
        map[row.id] = row;
      }
      return map;
    }

    async function openRelationshipList(mode) {
      if (!profileId) return;

      const isFollowers = mode === "followers";
      const title = isFollowers ? "Followers" : "Following";
      listModalTitle.textContent = title;
      userListEl.innerHTML = `<div class="loading-state">Loading ${title.toLowerCase()}...</div>`;
      openModal();

      try {
        const columnToMatch = isFollowers ? "following_id" : "follower_id";
        const columnToRead = isFollowers ? "follower_id" : "following_id";

        const { data, error } = await supabaseClient
          .from("follows")
          .select(`id, ${columnToRead}, created_at`)
          .eq(columnToMatch, profileId)
          .order("created_at", { ascending: false });

        if (error) throw error;

        const rows = data || [];
        const ids = rows.map(r => r[columnToRead]);
        const profileMap = await fetchProfilesByIds(ids);

        if (!rows.length) {
          userListEl.innerHTML = `<div class="empty-state">No ${title.toLowerCase()} yet.</div>`;
          return;
        }

        userListEl.innerHTML = rows.map(row => {
          const user = profileMap[row[columnToRead]] || {};
          const username = user.username || "User";
          const avatarUrl = user.avatar_url || "";
          const initial = username.trim().charAt(0).toUpperCase() || "U";

          return `
            <div class="user-row">
              <div class="user-row-left">
                <div class="user-row-avatar">
                  ${
                    avatarUrl
                      ? `<img src="${escapeHtml(avatarUrl)}" alt="Avatar">`
                      : `<span>${escapeHtml(initial)}</span>`
                  }
                </div>
                <div style="min-width:0">
                  <div class="user-row-name">${escapeHtml(username)}</div>
                  <div class="user-row-meta">${isFollowers ? "Follower" : "Following"}</div>
                </div>
              </div>
              <button class="user-row-action" data-user-id="${escapeHtml(user.id || row[columnToRead])}" data-user-name="${escapeHtml(username)}">
                Open
              </button>
            </div>
          `;
        }).join("");

        userListEl.querySelectorAll(".user-row-action").forEach(btn => {
          btn.addEventListener("click", () => {
            const id = btn.getAttribute("data-user-id");
            const name = btn.getAttribute("data-user-name");
            if (!id) return;
            window.location.href = `user.html?id=${encodeURIComponent(id)}&name=${encodeURIComponent(name || "User")}`;
          });
        });
      } catch (err) {
        console.error("RELATION LIST ERROR:", err);
        userListEl.innerHTML = `<div class="error-state">Unable to load ${escapeHtml(title.toLowerCase())}.<br>${escapeHtml(err?.message || "Unknown error")}</div>`;
      }
    }

    followersStat.addEventListener("click", () => openRelationshipList("followers"));
    followingStat.addEventListener("click", () => openRelationshipList("following"));

    followersStat.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") openRelationshipList("followers");
    });
    followingStat.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") openRelationshipList("following");
    });
    postsStat.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") feedEl.scrollIntoView({ behavior: "smooth", block: "start" });
    });

    function renderPost(post) {
      if (!post.image_url) return "";

      return `
        <article class="post">
          <div class="post-thumb">
            <img src="${escapeHtml(post.image_url)}" alt="Post image">
          </div>
        </article>
      `;
    }

    async function loadPosts() {
      if (!profileId) {
        renderError("Missing user id in URL.");
        return;
      }

      renderLoading("Loading posts...");

      try {
        const { data, error } = await supabaseClient
          .from("posts")
          .select("id, image_url, created_at")
          .eq("user_id", profileId)
          .not("image_url", "is", null)
          .order("created_at", { ascending: false });

        if (error) throw error;

        const posts = data || [];
        postsCountEl.textContent = posts.length;

        if (!posts.length) {
          renderEmpty("No image posts yet.");
          return;
        }

        feedEl.innerHTML = posts.map(renderPost).join("");
      } catch (err) {
        console.error("POST LOAD ERROR:", err);
        renderError("Unable to load posts.");
      }
    }

    async function init() {
      await getCurrentUser();
      const ok = await loadProfile();
      if (!ok) return;

      await Promise.all([
        loadStats(),
        (async () => {
          await checkFollowState();
          updateFollowButton();
        })(),
        loadPosts()
      ]);

      updateFollowButton();
    }

    init();
  </script>
</body>
</html>
