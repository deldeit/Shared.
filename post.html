<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared - Post</title>

  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Archivo Black', sans-serif;
    }

    :root {
      --bg: #000;
      --panel: #0f0f0f;
      --panel-2: #111;
      --border: #222;
      --border-2: #2c2c2c;
      --text: #fff;
      --muted: rgba(255,255,255,.68);
      --muted-2: rgba(255,255,255,.52);
    }

    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
      text-decoration: none;
      flex: 0 0 auto;
    }

    .header {
      font-size: 30px;
      line-height: 1;
      letter-spacing: -.5px;
      flex: 1;
      text-align: center;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0,0,0,.25);
    }

    .post-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 16px 14px;
      border-bottom: 1px solid #1f1f1f;
    }

    .post-user {
      min-width: 0;
      display: grid;
      gap: 6px;
    }

    .name {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      min-width: 0;
      line-height: 1.2;
      font-size: 14px;
      word-break: break-word;
    }

    .name a {
      color: #fff;
      text-decoration: none;
    }

    .name a:hover {
      text-decoration: underline;
    }

    .verified-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
      transform: translateY(-1px);
    }

    .verified-badge svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .time {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
      flex-wrap: wrap;
    }

    .post-media-wrap {
      display: flex;
      justify-content: center;
      padding: 16px 16px 8px;
    }

    .post-media {
      width: min(100%, 520px);
      aspect-ratio: 1 / 1;
      border-radius: 28px;
      overflow: hidden;
      background: #111;
      border: 1px solid #232323;
      box-shadow: 0 12px 28px rgba(0,0,0,.22);
    }

    .post-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .post-content {
      padding: 10px 16px 16px;
      display: grid;
      gap: 14px;
    }

    .post-caption {
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .post-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      max-width: 100%;
      border: 1px solid #242424;
      background: #090909;
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 12px;
      line-height: 1;
      color: #fff;
      user-select: none;
    }

    .post-tag span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .post-song {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid #242424;
      background: #090909;
      border-radius: 18px;
      padding: 12px 12px 12px 14px;
    }

    .song-meta {
      min-width: 0;
      display: grid;
      gap: 5px;
      flex: 1;
    }

    .song-title {
      font-size: 13px;
      line-height: 1.25;
      word-break: break-word;
    }

    .song-sub {
      font-size: 11px;
      color: var(--muted-2);
      line-height: 1.2;
    }

    .post-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .like-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
      transition: transform .15s ease, opacity .15s ease, background .15s ease;
    }

    .icon-btn:hover {
      transform: translateY(-1px);
    }

    .icon-btn.secondary {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
    }

    .icon-btn.likeBtn {
      background: #fff;
      color: #000;
    }

    .icon-btn.liked {
      background: #fff;
      color: #000;
    }

    .like-count-btn {
      border: none;
      background: transparent;
      color: #fff;
      padding: 0;
      font-size: 12px;
      cursor: pointer;
      opacity: .9;
    }

    .like-count-btn:hover {
      opacity: 1;
      text-decoration: underline;
    }

    .share-wrap {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
      line-height: 1;
      font-size: 20px;
    }

    .loading-state,
    .error-state,
    .empty-state {
      padding: 22px 10px;
      text-align: center;
      opacity: .78;
      font-size: 13px;
    }

    .error-state {
      opacity: .95;
    }

    .hidden {
      display: none !important;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 50;
      display: none;
    }

    .overlay.show {
      display: block;
    }

    .modal {
      position: fixed;
      z-index: 60;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(92vw, 420px);
      max-height: 78vh;
      background: #0f0f0f;
      border: 1px solid #222;
      border-radius: 22px;
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
    }

    .modal.show {
      display: flex;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .modal-title {
      font-size: 16px;
    }

    .modal-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: auto;
      padding-right: 2px;
    }

    .user-item,
    .liker-item,
    .share-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid #222;
      border-radius: 14px;
      background: #000;
      text-decoration: none;
      color: #fff;
      cursor: pointer;
      transition: .15s ease;
    }

    .user-item:hover,
    .liker-item:hover,
    .share-item:hover {
      background: #111;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      border: 1px solid #2b2b2b;
      color: #fff;
      font-size: 13px;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .meta {
      min-width: 0;
      flex: 1;
    }

    .meta .name {
      font-size: 12px;
      line-height: 1.35;
    }

    .meta .sub {
      margin-top: 4px;
      font-size: 11px;
      opacity: .7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .share-actions {
      display: grid;
      gap: 8px;
    }

    .share-action-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      border: 1px solid #222;
      background: #000;
      color: #fff;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      font-size: 12px;
      text-align: left;
    }

    .share-action-btn:hover {
      background: #111;
    }

    @media (max-width: 520px) {
      .header {
        font-size: 26px;
      }

      .post-header,
      .post-content,
      .post-media-wrap {
        padding-left: 14px;
        padding-right: 14px;
      }

      .post-song {
        flex-direction: column;
        align-items: stretch;
      }

      .icon-btn {
        width: 100%;
      }

      .post-media {
        border-radius: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="overlay" id="likersOverlay"></div>
  <div class="overlay" id="shareOverlay"></div>

  <div class="container">
    <div class="topbar">
      <a class="back-link" href="javascript:history.back()" aria-label="Back">
        <span class="material-symbols-outlined">arrow_back</span>
      </a>
      <div class="header">Shared.</div>
      <div style="width:44px;"></div>
    </div>

    <div class="card" id="postCard">
      <div class="loading-state" id="loadingState">Loading post...</div>
    </div>
  </div>

  <div class="modal" id="likersModal" role="dialog" aria-modal="true" aria-labelledby="likersTitle">
    <div class="modal-header">
      <div class="modal-title" id="likersTitle">Likes</div>
      <button type="button" class="icon-btn secondary" id="closeLikersBtn">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="modal-list" id="likersList"></div>
  </div>

  <div class="modal" id="shareModal" role="dialog" aria-modal="true" aria-labelledby="shareTitle">
    <div class="modal-header">
      <div class="modal-title" id="shareTitle">Share post</div>
      <button type="button" class="icon-btn secondary" id="closeShareBtn">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="share-actions" id="shareActions"></div>
  </div>

  <script>
    const SUPABASE_URL = "https://cnhaonawapuahzoctqav.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes";
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(window.location.search);
    const postId = params.get("id") || "";

    const postCard = document.getElementById("postCard");
    const likersModal = document.getElementById("likersModal");
    const likersOverlay = document.getElementById("likersOverlay");
    const likersList = document.getElementById("likersList");
    const likersTitle = document.getElementById("likersTitle");
    const closeLikersBtn = document.getElementById("closeLikersBtn");

    const shareModal = document.getElementById("shareModal");
    const shareOverlay = document.getElementById("shareOverlay");
    const shareActions = document.getElementById("shareActions");
    const closeShareBtn = document.getElementById("closeShareBtn");

    let currentUser = null;
    let postData = null;
    let authorData = null;
    let likedByMe = false;
    let likesCountValue = 0;
    let likersCache = [];
    let audio = new Audio();
    let audioPlaying = false;
    let realtimeChannel = null;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getFirstDefined(obj, keys, fallback = "") {
      for (const key of keys) {
        const value = obj?.[key];
        if (value !== undefined && value !== null && value !== "") return value;
      }
      return fallback;
    }

    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return new Intl.DateTimeFormat("it-IT", {
        day: "2-digit",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function verifiedBadgeHtml() {
      return `
        <span class="verified-badge" aria-label="Verified" title="Verified">
          <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
            <defs>
              <mask id="checkcut-post">
                <rect width="24" height="24" fill="white"></rect>
                <path d="M6.5 12.5 L10.3 16.2 L17.6 8.8" fill="none" stroke="black" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"></path>
              </mask>
            </defs>
            <circle cx="12" cy="12" r="11" fill="white" mask="url(#checkcut-post)"></circle>
          </svg>
        </span>
      `;
    }

    function initials(name) {
      const clean = String(name || "U").trim();
      if (!clean) return "U";
      const parts = clean.split(/\s+/).filter(Boolean);
      if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
      return `${parts[0][0] || ""}${parts[1][0] || ""}`.toUpperCase();
    }

    function postUrl() {
      return `${location.origin}${location.pathname}?id=${encodeURIComponent(postId)}`;
    }

    async function getCurrentUser() {
      const { data: sessionData, error } = await supabaseClient.auth.getSession();

      if (!error && sessionData?.session?.user) {
        currentUser = sessionData.session.user;
        return currentUser;
      }

      const savedSessionRaw = sessionStorage.getItem("shared-session");
      if (!savedSessionRaw) return null;

      try {
        const savedSession = JSON.parse(savedSessionRaw);
        if (!savedSession?.access_token || !savedSession?.refresh_token) return null;

        const { data, error: setSessionError } = await supabaseClient.auth.setSession({
          access_token: savedSession.access_token,
          refresh_token: savedSession.refresh_token
        });

        if (!setSessionError && data?.user) {
          currentUser = data.user;
          return currentUser;
        }
      } catch (err) {
        console.error("SESSION RESTORE ERROR:", err);
      }

      return null;
    }

    async function fetchPost() {
      if (!postId) {
        throw new Error("Missing post id in URL.");
      }

      const { data, error } = await supabaseClient
        .from("posts")
        .select("*")
        .eq("id", postId)
        .maybeSingle();

      if (error) throw error;
      if (!data) throw new Error("Post not found.");

      postData = data;
      return data;
    }

    async function fetchAuthor(userId) {
      if (!userId) return null;

      const { data, error } = await supabaseClient
        .from("profiles")
        .select("id, display_name, verified, avatar_url, bio")
        .eq("id", userId)
        .maybeSingle();

      if (error) {
        console.error("AUTHOR LOAD ERROR:", error);
      }

      authorData = data || null;
      return authorData;
    }

    async function fetchProfilesByIds(ids) {
      const uniqueIds = [...new Set((ids || []).filter(Boolean))];
      if (!uniqueIds.length) return new Map();

      const { data, error } = await supabaseClient
        .from("profiles")
        .select("id, display_name, avatar_url, verified")
        .in("id", uniqueIds);

      if (error) {
        console.error("PROFILE BATCH LOAD ERROR:", error);
        return new Map();
      }

      const map = new Map();
      (data || []).forEach(row => map.set(row.id, row));
      return map;
    }

    async function fetchLikesState() {
      likesCountValue = 0;
      likedByMe = false;

      if (!postData?.id) return;

      const { count, error: countError } = await supabaseClient
        .from("likes")
        .select("*", { count: "exact", head: true })
        .eq("post_id", postData.id);

      if (!countError && typeof count === "number") {
        likesCountValue = count;
      }

      if (!currentUser) return;

      const { data, error } = await supabaseClient
        .from("likes")
        .select("id")
        .eq("post_id", postData.id)
        .eq("user_id", currentUser.id)
        .maybeSingle();

      if (!error) {
        likedByMe = !!data;
      }
    }

    function setLikeButtonState() {
      const likeBtn = document.querySelector(".likeBtn");
      const likeCountBtn = document.querySelector(".likeCountBtn");
      const likeCountEl = document.querySelector(".likeCount");

      if (!likeBtn || !likeCountBtn || !likeCountEl) return;

      likeCountEl.textContent = String(likesCountValue);

      if (likedByMe) {
        likeBtn.classList.add("liked");
        likeBtn.innerHTML = `
          <span class="material-symbols-outlined">favorite</span>
          <span>Liked</span>
        `;
      } else {
        likeBtn.classList.remove("liked");
        likeBtn.innerHTML = `
          <span class="material-symbols-outlined">favorite_border</span>
          <span>Like</span>
        `;
      }

      likeCountBtn.textContent = `${likesCountValue} ${likesCountValue === 1 ? "like" : "likes"}`;
    }

    function openLikersModal() {
      likersOverlay.classList.add("show");
      likersModal.classList.add("show");
    }

    function closeLikersModal() {
      likersOverlay.classList.remove("show");
      likersModal.classList.remove("show");
      likersList.innerHTML = "";
      likersTitle.textContent = "Likes";
    }

    function openShareModal() {
      shareOverlay.classList.add("show");
      shareModal.classList.add("show");
    }

    function closeShareModal() {
      shareOverlay.classList.remove("show");
      shareModal.classList.remove("show");
      shareActions.innerHTML = "";
    }

    function renderShareActions() {
      const url = postUrl();
      const text = encodeURIComponent("Check out this post on Shared.");
      const encodedUrl = encodeURIComponent(url);

      shareActions.innerHTML = `
        <button class="share-action-btn" type="button" id="nativeShareBtn">
          <span class="material-symbols-outlined">share</span>
          Share using device menu
        </button>

        <button class="share-action-btn" type="button" id="copyLinkBtn">
          <span class="material-symbols-outlined">content_copy</span>
          Copy link
        </button>

        <a class="share-action-btn" href="https://wa.me/?text=${text}%20${encodedUrl}" target="_blank" rel="noopener noreferrer">
          <span class="material-symbols-outlined">chat</span>
          WhatsApp
        </a>

        <a class="share-action-btn" href="https://twitter.com/intent/tweet?text=${text}&url=${encodedUrl}" target="_blank" rel="noopener noreferrer">
          <span class="material-symbols-outlined">public</span>
          X / Twitter
        </a>

        <a class="share-action-btn" href="https://t.me/share/url?url=${encodedUrl}&text=${text}" target="_blank" rel="noopener noreferrer">
          <span class="material-symbols-outlined">send</span>
          Telegram
        </a>

        <a class="share-action-btn" href="https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}" target="_blank" rel="noopener noreferrer">
          <span class="material-symbols-outlined">thumb_up</span>
          Facebook
        </a>
      `;

      document.getElementById("nativeShareBtn").onclick = async () => {
        try {
          if (navigator.share) {
            await navigator.share({
              title: "Shared post",
              text: "Check out this post on Shared.",
              url
            });
          } else if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(url);
            alert("Link copied.");
          } else {
            alert(url);
          }
        } catch (err) {
          console.error("SHARE ERROR:", err);
        }
      };

      document.getElementById("copyLinkBtn").onclick = async () => {
        try {
          await navigator.clipboard.writeText(url);
          alert("Link copied.");
        } catch (err) {
          console.error(err);
          prompt("Copy this link:", url);
        }
      };
    }

    async function showLikers(postIdValue) {
      likersList.innerHTML = `<div class="empty-state">Loading...</div>`;
      likersTitle.textContent = "Likes";
      openLikersModal();

      const { data, error } = await supabaseClient
        .from("likes")
        .select("user_id, created_at")
        .eq("post_id", postIdValue)
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        likersList.innerHTML = `<div class="empty-state">Unable to load likes.</div>`;
        return;
      }

      const rows = data || [];
      likersCache = rows;

      if (rows.length === 0) {
        likersList.innerHTML = `<div class="empty-state">No likes yet.</div>`;
        return;
      }

      const profilesMap = await fetchProfilesByIds(rows.map(r => r.user_id));
      likersList.innerHTML = "";

      rows.forEach(row => {
        const profile = profilesMap.get(row.user_id);
        const name = profile?.display_name || "Unknown user";
        const avatarUrl = profile?.avatar_url || "";
        const verified = !!profile?.verified;
        const href = `user.html?id=${encodeURIComponent(row.user_id || "")}&name=${encodeURIComponent(name)}`;

        const item = document.createElement("a");
        item.className = "liker-item";
        item.href = href;

        item.innerHTML = `
          <div class="avatar">
            ${
              avatarUrl
                ? `<img src="${escapeHtml(avatarUrl)}" alt="avatar">`
                : `${escapeHtml(initials(name))}`
            }
          </div>
          <div class="meta">
            <div class="name">
              <span>${escapeHtml(name)}</span>
              ${verified ? verifiedBadgeHtml() : ""}
            </div>
          </div>
        `;

        likersList.appendChild(item);
      });
    }

    async function toggleLike() {
      if (!currentUser || !postData?.id) {
        alert("Login required.");
        return;
      }

      const likeBtn = document.querySelector(".likeBtn");
      if (likeBtn) likeBtn.disabled = true;

      try {
        if (likedByMe) {
          const { error } = await supabaseClient
            .from("likes")
            .delete()
            .eq("post_id", postData.id)
            .eq("user_id", currentUser.id);

          if (error) throw error;
        } else {
          const { error } = await supabaseClient
            .from("likes")
            .insert({
              post_id: postData.id,
              user_id: currentUser.id
            });

          if (error) throw error;
        }

        await refreshLikes();
      } catch (err) {
        console.error("LIKE TOGGLE ERROR:", err);
        alert(err?.message || "Unable to update like.");
      } finally {
        if (likeBtn) likeBtn.disabled = false;
      }
    }

    async function refreshLikes(keepModal = false) {
      if (!postData?.id) return;

      const { count, error: countError } = await supabaseClient
        .from("likes")
        .select("*", { count: "exact", head: true })
        .eq("post_id", postData.id);

      if (!countError && typeof count === "number") {
        likesCountValue = count;
      }

      if (currentUser) {
        const { data, error } = await supabaseClient
          .from("likes")
          .select("id")
          .eq("post_id", postData.id)
          .eq("user_id", currentUser.id)
          .maybeSingle();

        if (!error) likedByMe = !!data;
      }

      setLikeButtonState();

      if (keepModal && likersModal.classList.contains("show")) {
        await showLikers(postData.id);
      }
    }

    function updatePlayButton() {
      const btn = document.querySelector(".playBtn");
      if (!btn) return;

      const icon = btn.querySelector(".material-symbols-outlined");
      const label = btn.querySelector(".btn-label");

      if (audioPlaying) {
        icon.textContent = "pause";
        label.textContent = "Pause preview";
        btn.dataset.playing = "1";
      } else {
        icon.textContent = "play_arrow";
        label.textContent = "Play preview";
        btn.dataset.playing = "0";
      }
    }

    function playAudio(url) {
      if (!url) return;

      if (audio.src !== url) {
        audio.pause();
        audio.src = url;
      }

      if (audio.paused) {
        audio.play()
          .then(() => {
            audioPlaying = true;
            updatePlayButton();
          })
          .catch(err => console.error("AUDIO PLAY ERROR:", err));
      } else {
        audio.pause();
        audioPlaying = false;
        updatePlayButton();
      }
    }

    audio.addEventListener("ended", () => {
      audioPlaying = false;
      updatePlayButton();
    });

    function buildPostHtml() {
      const authorName = getFirstDefined(authorData, ["display_name"], "User");
      const authorId = getFirstDefined(authorData, ["id"], getFirstDefined(postData, ["user_id"], ""));
      const verified = Boolean(getFirstDefined(authorData, ["verified"], false));
      const createdAt = getFirstDefined(postData, ["created_at", "inserted_at"], "");
      const caption = getFirstDefined(postData, ["caption", "text", "content"], "");
      const imageUrl = getFirstDefined(postData, ["image_url", "media_url"], "");
      const tag = getFirstDefined(postData, ["tag", "category", "topic", "tags"], "");
      const tagLabel = getFirstDefined(postData, ["tag_label", "category_label"], tag);
      const songTitle = getFirstDefined(postData, ["song_title", "song_name", "track_title"], "");
      const songPreview = getFirstDefined(postData, ["song_preview", "preview_url", "audio_preview"], "");
      const authorLink = `user.html?id=${encodeURIComponent(authorId)}&name=${encodeURIComponent(authorName)}`;

      return `
        <div class="post-header">
          <div class="post-user">
            <div class="name">
              <a href="${authorLink}">
                ${escapeHtml(authorName)}
              </a>
              ${verified ? verifiedBadgeHtml() : ""}
            </div>
            <div class="time">
              <span class="material-symbols-outlined" style="font-size:16px;">schedule</span>
              <span>${escapeHtml(formatDate(createdAt))}</span>
            </div>
          </div>

          <span class="material-symbols-outlined" style="opacity:.6;">more_horiz</span>
        </div>

        ${imageUrl ? `
          <div class="post-media-wrap">
            <div class="post-media">
              <img class="post-image" src="${escapeHtml(imageUrl)}" alt="post image">
            </div>
          </div>
        ` : ""}

        <div class="post-content">
          ${caption ? `<div class="post-caption">${escapeHtml(caption)}</div>` : ""}

          ${tag ? `
            <div class="post-tag" title="${escapeHtml(tagLabel || tag)}" aria-label="${escapeHtml(tagLabel || tag)}">
              <span class="material-symbols-outlined" style="font-size:18px;">photo_camera</span>
              <span>${escapeHtml(tagLabel || tag)}</span>
            </div>
          ` : ""}

          ${(songTitle || songPreview) ? `
            <div class="post-song">
              <div class="song-meta">
                <div class="song-title">
                  <span class="material-symbols-outlined" style="font-size:16px;vertical-align:-3px;margin-right:4px;">music_note</span>
                  ${escapeHtml(songTitle || "Audio preview")}
                </div>
                <div class="song-sub">${songPreview ? "Hover to play preview" : "No preview available"}</div>
              </div>

              <button type="button" class="icon-btn secondary playBtn" ${songPreview ? "" : "disabled"} data-playing="0">
                <span class="material-symbols-outlined">play_arrow</span>
                <span class="btn-label">Play preview</span>
              </button>
            </div>
          ` : ""}

          <div class="post-actions">
            <div class="like-wrap">
              <button type="button" class="icon-btn likeBtn ${likedByMe ? "liked" : ""}">
                <span class="material-symbols-outlined">${likedByMe ? "favorite" : "favorite_border"}</span>
                <span>${likedByMe ? "Liked" : "Like"}</span>
              </button>

              <button type="button" class="like-count-btn likeCountBtn">
                <span class="likeCount">${likesCountValue}</span> ${likesCountValue === 1 ? "like" : "likes"}
              </button>
            </div>

            <div class="share-wrap">
              <button type="button" class="icon-btn secondary shareBtn">
                <span class="material-symbols-outlined">share</span>
                Share
              </button>
            </div>
          </div>
        </div>
      `;
    }

    function attachPostEvents() {
      const likeBtn = document.querySelector(".likeBtn");
      const likeCountBtn = document.querySelector(".likeCountBtn");
      const playBtn = document.querySelector(".playBtn");
      const shareBtn = document.querySelector(".shareBtn");
      const postSong = document.querySelector(".post-song");

      if (likeBtn) likeBtn.addEventListener("click", toggleLike);
      if (likeCountBtn) likeCountBtn.addEventListener("click", () => showLikers(postData.id));

      if (playBtn) {
        playBtn.addEventListener("click", () => {
          const songPreview = getFirstDefined(postData, ["song_preview", "preview_url", "audio_preview"], "");
          if (!songPreview) return;
          playAudio(songPreview);
        });
      }

      if (shareBtn) {
        shareBtn.addEventListener("click", async () => {
          renderShareActions();
          openShareModal();
        });
      }

      const songPreview = getFirstDefined(postData, ["song_preview", "preview_url", "audio_preview"], "");

      if (postSong && songPreview) {
        postSong.addEventListener("mouseenter", () => {
          if (!window.matchMedia("(hover: hover)").matches) return;
          playAudio(songPreview);
        });

        postSong.addEventListener("mouseleave", () => {
          if (!audio.paused) {
            audio.pause();
            audioPlaying = false;
            updatePlayButton();
          }
        });
      }

      updatePlayButton();
      setLikeButtonState();
    }

    function setupRealtime() {
      if (realtimeChannel) {
        supabaseClient.removeChannel(realtimeChannel);
      }

      realtimeChannel = supabaseClient
        .channel(`post-${postId}-likes`)
        .on("postgres_changes", {
          event: "*",
          schema: "public",
          table: "likes",
          filter: `post_id=eq.${postId}`
        }, async () => {
          await refreshLikes(likersModal.classList.contains("show"));
        })
        .on("postgres_changes", {
          event: "*",
          schema: "public",
          table: "posts",
          filter: `id=eq.${postId}`
        }, async () => {
          await loadPostPage();
        })
        .subscribe();
    }

    async function loadPostPage() {
      try {
        await getCurrentUser();
        await fetchPost();
        await fetchAuthor(postData.user_id);
        await fetchLikesState();

        postCard.innerHTML = `
          <div class="post">
            ${buildPostHtml()}
          </div>
        `;

        attachPostEvents();
        setupRealtime();
      } catch (err) {
        console.error("POST LOAD ERROR:", err);
        postCard.innerHTML = `
          <div class="error-state">
            Unable to load post.<br>
            ${escapeHtml(err?.message || "Unknown error")}
          </div>
        `;
      }
    }

    closeLikersBtn.addEventListener("click", closeLikersModal);
    likersOverlay.addEventListener("click", closeLikersModal);

    closeShareBtn.addEventListener("click", closeShareModal);
    shareOverlay.addEventListener("click", closeShareModal);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeLikersModal();
        closeShareModal();
      }
    });

    loadPostPage();
  </script>
</body>
</html>
