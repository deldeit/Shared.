<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared - Post</title>

  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Archivo Black', sans-serif;
    }

    :root {
      --bg: #000;
      --panel: #0f0f0f;
      --border: #222;
      --text: #fff;
      --muted: rgba(255,255,255,.68);
    }

    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
      text-decoration: none;
      flex: 0 0 auto;
    }

    .header {
      font-size: 30px;
      line-height: 1;
      letter-spacing: -.5px;
      flex: 1;
      text-align: center;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
    }

    .media {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #111;
    }

    .media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .content {
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .meta {
      font-size: 12px;
      color: var(--muted);
    }

    .caption {
      font-size: 14px;
      line-height: 1.4;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .error-state,
    .loading-state {
      padding: 22px 10px;
      text-align: center;
      opacity: .8;
      font-size: 13px;
    }

    @media (max-width: 520px) {
      .header {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a class="back-link" href="javascript:history.back()" aria-label="Back">
        <span class="material-symbols-outlined">arrow_back</span>
      </a>
      <div class="header">Shared.</div>
      <div style="width:44px;"></div>
    </div>

    <div class="card" id="postCard">
      <div class="loading-state" id="loadingState">Loading post...</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://cnhaonawapuahzoctqav.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawGQ6g9vHdHylcEHI8mIVJx_xAjGtArNes";
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(window.location.search);
    const postId = params.get("id") || "";

    const postCard = document.getElementById("postCard");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function loadPost() {
      if (!postId) {
        postCard.innerHTML = `<div class="error-state">Missing post id in URL.</div>`;
        return;
      }

      try {
        const { data, error } = await supabaseClient
          .from("posts")
          .select("id, image_url, caption, created_at, user_id, song_preview")
          .eq("id", postId)
          .maybeSingle();

        if (error) throw error;

        if (!data) {
          postCard.innerHTML = `<div class="error-state">Post not found.</div>`;
          return;
        }

        postCard.innerHTML = `
          <div class="media">
            ${data.image_url ? `<img src="${escapeHtml(data.image_url)}" alt="Post image">` : ""}
          </div>
          <div class="content">
            <div class="meta">
              ${data.created_at ? new Date(data.created_at).toLocaleString() : ""}
            </div>
            <div class="caption">
              ${escapeHtml(data.caption || "No caption")}
            </div>
          </div>
        `;
      } catch (err) {
        console.error("POST LOAD ERROR:", err);
        postCard.innerHTML = `<div class="error-state">Unable to load post.</div>`;
      }
    }

    loadPost();
  </script>
</body>
</html>
