<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shared Login</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  color:#fff;
  font-family:'Archivo Black', sans-serif;
  padding:24px;
}
.card{
  width:100%;
  max-width:340px;
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:20px;
  padding:28px 22px 22px;
  box-shadow:0 20px 60px rgba(0,0,0,.35);
}
h1{
  margin:0 0 20px;
  text-align:center;
  font-size:28px;
  letter-spacing:1px;
}
.tabs{
  display:flex;
  gap:8px;
  margin-bottom:20px;
}
.tab{
  flex:1;
  padding:10px;
  border-radius:999px;
  border:1px solid #333;
  background:transparent;
  color:#666;
  font-family:'Archivo Black', sans-serif;
  font-size:13px;
  letter-spacing:1px;
  cursor:pointer;
  transition:0.15s ease;
}
.tab.active{ background:#fff; color:#000; border-color:#fff; }
.tab:not(.active):hover{ border-color:#555; color:#aaa; }
.fields{ display:flex; flex-direction:column; gap:10px; }
input[type="text"],
input[type="email"],
input[type="password"]{
  width:100%;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid #222;
  background:#000;
  color:#fff;
  font-family:'Archivo Black', sans-serif;
  font-size:13px;
  outline:none;
  transition:border-color 0.15s;
}
input:focus{ border-color:#444; }
.checkbox-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:2px;
}
.checkbox-row input[type="checkbox"]{
  width:16px; height:16px;
  accent-color:#fff;
  cursor:pointer;
  flex-shrink:0;
}
.checkbox-row label{ font-size:11px; color:#666; cursor:pointer; line-height:1.4; }
.checkbox-row a{ color:#aaa; text-decoration:underline; }
.submit{
  width:100%;
  padding:14px;
  margin-top:14px;
  border-radius:16px;
  border:none;
  background:linear-gradient(135deg,#ffffff,#d0d0d0);
  color:#000;
  font-family:'Archivo Black', sans-serif;
  font-size:14px;
  letter-spacing:1px;
  cursor:pointer;
  transition:0.15s ease;
}
.submit:hover:not(:disabled){ transform:scale(1.02); }
.submit:disabled{ opacity:.6; cursor:not-allowed; }
.status{
  font-size:11px;
  color:#888;
  margin-top:12px;
  text-align:center;
  min-height:14px;
  word-break:break-word;
  line-height:1.5;
}
.status.error{ color:#e05555; }
.status.success{ color:#55e09a; }
.fade-enter{ animation: fadeIn 0.18s ease; }
@keyframes fadeIn{ from{ opacity:0; transform:translateY(4px); } to{ opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div class="card">
  <h1>Shared.</h1>
  <div class="tabs">
    <button class="tab active" id="tabLogin">LOGIN</button>
    <button class="tab" id="tabSignup">SIGN UP</button>
  </div>
  <div class="fields" id="fields"></div>
  <button class="submit" id="submitBtn">LOGIN</button>
  <div class="status" id="status"></div>
</div>

<script>
const API = "https://api.sharedweb.org";

const tabLogin  = document.getElementById("tabLogin");
const tabSignup = document.getElementById("tabSignup");
const fields    = document.getElementById("fields");
const submitBtn = document.getElementById("submitBtn");
const statusEl  = document.getElementById("status");

let mode = "login";

// ── Helpers ──────────────────────────────────────────────────────────────────

function setStatus(text, type = "neutral") {
  statusEl.textContent = text || "";
  statusEl.className = "status";
  if (type === "error")   statusEl.classList.add("error");
  if (type === "success") statusEl.classList.add("success");
}

function setLoading(v) {
  submitBtn.disabled = v;
  submitBtn.textContent = v
    ? (mode === "login" ? "SIGNING IN..." : "CREATING ACCOUNT...")
    : (mode === "login" ? "LOGIN" : "SIGN UP");
}

function saveSession(data) {
  localStorage.setItem("token",    data.token);
  localStorage.setItem("user_id",  data.user_id);
  localStorage.setItem("username", data.username);
}

function goHome() {
  window.location.replace("./home.html");
}

/**
 * Wrapper fetch che aggiunge:
 *  - Content-Type: application/json (per POST JSON)
 *  - Authorization: Bearer <token> se presente in localStorage
 *  - Gestione errori CORS / rete distinta da errori HTTP
 */
async function apiFetch(path, options = {}) {
  const token = localStorage.getItem("token");

  const headers = {
    "Content-Type": "application/json",
    ...(token ? { "Authorization": `Bearer ${token}` } : {}),
    ...(options.headers || {}),
  };

  // Per multipart/form-data NON impostare Content-Type (il browser lo fa da solo)
  if (options.body instanceof FormData) {
    delete headers["Content-Type"];
  }

  const res = await fetch(`${API}${path}`, {
    ...options,
    headers,
  });

  return res;
}

// ── Render ───────────────────────────────────────────────────────────────────

function renderFields() {
  fields.classList.remove("fade-enter");
  void fields.offsetWidth;
  fields.classList.add("fade-enter");

  if (mode === "login") {
    fields.innerHTML = `
      <input id="f_email"    type="email"    placeholder="Email"    autocomplete="email">
      <input id="f_password" type="password" placeholder="Password" autocomplete="current-password">
    `;
    submitBtn.textContent = "LOGIN";
  } else {
    fields.innerHTML = `
      <input id="f_username" type="text"     placeholder="Username" autocomplete="username">
      <input id="f_email"    type="email"    placeholder="Email"    autocomplete="email">
      <input id="f_password" type="password" placeholder="Password" autocomplete="new-password">
      <div class="checkbox-row">
        <input type="checkbox" id="f_terms">
        <label for="f_terms">I agree to the <a href="#">terms and conditions</a></label>
      </div>
    `;
    submitBtn.textContent = "SIGN UP";
  }
}

// ── Tab switch ────────────────────────────────────────────────────────────────

tabLogin.addEventListener("click", () => {
  if (mode === "login") return;
  mode = "login";
  tabLogin.classList.add("active");
  tabSignup.classList.remove("active");
  setStatus("");
  renderFields();
});

tabSignup.addEventListener("click", () => {
  if (mode === "signup") return;
  mode = "signup";
  tabSignup.classList.add("active");
  tabLogin.classList.remove("active");
  setStatus("");
  renderFields();
});

// ── Submit ────────────────────────────────────────────────────────────────────

submitBtn.addEventListener("click", async () => {
  setStatus("");

  // ── LOGIN ──
  if (mode === "login") {
    const email    = document.getElementById("f_email")?.value.trim();
    const password = document.getElementById("f_password")?.value;

    if (!email || !password) {
      setStatus("ENTER EMAIL AND PASSWORD", "error");
      return;
    }

    setLoading(true);
    setStatus("SIGNING IN...");

    try {
      const res = await apiFetch("/login", {
        method: "POST",
        body: JSON.stringify({ email, password }),
      });

      const data = await res.json();

      if (!res.ok) {
        // data.detail può essere stringa o array (FastAPI validation)
        const msg = Array.isArray(data.detail)
          ? data.detail.map(e => e.msg).join(" · ")
          : (data.detail || "LOGIN FAILED");
        setStatus(msg.toUpperCase(), "error");
        setLoading(false);
        return;
      }

      saveSession(data);
      setStatus("WELCOME BACK!", "success");
      setTimeout(goHome, 400);

    } catch (err) {
      // TypeError = CORS bloccato o server irraggiungibile
      if (err instanceof TypeError) {
        setStatus("SERVER UNREACHABLE — check CORS or network", "error");
      } else {
        setStatus("UNEXPECTED ERROR", "error");
      }
      setLoading(false);
    }

  // ── SIGN UP ──
  } else {
    const username = document.getElementById("f_username")?.value.trim();
    const email    = document.getElementById("f_email")?.value.trim();
    const password = document.getElementById("f_password")?.value;
    const terms    = document.getElementById("f_terms")?.checked;

    if (!username || !email || !password) {
      setStatus("FILL IN ALL FIELDS", "error");
      return;
    }
    if (password.length < 6) {
      setStatus("PASSWORD MIN 6 CHARACTERS", "error");
      return;
    }
    if (!terms) {
      setStatus("ACCEPT THE TERMS AND CONDITIONS", "error");
      return;
    }

    setLoading(true);
    setStatus("CREATING ACCOUNT...");

    try {
      const res = await apiFetch("/register", {
        method: "POST",
        body: JSON.stringify({ username, email, password }),
      });

      const data = await res.json();

      if (!res.ok) {
        const msg = Array.isArray(data.detail)
          ? data.detail.map(e => e.msg).join(" · ")
          : (data.detail || "SIGNUP FAILED");
        setStatus(msg.toUpperCase(), "error");
        setLoading(false);
        return;
      }

      saveSession(data);
      setStatus("ACCOUNT CREATED!", "success");
      setTimeout(goHome, 400);

    } catch (err) {
      if (err instanceof TypeError) {
        setStatus("SERVER UNREACHABLE — check CORS or network", "error");
      } else {
        setStatus("UNEXPECTED ERROR", "error");
      }
      setLoading(false);
    }
  }
});

// ── Auto-redirect se già loggato ──────────────────────────────────────────────
if (localStorage.getItem("token")) goHome();

renderFields();
</script>
</body>
</html>
