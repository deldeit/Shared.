<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shared Login</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  color:#fff;
  font-family:'Archivo Black', sans-serif;
  padding:24px;
}

.card{
  width:100%;
  max-width:340px;
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:20px;
  padding:22px;
  box-shadow:0 20px 60px rgba(0,0,0,.35);
}

h1{
  margin:0 0 16px;
  text-align:center;
  font-size:28px;
  letter-spacing:1px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:14px;
  border:1px solid #222;
  background:#000;
  color:#fff;
  font-family:'Archivo Black', sans-serif;
  outline:none;
}

input:focus{ border-color:#444; }

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:16px;
  border:none;
  font-family:'Archivo Black', sans-serif;
  cursor:pointer;
  transition:0.15s ease;
  letter-spacing:1px;
}

button:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.primary{
  background:linear-gradient(135deg,#ffffff,#d0d0d0);
  color:#000;
}

.primary:hover:not(:disabled){
  transform:scale(1.02);
}

.secondary{
  background:#000;
  color:#fff;
  border:1px solid #333;
}

.secondary:hover:not(:disabled){
  background:#111;
}

.google{
  background:#fff;
  color:#000;
}

.google:hover:not(:disabled){
  transform:scale(1.02);
}

.divider{
  display:flex;
  align-items:center;
  text-align:center;
  margin:18px 0 8px;
  color:#666;
  font-size:12px;
}

.divider::before,
.divider::after{
  content:"";
  flex:1;
  height:1px;
  background:#333;
}

.divider::before{ margin-right:10px; }
.divider::after{ margin-left:10px; }

.small{
  font-size:11px;
  opacity:0.7;
  margin-top:12px;
  text-align:center;
  min-height:14px;
  word-break:break-word;
}
</style>
</head>

<body>
<div class="card">
  <h1>Shared.</h1>

  <input id="username" type="text" placeholder="Username" autocomplete="username">
  <input id="email" type="email" placeholder="Email" autocomplete="email">
  <input id="password" type="password" placeholder="Password" autocomplete="current-password">

  <button type="button" class="primary" id="signinBtn">SIGN IN</button>
  <button type="button" class="secondary" id="signupBtn">SIGN UP</button>

  <div class="divider">OR</div>

  <button type="button" class="google" id="googleBtn">SIGN IN WITH GOOGLE</button>

  <div class="small" id="status"></div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = "https://cnhaonawapuahzoctqav.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true
  }
});

const status = document.getElementById("status");
const signInBtn = document.getElementById("signinBtn");
const signUpBtn = document.getElementById("signupBtn");
const googleBtn = document.getElementById("googleBtn");

const usernameInput = document.getElementById("username");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");

function setLoading(state){
  signInBtn.disabled = state;
  signUpBtn.disabled = state;
  googleBtn.disabled = state;
}

function setStatus(text){
  status.textContent = text || "";
}

function goHome(){
  window.location.replace("/home.html");
}

async function checkSession(){
  const { data, error } = await supabase.auth.getSession();
  if (error) {
    console.error(error);
    return;
  }
  if (data?.session) goHome();
}

await checkSession();

supabase.auth.onAuthStateChange((event, session) => {
  if ((event === "SIGNED_IN" || event === "TOKEN_REFRESHED") && session) {
    goHome();
  }
});

async function signIn(){
  setStatus("SIGNING IN...");
  setLoading(true);

  const email = emailInput.value.trim();
  const password = passwordInput.value;

  if (!email || !password){
    setStatus("ENTER EMAIL AND PASSWORD");
    setLoading(false);
    return;
  }

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  setLoading(false);

  if (error){
    setStatus(error.message);
    return;
  }

  goHome();
}

async function signUp(){
  setStatus("CREATING ACCOUNT...");
  setLoading(true);

  const email = emailInput.value.trim();
  const password = passwordInput.value;
  const username = usernameInput.value.trim();

  if (!email || !password || !username){
    setStatus("ENTER USERNAME, EMAIL AND PASSWORD");
    setLoading(false);
    return;
  }

  const { data, error } = await supabase.auth.signUp({
    email,
    password,
    options: {
      data: {
        display_name: username
      }
    }
  });

  setLoading(false);

  if (error){
    setStatus(error.message);
    return;
  }

  if (data?.session) {
    goHome();
  } else {
    setStatus("ACCOUNT CREATED. CHECK EMAIL IF CONFIRMATION IS ENABLED.");
  }
}

async function signInWithGoogle(){
  setStatus("REDIRECTING...");
  setLoading(true);

  const { error } = await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: `${window.location.origin}/home.html`
    }
  });

  if (error){
    setStatus(error.message);
    setLoading(false);
  }
}

signInBtn.addEventListener("click", signIn);
signUpBtn.addEventListener("click", signUp);
googleBtn.addEventListener("click", signInWithGoogle);
</script>
</body>
</html>
