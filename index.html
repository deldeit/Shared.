<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shared Login</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  color:#fff;
  font-family:'Archivo Black', sans-serif;
}

/* CARD */
.card{
  width:340px;
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:20px;
  padding:22px;
}

/* TITLE */
h1{
  margin:0;
  text-align:center;
  font-size:28px;
  letter-spacing:1px;
  margin-bottom:16px;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:14px;
  border:1px solid #222;
  background:#000;
  color:#fff;
  font-family:'Archivo Black', sans-serif;
  outline:none;
}

input:focus{
  border-color:#444;
}

/* BUTTON BASE */
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:16px;
  border:none;
  font-family:'Archivo Black', sans-serif;
  cursor:pointer;
  transition:0.15s ease;
  letter-spacing:1px;
}

/* PRIMARY */
.primary{
  background:linear-gradient(135deg,#ffffff,#d0d0d0);
  color:#000;
}

.primary:hover{
  transform:scale(1.02);
}

/* SECONDARY */
.secondary{
  background:#000;
  color:#fff;
  border:1px solid #333;
}

.secondary:hover{
  background:#111;
}

/* STATUS */
.small{
  font-size:11px;
  opacity:0.6;
  margin-top:12px;
  text-align:center;
}
</style>
</head>

<body>

<div class="card">

  <h1>Shared.</h1>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button class="primary" onclick="signIn()">SIGN IN</button>
  <button class="secondary" onclick="signUp()">SIGN UP</button>

  <div class="small" id="status"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://cnhaonawapuahzoctqav.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes"
);

/* AUTO REDIRECT */
const { data:{session} } = await supabase.auth.getSession();
if(session){
  window.location.href = "home.html";
}

const status = document.getElementById("status");

/* SIGN IN */
window.signIn = async () => {

  status.innerText = "SIGNING IN...";

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    status.innerText = error.message;
    return;
  }

  window.location.href = "home.html";
};

/* SIGN UP */
window.signUp = async () => {

  status.innerText = "CREATING ACCOUNT...";

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({
    email,
    password
  });

  if(error){
    status.innerText = error.message;
    return;
  }

  status.innerText = "CHECK EMAIL TO CONFIRM";
};
</script>

</body>
</html>
