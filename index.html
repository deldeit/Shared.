<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shared Login</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  color:#fff;
  font-family:'Archivo Black', sans-serif;
  padding:24px;
}
.card{
  width:100%;
  max-width:340px;
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:20px;
  padding:22px;
  box-shadow:0 20px 60px rgba(0,0,0,.35);
}
h1{
  margin:0 0 16px;
  text-align:center;
  font-size:28px;
  letter-spacing:1px;
}
input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:14px;
  border:1px solid #222;
  background:#000;
  color:#fff;
  font-family:'Archivo Black', sans-serif;
  outline:none;
  font-size:14px;
}
input:focus{ border-color:#444; }
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:16px;
  border:none;
  font-family:'Archivo Black', sans-serif;
  cursor:pointer;
  transition:0.15s ease;
  letter-spacing:1px;
  font-size:14px;
}
button:disabled{ opacity:.6; cursor:not-allowed; }
.primary{
  background:linear-gradient(135deg,#ffffff,#d0d0d0);
  color:#000;
}
.primary:hover:not(:disabled){ transform:scale(1.02); }
.secondary{
  background:#000;
  color:#fff;
  border:1px solid #333;
}
.secondary:hover:not(:disabled){ background:#111; }
.small{
  font-size:11px;
  opacity:0.7;
  margin-top:12px;
  text-align:center;
  min-height:14px;
  word-break:break-word;
}
#usernameField{ display:none; }
</style>
</head>
<body>
  <div class="card">
    <h1>Shared.</h1>

    <div id="usernameField">
      <input id="username" type="text" placeholder="Username" autocomplete="username">
    </div>
    <input id="email" type="email" placeholder="Email" autocomplete="email">
    <input id="password" type="password" placeholder="Password" autocomplete="current-password">

    <button type="button" class="primary" id="signinBtn">SIGN IN</button>
    <button type="button" class="secondary" id="signupBtn">CREATE ACCOUNT</button>

    <div class="small" id="status"></div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://cnhaonawapuahzoctqav.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes";
    const API_URL = "https://api.sharedweb.org";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    });

    const status      = document.getElementById("status");
    const signinBtn   = document.getElementById("signinBtn");
    const signupBtn   = document.getElementById("signupBtn");
    const usernameField = document.getElementById("usernameField");

    let mode = "signin"; // "signin" | "signup"

    function setStatus(text) { status.textContent = text || ""; }
    function setLoading(v) { signinBtn.disabled = v; signupBtn.disabled = v; }

    function goHome() { window.location.replace("./home.html"); }

    // Mostra/nascondi campo username in base alla modalità
    signupBtn.addEventListener("click", () => {
      if (mode === "signin") {
        mode = "signup";
        usernameField.style.display = "block";
        signinBtn.textContent = "SIGN IN";
        signupBtn.textContent = "CONFIRM SIGN UP";
        setStatus("Fill in all fields to create your account.");
      } else {
        doSignUp();
      }
    });

    signinBtn.addEventListener("click", () => {
      if (mode === "signup") {
        mode = "signin";
        usernameField.style.display = "none";
        signupBtn.textContent = "CREATE ACCOUNT";
        setStatus("");
      } else {
        doSignIn();
      }
    });

    // Controlla sessione esistente
    supabase.auth.getSession().then(({ data }) => {
      if (data?.session) goHome();
    });

    supabase.auth.onAuthStateChange((event, session) => {
      if ((event === "SIGNED_IN" || event === "TOKEN_REFRESHED") && session) goHome();
    });

    async function doSignIn() {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) { setStatus("ENTER EMAIL AND PASSWORD"); return; }

      setStatus("SIGNING IN...");
      setLoading(true);

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      setLoading(false);
      if (error) { setStatus(error.message); return; }
      goHome();
    }

    async function doSignUp() {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const username = document.getElementById("username").value.trim();

      if (!email || !password || !username) {
        setStatus("ENTER USERNAME, EMAIL AND PASSWORD");
        return;
      }
      if (password.length < 6) { setStatus("PASSWORD MIN 6 CHARACTERS"); return; }

      setStatus("CREATING ACCOUNT...");
      setLoading(true);

      // 1. Registra su Supabase Auth
      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: { data: { display_name: username } }
      });

      if (error) { setStatus(error.message); setLoading(false); return; }

      const userId = data?.user?.id;

      // 2. Crea profilo sul server locale
      if (userId) {
        try {
          const res = await fetch(`${API_URL}/profiles`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_id: userId, username })
          });
          if (!res.ok) {
            const err = await res.json();
            // Username duplicato o altro errore lato server
            setStatus(err.detail || "PROFILE ERROR");
            setLoading(false);
            return;
          }
        } catch (e) {
          // Il server non è raggiungibile — non blocca il login
          console.warn("Profile server unreachable:", e);
        }
      }

      setLoading(false);
      goHome();
    }
  </script>
</body>
</html>
