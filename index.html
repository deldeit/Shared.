<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shared Login</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
  color:white;
  font-family:'Archivo Black',sans-serif;
  gap:10px;
}

input,button{
  padding:12px;
  border-radius:10px;
  border:none;
  width:260px;
}

input{background:#111;color:white}
button{cursor:pointer}
.primary{background:white;color:black}
.secondary{background:transparent;border:1px solid #555;color:white}
</style>
</head>

<body>

<h1>Shared</h1>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="primary" onclick="signIn()">Sign in</button>
<button class="secondary" onclick="signUp()">Sign up</button>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://cnhaonawapuahzoctqav.supabase.co",
  "METTI_ANON_KEY"
);

// persist session
await supabase.auth.getSession();

// redirect if already logged
const { data: { session } } = await supabase.auth.getSession();
if(session){
  window.location.href = "home.html";
}

window.signIn = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(error) return alert(error.message);

  window.location.href = "home.html";
};

window.signUp = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({
    email,
    password
  });

  if(error) return alert(error.message);

  alert("Check email to confirm");
};
</script>

</body>
</html>
