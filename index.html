<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shared</title>

  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Archivo Black', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: black;
      color: white;
      gap: 20px;
    }

    h1 {
      font-size: 80px;
      background: linear-gradient(90deg,#fff,#999);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    input {
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #111;
      color: white;
      width: 260px;
    }

    .btns {
      display: flex;
      gap: 10px;
    }

    button {
      padding: 12px;
      border-radius: 999px;
      cursor: pointer;
      border: none;
      width: 130px;
    }

    .primary { background: white; color: black; }
    .secondary { background: transparent; color: white; border: 1px solid #555; }
  </style>
</head>

<body>

  <h1>Shared</h1>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <div class="btns">
    <button class="primary" onclick="signIn()">Sign in</button>
    <button class="secondary" onclick="signUp()">Sign up</button>
  </div>

  <p id="status"></p>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://cnhaonawapuahzoctqav.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes"
    );

    const status = document.getElementById("status");

    // SESSION CHECK
    const checkSession = async () => {
      const { data } = await supabase.auth.getSession();
      if (data.session) {
        status.innerText = "Logged in as: " + data.session.user.email;
      }
    };

    checkSession();

    // SIGN UP
    window.signUp = async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signUp({
        email,
        password
      });

      if (error) {
        alert(error.message);
      } else {
        alert("Check your email to confirm your account");
      }
    };

    // SIGN IN
    window.signIn = async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        alert(error.message);
      } else {
        status.innerText = "Logged in as: " + data.user.email;
      }
    };
  </script>

</body>
</html>
