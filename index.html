<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shared</title>

  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Archivo Black', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: black;
      color: white;
      gap: 12px;
    }

    h1 {
      font-size: 80px;
      background: linear-gradient(90deg,#fff,#999);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    input {
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #111;
      color: white;
      width: 260px;
    }

    .btns {
      display: flex;
      gap: 10px;
    }

    button {
      padding: 12px;
      border-radius: 999px;
      border: none;
      width: 130px;
      cursor: pointer;
    }

    .primary { background: white; color: black; }
    .secondary { background: transparent; color: white; border: 1px solid #555; }

    #status {
      margin-top: 10px;
      opacity: 0.8;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <h1>Shared</h1>

  <input id="username" placeholder="Username">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <div class="btns">
    <button class="primary" onclick="signUp()">Sign up</button>
    <button class="secondary" onclick="signIn()">Sign in</button>
  </div>

  <p id="status"></p>

  <!-- SCRIPT FUNZIONANTE -->
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // 🔥 METTI QUI LA TUA ANON KEY
    const SUPABASE_URL = "https://cnhaonawapuahzoctqav.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes";

    window.supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const status = document.getElementById("status");

    // -----------------------
    // SIGN UP
    // -----------------------
    window.signUp = async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const username = document.getElementById("username").value;

      console.log("START SIGNUP");

      const { data, error } = await supabase.auth.signUp({
        email,
        password
      });

      console.log("AUTH:", data, error);

      if (error) {
        alert(error.message);
        return;
      }

      // 🔥 prende user SEMPRE
      const { data: userData } = await supabase.auth.getUser();
      const user = userData.user;

      console.log("USER:", user);

      if (!user) {
        alert("Check email (user not active yet)");
        return;
      }

      const res = await supabase
        .from("profiles")
        .insert([{ id: user.id, username }]);

      console.log("INSERT:", res);

      if (res.error) {
        alert("ERROR: " + res.error.message);
      } else {
        status.innerText = "User created: @" + username;
      }
    };

    // -----------------------
    // SIGN IN
    // -----------------------
    window.signIn = async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      console.log("LOGIN:", data, error);

      if (error) {
        alert(error.message);
        return;
      }

      const user = data.user;

      const { data: profile, error: profileError } = await supabase
        .from("profiles")
        .select("username")
        .eq("id", user.id)
        .single();

      console.log("PROFILE:", profile, profileError);

      if (profileError) {
        alert(profileError.message);
      } else {
        status.innerText = "Logged in as @" + profile.username;
      }
    };

    console.log("SUPABASE READY");
  </script>

</body>
</html>
