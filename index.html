<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shared Login</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  color:#fff;
  font-family:'Archivo Black', sans-serif;
}

.container{
  width:320px;
  display:flex;
  flex-direction:column;
  gap:12px;
  text-align:center;
}

.card{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:20px;
  padding:20px;
}

h1{
  margin:0;
  font-size:26px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:14px;
  border:1px solid #222;
  background:#000;
  color:#fff;
  font-family:'Archivo Black', sans-serif;
  outline:none;
}

input:focus{
  border-color:#555;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:14px;
  border:none;
  font-family:'Archivo Black', sans-serif;
  cursor:pointer;
  transition:0.15s;
}

button:hover{
  opacity:0.9;
}

.primary{
  background:#fff;
  color:#000;
}

.secondary{
  background:#000;
  color:#fff;
  border:1px solid #333;
}

.small{
  font-size:11px;
  opacity:0.6;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h1>Shared</h1>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button class="primary" onclick="signIn()">SIGN IN</button>
    <button class="secondary" onclick="signUp()">SIGN UP</button>

    <div class="small" id="status"></div>
  </div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://cnhaonawapuahzoctqav.supabase.co",
  "YOUR_ANON_KEY"
);

// redirect if already logged
const { data: { session } } = await supabase.auth.getSession();
if(session){
  window.location.href = "home.html";
}

const status = document.getElementById("status");

window.signIn = async () => {
  status.innerText = "SIGNING IN...";

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    status.innerText = error.message;
    return;
  }

  window.location.href = "home.html";
};

window.signUp = async () => {
  status.innerText = "CREATING ACCOUNT...";

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({
    email,
    password
  });

  if(error){
    status.innerText = error.message;
    return;
  }

  status.innerText = "CHECK EMAIL TO CONFIRM";
};
</script>

</body>
</html>
