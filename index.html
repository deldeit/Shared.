<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shared Login</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  color:#fff;
  font-family:'Archivo Black', sans-serif;
}

.card{
  width:340px;
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:20px;
  padding:22px;
  box-shadow:0 20px 60px rgba(0,0,0,.35);
}

h1{
  margin:0 0 16px;
  text-align:center;
  font-size:28px;
  letter-spacing:1px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:14px;
  border:1px solid #222;
  background:#000;
  color:#fff;
  font-family:'Archivo Black', sans-serif;
  outline:none;
}

input:focus{
  border-color:#444;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:16px;
  border:none;
  font-family:'Archivo Black', sans-serif;
  cursor:pointer;
  transition:0.15s ease;
  letter-spacing:1px;
}

button:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.primary{
  background:linear-gradient(135deg,#ffffff,#d0d0d0);
  color:#000;
}

.secondary{
  background:#000;
  color:#fff;
  border:1px solid #333;
}

.google{
  background:#fff;
  color:#000;
}

.google:hover:not(:disabled),
.primary:hover:not(:disabled),
.secondary:hover:not(:disabled){
  transform:scale(1.02);
}

/* 🔥 DIVIDER */
.divider{
  display:flex;
  align-items:center;
  text-align:center;
  margin:18px 0 8px;
  color:#666;
  font-size:12px;
}

.divider::before,
.divider::after{
  content:"";
  flex:1;
  height:1px;
  background:#333;
}

.divider::before{
  margin-right:10px;
}

.divider::after{
  margin-left:10px;
}

.small{
  font-size:11px;
  opacity:0.7;
  margin-top:12px;
  text-align:center;
  min-height:14px;
}
</style>
</head>

<body>
  <div class="card">
    <h1>Shared.</h1>

    <input id="username" type="text" placeholder="Username">
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button class="primary" id="signinBtn">SIGN IN</button>
    <button class="secondary" id="signupBtn">SIGN UP</button>

    <!-- 🔥 DIVIDER -->
    <div class="divider">OR</div>

    <button class="google" id="googleBtn">SIGN IN WITH GOOGLE</button>

    <div class="small" id="status"></div>
  </div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://cnhaonawapuahzoctqav.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes"
);

const status = document.getElementById("status");
const signInBtn = document.getElementById("signinBtn");
const signUpBtn = document.getElementById("signupBtn");
const googleBtn = document.getElementById("googleBtn");

function setLoading(v){
  signInBtn.disabled = v;
  signUpBtn.disabled = v;
  googleBtn.disabled = v;
}

function goHome(){
  window.location.replace("home.html");
}

async function checkSession(){
  const { data } = await supabase.auth.getSession();
  if(data.session) goHome();
}

await checkSession();

supabase.auth.onAuthStateChange((_event, session)=>{
  if(session) goHome();
});

/* SIGN IN */
async function signIn(){
  status.textContent = "SIGNING IN...";
  setLoading(true);

  const email = emailInput().value.trim();
  const password = passwordInput().value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  setLoading(false);

  if(error){
    status.textContent = error.message;
    return;
  }

  goHome();
}

/* SIGN UP */
async function signUp(){
  status.textContent = "CREATING ACCOUNT...";
  setLoading(true);

  const email = emailInput().value.trim();
  const password = passwordInput().value;
  const username = usernameInput().value.trim();

  const { error } = await supabase.auth.signUp({
    email,
    password,
    options:{
      data:{
        display_name: username
      }
    }
  });

  setLoading(false);

  if(error){
    status.textContent = error.message;
    return;
  }

  status.textContent = "CHECK YOUR EMAIL / ACCOUNT CREATED";
}

/* GOOGLE */
async function signInWithGoogle(){
  status.textContent = "REDIRECTING...";
  setLoading(true);

  const { error } = await supabase.auth.signInWithOAuth({
    provider:"google",
    options:{
      redirectTo: window.location.origin
    }
  });

  if(error){
    status.textContent = error.message;
    setLoading(false);
  }
}

/* helpers */
const usernameInput = ()=>document.getElementById("username");
const emailInput = ()=>document.getElementById("email");
const passwordInput = ()=>document.getElementById("password");

/* events */
signInBtn.onclick = signIn;
signUpBtn.onclick = signUp;
googleBtn.onclick = signInWithGoogle;

</script>
</body>
</html>
