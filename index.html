<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shared</title>

  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Archivo Black',sans-serif; }

    body {
      height: 100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      background:black;
      color:white;
      gap:15px;
    }

    h1 {
      font-size:80px;
      background: linear-gradient(90deg,#fff,#999);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    input {
      padding:12px;
      border-radius:10px;
      border:none;
      background:#111;
      color:white;
      width:260px;
    }

    .btns { display:flex; gap:10px; }

    button {
      padding:12px;
      border-radius:999px;
      border:none;
      width:130px;
      cursor:pointer;
    }

    .primary { background:white; color:black; }
    .secondary { background:transparent; color:white; border:1px solid #555; }
  </style>
</head>

<body>

  <h1>Shared</h1>

  <input id="username" placeholder="Username">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <div class="btns">
    <button class="primary" onclick="signUp()">Sign up</button>
    <button class="secondary" onclick="signIn()">Sign in</button>
  </div>

  <p id="status"></p>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://cnhaonawapuahzoctqav.supabase.co",
      "INSERISCI_ANON_KEY"
    );

    const status = document.getElementById("status");

    window.signUp = async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const username = document.getElementById("username").value;

      const { data, error } = await supabase.auth.signUp({
        email,
        password
      });

      if (error) return alert(error.message);

      const user = data.user;

      const { error: profileError } = await supabase
        .from("profiles")
        .insert({
          id: user.id,
          username
        });

      if (profileError) {
        alert(profileError.message);
      } else {
        alert("Account created!");
      }
    };

    window.signIn = async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) return alert(error.message);

      const { data: profile } = await supabase
        .from("profiles")
        .select("username")
        .eq("id", data.user.id)
        .single();

      status.innerText = "Logged in as @" + profile.username;
    };
  </script>

</body>
</html>
