<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shared Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
  box-sizing:border-box;
  font-family:'Archivo Black',sans-serif;
}

body{
  margin:0;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* APP */
.app{
  width:420px;
  height:650px;
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:24px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  border-bottom:1px solid #222;
  background:#0b0b0b;
}

.back{
  cursor:pointer;
  padding:6px 10px;
  border-radius:10px;
  background:#1a1a1a;
}

.back:hover{
  opacity:.8;
}

.header-info{
  display:flex;
  flex-direction:column;
  cursor:pointer;
}

.name{
  font-size:13px;
}

.status{
  font-size:11px;
  opacity:.6;
}

/* CHAT */
.chat{
  flex:1;
  overflow-y:auto;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:75%;
  padding:10px 12px;
  border-radius:14px;
  font-size:13px;
}

.me{
  align-self:flex-end;
  background:#fff;
  color:#000;
}

.other{
  align-self:flex-start;
  background:#1a1a1a;
  border:1px solid #333;
}

/* INPUT */
.input{
  display:flex;
  gap:10px;
  padding:10px;
  border-top:1px solid #222;
}

input{
  flex:1;
  padding:12px;
  border-radius:999px;
  border:1px solid #333;
  background:#0a0a0a;
  color:#fff;
  outline:none;
}

button{
  border:none;
  border-radius:999px;
  padding:0 16px;
  background:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="back" id="backBtn">←</div>

    <div class="header-info" id="profileBtn">
      <div id="name" class="name">User</div>
      <div id="status" class="status">offline</div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat" class="chat"></div>

  <!-- INPUT -->
  <div class="input">
    <input id="input" placeholder="Write a message..." />
    <button id="sendBtn">Send</button>
  </div>

</div>

<script>
/* =========================
   SUPABASE INIT (SAFE SINGLETON)
========================= */
window.supabaseClient = window.supabaseClient || window.supabase.createClient(
  "https://cnhaonawapuahzoctqav.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes"
);

const supabase = window.supabaseClient;

/* =========================
   STATE
========================= */
let user, otherId, otherName;

const chat = document.getElementById("chat");

/* =========================
   URL PARAMS
========================= */
function getParams(){
  const p = new URLSearchParams(location.search);
  return {
    id: p.get("id"),
    name: p.get("name")
  };
}

/* =========================
   NAVIGATION
========================= */
document.getElementById("backBtn").onclick = () => {
  location.href = "home.html";
};

document.getElementById("profileBtn").onclick = () => {
  location.href = `user.html?id=${otherId}`;
};

/* =========================
   RENDER MESSAGE
========================= */
function renderMessage(m){
  const div = document.createElement("div");
  div.className = "msg " + (m.sender_id === user.id ? "me" : "other");
  div.innerText = m.content;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

/* =========================
   LOAD CHAT HISTORY
========================= */
async function loadChat(){
  const { data } = await supabase
    .from("messages")
    .select("*")
    .or(
      `and(sender_id.eq.${user.id},receiver_id.eq.${otherId}),and(sender_id.eq.${otherId},receiver_id.eq.${user.id})`
    )
    .order("created_at");

  chat.innerHTML = "";
  data.forEach(renderMessage);
}

/* =========================
   SEND MESSAGE
========================= */
async function sendMessage(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  const { error } = await supabase.from("messages").insert({
    sender_id: user.id,
    receiver_id: otherId,
    content: text
  });

  if(error){
    console.error("Send error:", error);
    return;
  }

  input.value = "";
}

/* =========================
   EVENTS
========================= */
document.getElementById("sendBtn").addEventListener("click", sendMessage);

document.getElementById("input").addEventListener("keydown", (e) => {
  if(e.key === "Enter") sendMessage();
});

/* =========================
   REALTIME MESSAGES
========================= */
function subscribeMessages(){
  supabase.channel("chat")
    .on("postgres_changes",
      { event:"INSERT", schema:"public", table:"messages" },
      payload => {
        const m = payload.new;

        if(
          (m.sender_id === user.id && m.receiver_id === otherId) ||
          (m.sender_id === otherId && m.receiver_id === user.id)
        ){
          renderMessage(m);
        }
      }
    )
    .subscribe();
}

/* =========================
   PRESENCE (ONLINE / OFFLINE)
========================= */
function subscribePresence(){
  const channel = supabase.channel("presence");

  channel.on("presence", { event:"sync" }, () => {
    const state = channel.presenceState();
    const online = !!state[otherId];

    document.getElementById("status").innerText =
      online ? "online" : "offline";
  });

  channel.subscribe(async (status) => {
    if(status === "SUBSCRIBED"){
      await channel.track({ user: user.id });
    }
  });
}

/* =========================
   INIT APP
========================= */
async function init(){
  const { data } = await supabase.auth.getUser();
  user = data.user;

  /* redirect if NOT logged in */
  if(!user){
    location.href = "index.html";
    return;
  }

  const params = getParams();
  otherId = params.id;
  otherName = params.name || "User";

  document.getElementById("name").innerText = otherName;

  await loadChat();
  subscribeMessages();
  subscribePresence();
}

init();
</script>

</body>
</html>
