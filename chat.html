<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box;font-family:'Archivo Black',sans-serif;}

body{
  margin:0;
  background:#000;
  color:#fff;
}

.container{
  max-width:900px;
  margin:auto;
  height:100vh;
  display:flex;
  flex-direction:column;
  padding:20px;
}

.header{
  text-align:center;
  margin-bottom:10px;
}

.status{
  font-size:11px;
  opacity:.6;
}

.chat{
  flex:1;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  background:#0f0f0f;
  border-radius:20px;
  padding:15px;
  border:1px solid #222;
}

.msg{
  max-width:70%;
  padding:10px 14px;
  border-radius:16px;
  font-size:13px;
}

.me{background:#fff;color:#000;align-self:flex-end;}
.other{background:#1a1a1a;border:1px solid #333;}

.meta{
  font-size:10px;
  opacity:.6;
  margin-top:4px;
}

.typing{
  font-size:11px;
  opacity:.6;
  margin:5px 0;
}

.input{
  display:flex;
  gap:10px;
  margin-top:10px;
}

input{
  flex:1;
  padding:12px;
  border-radius:999px;
  border:1px solid #333;
  background:#0a0a0a;
  color:#fff;
}

button{
  border:none;
  border-radius:999px;
  padding:0 16px;
  background:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <div id="name"></div>
    <div id="status" class="status"></div>
  </div>

  <div id="chat" class="chat"></div>
  <div id="typing" class="typing"></div>

  <div class="input">
    <input id="input" placeholder="Scrivi..." />
    <button onclick="send()">Invia</button>
  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://cnhaonawapuahzoctqav.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes"
);

let user, otherId, otherName;
const chat = document.getElementById("chat");
const typingDiv = document.getElementById("typing");

function getParams(){
  const p = new URLSearchParams(location.search);
  return {
    id: p.get("id"),
    name: p.get("name")
  };
}

function fallbackName(name, email){
  if(name) return name;
  if(email) return email.split("@")[0];
  return "User";
}

function addMsg(m, me, name){
  const d = document.createElement("div");
  d.className = "msg " + (me ? "me":"other");
  d.innerHTML = `
    ${m.content}
    <div class="meta">${name}</div>
  `;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

async function load(){
  const {data} = await supabase
    .from("messages")
    .select("*")
    .or(`and(sender_id.eq.${user.id},receiver_id.eq.${otherId}),and(sender_id.eq.${otherId},receiver_id.eq.${user.id})`)
    .order("created_at");

  chat.innerHTML = "";

  for(let m of data){
    addMsg(m, m.sender_id===user.id, m.sender_id===user.id?"You":otherName);
  }

  // mark as seen
  await supabase
    .from("messages")
    .update({seen_at: new Date()})
    .eq("receiver_id", user.id)
    .eq("sender_id", otherId)
    .is("seen_at", null);
}

async function send(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  await supabase.from("messages").insert({
    sender_id:user.id,
    receiver_id:otherId,
    content:text
  });

  input.value="";
}

function realtime(){
  supabase.channel("chat")
  .on("postgres_changes",{event:"INSERT",schema:"public",table:"messages"},p=>{
    const m = p.new;

    if(
      (m.sender_id===user.id && m.receiver_id===otherId) ||
      (m.sender_id===otherId && m.receiver_id===user.id)
    ){
      addMsg(m, m.sender_id===user.id, m.sender_id===user.id?"You":otherName);
    }
  })
  .subscribe();
}

function typing(){
  const channel = supabase.channel("typing");

  document.getElementById("input").addEventListener("input", ()=>{
    channel.send({
      type:"broadcast",
      event:"typing",
      payload:{user:user.id}
    });
  });

  channel.on("broadcast",{event:"typing"},payload=>{
    if(payload.payload.user !== user.id){
      typingDiv.innerText = otherName + " sta scrivendo...";
      clearTimeout(window.t);
      window.t = setTimeout(()=>typingDiv.innerText="",1500);
    }
  });

  channel.subscribe();
}

async function presence(){
  const ch = supabase.channel("presence",{config:{presence:{key:user.id}}});

  ch.on("presence",{event:"sync"},()=>{
    const state = ch.presenceState();
    const online = !!state[otherId];
    document.getElementById("status").innerText = online ? "online" : "offline";
  });

  ch.subscribe(async (status)=>{
    if(status==="SUBSCRIBED"){
      await ch.track({online:true});
    }
  });
}

async function init(){
  const {data} = await supabase.auth.getUser();
  user = data.user;

  if(!user){
    location.href="index.html";
    return;
  }

  const p = getParams();
  otherId = p.id;
  otherName = p.name || "User";

  document.getElementById("name").innerText = otherName;

  await load();
  realtime();
  typing();
  presence();
}

init();
</script>

</body>
</html>
