<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shared - Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
  box-sizing:border-box;
  font-family:'Archivo Black',sans-serif;
}

:root{
  --bg:#000;
  --panel:#0f0f0f;
  --border:#222;
  --text:#fff;
  --muted:rgba(255,255,255,.6);
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:920px;
  margin:0 auto;
  height:100vh;
  display:flex;
  flex-direction:column;
  padding:18px;
}

/* HEADER */
.topbar{
  text-align:center;
  margin-bottom:10px;
}

.logo{
  font-size:28px;
  letter-spacing:-1px;
}

.contact{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-top:8px;
  gap:6px;
}

.avatar{
  width:52px;
  height:52px;
  border-radius:50%;
  background:linear-gradient(135deg,#444,#111);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
}

.name{
  font-size:14px;
}

/* CHAT */
.chat{
  flex:1;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:20px;
  padding:14px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:75%;
  padding:10px 14px;
  border-radius:16px;
  font-size:13px;
}

.me{
  align-self:flex-end;
  background:#fff;
  color:#000;
}

.other{
  align-self:flex-start;
  background:#1a1a1a;
  border:1px solid #333;
}

.meta{
  font-size:10px;
  opacity:.6;
  margin-top:4px;
}

/* INPUT */
.input{
  display:flex;
  gap:10px;
  margin-top:10px;
}

input{
  flex:1;
  padding:12px;
  border-radius:999px;
  border:1px solid #333;
  background:#0a0a0a;
  color:#fff;
  outline:none;
}

button{
  border:none;
  border-radius:999px;
  padding:0 16px;
  background:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <div class="topbar">
    <div class="logo">Shared.</div>

    <div class="contact">
      <div id="avatar" class="avatar">U</div>
      <div id="contactName" class="name">User</div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat" class="chat"></div>

  <!-- INPUT -->
  <div class="input">
    <input id="input" placeholder="Scrivi un messaggio..." />
    <button id="sendBtn">Invia</button>
  </div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://cnhaonawapuahzoctqav.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes"
);

let user, otherId, otherName;

const chat = document.getElementById("chat");

function getParams(){
  const p = new URLSearchParams(location.search);
  return {
    id: p.get("id"),
    name: p.get("name")
  };
}

function addMsg(m, isMe){
  const div = document.createElement("div");
  div.className = "msg " + (isMe ? "me" : "other");

  div.innerHTML = `
    ${m.content}
    <div class="meta">${new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function loadMessages(){
  const { data } = await supabase
    .from("messages")
    .select("*")
    .or(`and(sender_id.eq.${user.id},receiver_id.eq.${otherId}),and(sender_id.eq.${otherId},receiver_id.eq.${user.id})`)
    .order("created_at");

  chat.innerHTML = "";

  for(const m of data){
    addMsg(m, m.sender_id === user.id);
  }
}

async function send(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  await supabase.from("messages").insert({
    sender_id:user.id,
    receiver_id:otherId,
    content:text
  });

  input.value="";
}

function realtime(){
  supabase.channel("chat")
    .on("postgres_changes",
      { event:"INSERT", schema:"public", table:"messages" },
      payload => {
        const m = payload.new;

        if(
          (m.sender_id === user.id && m.receiver_id === otherId) ||
          (m.sender_id === otherId && m.receiver_id === user.id)
        ){
          addMsg(m, m.sender_id === user.id);
        }
      }
    )
    .subscribe();
}

function setupUI(){
  document.getElementById("sendBtn").addEventListener("click", send);

  document.getElementById("input").addEventListener("keydown", e=>{
    if(e.key === "Enter") send();
  });
}

async function init(){
  const { data } = await supabase.auth.getUser();
  user = data.user;

  if(!user){
    location.href="index.html";
    return;
  }

  const p = getParams();
  otherId = p.id;
  otherName = p.name || "User";

  document.getElementById("contactName").innerText = otherName;
  document.getElementById("avatar").innerText = otherName?.[0]?.toUpperCase() || "U";

  await loadMessages();
  realtime();
  setupUI();
}

init();
</script>

</body>
</html>
