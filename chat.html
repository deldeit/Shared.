<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shared Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
  box-sizing:border-box;
  font-family:'Archivo Black',sans-serif;
}

body{
  margin:0;
  background:#000;
  color:#fff;
}

/* HEADER WHATSAPP STYLE */
.header{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 14px;
  border-bottom:1px solid #222;
  background:#0f0f0f;
  position:sticky;
  top:0;
}

.avatar{
  width:42px;
  height:42px;
  border-radius:50%;
  background:linear-gradient(135deg,#444,#111);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
}

.header-info{
  display:flex;
  flex-direction:column;
}

.name{
  font-size:13px;
}

.status{
  font-size:11px;
  opacity:.6;
}

/* CHAT */
.chat{
  height:calc(100vh - 120px);
  overflow-y:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:10px 12px;
  border-radius:14px;
  font-size:13px;
}

.me{
  align-self:flex-end;
  background:#fff;
  color:#000;
}

.other{
  align-self:flex-start;
  background:#1a1a1a;
  border:1px solid #333;
}

/* INPUT */
.input{
  display:flex;
  gap:10px;
  padding:10px;
  border-top:1px solid #222;
  background:#0f0f0f;
}

input{
  flex:1;
  padding:12px;
  border-radius:999px;
  border:1px solid #333;
  background:#0a0a0a;
  color:#fff;
  outline:none;
}

button{
  border:none;
  border-radius:999px;
  padding:0 16px;
  background:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div id="avatar" class="avatar">U</div>

  <div class="header-info">
    <div id="name" class="name">User</div>
    <div id="status" class="status">offline</div>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="chat"></div>

<!-- INPUT -->
<div class="input">
  <input id="input" placeholder="Message..." />
  <button id="sendBtn">Send</button>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://cnhaonawapuahzoctqav.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes"
);

let user, otherId, otherName;
const chat = document.getElementById("chat");

function params(){
  const p = new URLSearchParams(location.search);
  return {
    id: p.get("id"),
    name: p.get("name")
  };
}

function addMsg(m){
  const div = document.createElement("div");
  div.className = "msg " + (m.sender_id === user.id ? "me":"other");
  div.innerText = m.content;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

/* LOAD CHAT */
async function load(){
  const { data } = await supabase
    .from("messages")
    .select("*")
    .or(
      `and(sender_id.eq.${user.id},receiver_id.eq.${otherId}),and(sender_id.eq.${otherId},receiver_id.eq.${user.id})`
    )
    .order("created_at");

  chat.innerHTML = "";
  data.forEach(addMsg);
}

/* SEND */
async function send(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  await supabase.from("messages").insert({
    sender_id:user.id,
    receiver_id:otherId,
    content:text
  });

  input.value="";
}

document.getElementById("sendBtn").onclick = send;

document.getElementById("input").addEventListener("keydown", e=>{
  if(e.key==="Enter") send();
});

/* REALTIME MESSAGES */
function realtime(){
  supabase.channel("chat")
    .on("postgres_changes",
      { event:"INSERT", schema:"public", table:"messages" },
      payload=>{
        const m = payload.new;

        if(
          (m.sender_id===user.id && m.receiver_id===otherId) ||
          (m.sender_id===otherId && m.receiver_id===user.id)
        ){
          addMsg(m);
        }
      }
    )
    .subscribe();
}

/* PRESENCE (ONLINE/OFFLINE) */
function presence(){
  const channel = supabase.channel("presence");

  channel.on("presence",{event:"sync"},()=>{
    const state = channel.presenceState();
    const isOnline = !!state[otherId];

    document.getElementById("status").innerText =
      isOnline ? "online" : "offline";
  });

  channel.subscribe(async (status)=>{
    if(status==="SUBSCRIBED"){
      await channel.track({ user:user.id });
    }
  });
}

/* INIT */
async function init(){
  const { data } = await supabase.auth.getUser();
  user = data.user;

  if(!user){
    location.href="index.html";
    return;
  }

  const p = params();
  otherId = p.id;
  otherName = p.name || "User";

  document.getElementById("name").innerText = otherName;
  document.getElementById("avatar").innerText = otherName?.[0]?.toUpperCase() || "U";

  await load();
  realtime();
  presence();
}

init();
</script>

</body>
</html>
