<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Shared. — New</title>

<meta name="theme-color" content="#000" />

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --text:#fff;

  --muted:rgba(255,255,255,.65);
  --muted-2:rgba(255,255,255,.4);

  --border:rgba(255,255,255,.12);
  --panel:rgba(255,255,255,.05);
  --panel-2:rgba(255,255,255,.08);

  --accent:#fff;
  --danger:#ff3b30;
  --radius:20px;

  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}

body{
  background:#000;
  color:#fff;
  font-family:'Archivo Black', sans-serif;
  overflow:hidden;
}

/* ───────────────────────── PAGE */
.page{
  height:100dvh;
  display:flex;
  justify-content:center;
}

.shell{
  width:100%;
  max-width:640px;
  height:100%;
  display:flex;
  flex-direction:column;
  border-left:1px solid rgba(255,255,255,.08);
  border-right:1px solid rgba(255,255,255,.08);
}

/* ───────────────────────── TOPBAR */
.topbar{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:calc(14px + var(--safe-top)) 18px 14px;
  border-bottom:1px solid rgba(255,255,255,.08);
  background:rgba(0,0,0,.9);
  backdrop-filter:blur(18px);
}

.back-btn{
  justify-self:start;
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.04);
  color:rgba(255,255,255,.7);
  cursor:pointer;
  transition:.2s;
}

.back-btn:hover{
  background:rgba(255,255,255,.08);
  color:#fff;
}

.brand{
  justify-self:center;
  font-size:1.5rem;
  letter-spacing:-.06em;
}

/* ───────────────────────── TYPE SELECTOR */
.type-selector{
  display:flex;
  gap:10px;
  padding:18px;
}

.type-pill{
  flex:1;
  padding:16px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.03);
  cursor:pointer;
  transition:.2s;
  text-align:center;
}

.type-pill:hover{
  background:rgba(255,255,255,.06);
}

.type-pill.active{
  background:rgba(255,255,255,.08);
  border-color:rgba(255,255,255,.25);
}

.type-pill-icon{
  width:42px;
  height:42px;
  margin:0 auto 10px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.06);
}

.type-pill-label{
  font-size:11px;
  letter-spacing:.14em;
  color:rgba(255,255,255,.6);
}

/* ───────────────────────── BODY */
.body{
  flex:1;
  overflow:auto;
}

.inner{
  padding:22px 18px calc(40px + var(--safe-bottom));
  display:flex;
  flex-direction:column;
  gap:26px;
}

/* ───────────────────────── SECTION */
.section-title{
  font-size:12px;
  letter-spacing:.16em;
  color:rgba(255,255,255,.5);
  margin-bottom:10px;
}

/* ───────────────────────── DROPZONE */
.dropzone{
  border:1px dashed rgba(255,255,255,.18);
  border-radius:20px;
  padding:28px;
  text-align:center;
  background:rgba(255,255,255,.02);
  transition:.2s;
  cursor:pointer;
}

.dropzone:hover{
  background:rgba(255,255,255,.05);
  border-color:rgba(255,255,255,.3);
}

.dz-icon{
  width:52px;
  height:52px;
  margin:0 auto 10px;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.06);
}

/* ───────────────────────── INPUTS */
.input, .textarea{
  width:100%;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.12);
  background:#0b0b0b;
  color:#fff;
  padding:14px;
  font-size:14px;
  outline:none;
}

.textarea{
  min-height:110px;
  resize:none;
}

/* ───────────────────────── MUSIC */
.music-pill{
  display:none;
  align-items:center;
  gap:12px;
  padding:12px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.03);
}

.music-pill.show{display:flex;}

.music-cover{
  width:42px;
  height:42px;
  border-radius:10px;
}

/* ───────────────────────── BUTTONS */
.actions{
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.04);
  color:#fff;
  cursor:pointer;
  transition:.2s;
}

.btn:hover{
  background:rgba(255,255,255,.08);
}

.btn.primary{
  background:#fff;
  color:#000;
  border-color:#fff;
}

.btn.danger{
  flex:0;
  color:#ff6b6b;
  border-color:rgba(255,59,48,.3);
  background:rgba(255,59,48,.08);
}
</style>
</head>

<body>

<div class="page">
<div class="shell">

<header class="topbar">
  <button class="back-btn" id="backBtn">
    <span class="material-symbols-rounded">arrow_back</span>
    Back
  </button>
  <div class="brand">Shared.</div>
  <div></div>
</header>

<div class="type-selector">
  <div class="type-pill active" id="postType">Post</div>
  <div class="type-pill" id="momentType">Moment</div>
</div>

<div class="body">
<div class="inner">

<div>
  <div class="section-title">MEDIA</div>
  <div class="dropzone" id="dropzone">
    <div class="dz-icon">
      <span class="material-symbols-rounded">upload</span>
    </div>
    Drop or select file
    <input type="file" id="file" hidden />
  </div>
</div>

<div>
  <div class="section-title">CAPTION</div>
  <textarea class="textarea" id="caption"></textarea>
</div>

<div>
  <div class="section-title">TAGS</div>
  <input class="input" id="tags" placeholder="music, art..." />
</div>

<div>
  <div class="section-title">MUSIC</div>
  <input class="input" id="music" placeholder="search track..." />
</div>

<div class="actions">
  <button class="btn primary" id="publish">Publish</button>
  <button class="btn danger" id="cancel">X</button>
</div>

</div>
</div>

</div>
</div>

</body>
</html>
