<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Shared. — Upload</title>
<meta name="theme-color" content="#000000" />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
<style>
  :root {
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --max-w: 640px;
    --muted:   rgba(255,255,255,.60);
    --muted-2: rgba(255,255,255,.35);
    --border:  rgba(255,255,255,.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Archivo Black', sans-serif;
    overflow: hidden;
  }

  button, input, textarea, select { font-family: inherit; }

  /* ── LAYOUT ──────────────────────────────────────── */
  .page {
    width: 100%;
    height: 100dvh;
    display: flex;
    justify-content: center;
  }

  .shell {
    width: 100%;
    max-width: var(--max-w);
    height: 100%;
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  /* ── TOPBAR ──────────────────────────────────────── */
  .topbar {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: calc(14px + var(--safe-top)) 20px 14px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,.9);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
  }

  .back-btn {
    justify-self: start;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.05);
    color: #fff;
    text-decoration: none;
    font-size: 13px;
    transition: background .15s;
  }
  .back-btn:hover { background: rgba(255,255,255,.09); }
  .back-btn .material-symbols-rounded { font-size: 17px; }

  .brand {
    justify-self: center;
    font-size: 1.6rem;
    letter-spacing: -.07em;
    user-select: none;
  }

  .type-badge {
    justify-self: end;
    padding: 8px 13px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.04);
    color: var(--muted-2);
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
  }

  /* ── SCROLLABLE BODY ─────────────────────────────── */
  .body {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }

  /* ── INNER WRAPPER — generous padding ────────────── */
  .inner {
    padding: 36px 28px calc(40px + var(--safe-bottom));
    display: flex;
    flex-direction: column;
    gap: 40px;
  }

  /* ── SECTION ─────────────────────────────────────── */
  .section {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .section-head {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .section-title {
    font-size: 1.1rem;
    letter-spacing: -.03em;
  }

  .section-sub {
    font-size: 12px;
    color: var(--muted-2);
    letter-spacing: .01em;
  }

  .divider {
    border: 0;
    border-top: 1px solid var(--border);
  }

  /* ── DROPZONE ────────────────────────────────────── */
  .dropzone {
    position: relative;
    min-height: 200px;
    border-radius: 22px;
    border: 1.5px dashed rgba(255,255,255,.18);
    background: rgba(255,255,255,.02);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 32px 24px;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    overflow: hidden;
  }

  .dropzone:hover,
  .dropzone.dragover {
    border-color: rgba(255,255,255,.38);
    background: rgba(255,255,255,.045);
  }

  .dz-icon {
    width: 58px;
    height: 58px;
    border-radius: 18px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.10);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .dz-icon .material-symbols-rounded { font-size: 28px; }

  .dz-title { font-size: 1rem; }

  .dz-sub {
    font-size: .8rem;
    color: var(--muted-2);
    text-align: center;
    line-height: 1.5;
  }

  .file-input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  /* ── PREVIEW ─────────────────────────────────────── */
  .preview {
    display: none;
    border-radius: 22px;
    overflow: hidden;
    border: 1px solid var(--border);
    position: relative;
  }

  .preview.show { display: block; }

  .preview img,
  .preview video {
    display: block;
    width: 100%;
    max-height: 380px;
    object-fit: cover;
    background: #0d0d0d;
  }

  .preview-remove {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 36px;
    height: 36px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.2);
    background: rgba(0,0,0,.65);
    backdrop-filter: blur(12px);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 2;
    transition: background .15s;
  }
  .preview-remove:hover { background: rgba(0,0,0,.85); }
  .preview-remove .material-symbols-rounded { font-size: 18px; }

  /* ── PROGRESS ────────────────────────────────────── */
  .progress-wrap {
    display: none;
    flex-direction: column;
    gap: 10px;
  }
  .progress-wrap.show { display: flex; }

  .progress-label {
    font-size: 13px;
    color: var(--muted);
  }

  .progress-track {
    height: 3px;
    border-radius: 999px;
    background: rgba(255,255,255,.08);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 999px;
    background: #fff;
    width: 0%;
    transition: width .35s ease;
  }

  /* ── FIELD ───────────────────────────────────────── */
  .field {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .field-label {
    font-size: 11px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--muted-2);
  }

  .input,
  .textarea {
    width: 100%;
    background: #080808;
    border: 1px solid rgba(255,255,255,.11);
    border-radius: 14px;
    color: #fff;
    outline: none;
    padding: 15px 17px;
    font-size: 15px;
    transition: border-color .18s;
    line-height: 1.4;
  }

  .input:focus,
  .textarea:focus { border-color: rgba(255,255,255,.30); }

  .input::placeholder,
  .textarea::placeholder { color: rgba(255,255,255,.26); }

  .textarea {
    min-height: 116px;
    resize: vertical;
    line-height: 1.55;
  }

  /* ── SEARCH + SUGGESTIONS ────────────────────────── */
  .search-wrap { position: relative; }

  .suggestions {
    position: absolute;
    left: 0; right: 0;
    top: calc(100% + 8px);
    z-index: 30;
    background: #0a0a0a;
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 18px;
    overflow: hidden;
    display: none;
    box-shadow: 0 24px 64px rgba(0,0,0,.7);
    max-height: 270px;
    overflow-y: auto;
  }

  .suggestion {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,.05);
    transition: background .14s;
  }
  .suggestion:last-child { border-bottom: 0; }
  .suggestion:hover { background: rgba(255,255,255,.04); }

  .sug-thumb {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    object-fit: cover;
    background: #111;
    border: 1px solid rgba(255,255,255,.07);
    flex: 0 0 auto;
  }

  .sug-meta { min-width: 0; flex: 1; }

  .sug-title {
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sug-sub {
    margin-top: 3px;
    font-size: 11px;
    color: var(--muted-2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── MUSIC PILL ──────────────────────────────────── */
  .music-pill {
    display: none;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    border-radius: 16px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.09);
  }
  .music-pill.show { display: flex; }

  .music-pill-cover {
    width: 46px;
    height: 46px;
    border-radius: 11px;
    object-fit: cover;
    background: #111;
    border: 1px solid rgba(255,255,255,.07);
    flex: 0 0 auto;
  }

  .music-pill-info { min-width: 0; flex: 1; }

  .music-pill-title {
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .music-pill-artist {
    margin-top: 3px;
    font-size: 12px;
    color: var(--muted-2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .music-pill-clear {
    width: 32px;
    height: 32px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.10);
    background: transparent;
    color: var(--muted-2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex: 0 0 auto;
    transition: background .15s, color .15s;
  }
  .music-pill-clear:hover { background: rgba(255,255,255,.06); color: #fff; }
  .music-pill-clear .material-symbols-rounded { font-size: 16px; }

  /* ── STATUS ──────────────────────────────────────── */
  .status {
    font-size: 13px;
    color: var(--muted);
    min-height: 20px;
  }
  .status.error { color: #ff8a85; }
  .status.ok    { color: #5edb78; }

  /* ── ACTIONS ─────────────────────────────────────── */
  .actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    appearance: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    padding: 15px 22px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.13);
    background: rgba(255,255,255,.05);
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    cursor: pointer;
    transition: background .17s, transform .13s;
    white-space: nowrap;
  }
  .btn:hover  { background: rgba(255,255,255,.10); }
  .btn:active { transform: scale(.97); }
  .btn .material-symbols-rounded { font-size: 20px; }

  .btn.primary {
    flex: 1;
    background: #fff;
    color: #000;
    border-color: #fff;
    box-shadow: 0 4px 24px rgba(255,255,255,.10);
  }
  .btn.primary:hover { background: rgba(255,255,255,.88); }
  .btn.primary:disabled {
    background: rgba(255,255,255,.14);
    color: rgba(0,0,0,.35);
    box-shadow: none;
    cursor: not-allowed;
  }

  .btn.icon-only {
    padding: 15px;
    flex: 0 0 auto;
  }

  .btn.danger {
    background: rgba(255,59,48,.08);
    color: #ff8a85;
    border-color: rgba(255,59,48,.20);
    flex: 0 0 auto;
    padding: 15px;
  }
  .btn.danger:hover { background: rgba(255,59,48,.15); }

  /* ── FOOTNOTE ────────────────────────────────────── */
  .footnote {
    font-size: 12px;
    color: var(--muted-2);
    line-height: 1.6;
  }

  /* ── MOBILE ──────────────────────────────────────── */
  @media (max-width: 560px) {
    .shell { border: 0; }
    .inner { padding: 28px 20px calc(32px + var(--safe-bottom)); gap: 32px; }
    .brand { font-size: 1.35rem; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="shell">

    <header class="topbar">
      <a class="back-btn" href="javascript:history.back()" aria-label="Go back">
        <span class="material-symbols-rounded">arrow_back</span>
        <span>Back</span>
      </a>
      <div class="brand">Shared.</div>
      <div id="typeChipEl" class="type-badge">post</div>
    </header>

    <div class="body">
      <div class="inner">

        <!-- ── MEDIA ───────────────────────────────── -->
        <section class="section">
          <div class="section-head">
            <div class="section-title">Media</div>
            <div class="section-sub">image or video</div>
          </div>

          <div id="dropzone" class="dropzone" role="button" tabindex="0" aria-label="Choose a file">
            <div class="dz-icon">
              <span class="material-symbols-rounded">image</span>
            </div>
            <div class="dz-title">Choose a file</div>
            <div class="dz-sub">Drag & drop here, or tap to browse</div>
            <input id="fileInput" class="file-input" type="file" accept="image/*,video/*" aria-label="File input" />
          </div>

          <div id="preview" class="preview">
            <button class="preview-remove" id="previewRemove" type="button" aria-label="Remove file">
              <span class="material-symbols-rounded">close</span>
            </button>
          </div>

          <div id="progressWrap" class="progress-wrap">
            <div class="progress-label" id="progressLabel">Uploading…</div>
            <div class="progress-track">
              <div class="progress-fill" id="progressFill"></div>
            </div>
          </div>
        </section>

        <hr class="divider" />

        <!-- ── DETAILS ─────────────────────────────── -->
        <section class="section">
          <div class="section-head">
            <div class="section-title">Details</div>
          </div>

          <div class="field">
            <div class="field-label">Caption</div>
            <textarea id="captionInput" class="textarea" placeholder="Write something about this post…"></textarea>
          </div>

          <div class="field">
            <div class="field-label">Tags</div>
            <input id="tagsInput" class="input" type="text" placeholder="music, art, night" autocomplete="off" />
          </div>

          <div class="field search-wrap">
            <div class="field-label">Location</div>
            <input id="locationSearch" class="input" type="text" placeholder="Search a place" autocomplete="off" />
            <div id="locationSuggestions" class="suggestions"></div>
          </div>
          <input id="locationInput" type="hidden" />
        </section>

        <hr class="divider" />

        <!-- ── MUSIC ───────────────────────────────── -->
        <section class="section">
          <div class="section-head">
            <div class="section-title">Music</div>
            <div class="section-sub">via Deezer</div>
          </div>

          <div id="musicPill" class="music-pill">
            <img id="musicPillCover" class="music-pill-cover" src="" alt="" />
            <div class="music-pill-info">
              <div id="musicPillTitle" class="music-pill-title"></div>
              <div id="musicPillArtist" class="music-pill-artist"></div>
            </div>
            <button class="music-pill-clear" id="musicPillClear" type="button" aria-label="Remove track">
              <span class="material-symbols-rounded">close</span>
            </button>
          </div>

          <div class="field search-wrap">
            <div class="field-label">Search track</div>
            <input id="musicSearch" class="input" type="text" placeholder="Artist, song title…" autocomplete="off" />
            <div id="musicSuggestions" class="suggestions"></div>
          </div>

          <input id="musicTitle" type="hidden" />
          <input id="musicArtist" type="hidden" />
          <input id="musicPreviewInput" type="hidden" />
          <input id="musicCoverInput" type="hidden" />
        </section>

        <hr class="divider" />

        <!-- ── PUBLISH ─────────────────────────────── -->
        <section class="section">
          <div id="status" class="status">Ready to publish.</div>

          <div class="actions">
            <button id="submitBtn" class="btn primary" type="button">
              <span class="material-symbols-rounded">cloud_upload</span>
              <span>Publish</span>
            </button>
            <button id="clearBtn" class="btn icon-only" type="button" aria-label="Clear form">
              <span class="material-symbols-rounded">restart_alt</span>
            </button>
            <button id="cancelBtn" class="btn danger" type="button" aria-label="Cancel">
              <span class="material-symbols-rounded">close</span>
            </button>
          </div>

          <div class="footnote">
            Posts are visible to everyone. Avoid sharing private or sensitive content.
          </div>
        </section>

      </div>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL      = "https://cnhaonawapuahzoctqav.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGFvbmF3YXB1YWh6b2N0cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQyNTAsImV4cCI6MjA5MTkyMDI1MH0._11u3YOxSawQG6g9vHdHylcEHI8mIVJx_xAjGtArNes";
const supabase     = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const BUCKET       = "shared";

const els = {
  typeChip:          document.getElementById("typeChipEl"),
  dropzone:          document.getElementById("dropzone"),
  fileInput:         document.getElementById("fileInput"),
  preview:           document.getElementById("preview"),
  previewRemove:     document.getElementById("previewRemove"),
  progressWrap:      document.getElementById("progressWrap"),
  progressFill:      document.getElementById("progressFill"),
  progressLabel:     document.getElementById("progressLabel"),
  captionInput:      document.getElementById("captionInput"),
  tagsInput:         document.getElementById("tagsInput"),
  locationSearch:    document.getElementById("locationSearch"),
  locationSuggestions: document.getElementById("locationSuggestions"),
  locationInput:     document.getElementById("locationInput"),
  musicPill:         document.getElementById("musicPill"),
  musicPillCover:    document.getElementById("musicPillCover"),
  musicPillTitle:    document.getElementById("musicPillTitle"),
  musicPillArtist:   document.getElementById("musicPillArtist"),
  musicPillClear:    document.getElementById("musicPillClear"),
  musicSearch:       document.getElementById("musicSearch"),
  musicSuggestions:  document.getElementById("musicSuggestions"),
  musicTitle:        document.getElementById("musicTitle"),
  musicArtist:       document.getElementById("musicArtist"),
  musicPreviewInput: document.getElementById("musicPreviewInput"),
  musicCoverInput:   document.getElementById("musicCoverInput"),
  status:            document.getElementById("status"),
  submitBtn:         document.getElementById("submitBtn"),
  clearBtn:          document.getElementById("clearBtn"),
  cancelBtn:         document.getElementById("cancelBtn"),
};

let selectedFile  = null;
let currentUser   = null;
let musicTimer    = null;
let locTimer      = null;
let jsonpId       = 0;

// ── INIT ────────────────────────────────────────────────
const params     = new URLSearchParams(location.search);
els.typeChip.textContent = params.get("type") || "post";

const { data: authData } = await supabase.auth.getUser();
currentUser = authData?.user || null;
if (!currentUser) setStatus("You must be signed in to upload.", "error");

// ── STATUS ──────────────────────────────────────────────
function setStatus(msg, type = "") {
  els.status.textContent = msg || "";
  els.status.className   = `status${type ? " " + type : ""}`;
}

// ── PROGRESS ────────────────────────────────────────────
function showProgress(pct, label = "Uploading…") {
  els.progressWrap.classList.add("show");
  els.progressFill.style.width = `${pct}%`;
  els.progressLabel.textContent = label;
}
function hideProgress() {
  els.progressWrap.classList.remove("show");
  els.progressFill.style.width = "0%";
}

// ── PREVIEW ─────────────────────────────────────────────
function renderPreview(file) {
  [...els.preview.children].forEach(c => { if (c !== els.previewRemove) c.remove(); });
  if (!file) { els.preview.classList.remove("show"); return; }
  const url    = URL.createObjectURL(file);
  const isVid  = file.type.startsWith("video/");
  const node   = document.createElement(isVid ? "video" : "img");
  node.src     = url;
  if (isVid) { node.controls = true; node.muted = true; node.playsInline = true; node.loop = true; }
  els.preview.insertBefore(node, els.previewRemove);
  els.preview.classList.add("show");
}
function clearPreview() {
  selectedFile = null;
  els.fileInput.value = "";
  [...els.preview.children].forEach(c => { if (c !== els.previewRemove) c.remove(); });
  els.preview.classList.remove("show");
}
els.previewRemove.addEventListener("click", clearPreview);

// ── FILE INPUT ───────────────────────────────────────────
function handleFile(file) {
  if (!file) return;
  selectedFile = file;
  renderPreview(file);
  setStatus(file.name);
}
els.fileInput.addEventListener("change", e => handleFile(e.target.files?.[0]));
els.dropzone.addEventListener("click",   () => els.fileInput.click());
els.dropzone.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); els.fileInput.click(); }});
els.dropzone.addEventListener("dragover",  e => { e.preventDefault(); els.dropzone.classList.add("dragover"); });
els.dropzone.addEventListener("dragleave", () => els.dropzone.classList.remove("dragover"));
els.dropzone.addEventListener("drop", e => {
  e.preventDefault();
  els.dropzone.classList.remove("dragover");
  handleFile(e.dataTransfer.files?.[0]);
});

// ── SUGGESTIONS ─────────────────────────────────────────
function showSugg(box, items, renderFn) {
  if (!items.length) { box.innerHTML = ""; box.style.display = "none"; return; }
  box.innerHTML = items.map(renderFn).join("");
  box.style.display = "block";
}
function hideSugg(box) { box.style.display = "none"; box.innerHTML = ""; }

document.addEventListener("click", e => {
  if (!e.target.closest(".search-wrap")) {
    hideSugg(els.musicSuggestions);
    hideSugg(els.locationSuggestions);
  }
});

// ── UTILS ────────────────────────────────────────────────
function esc(str) {
  return String(str ?? "")
    .replaceAll("&","&amp;").replaceAll("<","&lt;")
    .replaceAll(">","&gt;").replaceAll('"',"&quot;");
}

// ── DEEZER ──────────────────────────────────────────────
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = `__jsonp_${++jsonpId}`;
    const s  = document.createElement("script");
    const cleanup = () => { delete window[cb]; s.remove(); };
    window[cb] = d => { cleanup(); resolve(d); };
    s.onerror  = () => { cleanup(); reject(new Error("JSONP failed")); };
    s.src = `${url}&output=jsonp&callback=${cb}`;
    document.head.appendChild(s);
  });
}
async function deezerSearch(q) {
  try {
    const d = await jsonp(`https://api.deezer.com/search?q=${encodeURIComponent(q)}`);
    return (d?.data || []).slice(0, 6).map(t => ({
      id:      String(t.id),
      title:   t.title || "",
      artist:  t.artist?.name || "",
      cover:   t.album?.cover_xl || t.album?.cover_big || t.album?.cover_medium || "",
      preview: t.preview || ""
    }));
  } catch { return []; }
}

els.musicSearch.addEventListener("input", () => {
  const q = els.musicSearch.value.trim();
  clearTimeout(musicTimer);
  if (q.length < 2) { hideSugg(els.musicSuggestions); return; }
  musicTimer = setTimeout(async () => {
    const items = await deezerSearch(q);
    showSugg(els.musicSuggestions, items, item => `
      <div class="suggestion" data-mid="${esc(item.id)}">
        <img class="sug-thumb" src="${esc(item.cover)}" alt="">
        <div class="sug-meta">
          <div class="sug-title">${esc(item.title)}</div>
          <div class="sug-sub">${esc(item.artist)}</div>
        </div>
      </div>
    `);
    els.musicSuggestions.querySelectorAll("[data-mid]").forEach(el => {
      const item = items.find(r => r.id === el.dataset.mid);
      el.addEventListener("click", () => pickMusic(item));
    });
  }, 240);
});

function pickMusic(track) {
  if (!track) return;
  els.musicTitle.value        = track.title;
  els.musicArtist.value       = track.artist;
  els.musicPreviewInput.value = track.preview;
  els.musicCoverInput.value   = track.cover;
  els.musicPillCover.src      = track.cover;
  els.musicPillTitle.textContent  = track.title;
  els.musicPillArtist.textContent = track.artist;
  els.musicPill.classList.add("show");
  els.musicSearch.value = "";
  hideSugg(els.musicSuggestions);
}
function clearMusic() {
  els.musicTitle.value = els.musicArtist.value = els.musicPreviewInput.value = els.musicCoverInput.value = "";
  els.musicSearch.value = "";
  els.musicPill.classList.remove("show");
}
els.musicPillClear.addEventListener("click", clearMusic);

// ── NOMINATIM ────────────────────────────────────────────
async function nominatim(q) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&addressdetails=1&limit=6&q=${encodeURIComponent(q)}`, { headers: { "Accept-Language": "it" }});
    return (await r.json()).slice(0, 6);
  } catch { return []; }
}

els.locationSearch.addEventListener("input", () => {
  const q = els.locationSearch.value.trim();
  clearTimeout(locTimer);
  if (q.length < 2) { hideSugg(els.locationSuggestions); return; }
  locTimer = setTimeout(async () => {
    const results = await nominatim(q);
    showSugg(els.locationSuggestions, results, item => `
      <div class="suggestion" data-dn="${esc(item.display_name || '')}">
        <div class="sug-meta">
          <div class="sug-title">${esc(item.name || item.display_name || '')}</div>
          <div class="sug-sub">${esc(item.display_name || '')}</div>
        </div>
      </div>
    `);
    els.locationSuggestions.querySelectorAll("[data-dn]").forEach(el => {
      const item = results.find(r => r.display_name === el.dataset.dn);
      el.addEventListener("click", () => {
        els.locationInput.value  = item?.display_name || "";
        els.locationSearch.value = item?.display_name || "";
        hideSugg(els.locationSuggestions);
      });
    });
  }, 240);
});

// ── IMAGE PROCESSING ─────────────────────────────────────
async function imageToJpeg(file) {
  const url = URL.createObjectURL(file);
  try {
    const img = new Image(); img.src = url; await img.decode();
    const size = Math.min(img.width, img.height);
    const sx   = Math.floor((img.width  - size) / 2);
    const sy   = Math.floor((img.height - size) / 2);
    const c    = document.createElement("canvas");
    c.width = c.height = 800;
    const ctx = c.getContext("2d");
    ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 800, 800);
    ctx.drawImage(img, sx, sy, size, size, 0, 0, 800, 800);
    const blob = await new Promise((res, rej) => c.toBlob(b => b ? res(b) : rej(new Error("Conversion failed")), "image/jpeg", 0.92));
    return { blob, ext: "jpg", type: "image/jpeg" };
  } finally { URL.revokeObjectURL(url); }
}
async function prepareAsset(file) {
  if (file.type.startsWith("image/")) return imageToJpeg(file);
  return { blob: file, ext: (file.name.split(".").pop() || "bin").toLowerCase(), type: file.type || "application/octet-stream" };
}

// ── UPLOAD ───────────────────────────────────────────────
async function uploadAsset(file) {
  showProgress(10, "Processing…");
  const stamp  = Date.now();
  const safe   = (file.name || `upload_${stamp}`).replace(/[^a-zA-Z0-9_.-]/g, "_");
  const asset  = await prepareAsset(file);
  const base   = safe.replace(/\.[^.]+$/, "");
  const path   = `${currentUser?.id || "anonymous"}/${stamp}_${base}.${asset.ext}`;

  showProgress(35, "Uploading…");
  const { error } = await supabase.storage
    .from(BUCKET)
    .upload(path, asset.blob, { cacheControl: "3600", upsert: false, contentType: asset.type });
  if (error) throw error;

  showProgress(85, "Saving…");
  const { data } = supabase.storage.from(BUCKET).getPublicUrl(path);
  return data?.publicUrl || "";
}

// ── SUBMIT ───────────────────────────────────────────────
els.submitBtn.addEventListener("click", async () => {
  if (!selectedFile) { setStatus("Choose a media file first.", "error"); return; }
  if (!currentUser)  { setStatus("You must be signed in.", "error"); return; }

  els.submitBtn.disabled = true;
  setStatus("Publishing…");
  try {
    const mediaUrl = await uploadAsset(selectedFile);
    const { error } = await supabase.from("posts").insert({
      user_id:      currentUser.id,
      image_url:    mediaUrl,
      caption:      els.captionInput.value.trim() || null,
      tags:         els.tagsInput.value.split(",").map(t => t.trim()).filter(Boolean),
      location:     els.locationInput.value.trim() || null,
      song_title:   els.musicTitle.value.trim()        || null,
      song_author:  els.musicArtist.value.trim()       || null,
      song_preview: els.musicPreviewInput.value.trim() || null,
      song_cover:   els.musicCoverInput.value.trim()   || null,
      created_at:   new Date().toISOString()
    });
    if (error) throw error;
    showProgress(100, "Done!");
    setStatus("Post published!", "ok");
    setTimeout(() => { window.location.href = "index.html"; }, 800);
  } catch (err) {
    console.error(err);
    setStatus(err?.message || "Upload failed.", "error");
    hideProgress();
    els.submitBtn.disabled = false;
  }
});

// ── CLEAR ────────────────────────────────────────────────
els.clearBtn.addEventListener("click", () => {
  clearPreview(); clearMusic();
  els.captionInput.value = "";
  els.tagsInput.value    = "";
  els.locationSearch.value = "";
  els.locationInput.value  = "";
  hideSugg(els.locationSuggestions);
  hideProgress();
  setStatus("Ready to publish.");
});

// ── CANCEL ───────────────────────────────────────────────
els.cancelBtn.addEventListener("click", () => { window.location.href = "index.html"; });
</script>
