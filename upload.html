<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Shared. — New</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />

<style>
:root{
  --bg:#050505;
  --muted:rgba(255,255,255,.6);
  --border:rgba(255,255,255,.1);
  --max:640px;
}

/* RESET */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Archivo Black',sans-serif;
  background:var(--bg);
  color:#fff;
  overflow:hidden;
}

/* LAYOUT */
.page{display:flex;justify-content:center;height:100dvh}
.shell{width:100%;max-width:var(--max);display:flex;flex-direction:column;border:1px solid var(--border);border-top:0;border-bottom:0}

/* TOP */
.topbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 20px;
  border-bottom:1px solid var(--border);
}
.brand{font-size:22px;letter-spacing:-.05em}

/* PILLS */
.type-selector{
  display:flex;
  gap:10px;
  padding:18px;
}

.type-pill{
  flex:1;
  padding:14px 16px;
  border-radius:999px;
  border:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  cursor:pointer;
  transition:.2s;
  user-select:none;
  font-size:13px;
  opacity:.7;
}

.type-pill .icon{font-size:18px}

.type-pill.post.active{
  background:#fff;
  color:#000;
  opacity:1;
}

.type-pill.moment.active{
  background:#000;
  color:#fff;
  border-color:#fff;
  opacity:1;
}

/* BODY */
.body{overflow:auto;flex:1}
.inner{padding:20px;display:flex;flex-direction:column;gap:22px}

/* DROP */
.dropzone{
  border:1px dashed var(--border);
  border-radius:20px;
  padding:28px;
  text-align:center;
  cursor:pointer;
}
.file-input{display:none}

/* PREVIEW */
.preview img,.preview video{
  width:100%;
  border-radius:16px;
  margin-top:10px;
}

/* INPUTS */
input,textarea{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:#0a0a0a;
  color:#fff;
  outline:none;
}

textarea{min-height:100px}

/* BUTTONS */
.actions{display:flex;gap:10px}
.btn{
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:transparent;
  color:#fff;
  cursor:pointer;
}
.btn.primary{
  flex:1;
  background:#fff;
  color:#000;
}

/* STATUS */
.status{font-size:12px;color:var(--muted)}
</style>
</head>

<body>

<div class="page">
<div class="shell">

<div class="topbar">
  <div></div>
  <div class="brand">Shared.</div>
  <div></div>
</div>

<!-- TYPE -->
<div class="type-selector">
  <div class="type-pill post active" id="pillPost">
    <span class="material-symbols-rounded icon">photo_library</span>
    Post
  </div>

  <div class="type-pill moment" id="pillMoment">
    <span class="material-symbols-rounded icon">bolt</span>
    Moment
  </div>
</div>

<div class="body">
<div class="inner">

<!-- MEDIA -->
<div class="dropzone" id="dropzone">
  Tap to upload media
  <input type="file" id="fileInput" class="file-input" accept="image/*,video/*">
</div>

<div id="preview"></div>

<!-- CAPTION -->
<textarea id="caption" placeholder="Write something..."></textarea>

<!-- LOCATION -->
<input id="location" placeholder="Location">

<!-- MUSIC -->
<input id="music" placeholder="Song (optional)">

<div class="status" id="status">Ready</div>

<!-- ACTIONS -->
<div class="actions">
  <button class="btn primary" id="publish">Publish</button>
</div>

</div>
</div>

</div>
</div>

<script>
const API = "https://api.sharedweb.org";

const token = localStorage.getItem("token");
const userId = localStorage.getItem("user_id");

if (!token) location.href = "home.html";

/* STATE */
let type = "post";
let file = null;

/* ELEMENTS */
const pillPost = document.getElementById("pillPost");
const pillMoment = document.getElementById("pillMoment");
const fileInput = document.getElementById("fileInput");
const dropzone = document.getElementById("dropzone");
const preview = document.getElementById("preview");
const caption = document.getElementById("caption");
const locationEl = document.getElementById("location");
const music = document.getElementById("music");
const status = document.getElementById("status");
const publish = document.getElementById("publish");

/* TYPE SWITCH */
function setType(t){
  type = t;

  pillPost.classList.toggle("active", t==="post");
  pillMoment.classList.toggle("active", t==="moment");

  status.textContent = t === "post"
    ? "Creating Post"
    : "Creating Moment";
}

pillPost.onclick = () => setType("post");
pillMoment.onclick = () => setType("moment");

/* FILE */
dropzone.onclick = () => fileInput.click();

fileInput.onchange = e=>{
  file = e.target.files[0];
  if(!file) return;

  const url = URL.createObjectURL(file);

  preview.innerHTML = file.type.startsWith("video")
    ? `<video src="${url}" controls></video>`
    : `<img src="${url}">`;
};

/* UPLOAD */
async function upload(f){
  const fd = new FormData();
  fd.append("file", f, `${userId}_${Date.now()}.jpg`);

  const res = await fetch(`${API}/upload`,{
    method:"POST",
    headers:{ Authorization:`Bearer ${token}` },
    body:fd
  });

  if(!res.ok) throw new Error("upload failed");
  return await res.json();
}

/* PUBLISH */
publish.onclick = async ()=>{
  if(!file){
    status.textContent = "Select media first";
    return;
  }

  publish.disabled = true;
  status.textContent = "Uploading...";

  try{
    const up = await upload(file);
    const url = up.url || up.image_url || "";

    const body = {
      content: caption.value,
      image_url: url,
      location: locationEl.value || null,
      song_title: music.value || null,
      type
    };

    const endpoint =
      type === "moment"
        ? `${API}/moments`
        : `${API}/posts`;

    const res = await fetch(endpoint,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":`Bearer ${token}`
      },
      body:JSON.stringify(body)
    });

    if(!res.ok) throw new Error("publish failed");

    status.textContent = "Posted!";
    setTimeout(()=>location.href="index.html",800);

  }catch(e){
    status.textContent = e.message;
    publish.disabled = false;
  }
};
</script>

</body>
</html>
